DefaultDescription=The PS-1 is a Japanese flying boat designed for anti-submarine warfare and maritime patrol. Entering service in 1971 with the JMSDF, it carried homing torpedoes, depth charges, and 5" Zuni rockets, as well as sonobuoys. Incorporating many new innovations at the time, the PS-1 was capable of landing in seas as high as 3 meters (9.8ft). Later modifications of the type included the US-1A search and rescue aircraft, and a single aircraft was modified experimentally as an air tanker for aerial firefighting. The PS-1 was phased out in the 1980s in favor of the P-3 Orion for the maritime patrol mission.
