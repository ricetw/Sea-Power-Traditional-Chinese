[usn_qh-50c]
Type=Drone Helicopter
Default=QH-50C,QH-50
DefaultDescription=The QH-50 DASH (Drone Anti-Submarine Helicopter) is intended to act as a long range anti-submarine weapon for ships otherwise too small to accomodate a hangar and helicopter. A major component of the FRAM program, the QH-50 was assigned to older ships, such as the Gearing-class destroyers, and also equipped the postwar ocean escorts. The helicopter suffered from a high failure rate as it proved unreliable in shipborne service, and was withdrawn from service by 1973. The JMSDF were the only foreign operator of the QH-50, who had greater success in operations thanks to regular service, later retiring them in 1977. The QH-50C was the first production variant, powered by a 300 shp turboshaft engine, with 373 aircraft built.
Squadron1=QH-50,QH-50
Callsigns=Squadron1,Dash

