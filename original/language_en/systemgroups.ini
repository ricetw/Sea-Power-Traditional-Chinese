#Guns
MK37_GFCS_MK4=Mark 37 GFCS (Radar Mark 4 "FD")|The Mark 37 Gun Fire Control System (GFCS) controls the dual-purpose 5"/38-caliber gun. The director is equipped with the Mark 4 "FD" ranging radar, a highly successful combination allowing engagement of both air and surface targets.
MK37_GFCS_MK12=Mark 37 GFCS (Radar Mark 12/22)|The Mark 37 Gun Fire Control System (GFCS) controls the dual-purpose 5"/38-caliber gun. The director is equipped with the Mark 12 ranging radar as well as the Mark 22 heightfinder. This combination of director and radar sets equipped almost all new construction and refitted warships by mid-1944.
MK37_GFCS_MK28=Mark 37 GFCS (Radar Mark 28)|The Mark 37 Gun Fire Control System (GFCS) controls the dual-purpose 5"/38-caliber gun. The director is equipped with the small dish of the Mark 28 ranging radar, a weight-saving innovation for older refitted warships where topweight concerns did not allow for the standard Mark 12 and Mark 22 installations usually fitted to the Mark 37 director.
MK37_GFCS=MK37 GFCS|The Mark 37 Gun Fire Control System (GFCS) controls the dual-purpose 5"/38-caliber gun. The director is equipped with the Mark 25 ranging radar, a standard combination for all postwar Mark 37 installations. In this guise, the Mark 37 GFCS remained in service until the early 1990s.
MK38_GFCS_MK3=Mark 38 GFCS (Radar Mark 3 "FC")|The Mark 38 Gun Fire Control System (GFCS) directs battleship caliber main battery guns, providing highly accurate fire control against sea and land targets. This system incorporated an armored director positioned atop the large tower superstructures of the North Carolina, South Dakota, and Iowa class battleships. It also equipped the Alaska class large cruisers. This director is equipped with the Mark 3 "FC" ranging radar, one of the first American fire control sets. This director and radar combination saw significant service in 1942 and 1943, before its replacement by the Mark 8 and later Mark 13 sets.
MK38_GFCS=Mark 38 GFCS (Radar Mark 13)|The Mark 38 Gun Fire Control System (GFCS) directs battleship caliber main battery guns, providing highly accurate fire control against sea and land targets. This system incorporated an armored director positioned atop the large tower superstructures of the North Carolina, South Dakota, and Iowa class battleships. It also equipped the Alaska class large cruisers. This director is equipped with the Mark 13 ranging radar, and remained in service until the early 1990s with the retirement of the Iowa class.
MK56_GFCS=MK56_GFCS|The Mk-56 gunfire control system is used on ships equipped with 3" and 5" guns. An X-band radar tracker allows the ships to engage both surface targets and fast air targets alike.
MK63_GFCS=MK63_GFCS|The Mk-63 gunfire control system is used on ships equipped with 3" and 5" guns. An X-band radar tracker allows the ships to engage both surface targets and fast air targets alike.
MK68_GFCS=MK68 GFCS|The Mk-68 gunfire control system is used on ships equipped with the Mk-42 5"/54 gun mounts. An X-band radar tracker allows the ships to engage both surface targets and fast air targets alike.
MK86_GFCS=MK86 GFCS|The Mk-86 gunfire control system is used on ships equipped with the Mk-45 5"/54 gun mounts. An X-band radar tracker allows the ships to engage both surface targets and fast air targets alike. Unlike previous directors, it is unmanned and uses remote TV cameras for optical backup.
MK92_FCS=MK92 FCS|The Mk-92 is a licensed version of the Dutch WM-25 fire-control radar used by the USN on the Oliver Hazard Perry class frigates and Pegasus hydrofoils, where it controls the ships Standard MR missiles and 76mm gun.
MK92_SearchRadar=MK92 Radar|The Mk-92 includes two radars, a search and tracking set, and a continuous-wave fire control radar. This is the search radar set, and it can track 2 surface targets at once, and cue gunfire towards them.
SPQ-9=SPQ-9|The AN/SPQ-9 is the X-band surface search and tracking radar associated with the Mk-86 gunfire control system. Notably, this radar can track low flying air targets, such as sea-skimming cruise missiles, at short ranges, albeit with a very limited altitude capability.

