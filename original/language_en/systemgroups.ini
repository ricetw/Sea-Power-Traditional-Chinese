AN/APQ-109=AN/APQ-109|The AN/APQ-109 is a medium-range multi-mode radar used on the F-4D. Has no look-down/shoot-down capability, therefore detection and firing range is extremely limited against low-flying aircraft.
AN/APQ-120=AN/APQ-120|The AN/APQ-120 is a medium-range multi-mode radar used on the F-4E. Has no look-down/shoot-down capability, therefore detection and firing range is extremely limited against low-flying aircraft.
AN/AWG-10A=AN/AWG-10A|The AN/AWG-10A is a long-range multi-mode integrated radar used on the F-4J. Features pulse-doppler capabilities and is the first US fighter radar to be capable of look-down/shoot-down.
AN/AWG-10B=AN/AWG-10B|The AN/AWG-10B is a long-range multi-mode integrated radar used on the F-4S. Features pulse-doppler capabilities and is the first US fighter radar to be capable of look-down/shoot-down.\nUpgraded from the AWG-10A with solid-state electronics and improved low-altitude performance.
AN/AWG-11=AN/AWG-11|The AN/AWG-11 is a long-range multi-mode integrated radar. Features pulse-doppler capabilities and is the first US fighter radar to be capable of look-down/shoot-down.\nThis is the export model of AWG-10A from the F-4J, and is used on British F-4 Phantoms, and the JASDF T-2.
AN/AWG-12=AN/AWG-12|The AN/AWG-12 is a long-range multi-mode integrated radar. Features pulse-doppler capabilities and is the first US fighter radar to be capable of look-down/shoot-down.\nThis is the export model of AWG-10B from the F-4S, and is used on British F-4 Phantoms, and the JASDF F-1.
