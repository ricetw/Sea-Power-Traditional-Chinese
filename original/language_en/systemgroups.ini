US_Aircraft_ESM=ESM|Electronic Support Measures systems intercept radar signals to provide a passive detection capability without the need to reveal ones location by radiating radar.

WLR-1=AN/WLR-1C ESM|The AN/WLR-1C electronic warfare suite is a combined radio intercept and warning system used on some US ships and earlier submarines. Features high sensitivity, but a relatively slow identification rate.
AN/WLR-6=AN/WLR-6 ESM|The AN/WLR-6 ESM system is an upgraded radio warning and intercept system for the early Sturgeon class submarines, utilizing the large sail and digital electronics to increase the range and accuracy of this system over the previous WLR-1 radio warning system.
AN/WLQ-4=AN/WLQ-4 ELINT|The AN/WLQ-4 "Sea Nymph" is an advanced ELINT and SIGINT sensor suite for upgraded Sturgeon class submarines, with very high accuracy and significant over-the-horizon capabilities.
AN/WLR-8=AN/WLR-8 ELINT|The AN/WLR-8 is a compact ELINT system used on Los Angeles class SSNs, and was a direct successor to the AN/WLR-1 ESM system. Primarily, this ESM suite was designed to be more compact than the larger WLQ-4, so it could fit inside of the small mast of the Los Angeles class submarine.

AN/SLQ-32_RWR=ESM|The AN/SLQ-32(v)1 electronic warfare suite detects enemy missile seekers and targeting radars, providing a missile warning capability.
AN/SLQ-32_ESM=ESM|The AN/SLQ-32(v)2 and (v)3 electronic warfare suites retain the missile warning capability of (v)1 but adds the ability to detect surface-search and early warning radars.

