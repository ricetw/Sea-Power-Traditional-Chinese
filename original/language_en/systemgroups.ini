#---------------------------------------- Radar ----------------------------------------
#---------- Surface ships ----------
#---Air/Air&Surface---
CXAM=CXAM|CXAM was the prototype of US Navy long-range air search radars. This set equipped larger combatants just prior to the start of World War II. It was a large 18 x 16 foot mattress with the ability to elevate, though its beam was too broad to allow for heightfinding. The CXAM led directly to the wartime air search radars, almost all of which were incremental improvements over this baseline design.
CXAM-1=CXAM-1|CXAM-1 was an incremental improvement over CXAM, with fourteen total sets delivered and installed on battleships, cruisers, and aircraft carriers. The antenna retained the mattress appearance but the elevating capability was removed. Accuracy was improved to 200 yards, and this set remained in service aboard some ships into 1943. It was replaced on large combatants by the SK or SK-2 set.
SA=SA|The SA series of sets was intended to replicate the functionality and performance of CXAM with a smaller antenna for use aboard escort ships and auxiliaries. Relatively successful, the SA series became the standard air search set for destroyer escorts and frigates, and some were also fitted to destroyers and light cruisers. This type also equipped ships of the Free French forces which were refitted in US yards late in the war.
SC-1=SC-1|Like SA, the SC was an attempt to bring the performance of the CXAM to smaller ships by using a smaller antenna. Unfortunately the smaller antenna led to lower effective range, and the operating forces disliked the baseline SC. SC-1 was then introduced in January 1942 with double the power and twice the range, and soon all SCs were converted. This set equipped destroyers and auxiliaries early in the war before being replaced by SC-2 as that set became available.
SC-2=SC-2|SC-2 improved on the SC-1 by greatly enlarging the antenna. This set incorporated provisions for the BG and BL IFF systems, and became the primary radar for destroyers through the end of the war. Slightly improved variants of SC-2 (SC-3, SC-4, and SC-5) remained in service on destroyers until 1963.
SK=SK|SK was the standard wartime air search set for large ships. Essentially an SC-2 set with a CXAM-sized antenna, it was a two-dimensional radar system providing only azimuth and slant range data. Additional sensors were required for heightfinding.
SK-2=SK-2|This set was an incremental improvement over SK, with a 17 foot dish antenna intended to reduce side lobes. Late in the war, both SK and SK-2 were criticized for their inability to detect high-flying aircraft due to low beam elevation. 75 sets were produced, equipping larger combatants as they entered service or came into yards for refit. 
SM=SM|SM was the first US radar designed for fighter direction, incorporating a conically scanned "pencil beam" to determine height of an air target, a capability not available to earlier air search radars. SM was very heavy at 18,000lbs (4,000lbs for the antenna alone), and could only be mounted on large aircraft carriers. Later, SM-1 and SP were built for smaller ships.
SP=SP|SP was the lightweight successor to the SM heightfinding radar. This set could incorporate two different antennas depending on the ship receiving it, with a smaller antenna made available for destroyers and light carriers. This set equipped the Gearing class radar picket destroyers (DDRs) that operated off Okinawa. 300 sets were built, and by the end of the war it was common to see capital ships mounting an SP on the mainmast complementing an SK or SK-2 on the foremast.
SR=SR|SR was the first entirely new air search set since CXAM, incorporating many new features which had been pioneered by previous radar sets. The antenna was roughly the same size as the SC-2 with more than double the power, and equipped destroyers towards the end of the war. It also equipped larger combatants as a backup air search radar, and remained in service until 1961.
SR-2=SR-2|SR-2 was a 50cm 2D air search set originally intended for destroyer escorts, but after production began it proved far too large. The pilot models equipped the large carriers of the Midway-class as well as several light cruisers and the first four of the submarine radar pickets (SSRs). This set was replaced by the AN/SPS-6 due to its inferior performance.
SR-3=SR-3|SR-3 and SR-6 were designed as replacements for SK and SC across the fleet, using L-band for better performance with less fading. Both sets performed poorly in reality due to the antennas chosen, which were described as "not enough antenna" in a postwar report. SR-6 was a lighter weight version of SR-3, with a smaller antenna.
SR-6=SR-6|SR-3 and SR-6 were designed as replacements for SK and SC across the fleet, using L-band for better performance with less fading. Both sets performed poorly in reality due to the antennas chosen, which were described as "not enough antenna" in a postwar report. SR-6 was a lighter weight version of SR-3, with a smaller antenna.
SPS-6=SPS-6|The AN/SPS-6 is a two-dimensional radar used by the US Navy as a first-generation air-search radar after World War II, and was widely exported to allies. As the AN/SPS-6 is a 2D radar it provides only azimuth and slant range data. Additional sensors must be used to determine height.
SPS-12=SPS-12|In service from the 1950s to the 1980s the AN/SPS-12 is a medium-range two-dimensional air and surface surveillance radar.
SPS-29=SPS-29|The AN/SPS-29 is a two-dimensional radar used by the US Navy as an early warning radar after World War II, and was equipped aboard naval ships during the Cold War. As a 2D radar it provides only azimuth and slant range data. Additional sensors must be used to determine height.
SPS-30=SPS-30|A modernised version of the AN/SPS-8 combined with a more powerful transmitter the AN/SPS-30 is a shipboard integrated S band search and height finding radar systems used for the detection and surveillance of aircraft.
UPA-43=UPA-43|The AN/UPA-43 is an Identification Friend-or-Foe (IFF) interrogator used by the US Navy. Later radars like the AN/SPS-48 feature an integrated IFF interrogator that does away with the need for a separate antenna.
SPS-32=SPS-32|Part of the famous SCANFAR system used by USS Enterprise and USS Long Beach the AN/SPS-32 is the horizontally oriented part of the antenna system and is used primarily for air surveillance.
SPS-33=SPS-33|Part of the famous SCANFAR system used by USS Enterprise and USS Long Beach the AN/SPS-33 is the vertically oriented part of the antenna system and is used primarily for target tracking.
SPS-37=SPS-37|The AN/SPS-37 is a two-dimensional radar used by the US Navy as an early warning radar during the early cold war, and is an improved development of the AN/SPS-29. As a 2D radar it provides only azimuth and slant range data. Additional sensors must be used to determine height.
SPS-39=SPS-39|The AN/SPS-39 is a 3D long-range air search radar use to provide bearing, range and altitude  Like the larger SPS-48, it is mechanically rotated for azimuth but electronically scanned for elevation. The 3D radar acts as an intermediary between the 2D early warning radar and the fire-control radars used for engaging targets.
SPS-40=SPS-40|The AN/SPS-40 is a long range 2D air search radar common on many US ships. As a 2D radar it provides only azimuth and slant range data. Additional sensors must be used to determine height.
SPS-43=SPS-43|The AN/SPS-43 is a very long-range air-search radar system used primarily on US carriers and guided-missile cruisers. Operating in the VHF band the AN/SPS-43 also employs frequency-hopping to counter jamming attempts. As a 2D radar it provides only azimuth and slant range data.
SPS-48=SPS-48|The AN/SPS-48 is a long-range, 3D, Air-search radar. Target Azimuth is detected through mechanical scanning by rotating the whole antenna on its base, while Elevation is determined through electrical scanning. The 3D radar acts as an intermediary between the 2D early warning radar and the fire-control radars used for engaging targets.
SPS-48E=SPS-48E|The AN/SPS-48E is a long-range, 3D, Air-search radar. Target Azimuth is detected through mechanical scanning by rotating the whole antenna on its base, while Elevation is determined through electrical scanning. The 3D radar acts as an intermediary between the 2D early warning radar and the fire-control radars used for engaging targets.\nThis is the NTU-specific upgraded SPS-48 with a new antenna and significantly improved low-altitude and ECCM capabilities, and has an even longer effective range.
SPS-49=SPS-49|The AN/SPS-49 is a long range  2D air search radar that and the successor to the SPS-40. It is a primary air-search radar for many US and allied ships. On older ships it replaced the SPS-40 during the NTU upgrade programme.
SPS-49V5=SPS-49(V)5|The AN/SPS-49(V)5 is a long range  2D air search radar that and the successor to the SPS-40. It is a primary air-search radar for many US and allied ships. On older ships it replaced the SPS-40 during the NTU upgrade programme.\nThis is an upgraded, higher-power model derived from the NTU program and backfitted to other ships, and posesses a lower minimum altitude and better ECCM performance.
SPS-52=SPS-52|The AN/SPS-52 is a 3D long-range air search radar use to provide bearing, range and altitude  Like the larger SPS-48, it is mechanically rotated for azimuth but electronically scanned for elevation. The 3D radar acts as an intermediary between the 2D early warning radar and the fire-control radars used for engaging targets.
SPN-43=SPN-43|AN/SPN-43 is a 2D ATC radar used aboard aircraft carriers and other air-capable ships to provide identification and control of aircraft within a 50 mile range from the ship.
SPY-1A=SPY-1A|The AN/SPY-1 is a long range 3D passive electronically scanned array and is a key component of the AEGIS combat system. Four distributed, computer-controlled antennae are used to provide a continous 360-degree coverage of the airspace around the ship. 
MK-23_TAS=MK-23 TAS|The Mk. 23 TAS (Target Acquisition System) is a small, fast-rotating medium-range 2D radar for detecting sea-skimming or high-angle missile attacks, used in conjunction with the NATO Sea Sparrow point defence system.

#---Surface only---
SPS-10=SPS-10|AN/SPS-10 is a two-dimensional surface search radar equipping many US and allied ships during the post-war and Cold War eras. 
SPS-55=SPS-55|The AN/SPS-55 is a solid state surface search and navigation radar that equips the Spruance class and its derivatives, as well as the Oliver Hazard Perry frigates and Avenger class minesweepers.
SPS-67=SPS-67|The AN/SPS-67 is a short range surface search radar commonly used aboard US ships for the detection and tracking of surface- and very low-flying contacts.

