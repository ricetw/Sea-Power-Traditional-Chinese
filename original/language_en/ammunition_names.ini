[AmmunitionNames]
# ------------------ AAM ------------------
fr_r530em=R530FE (SARH),,SARH AAM,The R530FE is a French semi-active short range air-to-air missile. Being one of the earliest homing air-to-air missiles of French origin, the R530 is not a particularly reliable or potent weapon, but it has a relatively long-burning motor and decent range to its contemporaries of the era.
fr_super-530f=Super-530F,,SARH AAM,The Super-530F is a French semi-active short to medium range air-to-air missile. Roughly analogous to the AIM-7, it is an upgrade over the preceding R530 missile.
fr_r550=R550,Magic 1,AAM,The R550 Magic 1 is a French infrared homing short range air-to-air missile comparable to the US AIM-9. It is rear aspect only.

pla_pl-2=PL-2A,,IR AAM,The PL-2A (霹雳-2) is a Chinese rear-aspect infrared homing air-to-air missile. It is a copy of the Soviet Vympel K-13, with very similar performance. Rear aspect only.
pla_pl-2b=PL-2B,,IR AAM,The PL-2B (霹雳-2) is a Chinese rear-aspect infrared homing air-to-air missile. PL-2B uses a longer nosecone to house a slightly improved seeker, but is otherwise a minor upgrade in reliability compared to PL-2A.
pla_pl-5b=PL-5B,,IR AAM,The PL-5B (霹雳-5) is a Chinese rear-aspect infrared homing air-to-air missile. Developed alongside PL-2B, PL-5B was born out of the failed radar-homing PL-5A missile. It uses an infrared seeker derived from PL-2B, but with a more capable airframe in terms of range and turn performance. Rear aspect only.
pla_pl-5c=PL-5C,,IR AAM,The PL-5C (霹雳-5) is a Chinese all-aspect infrared homing air-to-air missile. A major improvement on the PL-2 and PL-5B series, PL-5C incorporates a cutting edge crossed-array seeker, which allows for all-aspect firing and a significant degree of countermeasure resistance. Also features a longer burning motor, and improved turn performance.

usaf_aim-9e=AIM-9E,Sidewinder,AAM,The AIM-9E Sidewinder is an American infrared homing air-to-air missile. The Echo has significantly improved performance in all areas than earlier versions, with improved acquisition envelope and increased range. Rear aspect only.
usaf_aim-9j=AIM-9J,Sidewinder,AAM,The AIM-9J Sidewinder is an American infrared homing air-to-air missile. The Juliet has significant changes over the Echo particularly to the control systems, with solid-state electronics replacing earlier vaccum-tube electronics. Probability of kill is improved from previous versions, but it is still rear aspect only. 
usaf_aim-9p=AIM-9P,Sidewinder,AAM,The AIM-9P Sidewinder is an American infrared homing air-to-air missile. The Papa model is the export version of the Juliet model, and features a new fuze, new motor, improved seeker, and allows for side-aspect shots, alongside greater reliability.

usn_aim-7d=AIM-7D,Sparrow,AAM,The AIM-7D Sparrow is an American semi-active radar homing air-to-air missile. The Delta was optimised for increased closing rates compared to the earlier Charlie.\nNotably deficient against low-flying targets, and has a large minimum range.
usn_aim-7e=AIM-7E,Sparrow,AAM,The AIM-7E Sparrow is an American semi-active radar-homing air-to-air missile. The Echo has increased range and performance compared to previous variants.\nNotably deficient against low-flying targets, and has a large minimum range.
usn_aim-7e2=AIM-7E-2,Sparrow,AAM,The AIM-7E-2 "Dogfight" Sparrow is an American semi-active radar-homing air-to-air missile. The Echo-2 is a subvariant of the original Echo model, after deficiencies were found in its performance against fighters in Vietnam. Features a shorter minimum range, slightly better low-altitude performance, and slightly greater maneuverability in the boost phase of flight.
usn_aim-7e4=AIM-7E-4,Sparrow,AAM,The AIM-7E-4 Sparrow is an American semi-active radar-homing air-to-air missile. The Echo-4 is an upgraded US Navy model, to make use of a significantly more powerful radar over earlier fighters, and has slightly improved seeker characteristics against jamming and countermeasures.
usn_aim-7f=AIM-7F,Sparrow,AAM,The AIM-7F Sparrow is an American semi-active radar-homing air-to-air missile. The Foxtrot is a redesign of the original Sparrow III airframe, and incorporates a modern boost-sustain motor for longer range, alongside improved fuzing and a more capable seeker head, with performance enhancements in all aspects.\nDespite this, it's low-altitude and ECCM performance is still not exceptional, and its seeker cannot make full use of this missile's long range..
usn_aim-7m=AIM-7M,Sparrow,AAM,The AIM-7M Sparrow is an American semi-active radar-homing air-to-air missile. The Mike is an upgrade of the Foxtrot model, with a much improved monopulse seeker head, which allows for effective firing against sea-skimming targets, and significantly increases its ECCM capabilities, alongside an increase in effective range due to the new seeker.
usn_aim-9b=AIM-9B,Sidewinder,AAM,The AIM-9B Sidewinder is an American infrared homing air-to-air missile. The Bravo was the first operational variant of the AIM-9 series. Compared to later versions, it has a narrow launch envelope, and a tendency to be easily decoyed by another heat source such as the sun. Needless to say, it is rear-aspect only.
usn_aim-9c=AIM-9C,Sidewinder,AAM,The AIM-9C Sidewinder is an American semi-active radar homing air-to-air missile. The Charlie is the only radar-homing Sidewinder model to enter service, and is identical to the Delta model other than the semi-active radar seeker, which allows for all-aspect shots at longer ranges. Being exclusive to the Navy's F-8, and generally disliked by crews, meant that the AIM-9C was retired only a few years after entering service.
usn_aim-9d=AIM-9D,Sidewinder,AAM,The AIM-9D Sidewinder is an American infrared homing air-to-air missile. The Delta is an improved variant versus the Bravo, sporting an improved seeker, improved warhead and increased range. Rear aspect only.
usn_aim-9g=AIM-9G,Sidewinder,AAM,The AIM-9G Sidewinder is an American infrared homing air-to-air missile. The Golf is an improved variant versus the Delta, with a greater firing angle, and was exported to other nations as well. Rear aspect only.
usn_aim-9h=AIM-9H,Sidewinder,AAM,The AIM-9H Sidewinder is an American infrared homing air-to-air missile. The Hotel is a solid-state version of the Golf model, and features a more sensitive seeker that allows for side-aspect shots as well, alongside improved maneuverability and reliability.
usn_aim-9l=AIM-9L,Sidewinder,AAM,The AIM-9L Sidewinder is an American infrared homing air-to-air missile. The Lima variant was the first Sidewinder with the ability to attack from all directions. Compared to all previous versions, the acquisition envelope is vastly improved, with the ability to engage targets head-on in the merge. A rear-aspect shot still allows for a longer acquisition range, however.
usn_aim-9m=AIM-9M,Sidewinder,AAM,The AIM-9M Sidewinder is an American infrared homing air-to-air missile. The Mike variant is the most modern version in service, and is a Lima model with improved flare rejection capabilities, and a longer seeker range.
usn_aim-54a=AIM-54A,Phoenix,AAM,The AIM-54A Phoenix is an American active radar-homing air-to-air missile. This is the longest range air-to-air missile in the US inventory and is unique to the F-14. Integrated with the advanced AWG-9 radar it provides the F-14 with the ability to engage 6 targets with 1 missile each simultaneously. To achieve this, the missiles fly on autopilot while the computers aboard the plane sample the track-while-scan radar data into track files, which are then used to transmit guidance updates to the missiles while in the midcourse phase, guiding them into a 'basket' where the missile's own active radar homing acquires the target for the terminal phase.

wp_aa-2a=AA-2B,Atoll B,IR AAM,The AA-2A Atoll (Vympel R-3S) is a Soviet rear-aspect infrared homing air-to-air missile. It is a reverse-engineered copy of the American AIM-9B, with minor tweaks to construction and performance, and otherwise performs identically. Rear aspect only.
wp_aa-2c=AA-2C,Atoll C,SARH AAM,The AA-2C Atoll (Vympel K-13/R-3R) is a Soviet semi-active radar homing air-to-air missile. It is based on a reverse engineered AIM-9B but has an entirely different seeker, but otherwise shares the same poor acquisition and launch envelopes of the American progenitor.
wp_aa-2d=AA-2D,Advanced Atoll D,IR AAM,The AA-2D Advanced Atoll (Vympel K-13M) is a Soviet infrared homing air-to-air missile. It is derived from the AA-2A Atoll (itself reverse engineered from the AIM-9) but features a new motor and seeker, vastly improving performance.
wp_aa-2-2=AA-2D,Advanced Atoll 2,IR AAM,The AA-2-2 Advanced Atoll (Vympel K-13M1) is a Soviet infrared homing air-to-air missile. It is derived from the AA-2A Atoll (itself reverse engineered from the AIM-9) but features a new motor and seeker, vastly improving performance.

wp_aa-3e=AA-3E,Advanced Anab,SARH AAM,The AA-3E Advanced Anab E (Kaliningrad R-98MR) is a Soviet semi-active radar homing air-to-air missile. One of a pair of Advanced Anab designs designed for the Su-15 and Yak-28P. Like the AIM-4 Falcon used on the US F-102 and F-106 interceptors, the doctrine was to fire one radar-guided and one infrared missile at the target, improving kill probability.
wp_aa-3f=AA-3F,Advanced Anab,IR AAM,The AA-3 Advanced Anab F (Kaliningrad R-98MT) is a Soviet built infrared homing air-to-air missile. One of a pair of Advanced Anab designs designed for the Su-15 and Yak-28P. Like the AIM-4 Falcon used on the US F-102 and F-106 interceptors, the doctrine was to fire one radar-guided and one infrared missile at the target, improving kill probability.
wp_aa-6a=AA-6A,Acrid,AAM,The AA-6A Acrid (Vympel R-40R) is a Soviet long-range semi-active radar homing air-to-air missile. It was developed specifically for the MiG-25P interceptor to counter the XB-70 Valkyrie. Like the AIM-4 Falcon used on the US F-102 and F-106 interceptors, the doctrine was to fire one radar-guided and one infrared missile at the target, improving kill probability.
wp_aa-6b=AA-6B,Acrid,IR AAM,The AA-6B Acrid (Vympel R-40T) is a Soviet long-range infrared homing air-to-air missile. It was developed specifically for the MiG-25P interceptor to counter the XB-70 Valkyrie. Like the AIM-4 Falcon used on the US F-102 and F-106 interceptors, the doctrine was to fire one radar-guided and one infrared missile at the target, improving kill probability.
wp_aa-6c=AA-6C,Acrid,AAM,The Improved AA-6C Acrid (Vympel R-40RD) is a Soviet long-range semi-active radar homing air-to-air missile. It was developed specifically for the new MiG-25PD interceptor. Maximum range of the missile was increased up to 60 km. Like the AIM-4 Falcon used on the US F-102 and F-106 interceptors, the doctrine was to fire one radar-guided and one infrared missile at the target, improving kill probability.
wp_aa-6d=AA-6D,Acrid,AAM,The Improved AA-6D Acrid (Vympel R-40TD) is a Soviet long-range infrared homing air-to-air missile. It was developed specifically for the new MiG-25PD interceptor. Maximum range of the missile was increased up to 60 km. Like the AIM-4 Falcon used on the US F-102 and F-106 interceptors, the doctrine was to fire one radar-guided and one infrared missile at the target, improving kill probability.
wp_aa-7c=AA-7C,Apex,SARH AAM,The AA-7C Apex (Vympel R-24R) is a Soviet medium-range semi-active radar homing air-to-air missile. The updated Charlie and Delta variants were developed to equip the MiG-23 in the mid-1970s. Roughly analogous to the US AIM-7E, the AA-7C features a monopulse seeker with increased ECM resistance and lock-on-after-launch capability.
wp_aa-7d=AA-7D,Apex,IR AAM,The AA-7D Apex (Vympel R-24T) is a Soviet medium-range infrared homing air-to-air missile. The updated Charlie and Delta variants were developed to equip the MiG-23 in the mid-1970s. Like the AIM-4 Falcon used on the US F-102 and F-106 interceptors, the doctrine was to fire one radar-guided and one infrared missile at the target, improving kill probability.
wp_aa-8=AA-8,Aphid,AAM,The AA-8 Aphid (Vympel R-60M) is a Soviet short-range infrared homing air-to-air missile. The weapon has been exported extremely widely and is likely to be commonly encountered in Soviet aligned states.
wp_aa-11=AA-11,Archer,AAM,The AA-11 Archer (Vympel R-73A) is a Soviet short-range infrared homing air-to-air missile. This is the top performing short-range missile in the Soviet arsenal, and remains extremely competitive compared to overseas competition, and represents an extremely lethal weapon at short range at all aspects.

# ------------------ SAM ------------------
jsdf_sam1=Tan-SAM 1,,SAM,A japanese all-aspect IR homing short range surface-to-air missile. Part of Type 82 SAM system.

plan_hq-61=HQ-61,,SAM,The HQ-61 is a Chinese surface-to-air missile, and is the very first naval SAM developed for the PLAN. While the missile was accepted into service in the 1980s, it has performance significantly worse than its contemporaries, and is roughly equivalent in performance to the American RIM-7E Sea Sparrow.

raf_rapier=FSB Rapier,Rapier,SAM,A British optically guided short-range, low-altitude point-defence missile system. Utilizing the command-to-line-of-sight (CLOS) guidance system, it has varying effectiveness against fast aircraft and missiles.

rn_seacat=GWS-21,Sea Cat Mk.1,SAM,The GWS-21 Seacat is the earliest example of a shipboard point-defence missile system. It entered Royal Navy service in 1962 and has also been widely exported as a replacement for the Bofors 40mm. Utilizing the command-to-line-of-sight (CLOS) guidance system, it has questionable effectiveness against fast jets and missiles.
rn_seacat_mk2=GWS-24,Sea Cat Mk.2,SAM,The GWS-24 Seacat is an upgraded model of the Sea Cat Mk.1 (GWS-20) with improved low-altitude performance, greater range, higher reliability, and is combined with a more advanced fire control system. Unfortunately, this is still a very sub-par missile, and is of questionable effectiveness.

usa_mim-14=MIM-14,Nike Hercules,SAM,MIM-14 Nike Hercules is a surface-to-air missile system used by the United States and NATO forces for medium and high-altitude air defense.
usa_mim-23=MIM-23,Hawk,SAM,Developed in the US in the 1960s the HAWK is a relatively mobile medium-range Surface to Air Missile System. The missile itself utilises semi-active homing from the HPIR (High Power Illuminator Radar) which is a part of the wider HAWK battery, with targets detected by PAR (Pulse Acquisition Radar) for high altitude targets and CWAR (Continuous Wave Acquisition Radar) for low altitude targets in ground clutter. 

usn_rim-2f=RIM-2F,Terrier,SAM/ASuW,The RIM-2F Terrier is one of the earliest surface-to-air missile systems introduced by the USN. It was conceived to provide a mid-range defensive layer to carrier strike groups that sat between fighters and guns. The original Terrier was a beam-riding weapon. The RIM-2F is an improved semi-active radar homing weapon with increased maneuverability and kill probability. Like other surface-to-air missiles, it can be used in a secondary anti-surface role. Salvo interval is adversely affected by the need to manually assemble booster fins, with one launcher able to fire 2 missiles every 30 seconds.
usn_rim-24b=RIM-24B,Tartar,SAM/ASuW,needs description
usn_rim-8=RIM-8J,Talos,SAM/ASuW,The RIM-8J Talos is a massive long-range surface-to-air missile system used primarily by USN cruisers. It flies a beam-riding midcourse phase with a semi-active radar homing terminal phase. The missile requires some assembly prior to launch so rate of fire is lower than more modern systems, as indicated by the very large physical size of the magazine used by the system.
usn_rim-7=RIM-7E,Sea Sparrow,SAM/ASuW,The RIM-7E Sea Sparrow is a short-range surface-to-air missile, and is the primary NATO shipboard point-defense missile.\nThis is the earliest Sea Sparrow model, and is identical in performance to the air-launched AIM-7E, except that its range and speed are greatly diminished, which limits effective firing distances to short range.\nInherits AIM-7E's deficiencies in seeker performance and low-altitude firing capabilities, which are notably poor.
usn_rim-7h=RIM-7H,Sea Sparrow,SAM/ASuW,The RIM-7H Sea Sparrow is a short-range surface-to-air missile, and is the primary NATO shipboard point-defense missile.\nThe 'Hotel' model of Sea Sparrow is overall extremely similar to the 'Echo' model, except that RIM-7H has folding fins to fit in newer launchers, and slightly improved reliability.
usn_rim-7m=RIM-7M,Sea Sparrow,SAM/ASuW,The RIM-7M Sea Sparrow is a short-range surface-to-air missile, and is the primary NATO shipboard point-defense missile.\nThe 'Mike' model is identical to the air-launched AIM-7M, except that its range and speed are significantly lower.\nCompared to earlier models, the 'Mike' is the first of the series to have the ability to engage sea-skimming missiles and aircraft, and is a reliable point-defense missile in spite of its short range and speed.
usn_rim-66a=RIM-66A,SM-1MR,SAM/ASuW,The RIM-66A Standard Missile 1 MR was developed as a new effector to be paired with platforms that previously used the RIM-24C Tartar. The Standard Missile shares a fuselage with the Tartar to ease physical integration. The A variant was the earliest and entered service in 1967.
usn_rim-66b=RIM-66B,SM-1MR,SAM/ASuW,The RIM-66B Standard Missile 1 MR was developed as a new effector to be paired with platforms that previously used the RIM-24C Tartar. The Standard Missile shares a fuselage with the Tartar to ease physical integration. The B variant was a significant upgrade over the A variant with new components. Most A models were upgraded to Bs.
usn_rim-66e=RIM-66E,SM-1MR,SAM/ASuW,The RIM-66B Standard Missile 1 MR was developed as a new effector to be paired with platforms that previously used the RIM-24C Tartar. The Standard Missile shares a fuselage with the Tartar to ease physical integration. The E variant was a redesign of the electronics of the B model, using SM-2MR components, and features a limited ability to engage sea-skimming cruise missiles.
usn_rim-66c=RIM-66C,SM-2MR,SAM/ASuW,The RIM-66C Standard Missile 2 MR is a key part of the new AEGIS Combat Management System fitted to the USN's newest surface combatants and the New Threat Upgrade fitted to older platforms. It provides a more capable weapon than the older Standard Missile 1 with reduced illuminator use allowing for more concurrent missiles in flight. 
usn_rim-66g=RIM-66G,SM-2MR,SAM/ASuW,The RIM-66G Standard Missile 2 MR Block II is a key part of the new AEGIS Combat Management System fitted to the USN's newest surface combatants and the New Threat Upgrade fitted to older platforms. It provides a more capable weapon than the older Standard Missile 1 with reduced illuminator use allowing for more concurrent missiles in flight.\nThe Block II SM-2MR more than doubles the range of the previous Block I missiles, improves capability against faster targets, and has a lower minimum altitude compared to earlier Standard Missiles, although not perfect against sea-skimmers yet.\n\nThe RIM-66G is the SM-2MR Block II variant used by Mark 26 AEGIS warships, like the arm-launcher Ticonderoga class CGs.
usn_rim-67a=RIM-67A,SM-1ER,SAM/ASuW,The RIM-67A Standard Missile 1 ER was developed as a new effector to replace the RIM-8 Talos. The missile is identical to the RIM-66A but fitted with an additional booster to increase its range.
usn_rim-67b=RIM-67B,SM-2ER,SAM/ASuW,The RIM-67B Standard Missile 2 ER is a key part of the New Threat Upgrade fitted to platforms that previously carried the RIM-2 Terrier. The missile is practically identical to the RIM-66C but fitted with an additional booster to increase its range.
usn_rim-67c=RIM-67C,SM-2ER,SAM/ASuW,The RIM-67C Standard Missile 2 ER is a key part of the New Threat Upgrade fitted to platforms that previously carried the RIM-2 Terrier. The missile is practically identical to the RIM-66C but fitted with an additional booster to increase its range.\nThe Block II SM-2ER improves the speed and range of the previous Block I missiles, improves capability against faster targets, and has a lower minimum altitude compared to earlier Standard Missiles, although not perfect against sea-skimmers yet.

wp_sa-n-1=SA-N-1,Goa,SAM/ASuW,The SA-N-1 Goa (M-1 Volna) is the earliest Soviet naval surface-to-air missile system. It is intended to provide area air defence and a degree of protection from inbound anti-ship missiles. Originally only effective against high-flying air targets, later variants introduced an anti-surface capability and better capability to engage low-flying targets, as well as increased range.
wp_sa-n-1c=SA-N-1C,Goa,SAM/ASuW,The SA-N-1C Goa (M-1 Volna-P) is modification of the earliest Soviet naval surface-to-air missile system. It has better resistance to jamming and chaff and capable of engaging low-flying targets.
wp_sa-n-3=SA-N-3,Goblet,SAM/ASuW,The SA-N-3 Goblet (M-11 Shtorm) is a Soviet naval surface-to-air missile system. The system was installed on a number of missile cruiser classes and the Soviet Union's helicopter and STOVL carriers. It has a secondary anti-surface capability, and later versions improved performance against low-flying targets.
wp_sa-n-4=SA-N-4,Gecko,SAM/ASuW,The SA-N-4 Gekko (9K33M Osa) is the naval version of the SA-8 Gecko (note the different spelling) with two missiles on a retractable rotating launcher. It has been installed on a significant number of Soviet platforms to fulfil the short-range air defence role.
wp_sa-n-5=SA-N-5,Grail,SAM,The SA-N-5 Grail (9K32 Strela-2) is a man-portable surface-to-air missile also known as the SA-7 when used from land based launchers. On ships it is used as a point-defence system.
wp_sa-n-6=SA-N-6,Grumble,SAM/ASuW,The SA-N-6 Grumble (S-300F) is the naval version of the SA-10 (S-300P) land-based surface-to-air missile system. This powerful long-range system is fitted in Soviet missile-cruiser classes, and offers performance comparable to that of the SM-2. 
wp_sa-n-7=SA-N-7,Gadfly,SAM/ASuW,The SA-N-7 Gadfly (3S90 Uragan) is the naval version of the SA-11 Gadfly (9K37 Buk) land-based surface-to-air missile system. The SA-N-7 system is a sophisticated and capable weapon system and made its entry to service on the Sovremenny-class destroyers.
wp_sa-n-9=SA-N-9,Gauntlet,SAM/ASuW,The SA-N-9 Gauntlet (3K95 Kinzhal) is the naval version of the SA-15 Gauntlet (9K330 Tor) missile system. It utilises the same missile as the SA-15 and is fitted on a significant number of Soviet major surface combatants.

wp_sa-2=SA-2,Guideline,SAM,The SA-2 Guideline (S-75 Dvina) is a Soviet long-range surface-to-air missile system. The system is intended to counter bombers over large areas and has been widely exported, having been used in many conflicts but most famously during the Vietnam war.
wp_sa-3=SA-3,Goa,SAM,The SA-3 Goa (S-125 Neva/Pechora) is a Soviet medium-range surface-to-air missile system. The system is intended to counter more manoeuvrable and lower altitude targets.
wp_sa-4=SA-4,Ganef,SAM,The SA-4 Ganef (2K11 Krug) is a Soviet mobile medium-range surface-to-air missile system. The system is intended to counter bombers over large areas.
wp_sa-5=SA-5,Gammon,SAM,The SA-5 Gammon (S-200) is a Soviet long-range surface-to-air missile system. The system is intended to counter high-altitude bombers over large areas. The missiles incorporate a home-on-jam capability.
wp_sa-6=SA-6,Gainful,SAM,The SA-6 Gainful (2K12 Kub) is a Soviet mobile surface-to-air missile system. The system is intended to counter short-range threats out to approximately 15 miles.
wp_sa-8=SA-8,Gecko,SAM,The SA-8 Gecko (9K33M3 Osa) is a Soviet mobile surface-to-air missile system. The system is intended to provide short-range air defense for tank and motorized divisions.
wp_sa-11=SA-11,Gadfly,SAM,The SA-11 Gadfly (9K37 Buk) is a Soviet mobile surface-to-air missile system. The system is intended to counter short-range threats out to approximately 18 miles.
wp_sa-13=SA-13,Gopher,SAM,The SA-13 Gopher (9K35 Strela-10) is a Soviet highly mobile short-range surface-to-air missile system. The system is intended to counter low-altitude pop-up threats such as helicopters.

# ---------- Anti-radar Missiles ---------
usn_agm-45=AGM-45B,Shrike,ARM,The AGM-45 Shrike is an American anti-radiation missile developed from the fuselage of the AIM-7 Sparrow and a new seeker. It has short range, unimpressive speed, a small warhead, and can only guide on a limited number of radar bands (S, C, X bands), but low cost and light weight means ubiquitous use.
usn_agm-78=AGM-78D,Standard ARM,ARM,The AGM-78 Standard ARM (STARM) is an American long-range ARM meant to engage top-tier SAM sites from standoff distances. STARM is derived from the SM-1MR SAM, and has a long-burning sustainer and lofting profile to achieve long range, and has a potent warhead to guarantee destruction of whatever radar system it hits. Unfortunately, this is an expensive and rare weapon, so few if any can be used at any given time.
usn_agm-88a=AGM-88A,HARM,ARM,The AGM-88A HARM (High-speed Anti-Radiation Missile) is an American long-range ARM, with exceptional performance in all categories. HARM is the most modern anti-radiation missile in the NATO arsenal by 1985, and outperforms its predecessors in nearly every category, especially reliability and maximum speed. Due to this missile being very new in service, only a limited number (or none at all) can be used at any given time.
usn_agm-122a=AGM-122A,Sidearm,ARM,The AGM-122A is a short-range tactical anti-radiation missile primary designed to be used from helicopters and fixed wing aircraft. Modified from the short-lived AIM-9C, Sidearm is an effective short range ARM to deal with pop-up SHORAD threats, but is poorly suited to face significant air defenses.

usn_rgm-8h=RGM-8H,Talos ARM,ARM,The RGM-8H Talos is the anti-radar version of the RIM-8 Talos SAM, and utilizes its large airframe to achieve very long range and high speed for a ship-launch ARM. While RGM-8H is based off a SAM, this missile has no anti-aircraft capability, and is only able to engage surface targets actively emitting with radar.

wp_as-11=AS-11,Kilter,ARM,The AS-11 Kilter (Kh-58) is a Soviet anti-radiation missile developed to equip the Su-24M attack aircraft. This is one of the most advanced ARMs for the Soviet air forces, and has a very long range when fired at supersonic speeds.
wp_as-12=AS-12,Kegler,ARM,The AS-12 Kegler (Kh-25MP) is a Soviet air launched supersonic medium-range anti-radar missile. This is the most common ARM in Soviet service, and is roughly analogous to the American AGM-45 Shrike.

wp_as-2b=AS-2B,Kipper,ASM,K-10SP is a variant of K-10S missile which exchanges warhead fo Azaliya jammer system

# ---------- Anti-ship Missiles ----------
is_gabriel_2=Gabriel 2,,ASM,Gabriel is an Israeli anti-ship missile with semi-active radar homing (SARH) and relatively short range, and flies low to avoid enemy fire. This is an upgraded model of the original Gabriel 1, and is meant to improve ECCM capabilities alongside overall reliability.
is_gabriel_3=Gabriel 3,,ASM,The Gabriel 3 is an Israeli short-range anti-ship missile with sea skimming capabilities and an active radar seeker. This is an upgraded Gabriel 2 missile, with a redesigned nose to accomodate an advanced active radar seeker, and allows for "fire and forget" operation.
is_gabriel_3as=Gabriel 3AS,,ASM,The Gabriel 3AS is an Israeli short-range anti-ship missile with sea skimming capabilities and an active radar seeker. This is the air-launch version of the Gabriel 3, and has improved range and a redesigned fuselage.

it_seakiller_2=Sea Killer 2,,ASM,Sea Killer 2 is a short range anti-ship missile developed in Italy. Sea Killer Mark 2 was purchased by Iran to arm its Alvand-class frigates each of which was fitted with a single five-round launcher.
it_otomat_mk1=Otomat MK1,,ASM,OtomatMK1 is a medium range anti-ship missile developed in cooperation between Italy and France.

jasdf_asm-1=ASM-1,,ASM,The ASM-1 is a Japanese standoff anti-ship missile. The ASM-1 is the air-launched variant.

fr_as12=AS.12,,ASM,The AS.12 is a command-guided, short-range helicopter-launch ASM of French origin. This is an upgraded SS.11 ATGM, with a longer motor and significantly larger warhead, and can pose a serious threat to boats as well as small ships.
fr_am-39=AM39,Exocet,ASM,The AM39 Exocet is a French standoff anti-ship missile. It is a popular alternative to the Harpoon throughout NATO and in a number of other nations. The AM39 is the air-launched variant.
fr_mm-38=MM38,Exocet,ASM,The MM38 Exocet is a French standoff anti-ship missile. It is a popular alternative to the Harpoon throughout NATO and in a number of other nations. The MM38 is the surface-launched variant.

knm_penguin_mk2=AGM-119,Penguin Mk2,ASM,The AGM-119 Penguin is a small air-launched and surface-launched anti-ship missile developed in collaboration between the US and Norway. 

plan_sy-1=SY-1,Scrubbrush,ASM,The SY-1 is a Chinese license-built version of the Soviet Styx missile.
plan_sy-1a=SY-1A,Scrubbrush,ASM,The SY-1A is a Chinese development of the Soviet Styx missile, with an improved seeker and a sea-skimming terminal flight phase, and is also able to be used on ships as well as land-based launchers.
plan_hy-1=HY-1,Silkworm,ASM,The HY-1 is a Chinese development of the Soviet Styx missile, with extended range due to a lengthened fuel tank.
plan_hy-1j=HY-1J,Safflower,ASM,The HY-1J is the ship-based version of the Chinese HY-1 missile, with identical performance in all other characteristics.
plan_hy-1a=HY-1A,Safflower,ASM,The HY-1A is a Chinese upgrade of the HY-1J missile featuring an improved seeker and radar altimeter, which allows for a sea-skimming terminal flight phase.
plan_hy-2=HY-2,Seersucker,ASM,The HY-2 is a Chinese derivative of the HY-1 missile, and includes a further enlarged fuel tank to increase range. This makes HY-2 exclusively a land-based missile system, as no shipborne launcher is long enough to accomodate it.
pla_hy-3=HY-3,Sawhorse,ASM,The HY-3 is a ramjets-powered shore-based supersonic anti-ship missile travelling up to Mach 2.5 and ranges up to 130-180 kilometers. Its development was completed in the early 1990s but the missile did not enter service.
plan_hy-4=HY-4,Sadsack,ASM,The HY-4 is a Chinese derivative of the HY-2 missile, with a turbojet engine replacing the original liquid-fuel rocket propulsion. This allows for a significant improvement in range, although the ungainly airframe of the HY-4 means it flies at a relatively high altitude and slow speed for much of its flight.
pla_yj-1=YJ-1,Saples,ASM,The YJ-1 is an air launched short-range supersonic anti ship missile, with a speed exceeding Mach 2, and a sea-skimming terminal phase. While this missile was not accepted into service, a limited number of preproduction missiles were available in the late 1980s, and it was intended to be used primarily on the SH-5 flying boat.
pla_yj-6=YJ-6,Kraken,ASM,The YJ-6 is a Chinese air-launched anti-ship missile developed from the land/ship-based SY-1/HY-1, and features a longer firing range due to its air launch profile, although it uses an early seeker, and is susceptible to countermeasures like other early Styx or Silkworm models.
plan_yj-8=YJ-8,Sardine,ASM,The YJ-8 is a Chinese anti-ship missile resembling, and roughly equivalent to, the French Exocet missile. After launch the missile climbs to 20-30 meters and descends to attack at 5-7 meters in a sea-skimming profile.

usn_agm-12b=AGM-12B,Bullpup,ASM,The AGM-12 Bullpup is an American air launched supersonic standoff strike weapon. It relies on an operator manually guiding the missile, similar to the Soviet AS-7, and features much of the same drawbacks, chief among which is the need to keep flying the aircraft in a straight path towards the target.
usn_agm-123=AGM-123,Skipper,ASM,The Skipper is an American short-to-medium range anti-ship guided missile, produced by combining a Paveway II laser-guided bomb with a solid rocket booster. This was done to provide aircrews with an alternative to Harpoon, which proved troublesome to use in heavily congested waters such as the Persian Gulf, where the risk of hitting civilians is just too high.
usn_agm-84a=AGM-84A,Harpoon,ASM,The Harpoon is an American standoff anti-ship weapon used widely throughout NATO. The weapon has an active radar seeker that is activated after following a pre-programmed route. The AGM-84 variant is air launched.
usn_agm-84c=AGM-84C,Harpoon,ASM,The Harpoon is an American standoff anti-ship weapon used widely throughout NATO. The weapon has an active radar seeker that is activated after following a pre-programmed route. The AGM-84C variant is air launched and does not perform a pop-up terminal maneuver, and instead has a sea-skimming phase to attack ships more effectively.
usn_agm-84d=AGM-84D,Harpoon,ASM,The Harpoon is an American standoff anti-ship weapon used widely throughout NATO. The weapon has an active radar seeker that is activated after following a pre-programmed route. The AGM-84 variant is air launched. AGM-84D is a newer modification, appeared in 1985. It has improved ECCM capabilities and greater range due to improved fuel.

usn_rgm-84a=RGM-84A,Harpoon,ASM,The Harpoon is an American standoff anti-ship weapon used widely throughout NATO. The weapon has an active radar seeker that is activated after following a pre-programmed route. The RGM-84A variant is surface launched, with a pop-up terminal maneuver to evade close-in weapons systems.
usn_rgm-84c=RGM-84C,Harpoon,ASM,The Harpoon is an American standoff anti-ship weapon used widely throughout NATO. The weapon has an active radar seeker that is activated after following a pre-programmed route. The RGM-84C variant is surface launched and does not perform a pop-up terminal maneuver, and instead has a sea-skimming phase to attack ships more effectively.
usn_rgm-84d=RGM-84D,Harpoon,ASM,The Harpoon is an American standoff anti-ship weapon used widely throughout NATO. The weapon has an active radar seeker that is activated after following a pre-programmed route. The RGM-84D variant is surface launched. AGM-84D is a newer modification, appeared in 1985. It has improved ECCM capabilities and greater range due to improved fuel.
usn_rgm-109b=RGM-109B,Tomahawk,ASM,The RGM-109B Tomahawk Anti-Ship Missile (TASM) is an American standoff anti-ship weapon. The weapon has an active radar seeker that is activated after following a pre-programmed route, and is capable of flying a search pattern with deceptive manuevers.

usn_ugm-84a=UGM-84A,Harpoon,ASM,The Harpoon is an American standoff anti-ship weapon used widely throughout NATO. The weapon has an active radar seeker that is activated after following a pre-programmed route. The UGM-84A variant is submarine launched, using a disposable canister, and performs a pop-up terminal maneuver.
usn_ugm-84b=UGM-84B,Harpoon,ASM,The Harpoon is an American standoff anti-ship weapon used widely throughout NATO. The weapon has an active radar seeker that is activated after following a pre-programmed route. The UGM-84B variant is specifically made for the Royal Navy, this being the submarine-launch version. Unlike the earlier UGM-84A, it does not perform a pop-up terminal maneuver, and instead has a sea-skimming phase to attack ships more effectively.
usn_ugm-84c=UGM-84C,Harpoon,ASM,The Harpoon is an American standoff anti-ship weapon used widely throughout NATO. The weapon has an active radar seeker that is activated after following a pre-programmed route. The UGM-84B variant is submarine launched, using a disposable canister. Unlike the earlier UGM-84A, it does not perform a pop-up terminal maneuver, and instead has a sea-skimming phase to attack ships more effectively.
usn_ugm-109b=UGM-109B,Tomahawk,ASM,The RGM-109B Tomahawk Anti-Ship Missile (TASM) is an American standoff anti-ship weapon. The weapon has an active radar seeker that is activated after following a pre-programmed route, and is capable of flying a search pattern with deceptive manuevers.\nThis is the submarine launched model deployed exclusively from torpedo tubes.

wp_as-2=AS-2,Kipper,ASM,The AS-2 Kipper (K-10S) is a Soviet air launched supersonic standoff anti-ship weapon designed to be carried by the Tu-16. Roughly analogous to an air-launched SS-N-3, it suffers much the same drawbacks against even moderately modern air defences.
wp_as-4=AS-4,Kitchen,ASM,The AS-4 Kitchen (Kh-22) is a Soviet air launched supersonic standoff anti-ship weapon carried by the Tu-22M or Tu-95. It flies a high-altitude, high-speed profile with a supersonic terminal dive, making it very hard to counter.
wp_as-6=AS-6,Kingfish,ASM,The AS-6 Kingfish (Kh-26) is a Soviet air launched supersonic standoff strike and anti-ship weapon designed to be carried by the Tu-16. A smaller cousin of the AS-4, it flies a high-altitude, high-speed profile with a supersonic terminal dive, making it very hard to counter.
wp_as-7=AS-7,Kerry,ASM,The AS-7 Kerry (Kh-23 Grom) is a Soviet air launched supersonic standoff strike weapon. It relies on an operator manually guiding the missile, similar to the US AGM-12 Bullpup, and features much of the same drawbacks.
wp_as-10=AS-10,Karen,ASM,The AS-10 Karen (Kh-25/Kh-25M) is a Soviet air launched supersonic standoff strike weapon. It uses a laser seeker for fire-and-forget capability.
wp_as-13=AS-13,Kingbolt,ASM,The AS-13 Kingbolt (Kh-59 Ovod) is a Soviet air launched subsonic standoff strike weapon. It flies the midcourse under inertial guidance, using pre-programmed target coordinates, with a terminal TV homing phase.
wp_as-14a=AS-14A,Kedge,ASM,The AS-14A Kedge (Kh-29L) is a Soviet air launched supersonic air to surface missile, with a heavy warhead and laser guidance.
wp_as-14b=AS-14B,Kedge,ASM,The AS-14B Kedge (Kh-29T) is a Soviet air launched supersonic air to surface missile, with a heavy warhead and TV guidance for longer range, but has degraded performance at night.

wp_ss-n-2=SS-N-2,Styx,ASM,The SS-N-2 Styx (P-15 Termit) is a Soviet surface launched subsonic standoff anti-ship weapon. The weapon was licence produced by China as the well known CSS-C-2 Silkworm. It also can be used to attack land installation on the shore.
wp_ss-n-2c=SS-N-2C,Styx,ASM,The SS-N-2C Styx (P-15 Termit-M) is a Soviet surface launched subsonic standoff anti-ship weapon. It is an improved version of original P-15 with extended range and better ECCM. It also can be used to attack land installation on the shore.
wp_ss-n-3=SS-N-3,Shaddock,ASM,The SS-N-3 Shaddock (P-35) is a Soviet surface launched subsonic standoff anti-ship weapon. While it was fearsome at the time of introduction, the subsonic, high-altitude flight profile makes it very vulnerable to surface-to-air missiles. Another drawback is the need for the launch platform to stay in contact with the missile during the entire flight, which means submerged platforms have to stay exposed on the surface during a strike, leaving them vulnerable to counterattacks.
wp_ss-n-3b=SS-N-3B,Sepal,ASM,The SS-N-3B Sepal (Progress) is a Soviet surface launched subsonic standoff anti-ship weapon. It is an improved version of original P-35 missile with lower flight altitude and better resistance to jamming and chaff.
wp_ss-n-7=SS-N-7,Starbright,ASM,The SS-N-7 Starbright (P-70 Ametist) is a Soviet submarine launched transonic standoff anti-ship weapon. It was the first missile system in the world to be launched from a submerged submarine. It is a relatively short-ranged weapon, and was replaced by the SS-N-9 Siren.
wp_ss-n-9=SS-N-9,Siren,ASM,The SS-N-9 Siren (P-120 Malakhit) is a Soviet surface launched subsonic standoff anti-ship weapon. It is faster and longer-ranged than the Styx, and can perform evasive manuevers in the terminal phase.
wp_ss-n-12=SS-N-12,Sandbox,ASM,The SS-N-12 Sandbox (P-500 Bazalt) is a Soviet surface launched supersonic standoff anti-ship weapon designed to replace the SS-N-3 Shaddock. Compared to the Shaddock, it is much faster, and incorporates an inter-missile data-link that allows the majority of the salvo to stay at a low altitude while a single missile flies high acting as a target spotter. It also carries defensive ECM to increase survivability against anti-air defences.
wp_ss-n-19=SS-N-19,Shipwreck,ASM,The SS-N-19 Shipwreck (P-700 Granit) is a Soviet surface launched supersonic standoff anti-ship weapon. It flies a HI-LO profile and includes an advanced inter-missile datalink that allows several missiles in a salvo to distribute targets between them using a single missile as a high-flying spotter. It is capable of evasive manuevers in the terminal phase, carries an onboard ECM jammer and decoys, and is armored against CIWS fire and missile fragments. This is a fearsome weapon by any metric.
wp_ss-n-22=SS-N-22,Sunburn,ASM,The SS-N-22 Sunburn (P-270 Moskit) is a Soviet surface launched supersonic standoff anti-ship weapon. It flies a LO-LO profile with a supersonic sea-skimming terminal phase, during which the missile performs evasive snaking manuevers to increase survivability against air defences.

#----------- Land Strike only missiles---------
wp_as-4b=AS-4B,Kitchen-B,Land Attack,The AS-4B Kitchen (Kh-22MP Storm) is a Soviet made supersonic standoff land attack missile. 

fr_as11=AS.11,,Land Attack,The SS.11/AS.11 is a command-guided, short-range anti-tank missile of French origin. This model possesses a semi-armor-piercing warhead to attack small boats, rather than a shaped charge to attack tanks.

usn_agm-65b=AGM-65B,Maverick,Land Attack,The AGM-65B is an American TV-guided air-to-ground standoff weapon. An operator in the launch aircraft keeps crosshairs on the desired target, the weapon locks onto the target and then autonomously guides towards it after launch, similar to the AGM-62 Walleye.
usaf_agm-86c=AGM-86C,CALCM,Land Attack,The Conventional Air Launched Cruise Missile (CALCM) is an American air-launched standoff land attack missile and the primary standoff weapon of the B-52. These weapons fly a pre-programmed route to a target with no input from the launch platform after launch, using terrain contour matching using a terrain mapping radar and onboard digital maps.

usn_rgm-109c=RGM-109C,Tomahawk,Land Attack,The Tomahawk Land Attack Missile (TLAM) is an American standoff land attack missile. These weapons fly a pre-programmed route to a target with no input from the launch platform after launch, using terrain contour matching using a terrain mapping radar and onboard digital maps.

usn_ugm-109c=UGM-109C,Tomahawk,Land Attack,The Tomahawk Land Attack Missile (TLAM) is an American standoff land attack missile. These weapons fly a pre-programmed route to a target with no input from the launch platform after launch, using terrain contour matching using a terrain mapping radar and onboard digital maps.\nThis is the submarine launched model deployed exclusively from torpedo tubes. The UGM-109C cannot be fully fueled for submarine launch, therefore it has somewhat reduced range over the ship launch model.

usa_bgm-71a=BGM-71A,BGM-71A TOW,Land Attack,The BGM-71 TOW is an American wire-guided anti-tank missile. The weapon is used both from helicopters and from armoured vehicles.

wp_at-6=AT-6,Spiral,Land Attack,The AT-6 Spiral (9M114 Kokon) is a Soviet supersonic anti tank guided missile used by some attack helicopters, particularly the Ka-29 and Mi-24. Notably features long range, high speed, and a powerful warhead.
wp_at-10=AT-10,Sabber,Land Attack,The AT-10 Sabber is a Soviet anti tank guided missile used by T-55M tank.

# ---------- Anti-sub  Missilies ----------
usn_rur-5=RUR-5,ASROC,ASW,The RUR-5 ASROC (for Anti-Submarine Rocket) is a standoff anti-submarine weapon. The ASROC missile is launched from the shooting platform and deploys a Mk 46 ASW torpedo after flying a ballistic trajectory.

wp_apr-2=APR-2,,ASW,The APR-2 is a Soviet air-dropped anti-submarine torpedo, with a seeker range of 0.75 nautical miles and can be used to a depth of 600m.
wp_ss-n-14a=SS-N-14A,Silex,ASW,The SS-N-14 Silex (Metel) is a Soviet anti-submarine standoff weapon. Similar to the Australian Ikara these weapons carry an torpedo below a small cruise-missile airframe.
wp_ss-n-14b=SS-N-14B,Silex-B,ASW/ASuW,The SS-N-14 Silex-B (Rastrub) is a Soviet dual-purpose anti-submarine and anti-surface standoff weapon. Similar to the Australian Ikara these weapons carry an torpedo below a small cruise-missile airframe.
wp_ss-n-16=SS-N-16,Stallion,ASW,The SS-N-16 Stallion (Vodopad) is a Soviet submarines anti-submarine standoff weapon. It flies a ballistic trajectory to drop a torpedo in the vicinity of the target.

# ------------------ RBU ------------------
knm_terne_shell=Terne III Mortar,,ASW Mortar,Terne is a Norwegian rocket propelled anti-submarine weapon system developed in the 1960s.

plan_type62dc=FQF-1200,,ASW Mortar,The FQF-1200 is Chinese 5-barrel anti-submarine rocket launcher.
plan_type75dc=FQF-2500,,ASW Mortar,The FQF-2500 is Chinese 12-barrel anti-submarine rocket launcher.

rn_limbo_shell=LIMBO Mortar,,ASW Mortar,Limbo (or Anti Submarine Mortar Mark 10) is a British built 1950s anti-submarine mortar. Aimed using the shipboard sonar it aims to drop three depth bombs in a triangle around the target.
rn_squid_shell=SQUID Mortar,,ASW Mortar,Squid is a British built WWII vintage anti-submarine mortar. Aimed using the shipboard sonar it aims to drop three depth bombs in a triangle around the target.

swe_375mm_rocket=Bofors M/50,,ASW Mortar,Bofors M/50 is a 375 mm Sweden anti-submarine rocket launcher.

wp_rgb-10=RBU-1000,,ASW Mortar,The RBU-1000 (or Smerch-3) is a 300 mm Soviet anti-submarine rocket launcher. The RBU-1000 has a range of approximately 1000 yards.
wp_rgb-12=RBU-1200,,ASW Mortar,The RBU-1200 (or Smerch-3) is a 251 mm Soviet anti-submarine rocket launcher. The RBU-1200 has a range of approximately 1200 yards.
wp_rgb-25=RBU-2500,,ASW Mortar,The RBU-2500 (or Smerch-1) is a 213 mm Soviet anti-submarine rocket launcher. The RBU-2500 has a range of approximately 2500 yards.
wp_rgb-60=RBU-6000,,ASW Mortar,The RBU-6000 (or Smerch-2) is a 213 mm Soviet anti-submarine rocket launcher. The RBU-6000 has a range of approximately 6000 yards.

# --------------- Torpedoes ---------------
fr_e15=E15,,ASuW Torpedo,The French E15 Torpedo is an unusual 55cm heavyweight anti-surface torpedo with passive sonar guidance.
fr_l3=L3,,ASW Torpedo,The French L3 Torpedo is an unusual 55cm mediumweight anti-submarine torpedo.

ger_dm1=DM1,,ASW Torpedo,Germany's first wire-guided torpedo dedicated against submarines.
ger_dm2=DM2,,ASuW Torpedo,Germany's wire-guided torpedo dedicated against surface targets.
ger_sst4=SST4,,ASuW Torpedo,German-made ASuW wire-guided heavyweight torpedo. Produced for export to other navies.

it_a-244s_air=A-244,,ASW Torpedo,Italian lightweight air dropped anti-submarine torpedo. Features active and passive sonar guidance.

jmsdf_type80=Type 80,,Torpedo,Type 80 torpedo. Fruit of GRX-1 and GRX-2 research programs from 1970s, and influenced by USN's Mark 37 design, this ASW/ASuW wire-guided torpedo boost better characteristics in propulsion, performance and range over that of Mark 37.
jmsdf_type54=Type 54,,Torpedo,Type 54 Model 3 Mod 1 torpedo. First Japanese-designed post-World War II torpedo. Initially quite unsuccessful and prone to post-launch failures it went through several redesigns ending up in mass-produced Model 3 Mod 1 variant.

knm_tp612=TP612,,ASuW Torpedo,The Swedish TP612 is a heavyweight wire-guided torpedo with no seeker. The TP612 is a development of the TP611 with reduced noise and swim-out launch capability.
knm_tp613=TP613,,ASuW Torpedo,The Swedish TP613 is a heavyweight wire-guided torpedo with a passive sonar seeker. The TP613 is a development of the TP612 with the addition of passive sonar seeker.

plan_yu-1=Yu-1,,ASuW Torpedo,The Yu-1 (Fish Type-1) is the first domestically produced Chinese heavyweight torpedo. These straight running torpedoes are relatively simple and therefore reliable and effective.
plan_yu-1g=Yu-1G,,ASuW Torpedo,The Yu-1G (Fish Type-1A) is the first domestically produced Chinese heavyweight torpedo. This is an upgraded Yu-1 torpedo, with an added passive homing capability to more effectively engage maneuvering ships.
plan_yu-3=Yu-3,,ASW Torpedo,The Yu-3 (Fish Type-3) is a Chinese passive heavyweight anti-submarine torpedo. A slow torpedo, it is best suited for attacking diesel-eletric submarines, as faster targets may outrun the torpedo. The seeker has a maximum range of about 1600 yards.
plan_yu-4=Yu-4A,,ASuW Torpedo,The Yu-4A (Fish Type-4) is a Chinese passive heavyweight anti-surface torpedo. A slow torpedo, it is probably only effective at very close distances.

rn_mark9_mod2=MkIX,,ASuW Torpedo,The British Mark IX** torpedo is an anti-surface torpedo introduced during World War 2. Longer running time and more powerful warhead it is the final upgrade to the original 1930s Mark IX design.

usn_mk16=Mk-16,,ASuW Torpedo,The Mark 16 torpedo is a WWII vintage straight-running torpedo used through the 1950's and 1960's as a fast, very high power anti-ship torpedo by US attack submarines. Despite the lack of guidance, short range shots that connect will almost certainly sink any target, regardless of size. The Mod 8 variant incorporates the high power warhead of the Mod 0, with the longer range of the Mod 1 torpedo.
usn_mk37=Mk-37 Mod 0,,ASW Torpedo,The Mark 37 torpedo is the USN standard ASW lightweight torpedo used across multiple nations. Introduced in 1959, it was too slow and under-performing to stand against modern Soviet high-performance submarines.
usn_mk37_mod1=Mk-37 Mod 1,,ASW Torpedo,The Mark 37 torpedo is the USN standard ASW lightweight torpedo used across multiple nations. Introduced in 1959, it was too slow and under-performing to stand against modern Soviet high-performance submarines. The Mod 1 adds wire guidance at the cost of some speed.
usn_mk44_air=Mk-44,,ASW Torpedo,The Mark 44 torpedo is the legacy NATO anti-submarine torpedo, and is a common weapon throughout the entire Cold War. While it features good reliability, the Mark 44 has a short range and a slow speed, and struggles against fast, deep-diving submarines.\nThis model is air-launched.
usn_mk44_ship=Mk-44,,ASW Torpedo,The Mark 44 torpedo is the legacy NATO anti-submarine torpedo, and is a common weapon throughout the entire Cold War. While it features good reliability, the Mark 44 has a short range and a slow speed, and struggles against fast, deep-diving submarines.\nThis model is surface launched.
usn_mk46_air=Mk-46,,ASW Torpedo,The Mark 46 torpedo is the NATO standard for lightweight torpedoes used across multiple nations. Designed to attack modern Soviet high-performance submarines this variant is air dropped.
usn_mk46_ship=Mk-46,,ASW Torpedo,The Mark 46 torpedo is the NATO standard for lightweight torpedoes used across multiple nations. Designed to attack modern Soviet high-performance submarines this variant is ship launched.
usn_mk48=Mk-48,,Torpedo,The Mark 48 is an American heavyweight torpedo. These torpedoes are wire guided and capable of being retargeted from the launch platform.

wp_45-36nu=45-36NU,,ASuW Torpedo,The 45-36NU is an obsolete, pre-WWII designed 450mm straight running torpedo heavily influenced by Italian 45-F and 53-F designs from early 1930s. Lightweight and packing smaller punch than 530mm counterparts it's become quite ineffective weapon by 1950s. But sometimes you have to do with what you get.
wp_53-38=53-38,,ASuW Torpedo,The 53-38 is a WWII vintage Soviet heavyweight straight running torpedo. These torpedoes are relatively simple and therefore reliable and effective. The two deadliest sinkings in history (the German transport Wilhelm Gustloff and the troop transport Goya) were performed by two Soviet submarines using 53-38s.
wp_53-39=53-39,,ASuW Torpedo,The 53-39 is a WWII vintage Soviet heavyweight straight running torpedo. These torpedoes are relatively simple and therefore reliable and effective.
wp_53-56v=53-56,,ASuW Torpedo,The 53-56V is a Soviet heavyweight straight running torpedo. These torpedoes are updated variants of the 53-38.
wp_53-65K=53-65K,,WH Torpedo,The 53-65 is a Soviet wake-homing heavyweight torpedo designed to destroy surface ships.
wp_65-76=65-76,,WH Torpedo,The 65-76 is a Soviet 650mm wake-homing torpedo known as a carrier killer. It was developed specifically for use against extremely large targets such as super-carriers. Its larger 650 mm diameter means only some submarines can carry it.
wp_at-1=AT-1,,ASW Torpedo,The AT-1 is a Soviet electrical air-dropped anti-submarine torpedo with active/passive acoustic guidance carried only by helicopters.
wp_at-2=AT-2,,ASW Torpedo,The AT-2 is a Soviet electrical heavy-weight anti-submarine air-launched torpedo with active/passive acoustic guidance. The AT-2 is one of the few air-launched heavyweight torpedoes as the majority of the air-launched torpedoes are much smaller and only a quarter of the weight.
wp_set-40=SET-40,,ASW Torpedo,The SET-40 is a Soviet lightweight electrical anti-submarine torpedo with active/passive sonar guidance.
wp_set-65=SET-65,,ASW Torpedo,The SET-65 is a Soviet heavyweight electrical anti-submarine torpedo with active sonar guidance.
wp_test-71=TEST-71,,ASW Torpedo,The TEST-71 is a Soviet heavyweight anti-submarine wire-guided torpedo. It improves on the SET-65 with more advanced active/passive homing capabilities.
wp_umgt-1=UMGT-1,,ASW Torpedo,The UMGT-1 is a Soviet air dropped anti-submarine torpedo which also serves as the payload for the SS-N-14 and SS-N-16 ASW missiles. These lightweight torpedoes pack less of a punch than Soviet heavyweight torpedoes but are still extremely dangerous.
wp_uset-80=USET-80,,Torpedo,The USET-80 is a modern Soviet dual-purpose torpedo. It has an active/passive homing system making this an extremely dangerous weapon to contend with for both submarines and surface ships.

# ------------------ Bombs -----------------
fr_samp_t25=SAMP-25,,Bomb,The SAMP Type 25 is a French 230 kg (500 lb) dumb bomb. It is comparable to the US Mk-82.
fr_samp_t21=SAMP-21,,Bomb,The SAMP Type 21 is a French 400 kg (880 lb) dumb bomb. It is comparable to the US Mk-83.

pla_type-2=Type-100-2,,Bomb,Type-100-2 is a Chinese 100kg general purpose air-dropped bomb. Comparable to Soviet FAB-100.
pla_type-3-250=Type-250-3,,Bomb,Type-250-3 is a Chinese 250kg general purpose air-dropped bomb. Comparable to Soviet FAB-250.
pla_type-3-500=Type-500-3,,Bomb,Type-500-3 is a Chinese 500kg general purpose air-dropped bomb. Comparable to Soviet FAB-500.

raf_bl755=BL755,,Cluster Bomb,The BL755 contains 147 armour-piercing HEAT bomblets dispersed over a wide area. It was widely used during the Iran-Iraq war by the IRIAF and in the Falklands by the RAF.

usaf_gbu-2=GBU-2,Paveway I,Guided Bomb,The GBU-2 Paveway I is an American 2000 lb (907 kg) laser-guided bomb. The weapon is based on the Mk 84 but with the addition of a nose-mounted laser seeker and fins for guidance.
usaf_gbu-15=GBU-15,,Guided Bomb,The GBU-15(V)2 is an infrared-guided glide bomb which was used by the USAF on certain supersonic tactical aircraft, such as the F-111 and F-4E, and was exported to multiple nations. This weapon has an imaging infrared (IIR) seeker, which is highly reliable and can be used in all weather conditions, and also features a datalink capability for retargeting and relaying seeker data to the launch platform.
usaf_bolt-117=BOLT-117,,Guided Bomb,The BOLT-117 is an American 750 lb (340 kg) laser-guided bomb. The weapon a modified M-117 iron bomb but with the addition of a nose-mounted laser seeker and fins for guidance.
usaf_gbu-11=GBU-11,Paveway I,Guided Bomb,The GBU-11 is an American 3000 lb (1400 kg) laser-guided bomb. This is a super-heavy guided bomb meant to be used against hard targets, such as bridges or bunkers, due to its high explosive yield.
usaf_m117=M117,,Bomb,The M117 is a 750 lb (340 kg) bomb of Korean war vintage used by the USAF extensively during the Vietnam campaign. It was replaced by the various models of the Mk 80 series.
usaf_m118=M118,,Demolition Bomb,The M118 is an American 3000 lb (1400 kg) super-heavy demolition bomb intended to be used against hard point targets like bridges, bunkers, fortifications, railways, and other resilient structures.
usaf_cbu-24=CBU-24,,Cluster Bomb,The CBU-24 contains 665 fragmentation bomblets dispersed over a wide area. It was widely used as an anti-personnel weapon by Wild Weasel units attacking SAM sites.

usn_gbu-10=GBU-10,Paveway II,Guided Bomb,The GBU-10 Paveway II is an American 2000 lb (907 kg) laser-guided bomb. The weapon is based on the Mk 84 but with the addition of a nose-mounted laser seeker and fins for guidance. The guidance kit on the GBU-10 is an upgrade of the older Paveway I.
usn_gbu-12=GBU-12,Paveway II,Guided Bomb,The GBU-12 Paveway II is an American 500 lb (227 kg) laser-guided bomb. The weapon is based on the Mk 82 but with the addition of a nose-mounted laser seeker and fins for guidance.
usn_gbu-16=GBU-16,Paveway II,Guided Bomb,The GBU-16 Paveway II is an American 1000 lb (460 kg) laser-guided bomb. The weapon is based on the Mk 83 but with the addition of a nose-mounted laser seeker and fins for guidance.
usn_mk-82=Mk-82,,Bomb,The Mark 82 is a 500 lb (227 kg) low-drag general-purpose dumb bomb.
usn_mk-82_snakeye=Mk-82 Snakeye,,Bomb,The Mark 82 "Snake-eye" is a 500 lb (227 kg) high-drag general-purpose dumb bomb with deploying fins. Useful for 'laydown' delivery, where the aircraft deploys bombs at high speed and low altitude, with no pop-up and no dive approach, albeit at the cost of increased time of flight.
usn_mk-83=Mk-83,,Bomb,The Mark 83 is a 1000 lb (454 kg) low-drag general-purpose dumb bomb.
usn_mk-84=Mk-84,,Bomb,The Mark 84 is a 2000 lb (900 kg) low-drag general-purpose dumb bomb.
usn_rockeye=CBU-100,Rockeye,Cluster Bomb,The CBU-100 Rockeye II is an American 500 lb (227 kg) cluster bomb which dispenses 247 sub-munitions.
usn_walleye2=AGM-62,Walleye II,Guided Bomb,The AGM-62 Walleye is a television-guided glide bomb which was used by the United States Armed Forces from the 1960s-1990s. Most had a 250 lb (113 kg) high-explosive warhead; some had a W72 nuclear warhead.

usn_mk54_dc=Mk-54,,Depth Bomb,The Mark 54 depth bomb is an American aerial depth bomb designed during World War II which remained in service through the Cold War. 

wp_fab-100=OFAB-100,,Bomb,The OFAB-100-120 Soviet-designed 100 kg (220 lb) general purpose air-dropped bomb with a high-explosive warhead primarily used by the Soviet Union and its allies. 
wp_fab-250=FAB-250,,Bomb,The FAB-250 is a Soviet-designed 250 kg (550 lb) general purpose air-dropped bomb with a high-explosive warhead primarily used by the Soviet Union and its allies.
wp_fab-500=FAB-500 M-62,,Bomb,The FAB-500 is a Soviet-designed 500 kg (1100 lb) general purpose air-dropped bomb with a high-explosive warhead primarily used by the Soviet Union and its allies. 
wp_fab-500_m54=FAB-500 M-54,,Bomb,The FAB-500 is a Soviet-designed 500 kg (1100 lb) general purpose air-dropped bomb with a high-explosive warhead primarily used by the Soviet Union and its allies. This is a shorter, medium drag bomb meant to be carried in larger quantities, usually internally, but suffers from worse accuracy over the low-drag model.
wp_fab-1500_m54=FAB-1500 M-54,,Bomb,The FAB-1500 is a Soviet-designed 1500 kg (3300 lb) general purpose air-dropped bomb with a high-explosive warhead primarily used by the Soviet Union and its allies. This is the 1500kg model in a family of large high-explosive bombs, and is primarily to be used against hard targets such as large warships, bunkers, or airbases.
wp_fab-3000_m54=FAB-3000 M-54,,Bomb,The FAB-3000 is a Soviet-designed 3000 kg (6600 lb) 'general purpose' air-dropped bomb with a high-explosive warhead primarily used by the Soviet Union and its allies. This is the 3000kg model in a family of large high-explosive bombs, and is primarily to be used against hard targets such as large warships, bunkers, or airbases.
wp_fab-9000_m54=FAB-9000 M-54,,Bomb,The FAB-1500 is a Soviet-designed 9000 kg (20,000 lb) 'general purpose' air-dropped bomb with a high-explosive warhead primarily used by the Soviet Union and its allies. This is the 9000kg model in a family of large high-explosive bombs, and is one of the largest conventional bombs ever used in combat, with a focus on obliterating hardened targets.

wp_kab-500l=KAB-500L,,Guided Bomb,The KAB-500L is a Soviet-designed 500 kg (1100 lb) laser-homing air-dropped bomb with a high-explosive warhead primarily used by the Soviet Union and its allies. This is based off the FAB-500, but with a laser seeker and fins for guidance.

wp_rbk-250=RBK-250,,Cluster Bomb,The RBK-250 is a Soviet 250 kg (550 lb) cluster bomb.
wp_rbk-500=RBK-500,,Cluster Bomb,The RBK-500 is a Soviet 500 kg (1100 lb) cluster bomb.

wp_plab-100=PLAB-100,,Depth Bomb,The PLAB-100 is Soviet-designed 100 kg (220 lb) anti submarine air-dropped bomb primarily used by the Soviet Union and its allies. 

# ---------------- Sonobuoys ---------------
plan_skf-1=SKF-1,,Passive Sonobuoy,The SKF-1 is a passive-only omnidirectional sonobuoy used by the People's Liberation Army Navy since 1960s.
plan_skf-2=SKF-2,,Passive Sonobuoy,The SKF-2 is a passive, directional sonobuoy used by the People's Liberation Army Navy since mid-1970s.

usn_ssq-41=AN/SSQ-41,LOFAR,Sonobuoy,The SSQ-41A "Jezebel" is a Low Frequency Analysis and Recording (LOFAR) type sonobouy. This is the most common NATO passive sonobuoy, and has no ability to determine bearing like the later DIFAR sonobuoy, but still has decent sensitivity, and can be found in large numbers in any Western navy's stockpile.
usn_ssq-47=AN/SSQ-47,Julie,Active Sonobuoy,The SSQ-47A "Julie" is a continuously active range-only type sonobouy. This is the most common NATO active sonobuoy, and has no ability to determine bearing like the later DICASS sonobuoy, but is still useful to 'fix' a previously detected target with multiple buoys. As a result of the continuous active pinging, this sonobuoy has a lifespan of only 30 minutes.
usn_ssq-53=AN/SSQ-53,DIFAR,Passive Sonobuoy,The SSQ-53 is a Directional Frequency Analysis and Recording (DIFAR) type sonobouy. This gives the sonobuoy operator magnetic heading information which is a huge improvement over the earlier omnidirectional CRT-1.
usn_ssq-62=AN/SSQ-62,DICASS,Active Sonobuoy,The AN/SSQ-62 DICASS is an active sonobouy used for fixing a submerged submarine that has previously been located with the SSQ-53 passive sonobouys.
usn_ssq-77=AN/SSQ-77,VLAD,Sonobuoy,The SSQ-77A is a VLAD type (Vertical Line Array DIFAR) passive sonobuoy, designed to be a generational improvement for the original DIFAR type passive sonobuoy. This buoy has a similar architecture to the DIFAR buoy, but incorporates an extremely sensitive sonar array that allows for extremely long passive range for a sonobuoy, high capability against quiet, deep-diving targets and exhibits good performance operating in cluttered, noisy waters.\n\nThe consequence of this greater performance is the weight and cost of this buoy, meaning these are less common, and their accuracy at range is poor, so they are mostly useful for localization of submerged targets.
usn_ssq-101=AN/SSQ-101,,Active Sonobuoy,The AN/SSQ-101 Air Deployed Active Receiver (ADAR) is a sonobuoy designed as a receiver for shallow-water multi-static systems. When deployed it uses a large array of hydrophones to determine accurate bearings.

wp_rgb-1=RGB-1,,Passive Sonobuoy,The RGB-1 is a passive-only omnidirectional sonobuoy used by the Soviet Union.
wp_rgb-nm1=RGB-NM-1,,Passive Sonobuoy,The RGB-NM-1 is a passive-only omnidirectional sonobuoy used as part of the Baku suite by the Soviet Union.
wp_rgb-3=RGB-3,,Active Sonobuoy,The RGB-3 is an active-only sonobuoy used by the Soviet Union.

# ------------------ FFAR -----------------
usn_zuni=Zuni,,FFAR,The Zuni is a 5.0 in Folding-Fin Aircraft Rocket (FFAR) primarily carried by ground attack aircraft and attack helicopters. The Zuni can be used to carry various types of warheads similar to other FFAR systems. It is usually fired from the LAU-10 rocket pod holding four rockets.
usn_hydra=Hydra 70,,FFAR,The Hydra 70 is a 2.75-inch Folding-Fin Aircraft Rocket (FFAR) used by both fighters and helicopters. The Hydra is capable of being fitted with a range of warheads and is normally carried in pods of up to 19.

wp_s-5=S-5,,FFAR,The S-5 is a Soviet 55 mm Folding-Fin Aircraft Rocket (FFAR) used by fighter bombers and helicopters. The S-5 can trace its heritage to the German R4M of the late WWII era. Th rocket is normally carried in pods of up to 32.
wp_s-8=S-8,,FFAR,The S-8 is a Soviet 80 mm Folding-Fin Aircraft Rocket (FFAR) used by fighter bombers and helicopters. The S-8 has a number of different variants including specialist runway denial variants. The rocket is normally carried in pods of up to 20.
wp_s-24=S-24,,FFAR,The S-24 is a Soviet 240 mm Folding-Fin Aircraft Rocket (FFAR) used by fighter bombers and helicopters. Unlike most of FFAR it is carried singularly.
wp_s-25=S-25,,FFAR,The S-25 is a Soviet 266 mm Folding-Fin Aircraft Rocket (FFAR) used by fighter bombers and helicopters. The largest of the Soviet Union's unguided rockets the S-25 has a warhead containing nearly 60kg of explosives and is carried singularly.

# ------------------ MLRS -----------------
ir_107mm_rocket=Haseb-1,,MLRS,The Haseb-1 rocket is an Iranian version of the Chinese 107mm rocket fired by the Type 63 Multiple Rocket Launcher. In Iranian service both the launcher and the rocket are called Haseb.

usa_m26=M26,,MLRS,The M26 is a 227 mm unguided rocket used by the U.S. Army's M270 Multiple Launch Rocket System (MLRS). The rocket payload consists of up to 800 submunitions able to cover up to 2000 square meters.

wp_grad=Grad,,MLRS,The M-21OF Rocket is a Soviet weapon fired from the BM-21 launch vehicle. The complete system (the M-21) is more commonly known as the "Grad" Multiple Launched Rocket System. 

