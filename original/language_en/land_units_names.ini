Default=Type 63 APC,Type 63 APC
DefaultDescription=Comparable to the American M113, the Type 63 is the first Chinese armoured vehicle built without Soviet assistance. Like the M113, it is highly adaptable, and has been used by both China and various Chinese allied nations, such as Vietnam, North Korea, Bangladesh, and Iraq. It was supplied to the North Vietnamese Army during the Vietnam War, and also saw service in the Iran-Iraq War. In Chinese service, it was replaced by the ZSD 89 starting in the 1990s.
Variant1=Type 63 APC,Type 63 APC

[pla_lt_type_63]
Type=Light tank
Default=Type 63 LT,Type 63 LT
DefaultDescription=Developed from the Soviet PT-76, the Type 63 is a Chinese amphibious light tank first entering service in the mid 1960s. Unlike the PT-76, it incorporates numerous small changes, such as a four man crew, left-hand driver's position, centrally mounted turret, and the ability to use its tracks to swim alongside the waterjet propulsion. It has been exported to several Chinese allied nations, and first saw action during the final stages of the Vietnam War. It was later replaced in frontline Chinese service by the modified Type 63A.
Variant1=Type 63 LT,Type 63 LT
Variant2=Type 63 LT,Type 63 LT
