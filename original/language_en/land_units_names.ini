Default=Type 63 SPAAG,Type 63 SPAAG
DefaultDescription=Made by taking the hull of a T-34 and attaching a turret with twin 37mm Type 61 cannons, the Type 63 SPAA was supplied by China to the North Vietnamese Army during the Vietnam War (although there are conflicting sources as to its origin). Post war, it was used by both the NVA and the PLA, finally being retired in 1990.
