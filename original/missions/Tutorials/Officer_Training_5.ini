[General]
Type=Tutorial
[Debug]
DisableEnemyAIPlayer=True
[Language_ja]
Name=士官訓練5 - 偵察
Description=このチュートリアルでは、艦船、ヘリコプター、航空機を使用した外洋偵察の実施方法を学ぶ。限られた戦力下で（例：空母の支援なしで）目標を捜索する方法、水上レーダー探知を識別する方法、中立船舶と敵部隊を区別する方法、そして自軍センサー以外の探知方法がどのように活用できるかを学習する。
Taskforce1StartFreeContentPath=missions\Tutorials\Officer_Training_5_briefing\t05_window_1_ja.xml
Taskforce1StartFreeContentAssets=missions\Tutorials\Officer_Training_5_briefing
Taskforce1RORSATmessageMessage=海軍通信|発: 赤旗太平洋艦隊司令部\n宛: ヴォストーク機動部隊司令官\n\n1. コスモス1930の偵察データを受信、貴隊に伝達した。\n\n2. アメリカの船団を北緯41度、東経175度付近で探知。針路348、速力10ノット。\n\n3. 潜水艦K-175は命令受領のため潜望鏡深度に浮上、貴官の戦術指揮下に入る。\n\n4. 最大船速でミサイル射程圏内に進出し、アメリカ軍を撃滅せよ。健闘を祈る。|了解して続行
Trigger4Condition_Condition1AreaLabel=捜索エリア
Objective_CompleteMission=米船団を発見し、撃滅せよ
[Language_en]
Name=Officer Training 5 - Reconnaissance
Description=In this tutorial we will learn how to conduct open ocean reconnaissance using ships, helicopters, and aircraft. We will learn how to search an area for contacts using limited resources (e.g., without an aircraft carrier at our disposal), how to identify surface radar contacts, how to distinguish neutral shipping from hostile forces, and how other methods of detection beyond our own sensors can come into play.
Taskforce1StartFreeContentPath=missions\Tutorials\Officer_Training_5_briefing\t05_window_1.xml
Taskforce1StartFreeContentAssets=missions\Tutorials\Officer_Training_5_briefing
Taskforce1RORSATmessageMessage=NAVAL MESSAGE|FM HQ RED BANNER PACIFIC FLEET\nTO CMDR TASK FORCE VOSTOK\n\n1. Kosmos 1930 reconnaissance data has been received and passed to your force.\n\n2. American convoy has been detected near position 41N, 175E on course 348 at speed 10 knots.\n\n3. Submarine K-175 reporting to periscope depth to receive orders and will operate under your tactical command.\n\n4. Proceed at best speed into missile range and then destroy the Americans. Good luck.|Acknowledge & continue
Trigger4Condition_Condition1AreaLabel=Search Area
Objective_CompleteMission=Locate and destroy US convoy
[Language_cn]
Name=军官训练5——侦察
Description=在此教程中，我们将学习如何使用船只、直升机和固定翼飞机在公海进行侦察。我们将学习如何使用有限的资源（例如在没有航母的情况下）在一片区域内搜索接触、识别水面雷达接触、区分中立和敌对船只以及使用传感器之外的手段进行探测。
Taskforce1StartFreeContentPath=missions\Tutorials\Officer_Training_5_briefing\t05_window_1_cn.xml
Taskforce1StartFreeContentAssets=missions\Tutorials\Officer_Training_5_briefing
Taskforce1RORSATmessageMessage=海军消息|发件：太平洋舰队总部\n收件：东方特遣舰队指挥官\n\n1.我们已收到宇宙1930号的数据并将其发送至你的部队。\n\n2.我们在位置41N，175E附近侦察到了美国护航队，航向348，速度10节。\n\n3.K-175号潜艇报告已抵达潜望镜深度并准备接收命令，它将在你的战术指挥下行动。\n\n4.以最佳速度航行，靠近至导弹发射距离并消灭美国人。祝你好运。|收到并继续
Trigger4Condition_Condition1AreaLabel=搜索区域
Objective_CompleteMission=找到并摧毁美国护航队
[Language_ru]
Name=Officer Training 5 - Reconnaissance
[Language_de]
Name=Offiziersausbildung 5 - Aufklärung
Description=In diesem Tutorial werden Sie lernen, wie eine offene Seeaufklärung unter Einsatz von Schiffen, Hubschraubern und Luftfahrzeugen durchgeführt wird. Wir werden behandeln, wie ein Seegebiet mit begrenzten Kräften durchsucht wird (z. B. ohne einen Flugzeugträger in der Verfügungsgewalt), wie Oberflächenradarkontakte identifiziert werden, wie neutrale Handelsschifffahrt von feindlichen Kräften unterschieden wird und welche weiteren Aufklärungsmethoden neben Ihrer eigenen Sensorik existieren.
Taskforce1StartFreeContentPath=missions\Tutorials\Officer_Training_5_briefing\t05_window_1_de.xml
Taskforce1StartFreeContentAssets=missions\Tutorials\Officer_Training_5_briefing
Taskforce1RORSATmessageMessage=SEEMELDUNG|VON HQ ROTBANNERFLOTTE\nAN KDT EINSATZVERBAND VOSTOK\n\n1. Aufklärungsdaten von Kosmos 1930 wurden empfangen und an Ihren Verband weitergegeben.\n\n2. Amerikanischer Konvoi erfasst bei Position 41N, 175E, Kurs 348, Fahrt 10 Knoten.\n\n3. U-Boot K-175 meldet Sehrohrtiefe zur Befehlsaufnahme und wird unter Ihrem taktischen Befehl operieren.\n\n4. Mit Höchstfahrt in Raketenreichweite vorstoßen und danach die Amerikaner vernichten. Viel Erfolg.|Bestätigen & Fortfahren
Trigger4Condition_Condition1AreaLabel=Suchgebiet
Objective_CompleteMission=US-Konvoi aufklären und vernichten
[Language_es]
Name=Officer Training 5 - Reconnaissance
[Language_fr]
Name=Leçon n°5 - Reconnaissance
Description=Dans ce tutoriel, nous allons apprendre à mener des missions de reconnaissance en haute mer à l'aide de navires, d'hélicoptères et d'avions. Nous allons apprendre à rechercher des contacts dans une zone donnée avec des ressources limitées (par exemple, sans porte-avions à notre disposition), à identifier les contacts radar en surface, à distinguer les navires neutres des forces hostiles, et à utiliser d'autres méthodes de détection que nos propres capteurs.
Taskforce1StartFreeContentPath=missions\Tutorials\Officer_Training_5_briefing\t05_window_1_fr.xml
Taskforce1StartFreeContentAssets=missions\Tutorials\Officer_Training_5_briefing
Taskforce1RORSATmessageMessage=MESSAGE AMIRAUTE|FM ETAT-MAJOR ALERTE ROUGE FLOTTE DU PACIFIQUE\nAU CMDT FORCE D'INTERVENTION VOSTOK\n\n1. Les données de reconnaissance Kosmos 1930 ont été reçues et transmises à vos forces.\n\n2. Un convoi américain a été détecté près de la position 41N, 175E, sur une route 348 à une vitesse de 10 nœuds. \n\n3. Le sous-marin K-175 se met à immersion périscopique pour recevoir ses ordres et opérera sous votre commandement tactique.\n\n4. Avancez à pleine vitesse jusqu'à portée de tir, puis détruisez les Américains. Bonne chance.|Accuser réception et continuer.
Trigger4Condition_Condition1AreaLabel=Zone de recherche
Objective_CompleteMission=Localiser et détruire le convoi US
