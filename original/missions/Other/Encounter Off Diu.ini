[Language_ja]
Name=ディウ沖の遭遇 (1971年)
Description=パキスタンとインドは交戦状態にある。昨夜、インド海軍の大型任務部隊がパキスタン海軍潜水艦PNSハンゴールの直上を通過した。ハンゴールの接触報告が傍受され、現在2隻のインド軍対潜フリゲートが貴艦を捜索中である。ハンゴールを指揮して両フリゲートを撃沈し、西方へ脱出せよ。
Taskforce1StartmessageMessage=<size=20>1971年印パ戦争</size>\nディウ沖の遭遇|\nインドとパキスタンは交戦状態にある。インド西海岸の監視任務に就いていたPNSハンゴールは昨夜、カラチへ向かうインド軍の大型任務部隊と接触した。無線による接触報告が傍受されたため、インド海軍はハンゴールを捜索すべく2隻の対潜フリゲートを派遣した。\n\n敵フリゲートを撃沈し、西方へ離脱・脱出せよ。\n\nPNSハンゴールが生存せねばならない。|作戦開始
Taskforce1HangormustsurviveMessage=敗北|敗北！PNSハンゴールが撃沈された！|作戦終了
Taskforce1P1sinkfrigatescompleteMessage=任務更新|艦長、両フリゲートの撃破に成功した。これよりカラチへ向け西方に離脱できる。インド軍の無線通信を傍受したところ、敵西方艦隊が我々の捜索に向けて動員を開始した模様である。慎重に前進すべきだ。|了解！
Taskforce1P2escape-victoryMessage=勝利|勝利！強力な敵対勢力を退け、当該海域からの脱出に成功した。見事な手際だ、指揮官。|作戦終了
Trigger4Condition_Condition1AreaLabel=この地点に到達して脱出せよ
Objective_SinkEnemyFrigates=敵対潜フリゲートの撃沈
Objective_HangorMustSurvive=PNSハンゴールの生存
Objective_ReachObjectiveArea=西方への脱出
[Language_en]
Name=Encounter Off Diu (1971)
Description=Pakistan and India are at war. Last night, a large Indian task group passed directly over the Pakistani submarine PNS Hangor. Hangor’s contact report was intercepted, and now two Indian ASW frigates are hunting you. Command Hangor to sink both frigates and escape west.
Taskforce1StartmessageMessage=<size=20>The Indo-Pakistani War of 1971</size>\nENCOUNTER OFF DIU|\nIndia and Pakistan are at war. Tasked with surveilling the western coast of India, PNS Hangor made contact with a large Indian task group headed towards Karachi last night. The radio contact report was intercepted and the Indian navy has sent two ASW frigates searching for the Hangor.\n\nSink the enemy frigates, and then retire west to escape.\n\nPNS Hangor must survive.
Taskforce1HangormustsurviveMessage=DEFEAT|Defeat! PNS Hangor has been sunk!|Exit mission
Taskforce1P1sinkfrigatescompleteMessage=MISSION UPDATE|Captain, both frigates have been destroyed and we can retire west to Karachi. We have intercepted Indian radio traffic and their Western Fleet is mobilizing to search for us. We should proceed with caution.|Acknowledged!
Taskforce1P2escape-victoryMessage=VICTORY|Victory! You successfully escaped the area despite heavy opposition. Good work, Commander.|Exit mission
Trigger4Condition_Condition1AreaLabel=Reach this area to escape
Objective_SinkEnemyFrigates=Sink the enemy ASW frigates
Objective_HangorMustSurvive=PNS Hangor must survive
Objective_ReachObjectiveArea=Escape to the west
[Language_fr]
Name=Rencontre au large de Diu (1971)
Description=Le Pakistan et l'Inde sont en guerre. La nuit dernière, un important groupe opérationnel indien a survolé le sous-marin pakistanais Hangor. Le rapport de contact du Hangor a été intercepté, et deux frégates anti-sous-marines indiennes sont désormais à vos trousses. Ordonnez au Hangor de couler les deux frégates et de fuir vers l'ouest.
Taskforce1StartmessageMessage=<size=20>La guerre indo-pakistanaise de 1971</size>\nRENCONTRE AU LARGE DE DIU|\nL'Inde et le Pakistan sont en guerre. Chargé de surveiller la côte ouest de l'Inde, le PNS Hangor a détecté hier soir un important groupe opérationnel indien en route vers Karachi. Le rapport de contact radio a été intercepté et la marine indienne a envoyé deux frégates anti-sous-marines à la recherche du Hangor. Coulez les frégates ennemies, puis repliez-vous vers l'ouest pour vous échapper.\n\nLe PNS Hangor doit survivre.
Taskforce1HangormustsurviveMessage=DEFAITE|Défaite ! Le PNS Hangor a été coulé !|Quitter la mission
Taskforce1P1sinkfrigatescompleteMessage=MAJ MISSION|Capitaine, les deux frégates ont été détruites et nous pouvons nous replier vers l'ouest, en direction de Karachi. Nous avons intercepté le trafic radio indien et leur flotte occidentale se mobilise pour nous rechercher. Nous devons agir avec prudence.|Reçu !
Taskforce1P2escape-victoryMessage=VICTOIRE|Victoire ! Vous avez réussi à vous échapper de la zone malgré une forte opposition. Bravo, Commandant.| Quitter la mission
Trigger4Condition_Condition1AreaLabel=Rejoindre cette zone pour s'échapper
Objective_SinkEnemyFrigates=Couler les frégates ASM ennemies
Objective_HangorMustSurvive=Le PNS Hangor doit survivre
Objective_ReachObjectiveArea=Se dérober vers l'ouest
[Language_cn]
Name=第乌沿海遭遇战（1971）
Description=巴基斯坦和印度正在交战。昨夜，印度的一支大型舰队从巴基斯坦的鲨鱼号潜艇附近经过，鲨鱼号的接触报告已被截获，印度的两艘反潜护卫舰正在猎杀你。指挥鲨鱼号击沉两艘护卫舰并向西撤离。
Taskforce1StartmessageMessage=<size=20>印巴战争（1971）</size>\n第乌沿海遭遇战|\n巴基斯坦和印度正在交战。负责监视印度西海岸的巴军鲨鱼号潜艇昨夜与一支前往卡拉奇的印军舰队发生了接触。鲨鱼号的无线电接触报告已被截获，印度海军派出两艘反潜护卫舰前来搜索。\n\n击沉敌方护卫舰并向西撤离。\n\n鲨鱼号不能被击沉。
Taskforce1HangormustsurviveMessage=任务失败！|任务失败！鲨鱼号被击沉了！|退出任务
Taskforce1P1sinkfrigatescompleteMessage=任务更新|艇长，两艘护卫舰都已被摧毁，我们可以向西撤往卡拉奇了。我们截获了印度的无线电通信，他们的西部舰队正在搜寻我们。我们应该谨慎行事。|收到！
Taskforce1P2escape-victoryMessage=任务完成！|任务完成！你在重重阻碍下成功撤出了此地区。干得好，指挥官！|退出任务
Trigger4Condition_Condition1AreaLabel=到达此区域以撤离
Objective_SinkEnemyFrigates=击沉敌方反潜护卫舰
Objective_HangorMustSurvive=鲨鱼号不能被击沉
Objective_ReachObjectiveArea=向西撤离
[Language_ru]
Name=Encounter Off Diu (1971)
[Language_de]
Name=Gefecht vor Diu (1971)
Description=Pakistan und Indien befinden sich im Krieg. In der vergangenen Nacht lief eine große indische Einsatzgruppe direkt über das pakistanische U-Boot PNS Hangor hinweg. Der Kontaktbericht der Hangor wurde aufgefangen, und nun jagen zwei indische U-Jagd-Fregatten Ihre Einheit. Übernehmen Sie das Kommando über die Hangor, versenken Sie beide Fregatten und weichen Sie anschließend nach Westen aus.
Taskforce1StartmessageMessage=<size=20>Der Indo-Pakistanische Krieg von 1971</size>\nGEFECHT VOR DIU|\nIndien und Pakistan befinden sich im Krieg. Durch den Auftrag zur Überwachung der westindischen Küste hatte die PNS Hangor in der vergangenen Nacht Kontakt mit einer großen indischen Einsatzgruppe, die in Richtung Karatschi lief. Der Funk-Kontaktbericht wurde abgefangen, woraufhin die indische Marine zwei U-Jagd-Fregatten zur Suche nach der Hangor entsandt hat.\n\nVersenken Sie die feindlichen Fregatten und ziehen Sie sich anschließend westwärts zurück.\n\nDie PNS Hangor muss überleben.
Taskforce1HangormustsurviveMessage=NIEDERLAGE|Niederlage! Die PNS Hangor wurde versenkt!|Mission beenden
Taskforce1P1sinkfrigatescompleteMessage=LAGEAKTUALISIERUNG|Kommandant, beide Fregatten wurden zerstört, wir können nun westwärts nach Karatschi ausweichen. Abgefangener indischer Funkverkehr weist darauf hin, dass die Westflotte mobilisiert wurde, um nach uns zu suchen. Vorsichtiges Vorgehen ist geboten.|Bestätigt!
Taskforce1P2escape-victoryMessage=SIEG|Sieg! Trotz starker feindlicher Gegenwehr ist Ihnen die Flucht aus dem Einsatzraum gelungen. Gute Arbeit, Kommandant.|Mission beenden
Trigger4Condition_Condition1AreaLabel=Dieses Gebiet erreichen, um auszuweichen
Objective_SinkEnemyFrigates=Feindliche U-Jagd-Fregatten versenken
Objective_HangorMustSurvive=PNS Hangor muss überleben
Objective_ReachObjectiveArea=Westwärts ausweichen
