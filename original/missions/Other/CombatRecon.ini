[Language_ja]
Name=戦闘偵察
Description=千の軍勢を向こうに回し、汝は独り立つ\r\n勝利は掌中にあり\r\n独力ですべてをなぎ倒せ\r\n
Taskforce2LandUnit7NameOverride=無線鉄塔
Taskforce1BriefingMessage=イスマイリアに向け戦闘偵察を実施し、現地の通信鉄塔を無力化せよ。市街地周辺に敵SAM陣地の存在が報告されている。これを捕捉・撃破せよ。また、交戦するあらゆる敵対勢力を排除せよ。
Taskforce1RadioDestroyedMessage=無線鉄塔を破壊した。任務を続行せよ。
Taskforce1SAMDestroyedMessage=SAM陣地を破壊した。見事だ！\n任務完了！
Objective_DestroyRadioTower=無線鉄塔の破壊
Objective_DestroySAM=敵SAM陣地の破壊

[Language_en]
Name=Combat Recon
Description=An army of a thousand, and you stand alone\r\nVictory is within your reach\r\nYou will take them all on your own\r\n
Taskforce2LandUnit7NameOverride=Radio Tower
Taskforce1BriefingMessage=Conduct combat recon towards Ismailia and disable local comm tower.\nEnemy SAM is reported in vicinity of city. Locate and destroy it.\nEliminate any opposing enemy forces.
Taskforce1RadioDestroyedMessage=Radio Tower is destroyed. Continue mission.
Taskforce1SAMDestroyedMessage=SAM position is destroyed. Well done!\nMission Complete!
Objective_DestroyRadioTower=Destroy Radio Tower
Objective_DestroySAM=Destroy enemy SAM position.

[Language_de]
Name=Gefechtsaufklärung
Description=Eine Armee von Tausend, und Sie stehen alleine dar.\r\nDer Sieg ist zum greifen nahe.\r\nSie werden es allein mit allen aufnehmen\r\n
Taskforce2LandUnit7NameOverride=Funkmast
Taskforce1BriefingMessage=Gefechtsaufklärung in Richtung Ismailia durchführen und örtlichen Funkmast außer Gefecht setzen.\nFeindliche SAM-Stellung wird im Stadtgebiet gemeldet. Suchen und vernichten.\nAlle gegnerischen Feindkräfte bekämpfen und ausschalten.
Taskforce1RadioDestroyedMessage=Funkmast wurde zerstört. Auftrag fortsetzen.
Taskforce1SAMDestroyedMessage=SAM-Stellung wurde zerstört. Gut gemacht!\nAuftrag abgeschlossen!
Objective_DestroyRadioTower=Funkmast zerstören
Objective_DestroySAM=Feindliche SAM-Stellung zerstören.

[Language_fr]
Name=Reconnaissance
Description=Une armée de mille hommes, et vous êtes seul.\r\nLa victoire est à portée de main.\r\nVous les vaincrez par vos propres moyens !\r\n
Taskforce2LandUnit7NameOverride=Tour Radio
Taskforce1BriefingMessage=Effectuez une reconnaissance de combat vers Ismaïlia et désactivez la tour de communication locale.\nUne batterie de missiles sol-air ennemie est signalée à proximité de la ville. Localisez-la et détruisez-la.\nÉliminez toutes les forces ennemies rencontrées.
Taskforce1RadioDestroyedMessage=La tour radio est détruite. Continuez la mission.
Taskforce1SAMDestroyedMessage=Position SAM détruite. Bien joué !\nMission accomplie !
Objective_DestroyRadioTower=Détruire la tour radio
Objective_DestroySAM=Détruire la position SAM ennemie.

[Language_cn]
Name=战斗侦察
Description=对方有一支军队，而你单枪匹马。\r\n胜利就在咫尺。\r\n你需要独自消灭他们。\r\n
Taskforce2LandUnit7NameOverride=无线电塔
Taskforce1BriefingMessage=对伊斯梅利亚进行战斗侦察并瘫痪当地的通信塔。\n据报告，敌方的面对空导弹阵地位于城市附近，找到并摧毁它。\n消灭任何抵抗的敌军。
Taskforce1RadioDestroyedMessage=无线电塔被摧毁了，继续任务。
Taskforce1SAMDestroyedMessage=面对空导弹阵地被摧毁了。干得好！\n任务完成！
Objective_DestroyRadioTower=摧毁无线电塔
Objective_DestroySAM=摧毁敌方面对空导弹阵地

[Language_ko]
Name=전투 정찰
Description=천 명의 군대, 그리고 당신은 홀로 서 있습니다\r\n승리는 당신의 손 안에 있습니다\r\n당신은 그것들을 모두 혼자서 가져갈 것입니다\r\n
Taskforce2LandUnit7NameOverride=라디오 타워
Taskforce1BriefingMessage=이스마일리아를 향해 전투 정찰을 실시하고 지역 통신 타워를 비활성화하십시오.\n적 SAM이 도시 근처에서 보고되었습니다. 찾아서 파괴하시오.\n적을 물리치시오.
Taskforce1RadioDestroyedMessage=라디오 타워 파괴됨. 계속 진행함.
Taskforce1SAMDestroyedMessage=SAM 포대가 파괴되었습니다. 잘했습니다!\n임무 완료!
Objective_DestroyRadioTower=라디오 타워 파괴
Objective_DestroySAM=적의 SAM 포대 파괴

