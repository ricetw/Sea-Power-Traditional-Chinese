[Language_ja]
Name=トライデント作戦 (1971年)
Description=国境沿いのインド軍飛行場に対するパキスタン軍の攻撃への報復として、インド海軍はパキスタンのカラチ港への海軍攻撃を命じられた。カラチ打撃群を指揮して当該海域を急襲し、遭遇したすべてのパキスタン艦艇を撃沈せよ。
Taskforce2Vessel1NameOverride=MVヴィーナス・チャレンジャー
Taskforce2Vessel1ShortNameOverride=MVヴィーナス・チャレンジャー
Taskforce2Vessel4NameOverride=PNSムハフィズ
Taskforce2Vessel4ShortNameOverride=PNSムハフィズ
Taskforce1StartmessageMessage=<size=20>1971年印パ戦争</size>\nトライデント作戦|国境沿いのインド軍飛行場に対するパキスタン軍の攻撃への報復として、インド海軍はパキスタンのカラチ港への海軍攻撃を命じた。\n\nパキスタン海軍はすべての民間船舶に対し、カラチ周辺海域からの退避を命じている。したがって、捕捉したすべての水上目標は敵対的であるとみなし、交戦せねばならない。\n\n当該海域を掃討して遭遇したすべての敵艦を撃破し、しかる後に南方へ離脱せよ。\n\n少なくとも自軍の艦艇1隻が生存せねばならない。|作戦開始
Taskforce1OneplayershipmustsurviveMessage=敗北|敗北！全艦が破壊された！|作戦終了
Taskforce1Destroyallenemyships-playervictoryMessage=勝利|勝利！当該海域の敵艦はすべて撃破された。これはインドにとって大いなる勝利であり、我が方戦力が自由に作戦行動を展開可能になることで紛争の期間を短縮させるだろう。見事な手際だ、指揮官。|作戦終了
Taskforce1KhaibardetectmessageMessage=任務更新|指揮官、「キルタン」のレーダーが北西に水上目標を捕捉した。その位置と高速度からパキスタン軍艦であると判断される。スティックス・ミサイルで当該目標と交戦すべきだ。|了解！
Taskforce1VenusChallengerdetectedmessageMessage=任務更新|指揮官、北東から接近する2つの目標を確認した。これらは低速で編隊を組んでおり、当該海域への進出が予見されていた補給艦および護衛の軍艦と思われる。|了解！
Taskforce1MuhafizdetectedmessageMessage=任務更新|指揮官、北方に新たなレーダー捕捉。目標は低速かつ小型だが、カラチ沖の排除区域内に出現した以上、軍用と判断し破壊すべきである。|了解！
Objective_DestroyEnemyShips=遭遇した全敵艦の撃破
Objective_OneShipMustSurvive=自軍艦艇が少なくとも1隻生存
[Language_en]
Name=Operation Trident (1971)
Description=In retaliation for Pakistani strikes on Indian airfields along the border, the Indian Navy has been ordered to conduct a naval attack on the Pakistani port at Karachi. Take charge of the Karachi Strike Group to raid the area and sink any Pakistani ships you encounter.
Taskforce2Vessel1NameOverride=MV Venus Challenger
Taskforce2Vessel1ShortNameOverride=MV Venus Challenger
Taskforce2Vessel4NameOverride=PNS Muhafiz
Taskforce2Vessel4ShortNameOverride=PNS Muhafiz
Taskforce1StartmessageMessage=<size=20>The Indo-Pakistani War of 1971</size>\nOPERATION TRIDENT|In retaliation for Pakistani strikes on Indian airfields along the border, the Indian Navy has been ordered to conduct a naval attack on the Pakistani port at Karachi.\n\nThe Pakistani Navy has ordered all civilian traffic to remain clear of the area around Karachi. All surface contacts should be considered hostile and must be engaged.\n\nSweep the area and destroy all enemy ships encountered, then retire south.\n\nAt least one of your ships must survive.|Start mission
Taskforce1OneplayershipmustsurviveMessage=DEFEAT|Defeat! All of your ships have been destroyed!|Exit mission
Taskforce1Destroyallenemyships-playervictoryMessage=VICTORY|Victory! All enemy ships in the area have been destroyed. This is a great victory for India and will shorten the conflict by allowing our forces to operate with impunity. Good work, Commander.|Exit mission
Taskforce1KhaibardetectmessageMessage=MISSION UPDATE|Commander, Kiltan's radar has detected a surface contact to the northwest. Its location and high speed indicate it is a Pakistani warship. We should engage this target with our Styx missiles."|Acknowledged!
Taskforce1VenusChallengerdetectedmessageMessage=MISSION UPDATE|Commander, two contacts are moving towards us from northeast. These contacts are slower, moving in formation, likely a supply ship known to be in the area with a warship escort."|Acknowledged!
Taskforce1MuhafizdetectedmessageMessage=MISSION UPDATE|Commander, a new radar contact has been picked up to the north. It is slow and small but as it is appearing inside the exclusion zone off Karachi, it must be military and should be destroyed."|Acknowledged!
Objective_DestroyEnemyShips=Destroy all enemy ships encountered
Objective_OneShipMustSurvive=At least one of your ships must survive
[Language_fr]
Name=Opération Trident (1971)
Description=En représailles aux frappes pakistanaises sur les aérodromes indiens le long de la frontière, la marine indienne a reçu l'ordre de mener une attaque navale contre le port pakistanais de Karachi. Prenez le commandement du groupe d'attaque de Karachi pour attaquer la zone et couler tout navire pakistanais rencontré.
Taskforce2Vessel1NameOverride=MV Venus Challenger
Taskforce2Vessel1ShortNameOverride=MV Venus Challenger
Taskforce2Vessel4NameOverride=PNS Muhafiz
Taskforce2Vessel4ShortNameOverride=PNS Muhafiz
Taskforce1StartmessageMessage=<size=20>Guerre indo-pakistanaise de 1971</size>\nOPÉRATION TRIDENT|En représailles aux frappes pakistanaises sur les aérodromes indiens le long de la frontière, la marine indienne a reçu l'ordre de mener une attaque navale contre le port pakistanais de Karachi.\n\nLa marine pakistanaise a ordonné à tout trafic civil de rester à l'écart de la zone autour de Karachi. Tout contact de surface doit être considéré comme hostile et doit être engagé.\n\nNettoyez la zone et détruisez tous les navires ennemis rencontrés, puis repliez-vous vers le sud. Au moins un de vos navires doit survivre.|Commencer la mission
Taskforce1OneplayershipmustsurviveMessage=DEFAITE|Défaite ! Tous vos navires ont été détruits !|Quitter la mission
Taskforce1Destroyallenemyships-playervictoryMessage=VICTOIRE|Victoire ! Tous les navires ennemis dans la zone ont été détruits. C'est une grande victoire pour l'Inde et cela permettra de raccourcir le conflit en permettant à nos forces d'opérer sans être inquiétées. Bravo, Commandant.|Quitter la mission
Taskforce1KhaibardetectmessageMessage=MAJ MISSION|Commandant, le radar de Kiltan a détecté un contact en surface au nord-ouest. Sa position et sa vitesse élevée indiquent qu'il s'agit d'un navire de guerre pakistanais. Nous devons attaquer cette cible avec nos missiles Styx. |Bien reçu !
Taskforce1VenusChallengerdetectedmessageMessage=MAJ MISSION|Commandant, deux contacts se dirigent vers nous depuis le nord-est. Ces contacts sont plus lents et se déplacent en formation. Il s'agit probablement d'un navire de ravitaillement, escorté par un navire de guerre, dont la présence est connue dans la zone. |Bien reçu !
Taskforce1MuhafizdetectedmessageMessage=MAJ MISSION|Commandant, un nouveau contact radar a été détecté au nord. Il est lent et de faible amplitude, mais comme il apparaît dans la zone d'exclusion au large de Karachi, il doit être militaire et doit être détruit.|Bien reçu !
Objective_DestroyEnemyShips=Détruire tous les navires ennemis rencontrés
Objective_OneShipMustSurvive=Au moins l'un de vos navires doit survivre
[Language_cn]
Name=三叉戟行动（1971）
Description=为了报复巴基斯坦对印度边境机场的打击，印度海军收到命令对巴基斯坦的卡拉奇港口进行海上攻击。指挥卡拉奇打击群突袭此地区，击沉遭遇的巴基斯坦船只。
Taskforce2Vessel1NameOverride=金星挑战者
Taskforce2Vessel1ShortNameOverride=金星挑战者
Taskforce2Vessel4NameOverride=守护者
Taskforce2Vessel4ShortNameOverride=守护者
Taskforce1StartmessageMessage=<size=20>印巴战争（1971）</size>\n三叉戟行动|为了报复巴基斯坦对印度边境机场的打击，印度海军收到命令对巴基斯坦的卡拉奇港口进行海上攻击。\n\n巴基斯坦海军已命令所有民用船只远离卡拉奇周围区域。所有水面接触都应被视为敌军，必须与其交战。\n\n清扫此区域，摧毁遭遇的所有敌方船只，之后向南撤离。\n\n你至少有一艘船只不被击沉。|开始任务
Taskforce1OneplayershipmustsurviveMessage=任务失败！|任务失败！你的所有船只都已被摧毁！|退出任务
Taskforce1Destroyallenemyships-playervictoryMessage=任务完成！|任务完成！此区域内的所有敌方船只都被击沉了。这是印度的伟大胜利，我们的部队将可以不受限制地行动以尽快结束冲突。干得好，指挥官！|退出任务
Taskforce1KhaibardetectmessageMessage=任务更新|指挥官，基尔坦号的雷达探测到西北方向有水面接触。位置和高速表明它是一艘巴基斯坦军舰。我们应该用P-15导弹攻击此目标。|收到！
Taskforce1VenusChallengerdetectedmessageMessage=任务更新|指挥官，两个接触正从东北方向我们靠近。这些接触速度较慢且编队移动，可能是一艘已知位于此区域内的补给舰及其护航军舰。|收到！
Taskforce1MuhafizdetectedmessageMessage=任务更新|指挥官，北方出现了新的雷达接触。它又慢又小，但因为它出现在卡拉奇附近的禁区内，所以一定是军用船只，你应该摧毁它。|收到！
Objective_DestroyEnemyShips=摧毁遭遇的所有敌方船只
Objective_OneShipMustSurvive=你至少有一艘船只不被击沉
[Language_ru]
Name=Operation Trident (1971)
[Language_de]
Name=Operation Trident (1971)
Description=Als Vergeltung für pakistanische Angriffe auf indische Flugplätze entlang der Grenze wurde die indische Marine angewiesen, einen Seeangriff auf den pakistanischen Hafen von Karatschi durchzuführen. Übernehmen Sie das Kommando über die Karachi Strike Group, führen Sie einen Vorstoß in das Einsatzgebiet durch und versenken Sie alle pakistanischen Schiffe, auf die Sie treffen.
Taskforce2Vessel1NameOverride=MV Venus Challenger
Taskforce2Vessel1ShortNameOverride=MV Venus Challenger
Taskforce2Vessel4NameOverride=PNS Muhafiz
Taskforce2Vessel4ShortNameOverride=PNS Muhafiz
Taskforce1StartmessageMessage=<size=20>Der Indo-Pakistanische Krieg von 1971</size>\nOPERATION TRIDENT|Als Vergeltung für pakistanische Angriffe auf indische Flugplätze entlang der Grenze wurde die indische Marine angewiesen, einen Angriff auf den pakistanischen Hafen von Karatschi durchzuführen.\n\nDie pakistanische Marine hat sämtlichen zivilen Schiffsverkehr angewiesen, den Raum um Karatschi zu meiden. Alle Überwasserkontakte sind als feindlich zu bewerten und zu bekämpfen.\n\nDas Einsatzgebiet durchsuchen, alle angetroffenen feindlichen Schiffe vernichten und anschließend südwärts ausweichen.\n\nMindestens eines Ihrer Schiffe muss überleben.|Mission starten
Taskforce1OneplayershipmustsurviveMessage=NIEDERLAGE|Niederlage! Alle Ihre Schiffe wurden zerstört!|Mission beenden
Taskforce1Destroyallenemyships-playervictoryMessage=SIEG|Sieg! Sämtliche feindlichen Schiffe im Einsatzgebiet wurden vernichtet. Dies ist ein großer Sieg für Indien und wird den Konflikt verkürzen, da unsere Kräfte nun weitgehend unbehelligt operieren können. Gute Arbeit, Kommandant.|Mission beenden
Taskforce1KhaibardetectmessageMessage=LAGEAKTUALISIERUNG|Kommandant, das Radar der Kiltan hat einen Überwasserkontakt nordwestlich aufgefasst. Position und hohe Fahrt deuten auf ein pakistanisches Kriegsschiff hin. Wir sollten dieses Ziel mit unseren Styx-Flugkörpern bekämpfen.|Bestätigen
Taskforce1VenusChallengerdetectedmessageMessage=LAGEAKTUALISIERUNG|Kommandant, zwei Kontakte nähern sich aus nordöstlicher Richtung. Diese Kontakte laufen langsamer und in Formation. Vermutlich handelt es sich um ein im Raum bekanntes Versorgungsschiff mit Geleitschiffen.|Bestätigen
Taskforce1MuhafizdetectedmessageMessage=LAGEAKTUALISIERUNG|Kommandant, ein neuer Radarkontakt wurde nördlich aufgefasst. Er ist langsam und klein. Da er jedoch innerhalb der Sperrzone vor Karatschi erscheint, ist er als militärisch zu bewerten und zu zerstören.|Bestätigen
Objective_DestroyEnemyShips=Alle angetroffenen feindlichen Schiffe vernichten
Objective_OneShipMustSurvive=Mindestens eines Ihrer Schiffe muss überleben
