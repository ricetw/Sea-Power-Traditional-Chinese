[Language_ko]
Name=트라이던트 (1971) 작전
Description=파키스탄이 국경 인근 인도 비행장을 공격한 것에 대한 보복으로, 인도 해군은 파키스탄의 카라치 항구에 대한 공격을 명령받았습니다. 카라치 타격대를 지휘하여 해당 지역을 습격하고 조우하는 모든 파키스탄 선박을 격침시키십시오.
Taskforce2Vessel1NameOverride=MV 베누스 챌린저
Taskforce2Vessel1ShortNameOverride=MV 베누스 챌린저
Taskforce2Vessel4NameOverride=PNS 무하피즈
Taskforce2Vessel4ShortNameOverride=PNS 무하피즈
Taskforce1StartmessageMessage=<size=20>인도-파키스탄 전쟁 1971</size>\\n트라이던트 작전|파키스탄이 국경 인근 인도 비행장을 공격한 것에 대한 보복으로, 인도 해군은 파키스탄의 카라치 항구에 대한 공격을 명령받았습니다.\\n\\n파키스탄 해군은 모든 민간 선박에게 카라치 인근 지역으로 접근하지 말라고 명령했습니다.모든 접근 대상은 적대 세력으로 간주되며 즉각 교전에 들어갈 것입니다.\\n\\n카리치 지역을 휩쓸고 마주친 적 함선들을 모두 파괴한 후 남쪽으로 퇴각하십시오.\\n\\n적어도 한 척의 배는 반드시 살아남아야 합니다.|미션 시작
Taskforce1OneplayershipmustsurviveMessage=패배|패배! 당신의 모든 함선이 격침되었습니다!|미션 나가기
Taskforce1Destroyallenemyships-playervictoryMessage=승리|승리! 해당 지역의 모든 선박이 파괴되었습니다. 이는 우리 인도의 위대한 승리이며 군이 자유롭게 작전할 수 있게 함으로써 분쟁 기간을 단축시킬 것입니다. 수고하셨습니다, 사령관님.|미션 나가기
Taskforce1KhaibardetectmessageMessage=미션 업데이트|사령관님, 킬탄함의 레이더가 북서쪽에서 수상 표적을 탐지했습니다. 표적의 위치와 빠른 속도로 볼 때 파키스탄 군함으로 추정됩니다. 스틱스 미사일로 이 목표를 공격해야 합니다."|확인됨!
Taskforce1VenusChallengerdetectedmessageMessage=미션 업데이트|사령관님, 두 개의 표적이 북동쪽에서 우리 쪽으로 이동하고 있습니다. 해당 표적들은 느리지만 대형을 이루어 이동하고 있으며, 이 지역에 있는 것으로 알려진 보급함과 그 호위함으로 추정됩니다."|확인됨!
Taskforce1MuhafizdetectedmessageMessage=미션 업데이트|사령관님, 레이더가 북쪽에서 무언가를 포착하였습니다. 느리고 작지만 카라치 앞바다의 접근 금지 구역의 안에 있습니다. 군사 목표임이 분명하고 이 목표는 파괴되어야 합니다."|확인됨!
Objective_DestroyEnemyShips=조우한 모든 적 함선 파괴됨
Objective_OneShipMustSurvive=적어도 한 척의 배는 반드시 살아남아야 함
