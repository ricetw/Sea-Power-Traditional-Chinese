Description=Durante la Batalla de Baltim se enfrentaron cara a cara la marina israelí y la armada egipcia en el contexto de la guerra del Yom Kippur. Comenzó con la incursión de seis lanchas patrulleras lanzamisiles israelíes clase Sa'ar que se dirigían a Puerto Saíd, saliendo al encuentro de las mismas cuatro barcos lanzamisiles egipcios de la clase Osa que provenían desde Alejandría.
