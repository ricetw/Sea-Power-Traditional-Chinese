[Language_de]
Name=Die Schlacht von Baltim (1973)
Description=Drei Tage nach Beginn des Jom-Kippur-Krieges sind israelische Streitkräfte in Gefechte mit den arabischen Staaten verwickelt. Ihre Einheit aus Lenkwaffenschnellbooten der SA’AR-Klasse, die kürzlich siegreich aus der Schlacht von Latakia zurückgekehrt ist, wurde nach Westen umgeleitet, um den Vormarsch der IDF auf der Sinai-Halbinsel zu unterstützen. Verlegen Sie nach Port Said und suchen sowie vernichten Sie anschließend die ägyptische Lenkwaffenschnellboot-Flottille im Einsatzraum.
Taskforce1StartmessageMessage=<size=20>Der Jom-Kippur-Krieg – Teil 2</size>\nDIE SCHLACHT VON BALTIM|Drei Tage nach Beginn des Jom-Kippur-Krieges sind israelische Streitkräfte in Gefechte mit den arabischen Staaten verwickelt. Ihre Einheit aus Lenkwaffenschnellbooten der SA’AR-Klasse, die kürzlich siegreich aus der Schlacht von Latakia zurückgekehrt ist, wurde nach Westen umgeleitet, um den Vormarsch der IDF auf der Sinai-Halbinsel zu unterstützen.\n\nDie Aufklärung hat vier ägyptische Lenkwaffenschnellboote der OSA-Klasse erfasst, die von Alexandria ostwärts verlegen. Verlegen Sie nach Westen und vernichten Sie diese Einheiten. In Küstennähe ist mit starkem zivilen Schiffsverkehr zu rechnen.\n\nMindestens ein israelisches Schiff muss überleben.|Mission starten
Taskforce1Osasdestroyed-playervictoryMessage=SIEG|Sieg! Sämtliche ägyptischen Lenkwaffenschnellboote wurden zerstört. Gute Arbeit, Kommandant.|Mission beenden
Taskforce2Osasdestroyed-playervictoryMessage=<color=red>Mission fehlgeschlagen</color>|Alle unsere Kräfte wurden zerstört. Sie wurden besiegt.|Mission beenden
Taskforce1Playerdestroyed-playerdefeatMessage=NIEDERLAGE|Niederlage! Alle Ihre Schiffe wurden im Gefecht zerstört!|Mission beenden
Objective_DestroyEnemyMissileBoats=Feindliche Lenkwaffenschnellboote vernichten
Objective_OneShipMustSurvive=Mindestens ein eigenes Schiff muss überleben

[Language_cn]
Name=巴尔的姆之战（1973）
Description=赎罪日战争爆发三天后，以色列军队正全力与阿拉伯国家作战。你的导弹艇部队刚从拉塔基亚之战中得胜而归，已改道向西，支援以色列国防军向西奈半岛推进。前往塞得港，找到并摧毁此地区的埃及导弹艇舰队。
Taskforce1StartmessageMessage=<size=20>赎罪日战争——第2部分</size>\n巴尔的姆之战|赎罪日战争爆发三天后，以色列军队正全力与阿拉伯国家作战。你的导弹艇部队刚从拉塔基亚之战中得胜而归，已改道向西，支援以色列国防军向西奈半岛推进。\n\n侦察发现埃及的4艘205型导弹艇从亚历山大港向东移动，向西航行并摧毁它们。预计靠近海岸的位置会有大量民用船只通行。\n\n你至少有一艘船只不被击沉。|开始任务
Taskforce1Osasdestroyed-playervictoryMessage=任务完成！|任务完成！埃及导弹艇已被全部摧毁。干得好，指挥官！|退出任务
Taskforce2Osasdestroyed-playervictoryMessage=<color=red>任务失败！</color>|我军部队已损失殆尽，你失败了。
Taskforce1Playerdestroyed-playerdefeatMessage=任务失败！|你失败了！你的所有船只都在战斗中损失了！|退出任务
Objective_DestroyEnemyMissileBoats=摧毁敌方导弹艇
Objective_OneShipMustSurvive=你至少有一艘船只不被击沉

