[Language_ja]
Name=攻撃ウェイポイントのデモ
Description=攻撃ウェイポイント使用時における目標自動配分のデモンストレーション

Taskforce1StartMessage=攻撃ウェイポイントのテスト|本ミッションは、攻撃ウェイポイントを使用した際の目標自動配分機能を実演するために設計されている。間もなく敵機が飛来する。敵機は再攻撃を行わず一度限りの打撃を実施し、交戦規定が「Weapons Free」に設定されていない状態でも各目標への交戦を試みる点に注目されたい[cite: 432]。これにより、全体として統制された組織的攻撃が展開されるはずだ。ここでは自軍ユニットを操作する必要はなく、AIの挙動を観測することに専念してほしい。\n状況をより詳細に把握するため、デバッグメニュー(DM)にてWeaponTrailsおよびTruthForPlayerを有効にすることを推奨する。|状況を確認する

[Language_en]
Name=Attack waypoints demo
Description=Demo of target distribution while using attack waypoints

Taskforce1StartMessage=Attack waypoints test|This mission is designed to show automatic targets distribution while using attack waypoints. Enemy planes will arrive shortly. Note that they will perform a single strike without reattack and will try to engage each target while not being on weapons free. Overall this should (hopefully) look like some organized strike. You do not need to control your units here, just observe AI actions.\n It is reccomended to enable WeaponTrails and TruthForPlayer in DM for better overview|Let's see

