Objective_PeleliuMustSurvive=USS Peleliu must survive
Objective_SubMustSurvive=SAS Johanna van der Merwe must survive
Objective_DestroyGDRForces=Destroy the East German naval forces in the north
[Language_cn]
Name=红色马达加斯加（1985）
Description=华约军队已让马达加斯加天翻地覆，他们正在尝试占领这座岛屿以扩大其在印度洋的影响力。指挥贝里琉号两栖戒备群增援塔那那利佛的抵抗力量，南非海空军将支援此次行动。预计古巴飞机和华约船只将猛烈反击。
Taskforce1LandUnit1NameOverride=马南扎里机场
Taskforce1LandUnit1ShortNameOverride=马南扎里机场
Taskforce2LandUnit23NameOverride=苏阿拉拉机场
Taskforce2LandUnit23ShortNameOverride=苏阿拉拉机场
Taskforce1StartMessage=<size=20>南方盾牌</size>\n红色马达加斯加|美国及其盟友正在努力强化马达加斯加的反共抵抗力量。贝里琉号两栖戒备群收到任务确保通往塔那那利佛的空中走廊畅通并通过CH-46直升机运送关键物资。报告显示北方出现了东德侦察船，我们必须将其摧毁。\n\n确保你的CH-46直升机抵达补给点，之后找到并摧毁支援岸上共产主义者的东德海军单位。\n\n贝里琉号和约翰娜·范德梅维号不能被击沉。|开始任务
Taskforce1AreareachedMessage=任务更新|指挥官，我们的直升机已经抵达补给区并运送了物资。现在可以命令它们返回基地！|收到并继续
Taskforce1AllplayerheloskilledMessage=任务失败！|任务失败！我们损失了太多补给直升机！|退出任务
Taskforce1JohannavanderMerwemustsurviveMessage=任务失败！|任务失败！约翰娜·范德梅维号已被摧毁！|退出任务
Taskforce1PeleliumustsurviveMessage=任务失败！|任务失败！贝里琉号已被摧毁！|退出任务
Taskforce1DestroyGDRnavalunitsMessage=任务完成！|任务完成！补给已运抵岸上，我们消灭了尝试增援的东德海军部队。我们胜利了！|退出任务
