[Language_ja]
Name=レッド・マダガスカル (1985)
Description=ワルシャワ条約機構軍の介入によりマダガスカルは混乱に陥った。彼らはインド洋における影響力拡大のため、同島の完全制圧を目論んでいる。提督の任務は、ペリリュー両用即応群を指揮してアンタナナリボの抵抗勢力を救援することだ。作戦には南アフリカ海空軍ユニットが支援に当たる。キューバ空軍および条約機構海軍部隊による激しい抵抗が予想される。
Taskforce1LandUnit1NameOverride=FMSM
Taskforce1LandUnit1ShortNameOverride=FMSM
Taskforce2LandUnit23NameOverride=ソアララ飛行場
Taskforce2LandUnit23ShortNameOverride=FMNO
Taskforce1StartMessage=<size=20>サザン・シールド作戦</size>\nレッド・マダガスカル|米軍および同盟軍は、マダガスカルにおける反共抵抗勢力を増援すべく行動を開始した。ペリリュー両用即応群（ARG）に与えられた任務は、アンタナナリボへの航空回廊を確保し、CH-46ヘリコプターによって重要物資を届けることである。また、北方では東ドイツの偵察艦が報告されており、これを撃破しなければならない。\n\nCH-46を補給地点まで護衛し、しかるのちに沿岸の共産勢力を支援する東ドイツ海軍ユニットを索敵・撃破せよ。\n\nUSSペリリューおよびSASヨハンナ・ファン・デ・メルウェの生存が絶対条件である。|作戦開始
Taskforce1AreareachedMessage=任務更新|提督、ヘリ部隊が補給地点に到達し、物資の揚陸を完了した。これより帰還を許可する。|了解、継続
Taskforce1AllplayerheloskilledMessage=敗北|作戦失敗。輸送ヘリを喪失しすぎたため、これ以上の任務継続は不可能だ。|ミッション終了
Taskforce1JohannavanderMerwemustsurviveMessage=敗北|作戦失敗。SASヨハンナ・ファン・デ・メルウェが撃沈された。|ミッション終了
Taskforce1PeleliumustsurviveMessage=敗北|作戦失敗。USSペリリューが撃沈された。|ミッション終了
Taskforce1DestroyGDRnavalunitsMessage=勝利|作戦成功。物資の揚陸は完了し、敵を支援せんとした東ドイツ海軍部隊もすべて撃破した。見事な手際だ。|ミッション終了
Trigger2Condition_Condition1AreaLabel=補給エリア
Objective_ReachMarkedArea=CH-46を補給地点まで護衛
Objective_PeleliuMustSurvive=USSペリリューの生存
Objective_SubMustSurvive=SASヨハンナ・ファン・デ・メルウェの生存
Objective_DestroyGDRForces=北方の東ドイツ海軍部隊を撃破
[Language_en]
Name=Red Madagascar (1985)
Description=Warsaw Pact forces have thrown Madagascar into chaos and are attempting to seize the island to expand their reach in the Indian Ocean. Command the Peleliu Amphibious Ready Group to reinforce resistance forces at Antananarivo while South African air and naval units support the operation. Expect heavy opposition from Cuban aircraft and Warsaw Pact naval elements.
Taskforce1LandUnit1NameOverride=FMSM
Taskforce1LandUnit1ShortNameOverride=FMSM
Taskforce2LandUnit23NameOverride=Soalala Airfield
Taskforce2LandUnit23ShortNameOverride=FMNO
Taskforce1StartMessage=<size=20>Operation Southern Shield</size>\nRED MADAGASCAR|U.S. and Allied forces are working to reinforce anti-communist resistance on Madagascar. The Peleliu ARG has been tasked to secure the air corridor to Antananarivo and deliver critical supplies via CH-46 helicopter. In the north, East German recon ships have been reported and must be destroyed.\n\nEnsure your CH-46s reach the resupply point, then locate and destroy the East German naval units supporting the Communist forces ashore.\n\nUSS Peleliu and SAS Johanna van der Merwe must survive.|Start mission
Taskforce1AreareachedMessage=MISSION UPDATE|Commander, our helicopters have reached the resupply area and delivered the supplies. We can order them to return to base!|Acknowledge & continue
Taskforce1AllplayerheloskilledMessage=DEFEAT|Defeat! We have lost too many of our resupply helicopters and the mission is a failure!|Exit mission
Taskforce1JohannavanderMerwemustsurviveMessage=DEFEAT|Defeat! SAS Johanna van der Merwe has been destroyed!|Exit mission
Taskforce1PeleliumustsurviveMessage=DEFEAT|Defeat! USS Peleliu has been destroyed!|Exit mission
Taskforce1DestroyGDRnavalunitsMessage=VICTORY|Victory! Supplies have been delivered ashore and we have destroyed the East German naval units attempting to reinforce. Mission accomplished!|Exit mission
Trigger2Condition_Condition1AreaLabel=Resupply area
