[Language_de]
Name=Rotes Madagaskar (1985)
Description=Streitkräfte des Warschauer Pakts haben Madagaskar ins Chaos gestürzt und versuchen, die Insel zu besetzen, um ihren Einfluss im Indischen Ozean auszuweiten. Übernehmen Sie das Kommando über die Amphibious Ready Group PELELIU, um Kräfte des Widerstands bei Antananarivo zu verstärken, während südafrikanische Luft- und Seestreitkräfte die Operation ebenfalls unterstützen. Rechnen Sie mit starkem Widerstand durch kubanische Luft- und Seestreitkräfte des Warschauer Pakts.
Taskforce1LandUnit1NameOverride=FMSM
Taskforce1LandUnit1ShortNameOverride=FMSM
Taskforce1StartMessage=<size=20>Operation Southern Shield</size>\nROTES MADAGASKAR|US- und alliierte Streitkräfte arbeiten daran, den antikommunistischen Widerstand auf Madagaskar zu verstärken. Die Peleliu ARG wurde beauftragt, den Luftkorridor nach Antananarivo zu sichern und kritische Versorgungsgüter per CH-46-Hubschrauber zu verlegen. Im Norden wurden ostdeutsche Aufklärungsschiffe gemeldet, die zu zerstören sind.\n\nStellen Sie sicher, dass Ihre CH-46 den Versorgungspunkt erreichen, suchen und vernichten Sie anschließend die ostdeutschen Seestreitkräfte, die die kommunistischen Kräfte an Land unterstützen.\n\nDie USS Peleliu und die SAS Johanna van der Merwe müssen überleben.|Mission starten
Taskforce1AreareachedMessage=LAGEAKTUALISIERUNG|Kommandant, unsere Hubschrauber haben den Versorgungsraum erreicht und die Güter abgesetzt. Wir können den Rückflug zur Basis anordnen!|Bestätigen & fortfahren
Taskforce1AllplayerheloskilledMessage=NIEDERLAGE|Niederlage! Sämtliche Versorgungshubschrauber wurden abgeschossen!|Mission beenden
Taskforce1JohannavanderMerwemustsurviveMessage=NIEDERLAGE|Niederlage! SAS Johanna van der Merwe wurde zerstört!|Mission beenden
Taskforce1PeleliumustsurviveMessage=NIEDERLAGE|Niederlage! Die USS Peleliu wurde zerstört!|Mission beenden
Taskforce1DestroyGDRnavalunitsMessage=SIEG|Sieg! Die Versorgungsgüter wurden an Land gebracht und die ostdeutschen Seestreitkräfte, die Verstärkung heranführen wollten, wurden vernichtet. Auftrag erfüllt!|Mission beenden
