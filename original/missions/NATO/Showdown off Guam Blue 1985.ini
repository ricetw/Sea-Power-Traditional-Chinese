[Language_ja]
Name=グアム沖の決戦 - ブルー (1985)
Description=開戦の直前、ソ連軍はウラジオストクから太平洋に向けて有力な水上部隊を出撃させた。この部隊には巡洋戦艦キーロフと重航空巡洋艦ミンスクが含まれており、グアムの米軍基地を強襲するものとみられる。当該海域の米軍を指揮し、ソ連攻撃部隊を捕捉・撃破せよ。
Taskforce1LandUnit1NameOverride=アンダーセン空軍基地
Taskforce1LandUnit1ShortNameOverride=PGUA
Taskforce1StartMessage=グアム沖の決戦\nブルー (1985)|消息を絶ったソ連軍の有力な水上部隊について、連合軍情報部はグアムの米軍基地を攻撃すべく南下中であると判断した。当該海域の米軍および日本軍には、これを捕捉・撃滅する任務が与えられた。\n\nアンダーセン空軍基地から米軍機が出撃可能であるほか、海上自衛隊の哨戒戦力が索敵支援のため硫黄島の飛行場に展開している。我が方の水上打撃群（第72.1任務部隊）は既にアプラ港を出港しており、敵部隊を捕捉次第、攻撃を加えるべく北西へと進出中である。\n\n少なくとも一隻の水上艦を生存させよ。|作戦開始
StartForecast=フィリピン海東部海上気象予報\n有効期間：1985年6月27日 0000Z - 2400Z\n\n亜熱帯高圧帯が北緯20度以北の西部太平洋を西に張り出しており、フィリピン海東部では弱い東寄りの貿易風が卓越している。高圧帯の軸の南側では、活発なモンスーン・トラフにより散発的な対流活動が発生しており、局地的な雷雨を伴っている。当該海域に熱帯低気圧は存在せず、全般的な海況・気象は水上および航空作戦に適しているが、対流雲付近では局地的な影響が予想される。
Taskforce1OneshipmustsurviveMessage=作戦失敗|敗北！我が方の全水上艦が撃沈された！|継続
Taskforce1DestroyallenemyshipsvictoryMessage=任務完了|緊急（FLASH）\n発：太平洋艦隊司令長官\n宛：第72任務部隊指揮官\n\n1. (S) 国家技術情報手段および追跡偵察画像により、敵主力水上艦艇の撃沈を確認した。\n\n2. (S) 第72任務部隊は直ちに交戦を中止し、最高速でアプラ港へと帰還せよ。航行中は水中および航空脅威に対し警戒を厳にすること。\n\n3. (S) 運用上可能な限り速やかに、作戦状況速報（OPREP-3）および戦闘被害評価（BDA）を提出せよ。\n\n4. (S) 総員の見事な奮戦を称える。追加の任務については別電にて送付する。太平洋艦隊司令長官より。|作戦終了
Objective_DestroyKirovSAG=巡洋戦艦キーロフの撃沈
Objective_DestroyKievCVBG=重航空巡洋艦ミンスクの撃沈
Objective_OneShipMustSurvive=少なくとも一隻の自艦の生存
[Language_en]
Name=Showdown off Guam - Blue (1985)
Description=Shortly before hostilities broke out, the Soviets sortied a heavy surface force from Vladivostok into the Pacific. This force contains both the battlecruiser Kirov and the carrier Minsk, and is believed to be heading to strike the U.S. base on Guam. Command the U.S. forces in the area to locate and destroy the Soviet attack force.
Taskforce1LandUnit1NameOverride=Andersen AFB
Taskforce1LandUnit1ShortNameOverride=PGUA
Taskforce1StartMessage=SHOWDOWN OFF \nGUAM - BLUE (1985)|A large Soviet surface force is unaccounted for, and Allied intelligence believes it is moving south to strike the U.S. base at Guam. American and Japanese forces in the area have been tasked to locate and destroy it.\n\nU.S. air is available out of Andersen AFB, and JMSDF patrol assets are staging at the airfield on Iwo Jima to assist search. Our surface action group (TG 72.1) has departed Apra and is moving northwest to strike the Soviets once they are located.\n\nAt least one of our surface units must survive.|Start mission
StartForecast=MARINE WEATHER FORECAST FOR THE EASTERN PHILIPPINE SEA\nVALID: 270000Z - 272400Z JUN 85\n\nA subtropical ridge extends westward across the western Pacific north of 20N, with weak easterly trade winds prevailing across the eastern Philippine Sea. South of the ridge axis, an active monsoon trough is generating scattered convective activity with isolated thunderstorms. No tropical cyclones are present in the area, and overall conditions remain generally favorable for surface and air operations with localized weather impacts near convection.
Taskforce1OneshipmustsurviveMessage=MISSION FAILED|Defeat! All of our surface units have been destroyed! |Continue
Taskforce1DestroyallenemyshipsvictoryMessage=MISSION ACCOMPLISHED|FLASH\nFM CINCPACFLT\nTO CTF 72\n\n1. (S) National technical means and follow-on imagery confirm destruction of main enemy surface units.\n\n2. (S) CTF 72 is directed to disengage and retire at best speed to Apra. Maintain heightened awareness for subsurface or air threats during transit..\n\n3. (S) Submit preliminary OPREP-3 and battle damage assessment when operationally feasible.\n\n4. (S) Excellent performance by all hands. Further tasking will follow under separate traffic. CINCPAC sends.|Exit mission
Objective_DestroyKirovSAG=Destroy the Kirov
Objective_DestroyKievCVBG=Destroy the Minsk
Objective_OneShipMustSurvive=At least one of your ships must survive
[Language_cn]
Name=关岛对决——蓝方（1985）
Description=战争爆发前不久，苏联从海参崴向太平洋派遣了一支强大的水面部队，其中包含基洛夫号战列巡洋舰和明斯克号航空母舰，我们认为敌方的目标是打击美国在关岛的基地。指挥此区域内的美军找到并摧毁这支苏联攻击舰队。
Taskforce1LandUnit1NameOverride=安德森空军基地
Taskforce1LandUnit1ShortNameOverride=安德森空军基地
Taskforce1StartMessage=关岛对决\n——蓝方（1985）|一支庞大的苏联水面舰队下落不明，盟军情报部门认为它正向南移动，目标是打击关岛的美军基地。此区域内的美国和日本部队已收到命令找到并摧毁这支舰队。\n\n美国飞机已从安德森空军基地起飞，日本海上自卫队的巡逻资产也已在硫磺岛机场集结以协助搜寻。我方水面行动群（第72.1特遣大队）已从阿普拉港出发，正向西北方向移动，准备在第一时间打击发现的苏联舰队。\n\n你至少有一艘船只不被击沉。|开始任务
StartForecast=菲律宾海东部海洋天气预报\n有效期：1985年6月27日0000Z时至2400Z时\n\n亚热带高压脊向西延伸至北纬20度以北的西太平洋，菲律宾海东部盛行微弱东风。高压脊轴线以南，活跃的季风槽产生零星对流活动，并伴有零星雷暴。此区域内目前没有热带气旋，总体而言，水面和空中行动的条件仍然较为有利，但对流活动附近可能存在局部天气影响。
Taskforce1OneshipmustsurviveMessage=任务失败！|任务失败！我方所有水面单位已被摧毁！|继续
Taskforce1DestroyallenemyshipsvictoryMessage=任务完成！|紧急\n发件：太平洋舰队总司令\n收件：第72特遣舰队指挥官\n\n1.（机密）国家技术手段和后续图像证实敌方主要水面舰艇已被摧毁。\n\n2.（机密）第72特遣舰队脱离接触，并以最佳速度撤退至阿普拉港，途中保持高度警惕，注意水下和空中威胁。\n\n3.（机密）在情况允许时提交行动报告和战损评估。\n\n4.（机密）全体官兵表现出色。后续任务将另行通知。|退出任务
Objective_DestroyKirovSAG=消灭基洛夫号
Objective_DestroyKievCVBG=消灭明斯克号
Objective_OneShipMustSurvive=你至少有一艘船只不被击沉
[Language_ru]
Name=Вторжение на Гуам (За США)
Description=Советские силы вторжения в сопровождении мощного ракетного крейсера типа «Киров» и возглавляемой им корабельной ударной группы (КУГ) продвигаются к Гуаму с четкой целью закрепиться на территории США.
[Language_de]
Name=Euer Guam gehört uns (Blaue Seite)
Description=Ein sowjetischer Invasionsverband, eskortiert von dem leistungsstarken Kreuzer der Kirov-Klasse und seiner Einsatzgruppe, rückt in Richtung Guam vor, mit dem klaren Ziel, sich auf US-Territorium festzusetzen.
[Language_es]
Name=All Your Guam Belong to Us (Blue Side)
[Language_fr]
Name=Guam est à nous (Côté bleu)
Description=Une force d'invasion soviétique, escortée par un puissant croiseur de classe Kirov et son groupe d'action de surface (SAG), avance vers Guam avec l'objectif clair d'établir une tête de pont sur le territoire américain.
[Language_ko]
Name=괌 결전 - 블루포 (1985)
Description=적대 행위가 발생하기 직전, 소련은 블라디보스토크에서 태평양으로 강력한 지상군을 출격시켰습니다. 이 부대는 전투 순양함 키로프와 항공모함 민스크를 모두 포함하고 있으며, 괌의 미군 기지를 공격하기 위해 향하고 있는 것으로 추정됩니다. 해당 지역의 미군을 지휘하여 소련 공격 부대를 찾아 파괴하십시오.
