[Language_ja]
Name=潜水艦決戦：パシフィック・シールド (1971年)
Description=欧州で紛争が勃発。潜水艦スキャンプに対し、サンディエゴ沖の哨戒区で活動中のソ連ヤンキー級SSBN（弾道ミサイル原子力潜水艦）を無力化せよとの命令が下った。情報によれば、ソ連軍は米西海岸への攻撃を準備している可能性がある。ミサイル発射前に当該SSBNを捕捉・撃破せよ！
Taskforce1StartMessage=<size=24>潜水艦決戦シリーズ</size>\nパシフィック・シールド (1971年)|欧州で紛争が勃発した。潜水艦スキャンプに対し、過去24時間にわたって追尾してきたヤンキー級SSBNを撃沈せよとの命令が下った。ミサイルが発射される前にヤンキー級を捕捉・撃沈せよ！\n\n情報によれば、ソ連軍は1230Zまでに米本土（CONUS）への攻撃を開始する可能性がある。\n\nスキャンプは生存しなければならない。\n\n|作戦開始
Taskforce1StartIntel=1230Zまでにヤンキー級を撃破せよ！
Taskforce1ScampmustsurviveMessage=任務失敗|発 太平洋潜水艦艦隊司令官\n宛 太平洋艦隊総司令官\n\n1. (S) スキャンプは3月4日1000Z、サンディエゴ沖のヤンキー級SSBNに対する索敵撃破任務を割り当てられた。\n\n2. (S) スキャンプは当該目標との初期接触を報告したが、現在までに定時連絡が2回途絶している。我々はスキャンプが撃沈されたものと判断する。\n\n3. (S) 当該海域へ増援部隊を急派し目標の撃破を試みるが、当該ユニットによる米西海岸への核第一撃を許容する恐れがある。|作戦終了
Taskforce1DestroyYankeeMessage=任務達成|発 太平洋潜水艦艦隊司令官\n宛 大西洋艦隊総司令官\n\n1. (S) 潜水艦スキャンプより、カリフォルニア沖の哨戒区にてヤンキー級SSBNを雷撃・撃沈したとの報告あり。\n\n2. (S) 撃沈直前、スキャンプはミサイル・ハッチの開放音と思われる過渡音（トランジェント）を探知。我々は、スキャンプが我が国の海岸に対する戦略兵器の使用直前に、当該潜水艦を撃沈したものと判断する。\n\n3. (S) スキャンプ艦長および乗組員への叙勲を推薦する。スキャンプは現時刻をもって通常の哨戒区へ復帰中である。\n\n<size=16>潜水艦が熟練度を獲得した：\n\nUSS スキャンプ (SSN-588)：<color=Green>ベテラン</color></size>|作戦終了
Taskforce1YankeelaunchesMessage=任務失敗|発 大西洋艦隊総司令官\n宛 統合参謀本部、国防長官、統合参謀本部議長、NORAD\n\n緊急事態（FLASH EMERGENCY）\n\n(TS) 国家技術手段（NTM）および太平洋艦隊対潜部隊は、東太平洋の潜航中のプラットフォームから、SLBM（潜水艦発射弾道ミサイル）の発射と一致する過渡音を探知した。\n\n(TS) 初期弾道解析によれば、ミサイルはアメリカ合衆国西海岸を目標とする弾道軌道に乗っている。着弾予想地点はカリフォルニア沿岸地域。\n\n(TS) データの相関が取れ次第、追加報告を行う。\n\n(TS) 本件は緊急電報である。直ちに対応を要する。|作戦終了
Objective_DestroyYankee=1230Zまでにヤンキー級SSBNを撃破せよ
Objective_ScampMustSurvive=潜水艦スキャンプの生存
[Language_en]
Name=Sub Duel - Pacific Shield (1971)
Description=Conflict has broken out in Europe, and USS Scamp has been ordered to neutralize a Soviet Yankee class SSBN operating in its patrol box off San Diego. Intel believes the Soviets may be preparing to strike the Western Seaboard. Locate and destroy the SSBN before it can launch!
Taskforce1StartMessage=<size=24>Sub Duel Series</size>\n PACIFIC SHIELD (1971)|Conflict has broken out in Europe and the USS Scamp has been ordered to sink a Yankee class SSBN you have been shadowing for the past day. Locate and sink the Yankee before it can fire its missiles!\n\nIntel believes the Soviets may launch against CONUS by 1230Z.\n\nUSS Scamp must survive.\n\n|Start mission
Taskforce1StartIntel=Destroy the Yankee before 1230Z!
Taskforce1ScampmustsurviveMessage=MISSION FAILED|FM COMSUBPAC\nTO CINCPACFLT\n\n1. (S) SCAMP was assigned search and destroy mission against YANKEE SSBN off San Diego at time 1000Z 04MAR.\n\n2. (S) SCAMP reported initial contact with YANKEE SSBN but has now missed two scheduled check-ins. We assess that SCAMP has been destroyed.\n\n3. (S) We are surging forces to the area to attempt to destroy this contact but Soviet first strike on West Coast is now possible from this unit.|Exit mission
Taskforce1DestroyYankeeMessage=MISSION ACCOMPLISHED|FM COMSUBPAC\nTO CINCLANTFLT\n\n1. (S) USS SCAMP reports torpedoing and sinking YANKEE class SSBN in patrol area off California coast.\n\n2. (S) Prior to sinking, SCAMP reports hearing transients likely associated with missile hatch opening. We assess that SCAMP sank this submarine just prior to strategic weapon employment against our coast.\n\n3. (S) Recommend recognition for SCAMP’s Commanding Officer and crew. SCAMP is returning to normal patrol area at this time.\n\n<size=16>A submarine has gained a proficiency level:\n\nUSS Scamp SSN-588: <color=Green>Veterans</color></size>|Exit mission
Taskforce1YankeelaunchesMessage=MISSION FAILED|FM CINCLANTFLT\nTO JCS, SECDEF, CJCS, NORAD\n\nFLASH EMERGENCY\n\n(TS) NATIONAL TECHNICAL MEANS AND PACIFIC FLEET ASW FORCES REPORT DETECTION OF MISSILE LAUNCH TRANSIENTS CONSISTENT WITH SLBM FIRING FROM SUBMERGED PLATFORM IN EASTERN PACIFIC.\n\n(TS) INITIAL TRAJECTORY ANALYSIS INDICATES MISSILE(S) ON BALLISTIC TRACK CONSISTENT WITH TARGETING WEST COAST OF UNITED STATES. IMPACT AREA POSSIBLY CALIFORNIA COASTAL REGION.\n\n(TS) ADDITIONAL REPORTING TO FOLLOW AS DATA IS CORRELATED.\n\n(TS) THIS IS A FLASH MESSAGE. IMMEDIATE ATTENTION REQUESTED.|Exit mission
Objective_DestroyYankee=Destroy Yankee class SSBN before 1230Z
Objective_ScampMustSurvive=USS Scamp must survive
[Language_cn]
Name=潜艇对决——太平洋之盾（1971）
Description=欧洲战事已经爆发，巫喙鲈号潜艇收到命令消灭一艘在圣迭戈附近巡逻区内活动的苏联667A型弹道导弹核潜艇。情报显示这艘苏联潜艇可能在准备打击西海岸。在潜艇发射导弹前将其找到并摧毁！
Taskforce1StartMessage=<size=24>潜艇对决</size>\n太平洋之盾（1971）|欧洲战事已经爆发，巫喙鲈号潜艇收到命令消灭一艘已经跟踪了一天的667A型弹道导弹核潜艇。在潜艇发射导弹前将其找到并摧毁！\n\n情报显示苏联可能将在1230Z时对美国本土发射导弹。\n\n巫喙鲈号不能被击沉。\n\n|开始任务
Taskforce1StartIntel=在1230Z时前击沉667A型弹道导弹核潜艇！
Taskforce1ScampmustsurviveMessage=任务失败！|发件：太平洋潜艇部队司令\n收件：太平洋舰队总司令\n\n1.（机密）巫喙鲈号于3月4日1000Z时收到命令对圣迭戈附近的667A型弹道导弹核潜艇执行搜索并摧毁任务。\n\n2.（机密）巫喙鲈号报告了与敌方核潜艇的初次接触，但已经2次未在预定的汇报时间发送报告。我们评估巫喙鲈号已被摧毁。\n\n3.（机密）我们正在向此区域增兵，尝试在苏联利用此单位进行先发制人的打击前将其消灭。|退出任务
Taskforce1DestroyYankeeMessage=任务完成！|发件：太平洋潜艇部队司令\n收件：太平洋舰队总司令\n\n1.（机密）巫喙鲈号报告对加利福尼亚海岸巡逻区域内的667A型弹道导弹核潜艇发射鱼雷并将其击沉。\n\n2.（机密）在击沉之前，巫喙鲈号报告了高度疑似导弹舱打开的瞬态信号，我们评估认为巫喙鲈号在此潜艇即将对我方海岸投送战略武器之际将其击沉。\n\n3.（机密）建议对巫喙鲈号的指挥官和船员进行嘉奖。此时巫喙鲈号正在返回正常巡逻区域。\n\n<size=16>一艘潜艇达到了新的专业水准：\n\n巫喙鲈号（SSN-588）： <color=Green>老练</color></size>|退出任务
Taskforce1YankeelaunchesMessage=任务失败！|发件：太平洋舰队总司令\n收件：参谋长联席会议、国防部长、参谋长联席会议主席、北美防空司令部\n\n紧急情况\n\n（绝密）国家技术手段和太平洋舰队反潜部队报告称在东太平洋探测到导弹发射瞬态信号，其特征与潜射弹道导弹从水下平台发射一致。\n\n（绝密）初步弹道分析表明导弹瞄准了美国西海岸的目标，落点可能位于加利福尼亚州沿海地区。\n\n（绝密）数据核对完毕后将发送更多报告。\n\n（绝密）此信息为紧急信息，请求立即关注。|退出任务
Objective_DestroyYankee=在1230Z时前击沉667A型弹道导弹核潜艇
Objective_ScampMustSurvive=巫喙鲈号不能被击沉
[Language_ru]
