[Language_ko]
Name=잠수함 결투 - 태평양의 방패(1971)
Description=유럽에서 분쟁이 발생하여 USS 스캠프는 샌디에이고 인근 순찰 박스에서 작전 중이던 소련 양키급 SSBN을 무력화하라는 명령을 받았습니다. 인텔은 소련이 서부 해안을 공격할 준비를 하고 있을 수 있다고 믿습니다. SSBN이 발사되기 전에 위치를 찾아 파괴하세요!
Taskforce1StartMessage=<size=24>잠수함 대결 시리즈</size>\n 태평양의 방패 (1971)|유럽에서 분쟁이 발생했고, USS 스캠프는 지난 하루 동안 숨어 있던 양키급 SSBN을 침몰시키라는 명령을 받았습니다. 미사일을 발사하기 전에 양키급을 찾아서 침몰시키세요!\n\n인텔은 소련이 1230Z까지 CONUS에 대항하여 발사할 수 있다고 믿습니다.\n\nUSS 스캠프는 반드시 살아남을 것.|임무 시작
Taskforce1StartIntel=양키급을 줄루타임 12:30 이전에 격파할것!
Taskforce1ScampmustsurviveMessage=임무 실패|발신: 태평양함대 잠수함사령부\n수신: 태평양함대 사령관\n\n1. (기밀) 스캠프는 1000Z 04MAR 시간에 샌디에이고 앞바다에서 양키급 SSBN을 상대로 수색 및 파괴 임무를 부여받았습니다.\n\n2. (기밀) 스캠프는 양키급 SSBN과의 초기 접촉을 보고했지만 현재 예정된 체크인을 두 번 놓쳤습니다. 스캠프가 파괴되었다고 평가함.\n\n3. (기밀) 우리는 이 접촉을 파괴하기 위해 이 지역으로 병력을 급파하고 있지만, 이제 이 부대에서 소련의 서해안 첫 공격이 가능해졌습니다.|임무 나가기
Taskforce1DestroyYankeeMessage=임무 완수|발신: 태평양함대 잠수함사령부\n수신: 태평양함대 사령관\n\n1. (기밀) USS 스캠프는 캘리포니아 해안의 순찰 구역에서 양키급 SSBN을 어뢰로 격침했다고 보고함.\n\n2. (기밀) 침몰하기 전에 스캠프는 미사일 해치 개방과 관련된 일시적인 소음을 보고함. 우리는 스캠프가 전략 무기를 사용하기 직전에 우리 해안을 향해 잠수함을 침몰시켰다고 평가함.\n\n3. (기밀) SCAMP의 지휘관과 승무원들에게 추천합니다.\n\n<size=16>잠수함이 숙련도 레벨을 획득:\n\nUSS 스캠프 SSN-588: <color=DarkOrange>숙련됨</color></size>|임무 나가기
Taskforce1YankeelaunchesMessage=임무 실패됨|발신: 대서양함대사령부\n수신: 합동참모본부, 합동참모의장, 국방장관, 북미항공우주방위사령부\n\n 긴급 메세지\n\n(최고기밀) 국가 기술 수단 및 태평양 함대, 동부 태평양의 수중 플랫폼에서 SLBM 발사와 일치하는 미사일 발사 일시 탐지 보고됨.\n\n(최고기밀) 초기 궤적 분석 결과, 미국 서부 해안을 목표로 하는 발사차량에 미사일이 배치된 것으로 나타남.\n\n(최고기밀) 데이터가 상관관계가 있을 때 추가 보고가 필요함.\n\n(최고기밀) 이것은 최신 메시지입니다. 즉각적인 응답 요청.|임무 나가기
Objective_DestroyYankee=양키급 SSBN을 줄루타임 12:30 이전에 격파
Objective_ScampMustSurvive=USS 스캠프는 반드시 생존시킬것
