[Language_ru]
Name=Mind the Gap - Original (1988)
[Language_de]
Name=Achtung, Lücke - Original (1988)
Description=Nach den Ereignissen vom 09. und 10. Mai mobilisieren sowohl die NATO als auch die UdSSR ihre Streitkräfte, um Kriegsbereitschaft herzustellen. Die UdSSR setzt ihre U-Boot-Flotte in Bewegung und versucht, strategische Raketen-U-Boote (SSBNs) in den Nordatlantik zu verlegen, um das NATO-Gebiet zu bedrohen. Die Task Group Greyhound der US-amerikanischen 2. Flotte wurde beauftragt, die östlichen Zugänge zur GIUK-Lücke zu sichern und sowjetische U-Boote um jeden Preis zu stoppen. Die Einsatzregeln (ROE) erlauben das Angreifen aller unbekannten U-Boot-Kontakte.
MissionBriefingAssetsDirectory=campaigns\linear-campaign-proto-1\missions\03 Mind the Gap_Briefing
MissionBriefingLeftPane=campaigns\linear-campaign-proto-1\missions\03 Mind the Gap_Briefing\BriefingText_de.xml
MissionBriefingRightPane=campaigns\linear-campaign-proto-1\missions\03 Mind the Gap_Briefing\BriefingMap_de.xml
NeutralAircraft1ShortNameOverride=Mad Fox
Taskforce1StartmessageMessage=<size=20>Calculus of Conflict: Teil 3</size>\nACHTUNG, LÜCKE|Sowjetische U-Boote versuchen die GIUK-Lücke zu durchbrechen und in den Atlantik vorzustoßen. Die in der Region eingesetzten US-Streitkräfte haben den Auftrag, diese aufzuspüren und zu versenken.\n\nVier U-Boote fehlen auf den neuesten Satellitenbildern und werden in Ihrem Einsatzgebiet vermutet.Eine P-3C mit dem Rufzeichen „Mad Fox“ ist von der Luftwaffenbasis Thule im Anflug, um die Suche zu unterstützen.\n\nMindestens eines Ihrer Schiffe muss überleben.|Mission Starten
Taskforce1B-515TangowarningmessageMessage=MISSIONSUPDATE|Kommandant, laut J2 gibt es Hinweise und Warnmeldungen auf ein U-Boot der Tango-Klasse, das einen Angriff auf US-Streitkräfte in diesem Gebiet vorbereitet.|Bestätige!
Taskforce1BackfirewarningmessageMessage=MISSIONSUPDATE|Kommandant, es liegen Hinweise und Warnmeldungen vor, dass eine Staffel Backfire-Bomber aus nordöstlicher Richtung im Anflug ist.|Bestätige!
Taskforce1P-3CcheckinMessage=FLUGZEUG MELDET SICH|Greyhound, hier Mad Fox. Melde mich aus westlicher Richtung. Neun Personen an Bord, Einsatzdauer 4 Stunden und 30 Minuten, acht „Bloodhounds“ verfügbar, gemischte Sonobojen an Bord.\n\nBereit zur Einsatzaufnahme, Ende.|Bestätige!
Taskforce1DatumtriggerMessage=MISSIONSUPDATE|Kommandant, SOSUS meldet unbekannte U-Boot-Kontakte nördlich von Task Group Greyhound bei Datum B01.\n\nDas Hauptquartier geht davon aus, dass sich mindestens zwei U-Boote in dem Gebiet befinden, Kurs Süd-Südwest. Die Positionen A01 und B01 wurden als Bezugsdaten festgelegt.|Bestätige!
Taskforce1K-503CharlieIIIwarningmessageMessage=MISSIONSUPDATE|Kommandant, J2 hat die nachrichtendienstliche Lage aktualisiert.\n\nEin sowjetisches U-Boot der Charlie-II-Klasse wird derzeit in der Umgebung von Datum C01 vermutet.\n\nCharlie-II ist mit SS-N-9 mit einer Reichweite von 59nm bestückt.|Bestätige!
Taskforce1PlayervictoryMessage=SIEG|VON COMLANTFLT\nAN TG GREYHOUND\n\n1. Gute Arbeit, Kommandant. SOSUS meldet vier unabhängige Implosionen. Es wird angenommen, dass alle in der Region operierenden U-Boote neutralisiert wurden.\n\n2. Die Task Group Greyhound wird zur Erholung und Wiederauffüllung nach Reykjavík verlegt.|Mission Beenden
Taskforce1PlayerdefeatMessage=NIEDERLAGE|VON COMLANTFLT\nAN TG GREYHOUND\n\n1. SOSUS hat den Durchbruch sowjetischer strategischer Raketen-U-Boote in den Nordatlantik festgestellt.\n\n2. Die Task Group Greyhound wird angewiesen, sich zum nordatlantischen Rücken zurückzuziehen und sich auf die Wiederaufnahme des Kontakts vorzubereiten.|Mission Beenden
