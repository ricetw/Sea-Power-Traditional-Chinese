NeutralAircraft1ShortNameOverride=매드 폭스
Taskforce1StartmessageMessage=<size=20>분쟁의 미적분학: 파트 3</size>\\n발 밑 조심|소련 잠수함들이 GIUK 갭을 뚫고 대서양으로 진입하려고 시도하고 있습니다. 그 지역에 주둔한 미군은 그들을 찾아 침몰시키는 임무를 맡았습니다.\\n\\n폴리아르니에서 최신 이미지에서 잠수함 4척이 실종된 것으로 예상됩니다. P-3C 호출 부호 \"매드 폭스\"가 툴레 AFB에서 검색을 지원하기 위해 도착했습니다.\\n\\n적어도 한 척의 배는 반드시 살아남아야 합니다.|미션 시작
Taskforce1B-515TangowarningmessageMessage=미션 업데이트|사령관님, J2에서는 탱고급 잠수함이 이 지역의 미군을 공격할 준비를 하고 있다는 징후와 경고가 있습니다.|확인됨!
Taskforce1BackfirewarningmessageMessage=미션 업데이트|사령관님, 북동쪽에서 백파이어 폭격기 타격대가 접근중이라는 징후와 경고가 있습니다.|확인됨!
Taskforce1P-3CcheckinMessage=항공기 체크인|그레이하운드, 여기는 매드 폭스. 서쪽에서 체크인, 아홉 명의 영혼이 탑승하고, 4+30 플레이타임, 여덟 명의 블러드하운드, 소노보이 혼합 봉지.\n\n작업 준비 완료, 이상.|확인됨!
Taskforce1DatumtriggerMessage=미션 업데이트|사령관님, SOSUS는 다툼 B01에서 TG 그레이하운드 북쪽의 알려지지 않은 잠수함 접촉을 보고했습니다.\n\n본부는 남남서쪽으로 진행 중인 최소 두 척의 잠수함을 평가합니다. 다툼 A01과 B01이 설정되었습니다.|확인됨!
Taskforce1K-503CharlieIIIwarningmessageMessage=미션 업데이트|사령관님, J2의 정보를 업데이트했습니다.\n\n소련의 찰리-II는 다툼 C01의 위치에서 운영되고 있는 것으로 평가됩니다.\n\n찰리-II는 59NM 범위의 SS-N-9를 탑재하고 있습니다.|확인됨!
Taskforce1PlayervictoryMessage=승리|발신: 미국 대서양함대\n수신: TG 그레이하운드\n\n1. 잘했다 사령관, SOSUS 네 군데의 독립이 보고됨. 해당 지역에서 작전 중인 모든 잠수함이 무력화되었음을 평가됨.\n\n2. TGG는 휴식과 수리를 위해 레이캬비크로 향할것.|임무 종료
Taskforce1PlayerdefeatMessage=패배|발신: 미국 대서양함대\n수신: TG 그레이하운드\n\n1. SOSUS는 소련 탄도 미사일 잠수함이 북대서양으로 침투했음을 감지합니다.\n\n2. TGG는 북대서양 능선으로 후퇴하여 다시 연락을 취할 준비를 해야 합니다.|임무 종료
