[Language_ja]
Name=マインド・ザ・ギャップ - オリジナル (1988)
Description=キャンペーン「紛争の解析（Calculus of Conflict）」より、ミッション3「マインド・ザ・ギャップ」のオリジナル版。対潜戦（ASW）に焦点を当てた本ミッションでは、GIUKギャップに潜む4隻のソ連潜水艦を捕捉・撃沈することが求められる。一部で熱狂的に支持され、多くの者に忌み嫌われるこの任務は、生半可な覚悟で挑めるものではない。
NeutralAircraft1ShortNameOverride=マッド・フォックス
Taskforce1StartmessageMessage=<size=20>紛争の解析：第3部</size>\nマインド・ザ・ギャップ|ソ連潜水艦隊がGIUKギャップを突破し、大西洋への進出を企てている。当該海域の米軍部隊には、これらを捕捉・撃沈する任務が与えられた。\n\nポリヤルヌイ基地の最新の偵察画像から4隻の潜水艦が消失しており、本海域への進入が予想される。哨戒機P-3C、コールサイン"Mad Fox"が捜索支援のためチューレ空軍基地より接近中である。\n\n少なくとも1隻の自艦を生存させよ。|作戦開始
Taskforce1B-515TangowarningmessageMessage=作戦状況更新|指揮官、第2情報局（J2）より入電。本海域の米軍部隊に対し、タンゴ級潜水艦が攻撃準備を整えているとの兆候および警告あり。|了解
Taskforce1BackfirewarningmessageMessage=作戦状況更新|指揮官、北東よりバックファイア爆撃機攻撃隊が接近中との兆候および警告あり。|了解
Taskforce1P-3CcheckinMessage=航空機入電|グレイハウンド、こちらマッド・フォックス。西より戦域に進入した。搭乗員9名、残り滞空時間4時間30分、ブラッドハウンド（魚雷）8基、各種ソノブイを積載している。\n\n指示を待つ。オーバー。|了解
Taskforce1DatumtriggerMessage=作戦状況更新|指揮官、SOSUS（ソーサス）が第「グレイハウンド」任務群の北、デイタムB01にて正体不明の潜水艦との接触を感知した。\n\n司令部は、少なくとも2隻の潜水艦が南南西へと進行中であると判断。デイタムA01およびB01を設定した。|了解
Taskforce1K-503CharlieIIIwarningmessageMessage=作戦状況更新|指揮官、J2がインテリジェンス評価を更新した。\n\nデイタムC01の地点にて、ソ連のチャーリーII級原子力潜水艦が活動中と推定される。\n\nチャーリーII級は射程59海里のSS-N-9ミサイルを搭載している。警戒せよ。|了解
Taskforce1PlayervictoryMessage=勝利|発：大西洋艦隊司令長官\n宛：第「グレイハウンド」任務群\n\n1. 見事な手際だ、指揮官。SOSUSが4回の独立した圧壊音を確認した。当該海域で作戦行動中の敵潜水艦はすべて排除されたものと判断する。\n\n2. 任務群は休養および再整備のため、レイキャビクへと向かえ。|作戦終了
Taskforce1PlayerdefeatMessage=敗北|発：大西洋艦隊司令長官\n宛：第「グレイハウンド」NATO任務群\n\n1. SOSUSがソ連の弾道ミサイル原子力潜水艦（SSBN）の北大西洋への突破を確認した。\n\n2. 任務群は北大西洋海嶺まで後退し、再接触の準備を整えよ。|作戦終了
Trigger6Condition_Condition1AreaLabel=デイタムA01
Trigger7Condition_Condition1AreaLabel=デイタムB01
Trigger8Condition_Condition1AreaLabel=デイタムC01
Objective_OnePlayerShipMustSurvive=少なくとも1隻のプレイヤー艦艇の生存
Objective_DestroyUSSRSubs=遭遇したすべてのソ連潜水艦の撃破
[Language_en]
Name=Mind the Gap - Original (1988)
Description=From the "Calculus of Conflict" campaign, this is the original version of mission 3 "Mind the Gap". This ASW focused mission requires the player to find and sink four USSR submarines in the GIUK Gap. Loved by some and hated by many, this mission is not for the faint of heart!
NeutralAircraft1ShortNameOverride=Mad Fox
Taskforce1StartmessageMessage=<size=20>Calculus of Conflict: Part 3</size>\nMIND THE GAP|USSR submarines are attempting to break through the GIUK Gap into the Atlantic. The US forces in the area have been tasked to locate and sink them.\n\nFour submarines are missing from latest imagery out of Polyarny and expected in the area. P-3C callsign "Mad Fox" is inbound from Thule AFB to assist search.\n\nAt least one of your ships must survive.|Start mission
Taskforce1B-515TangowarningmessageMessage=MISSION UPDATE|Commander, from J2, there are indications and warnings of a Tango class submarine preparing to attack U.S. forces in the area.|Acknowledged!
Taskforce1BackfirewarningmessageMessage=MISSION UPDATE|Commander, we have indications and warnings of a Backfire bomber strike package inbound from the northeast.|Acknowledged!
Taskforce1P-3CcheckinMessage=AIRCRAFT CHECK IN|Greyhound, this is Mad Fox, checking in from the West, nine souls on board, 4+30 playtime, eight bloodhounds, mixed bag of sonobuoys.\n\nReady for tasking, over.|Acknowledged!
Taskforce1DatumtriggerMessage=MISSION UPDATE|Commander, SOSUS reports unknown submarine contacts north of TG Greyhound at Datum B01.\n\nHQ assesses at least two submarines located, proceeding south-southwest. Datums A01 and B01 have been established.|Acknowledged!
Taskforce1K-503CharlieIIIwarningmessageMessage=MISSION UPDATE|Commander, J2 has updated intelligence assessment.\n\nUSSR Charlie-II is assessed operating in position of DATUM C01.\n\nCharlie-II carries SS-N-9 with range of 59nm.|Acknowledged!
Taskforce1PlayervictoryMessage=VICTORY|FM COMLANTFLT\nTO TG GREYHOUND\n\n1. Good work Commander, SOSUS is reporting four independent implosions. Assess all submarines operating in the area have been neutralized.\n\n2. TGG directed to Reykjavik for rest and refit.|Exit mission
Taskforce1PlayerdefeatMessage=DEFEAT|FM COMLANTFLT\nTO TG GREYHOUND\n\n1. SOSUS detects USSR ballistic missile submarines have broken through in to the North Atlantic.\n\n2. TGG is directed to fall back to the North Atlantic Ridge and prepare to regain contact.|Exit mission
Trigger6Condition_Condition1AreaLabel=Datum A01
Trigger7Condition_Condition1AreaLabel=Datum B01
Trigger8Condition_Condition1AreaLabel=Datum C01
Objective_OnePlayerShipMustSurvive=At least one player ship must survive
Objective_DestroyUSSRSubs=Destroy all USSR submarines encountered
[Language_cn]
Name=注意缺口——原版（1988）
Description=《冲突演算》中任务3的原版。此任务以反潜战为主，要求玩家在GIUK缺口找到并击沉4艘苏联潜艇。玩家对它褒贬不一，但它肯定不适合胆小者！
NeutralAircraft1ShortNameOverride=疯狐
Taskforce1StartmessageMessage=<size=20>冲突演算：第3部分</size>\n注意缺口|苏联潜艇正在尝试从GIUK缺口突破封锁进入大西洋。此区域内的美军收到命令搜寻并击沉它们。\n\n4艘潜艇已从波利亚尔内基地的最新图像上消失，预计会出现在此区域。呼号“疯狐”的P-3C已从图勒航空基地起飞以协助搜索。\n\n你至少有一艘船只不被击沉。|开始任务
Taskforce1B-515TangowarningmessageMessage=任务更新|指挥官，我们收到来自情报部门的消息，有迹象和预警表明一艘641B型潜艇正准备攻击此区域内的美国军队。|收到！
Taskforce1BackfirewarningmessageMessage=任务更新|指挥官，有迹象和预警表明一个图-22M打击群从东北方靠近。|收到！
Taskforce1P-3CcheckinMessage=飞机入场|灰猎犬，这里是疯狐，正在从西方入场，机上有9人，剩余巡逻时间4小时30分，携带主被动声呐浮标和8枚鱼雷。\n\n准备执行任务，完毕。|收到！
Taskforce1DatumtriggerMessage=任务更新|指挥官，声波监听系统报告灰猎犬特遣大队北方的基准点B01有未知水下接触。\n\n总部评估至少发现两艘潜艇，它们正在向南-西南方向航行。基准点A01和B01已建立。|收到！
Taskforce1K-503CharlieIIIwarningmessageMessage=任务更新|指挥官，情报部门更新了评估。\n\n根据评估，苏联的670M型潜艇正在基准点C01处行动。\n\n670M型潜艇携带了射程约为80海里的P-120导弹|收到！
Taskforce1PlayervictoryMessage=任务完成！|发件：大西洋舰队总司令\n收件：灰猎犬特遣大队\n\n1.干得好，指挥官，声波监听系统报告了四次独立的爆炸。根据评估，在此区域内行动的潜艇已被全部消灭。 \n\n2.灰猎犬特遣大队返回雷克雅未克休整。|退出任务
Taskforce1PlayerdefeatMessage=任务失败！|发件：大西洋舰队总司令\n收件：灰猎犬特遣大队\n\n1.声波监听系统侦测到苏联弹道导弹潜艇已经突破封锁进入北大西洋。\n\n2.灰猎犬特遣大队撤回北大西洋海岭并准备重新接敌。|退出任务
