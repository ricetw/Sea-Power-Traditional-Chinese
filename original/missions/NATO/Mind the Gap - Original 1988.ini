[Language_ko]
Name=03 발 밑 조심(NATO)
Description=5월 9~10일간의 사건들로 NATO와 소련은 매우 급작스럽게 전투태세를 갖추고 있으며 소련은 잠수함대를 파견하여 북대서양으로 전략원잠들을 침투시켜 NATO 국가들에 대한 위협을 가하려고 합니다. 미 2함대의 그레이하운드 전투단이 GIUK 갭 동쪽에 자리잡아 해당 잠수함들을 처리하려고 합니다. 교전수칙은 발견된 모든 미확인 잠수항적들을 격침시키는것입니다.
MissionBriefingAssetsDirectory=campaigns\linear-campaign-proto-1\missions\03 Mind the Gap_Briefing
