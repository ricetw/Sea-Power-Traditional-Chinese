[Language_ja]
Name=危うき海峡 (1985)
Description=欧州での戦端が開かれる中、ソ連黒海艦隊は東地中海でNATO軍により甚大な損害を被った。彼らの最後の手駒となった重航空巡洋艦キエフは、ボスポラス海峡を経て北の黒海へと退却を図っている。この海域のNATO部隊を指揮し、逃げ切られる前に彼女を撃沈せよ。
Taskforce1LandUnit1NameOverride=スーダ空軍基地
Taskforce1LandUnit1ShortNameOverride=スーダ基地
Trigger6Condition_Condition1AreaLabel=デイタムA01
Taskforce1StartmessageMessage=<size=40>危うき海峡</size>|キエフとその戦闘群は、ソ連支配下のボスポラス海峡を通過して地中海からの脱出を試みている。北進して追撃し、逃げ切られる前にこれを撃沈せよ。\n\nギリシャとトルコは共に中立化されており、スーダ空軍基地からの限定的な攻撃隊を除いて援助は期待できない。注意せよ。ソ連軍はギリシャの島々の至る所に対艦ミサイル、対空砲、地対空ミサイル（SAM）陣地を配置している。また、インテル（情報源）によれば、少なくとも1隻のタンゴ級潜水艦がキエフの退却を掩護している模様だ。あらゆる島々の影に危険が潜んでいると思え。\n\nUSSアイオワを必ず生存させよ。|作戦開始
Taskforce1Kievdestroyed-playervictoryMessage=勝利|勝利！キエフは撃沈された。地中海における敵の重要かつ有力な戦闘艦艇を排除することに成功した。見事な手際だ、指揮官。|作戦終了
Taskforce1WisconsinmustsurviveMessage=敗北|敗北！USSアイオワが撃沈された！|作戦終了
Taskforce1KievreachesBosporus-playerdefeatMessage=敗北|1985年7月18日\n緊急―機密\n発：大西洋艦隊司令長官\n宛：アイオワ水上打撃群指揮官\n\n1. (S) 国家技術情報源によれば、キエフとその部隊がボスポラス海峡に進入したとのことである。\n\n2. (S) 我々は、極めて危険な敵に対し地中海での近年の戦果を確固たるものにする絶好の機会を逃した。追撃を中止し、最高速でナポリへと帰還せよ。\n\n3. (S) ナポリ到着後、最初の軍用機でワシントンDCへ向かい、デブリーフィングを受けよ。|作戦終了
Taskforce11hrSSKintelwarningMessage=緊急メッセージ|1985年7月18日\n発：第61任務部隊\n宛：アイオワ水上打撃群指揮官\n\n1. (S) 警告：ギリシャの漁船がナクソス島北東でスノーケル航行中の潜水艦を目撃した。この接点を、キエフ群と共に活動中と思われていた消息不明のタンゴ級潜水艦と断定する。\n\n2. (S) 0935Z、北緯37.27度、東経25.61度の位置にデイタムA01を設定した。\n\n3. (S) 可能であれば、貴部隊による当該ユニットの掃討を推奨する。撃沈した場合は緊急メッセージで報告せよ。諸君の幸運と健闘を祈る。|了解して継続
Taskforce11hrSSKintelwarningIntel=ギリシャ漁船がスノーケル航行中のタンゴ級潜水艦を目撃。0935Z、北緯37.27度、東経25.61度にデイタムA01を設定。
Objective_DestroyKiev=重航空巡洋艦キエフの撃沈
Objective_IowaMustSurvive=USSアイオワの生存
[Language_en]
Name=Dangerous Straits (1985)
Description=With hostilities underway in Europe, the Soviet Black Sea Fleet has taken heavy losses to NATO in the eastern Med. Their final surviving heavy unit is the carrier Kiev, which is attempting to retire north to the Black Sea via the Bosporus. Take charge of the NATO units in the area to sink her before she escapes.
Taskforce1LandUnit1NameOverride=Souda Airbase
Taskforce1LandUnit1ShortNameOverride=Souda Airbase
Trigger6Condition_Condition1AreaLabel=Datum A01
Taskforce1StartmessageMessage=<size=40>DANGEROUS STRAITS</size>|The Kiev and her battlegroup are attempting to escape the Mediterranean through the Soviet-controlled Bosporus Strait. Proceed north in pursuit and sink her before she can escape.\n\nGreece and Turkey have both been neutralized and are unable to offer assistance beyond token attack flights from Souda Airbase. Note: Soviet forces have emplaced anti-ship missiles, AAA guns, and SAM sites across the Greek islands. Intel believes at least one Tango class SSK may also be covering the Kiev's retreat. Danger will lurk behind every island!\n\nUSS Iowa must survive.|Start mission
Taskforce1Kievdestroyed-playervictoryMessage=VICTORY|Victory! The Kiev has been destroyed, removing a vital enemy large combatant from the board in the Mediterranean. Good work, Commander.|Exit mission
Taskforce1WisconsinmustsurviveMessage=DEFEAT|Defeat! The USS Iowa has been sunk!|Exit mission
Taskforce1KievreachesBosporus-playerdefeatMessage=DEFEAT|18JUL1985\nFLASH - SECRET\nFM CINCLANTFLT\nTO CMDR IOWA SAG\n\n1. (S) National technical intelligence sources indicate KIEV and her group have entered the Bosporus.\n\n2. (S) We have lost our chance to solidify recent gains in the Mediterranean against a highly dangerous enemy. Break off pursuit and retire at best speed to Naples.\n\n3. (S) Upon reaching Naples, board first available military flight to Washington DC for debriefing.|Exit mission
Taskforce11hrSSKintelwarningMessage=FLASH MESSAGE|18JUL1985\nFM CTF 61\nTO CMDR IOWA SAG\n\n1. (S) WARNING: Greek fishing boat reports sighting snorkeling submarine northeast of Naxos. Assess this contact as unlocated TANGO class SSK thought to be operating with KIEV group.\n\n2. (S) Datum A01 established at position 37.27N, 25.61E at time 0935Z.\n\n3. (S) Recommend prosecution of this unit by your force if possible. Report any sinkings via flash message. Good luck and good hunting.|Acknowledge & continue
Taskforce11hrSSKintelwarningIntel=Greek fishing boat reports sighting snorkeling TANGO class SSK. Datum A01 established at position 37.27N, 25.61E at time 0935Z.
Objective_DestroyKiev=Destroy the Kiev
Objective_IowaMustSurvive=USS Iowa must survive
[Language_cn]
Name=危险海峡（1985）
Description=欧洲战事已经爆发，苏联黑海舰队在东地中海遭到北约重创。他们最后残存的重型单位是基辅号，这艘航母正在尝试经博斯普鲁斯海峡向北撤回黑海。指挥此区域内的北约单位，在基辅号逃脱前将其击沉。
Taskforce1LandUnit1NameOverride=苏达空军基地
Taskforce1LandUnit1ShortNameOverride=苏达空军基地
Trigger6Condition_Condition1AreaLabel=基准点A01
Taskforce1StartmessageMessage=<size=40>危险海峡</size>|基辅号及其战斗群正在尝试经苏军控制的博斯普鲁斯海峡撤出地中海。向北追击，在基辅号逃脱前将其击沉。\n\n希腊和土耳其都已失去战斗力，除了从苏达空军基地派出聊胜于无的攻击小队外无力提供其他支援。注意：苏军已在希腊各岛屿部署了反舰导弹、防空炮和面对空导弹阵地。情报显示至少有一艘877型潜艇可能正在掩护基辅号撤退。每座岛屿都暗藏杀机！\n\n艾奥瓦号不能被击沉。|开始任务
Taskforce1Kievdestroyed-playervictoryMessage=任务完成！|任务完成！基辅号已被摧毁，地中海战场上一艘至关重要的大型敌舰不复存在。干得好，指挥官。|退出任务
Taskforce1WisconsinmustsurviveMessage=任务失败！|任务失败！艾奥瓦号已被击沉！|退出任务
Taskforce1KievreachesBosporus-playerdefeatMessage=任务失败！|1985年7月18日\n紧急——机密\n发件：大西洋舰队总司令\n收件：艾奥瓦号水面行动群指挥官\n\n1.（机密）国家技术情报来源表明基辅号及其战斗群已进入博斯普鲁斯海峡。\n\n2.（机密）我们失去了在地中海消灭高危敌方单位并巩固近期战果的机会。停止追击并以最佳速度撤回那不勒斯。\n\n3.（机密）抵达那不勒斯后，乘坐第一班可用的军机前往华盛顿进行汇报。|退出任务
Taskforce11hrSSKintelwarningMessage=紧急消息|1985年7月18日\n发件：第61特遣舰队指挥官\n收件：艾奥瓦号水面行动群指挥官\n\n1.（机密）提示：希腊渔船报告在纳克索斯岛东北方发现了处于通气管深度的潜艇。请将此接触评估为一艘位置不明的877型潜艇，我们认为它正在与基辅号战斗群协同行动。\n\n2.（机密）基准点A01已于0935Z时在位置37.27N，25.61E建立。\n\n3.（机密）建议在可能的情况下追击此单位。请通过紧急消息报告任何击沉情况。祝你好运，猎杀愉快。|收到并继续
Taskforce11hrSSKintelwarningIntel=希腊渔船报告了处于通气管深度的877型潜艇，基准点A01已于0935Z时在位置37.27N，25.61E建立。
Objective_DestroyKiev=击沉基辅号
Objective_IowaMustSurvive=艾奥瓦号不能被击沉
[Language_ru]
Name=Опасные проливы
Description=Ближний бой линкорного соединения в Эгейском море.
Taskforce1StartmessageMessage=<size=40>Опасные проливы</size>|<size=15>ТАКР «Киев» пытается уйти через контролируемые советской стороной пролив Босфор. Потопите его. Ожидайте наличия интенсивного гражданского судоходства.\nБудьте осторожны, опасность подстерегает за каждым островком!!
Taskforce1Kievdestroyed-playervictoryMessage=«Киев» потоплен, миссия завершена!
Taskforce1WisconsinmustsurviveMessage=Линкор «Висконсин» потоплен. Вы проиграли!
Taskforce1KievreachesBosporus-playerdefeatMessage=«Киев» вошёл в пролив Босфор. Вы проиграли!
Objective_DestroyKiev=Потопить «Киев»
Objective_IowaMustSurvive=«Висконсин» в строю
[Language_de]
Name=Gefährliche Meerenge (1985)
Description=Durch die Kampfhandlungen in Europa hat die sowjetische Schwarzmeerflotte im östlichen Mittelmeer schwere Verluste durch die NATO erlitten. Ihre letzte verbliebene schwere Einheit ist der Flugzeugträger Kiev, der aktuell versucht, sich über den Bosporus nach Norden ins Schwarze Meer abzusetzen. Übernehmen Sie das Kommando über die NATO-Einheiten im Einsatzraum und versenken Sie sie, bevor ihr die Flucht gelingt.
Taskforce1LandUnit1NameOverride=Souda Airbase
Taskforce1LandUnit1ShortNameOverride=Souda Airbase
Trigger6Condition_Condition1AreaLabel=Datum A01
Taskforce1StartmessageMessage=<size=40>GEFÄHRLICHE MEERENGE</size>|Die Kiev und ihre Kampfgruppe versuchen sich durch den von der Sowjetunion kontrollierten Bosporus aus dem Mittelmeer abzusetzen. Verlegen Sie nordwärts und versenken Sie den Verband bevor ihm die Flucht gelingt.\n\nGriechenland und die Türkei wurden beide neutralisiert und können abgesehen von einzelnen Angriffsflügen von der Souda Airbase hinaus keine Unterstützung leisten. Hinweis: Sowjetische Kräfte haben auf den griechischen Inseln Seezielflugkörper, Flakgeschütze und SAM-Stellungen in installiert. Der Nachrichtendienst geht zudem davon aus, dass mindestens ein U-Boot der Tango-Klasse die Rückzugsbewegung der Kiev deckt. Hinter jeder Insel kann Gefahr lauern!\n\nDie USS Iowa muss überleben.|Mission starten
Taskforce1Kievdestroyed-playervictoryMessage=SIEG|Sieg! Die Kiev wurde zerstört und damit ein bedeutender schwerer gegnerischer Kampfverband im Mittelmeer ausgeschaltet. Gute Arbeit, Kommandant.|Mission beenden
Taskforce1WisconsinmustsurviveMessage=NIEDERLAGE|Niederlage! Die USS Iowa wurde versenkt!|Mission beenden
Taskforce1KievreachesBosporus-playerdefeatMessage=NIEDERLAGE|18JUL1985\nBLITZMELDUNG - GEHEIM\nVON CINCLANTFLT\nAN KDT IOWA SAG\n\n1. (S) Die Aufklärung bestätigt, dass die KIEV und ihre Gruppe in den Bosporus eingelaufen ist.\n\n2. (S) Damit haben wir unsere Chance verloren, unseren Vorteil im Mittelmeer gegenüber einem äußerst gefährlichen Gegner weiter auszubauen. Brechen Sie die Verfolgung ab und verlegen Sie mit höchstmöglicher Geschwindigkeit zurück nach Neapel.\n\n3. (S) Nach Ankunft in Neapel begeben Sie sich mit dem ersten verfügbaren Militärflug nach Washington D.C. zur Nachbesprechung.|Mission beenden
Taskforce11hrSSKintelwarningMessage=BLITZMELDUNG|18JUL1985\nVON CTF 61\nAN KDT IOWA SAG\n\n1. (S) WARNUNG: Ein griechisches Fischerboot meldet die Sichtung eines schnorchelnden U-Boots nordöstlich von Naxos. Wir bewerten diesen Kontakt als nicht lokalisiertes U-Boot der TANGO-Klasse, das vermutlich gemeinsam mit der KIEV-Gruppe operiert.\n\n2. (S) Datum A01 wurde um 0935Z auf Position 37.27N, 25.61E festgelegt.\n\n3. (S) Es wird empfohlen, dieses Ziel nach Möglichkeit zu bekämpfen. Melden Sie jede Versenkung per Blitzmeldung. Viel Glück und Weidmannsheil.|Bestätigen und fortfahren
Taskforce11hrSSKintelwarningIntel=Ein griechisches Fischerboot meldet die Sichtung eines schnorchelnden U-Boots der TANGO-Klasse. Datum A01 wurde um 0935Z auf Position 37.27N, 25.61E festgelegt.
Objective_DestroyKiev=Zerstören Sie die Kiev
Objective_IowaMustSurvive=Die USS Iowa muss überleben
