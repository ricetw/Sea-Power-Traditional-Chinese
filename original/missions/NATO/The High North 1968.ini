[Language_de]
Name=Der Hohe Norden (1968)
Description=Nachrichtendienstliche Erkenntnisse deuten darauf hin, dass ein abtrünniges sowjetisches ballistisches Raketen-U-Boot Kurs auf die GIUK-Lücke genommen hat und versucht, in den Nordatlantik vorzustoßen. Seine Absichten sind derzeit unklar, jedoch haben sowjetische Informanten gegenüber CINCLANTFLT geäußert, man gehe davon aus, dass das Boot einen Erstschlag gegen die Vereinigten Staaten beabsichtigt. Als einzige NATO-Einheit im Einsatzgebiet erhalten Sie den Befehl, das Ziel mit der USS Joseph P. Kennedy Jr. aufzuklären und zu bekämpfen.
Taskforce1StartmessageMessage=DER HOHE NORDEN (1968)|Nachrichtendienstliche Erkenntnisse deuten darauf hin, dass ein abtrünniges sowjetisches ballistisches Raketen-U-Boot Kurs auf die GIUK-Lücke genommen hat und versucht, in den Nordatlantik vorzustoßen. Seine Absichten sind derzeit unklar, jedoch haben sowjetische Informanten gegenüber CINCLANTFLT geäußert, man gehe davon aus, dass das Boot einen Erstschlag gegen die Vereinigten Staaten beabsichtigt.\n\nAls einzige NATO-Einheit im Einsatzgebiet erhalten Sie den Befehl, das Ziel mit der USS Joseph P. Kennedy Jr. aufzuklären und zu bekämpfen. Eine P-2H der NAS Reykjavik ist zu Ihrer Unterstützung unterwegs.\n\nDie USS Joseph P. Kennedy Jr. muss überleben|Mission Starten
Taskforce1JosephPKennedymustsurviveMessage=NIEDERLAGE|Sie wurden besigt! Die USS Joseph P. Kennedy wurde zerstört!|Mission Beenden
Taskforce1SinkYankeeSSBN-playervictoryMessage=SIEG|20.DEZ 1968\nBLITZ-MELDUNG - GEHEIM\nVON CINCLANTFLT\nAN USS JOSEPH P. KENNEDY JR DD-850\n\n1. (TS) NAVFAC NORWEGEN MELDET MASSIVE UNTERWASSEREXPLOSIONEN IM NORDWESTEN DER FÄRÖER-INSELN.\n\n2. (TS) BEWERTET ALS AUSEINANDERBRECHENDES FEINDL. SSBN.\n\n3. (TS) NACHRICHTENDIENST MELDET RÜCKZUG DER SOWJETISCHEN NORDFLOTTE.\n\n4. (TS) GRATULIERT DD-850 ZU AUSGEZEICHNETER LEISTUNG. VERLEGEN SIE MIT HÖCHSTMÖGLICHER GESCHWINDIGKEIT SÜDWÄRTS NACH FASLANE. GUTE ARBEIT, KOMMANDANT.|Mission Beenden
Taskforce11minintelwarningdatumMessage=BLITZ-MELDUNG|26.DEZ 1968\nBLITZ-MELDUNG - GEHEIM\nVON CINCLANTFLT\nAN USS JOSEPH P. KENNEDY JR. DD-850\n\n1. (TS) NAVFAC NORWAY MELDET SOSUS-KONTAKT NÖRDLICH DER FÄRÖER-INSELN POSITION 65.7N 7.6W ZEIT 0931Z.\n\n2. (TS) SOSUS MELDET INTERMITTIERENDE SCHRAUBENGERÄUSCHE. KONTAKT IST MIT HOHER WAHRSCHEINLICHKEIT UNENTDECKTES U-BOOT DER YANKEE-KLASSE.\n\n3. (TS) VERLEGEN SIE ZU POSITION A01 UND SPÜREN SIE DEN KONTAKT AUF. LOKALISIEREN UND ZERSTÖREN SIE DEN KONTAKT, DANN WEITERE BEFEHLE ABWARTEN.|Bestätigen & Fortfahren
Taskforce11minintelwarningdatumIntel=SOSUS meldet Kontakt, der mit einem U-Boot der YANKEE-Klasse übereinstimmt, auf Position 65.7N, 7.6W um 0931Z. Position A01 wurde festgelegt und auf der Karte markiert.
Taskforce120minintelwarningmessageMessage=BLITZ-MELDUNG|26.DEZ 1968\nBLITZ-MELDUNG - GEHEIM\nVON CINCLANTFLT\nAN USS JOSEPH P. KENNEDY JR. DD-850\n\n1. (TS) GEHEIMDIENSTBERICHTE DEUTEN AUF AUSLAUFEN DER SOWJETISCHEN NORDFLOTTE VON MURMANSK HIN.\n\n2. (TS) SOWJETISCHE FÜHRUNG INFORMIERT CINCLANTFLT: NORDFLOTTE UNTERNIMMT EBENFALLS ABFANGVERSUCH.\n\n3. (TS) U-BOOT DER VICTOR-KLASSE IM EINSATZGEBIET KEINESFALLS UNTER BESCHUSS NEHMEN. EINDEUTIGE IDENTIFIZIERUNG VON UNTERWASSERKONTAKTEN VOR FEUERBEFEHL ZWINGEND NOTWENDIG.|Bestätigen & Fortfahren
Taskforce120minintelwarningmessageIntel=Alliiertes U-Boot der VICTOR-Klasse operiert in der Nähe. Eine eindeutige Identifizierung aller Unterwasserkontakte ist vor der Waffenfreigabe erforderlich.
Taskforce1Victordestroyed-playerdefeatMessage=NIEDERLAGE|26.DEZ 1968\nBLITZ-MELDUNG - GEHEIM\nVON CINCLANTFLT\nAN USS JOSEPH P. KENNEDY JR. DD-850\n\n1. (S) UdSSR MELDET KONTAKTVERLUST ZU IM EINSATZGEBIET OPERIERENDEM U-BOOT DER VICTOR-KLASSE.\n\n2. (S) NAVFAC NORWEGEN MELDET UNTERWASSEREXPLOSION DIE MIT DER LETZTEN BEKANNTEN PEILUNG DES U-BOOTS DER VICTOR-KLASSE ÜBEREINSTIMMT.\n\n3. (S) MISSION ABBRECHEN UND MIT HÖCHSTMÖGLICHER GESCHWINDIGKEIT SÜDWÄRTS NACH FASLANE VERLEGEN.\n\n4. (S) NACH ANKUNFT IN FASLANE ERSTE VERFÜGBARE MILITÄRMASCHINE NACH WASHINGTON D.C. BESTEIGEN ZWECKS NACHBESPRECHUNG.|Mission Beenden
