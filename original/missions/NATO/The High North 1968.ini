[Language_cn]
Name=高纬度北极区（1968）
Description=情报显示一艘叛变的苏联弹道导弹潜艇正驶向GIUK缺口，试图进入北大西洋。其目的尚不明确，但苏联秘密渠道已通知大西洋舰队总司令，他们认为其目的是袭击美国。指挥距此地区最近的北约部队小约瑟夫·P·肯尼迪号找到并击沉它。
Taskforce1StartmessageMessage=高纬度北极区（1968）|情报显示一艘叛变的苏联弹道导弹潜艇正驶向GIUK缺口，试图进入北大西洋。其目的尚不明确，但苏联秘密渠道已通知大西洋舰队总司令，他们认为其目的是袭击美国。\n\n作为此区域内唯一的北约单位，小约瑟夫·P·肯尼迪号的任务是找到并摧毁这艘苏联弹道导弹核潜艇。一架来自雷克雅未克海军航空站的P-2H已到达支援位置。\n\n小约瑟夫·P·肯尼迪号不能被击沉。|开始任务
Taskforce1JosephPKennedymustsurviveMessage=任务失败！|你失败了！小约瑟夫·P·肯尼迪号已被摧毁！|退出任务
Taskforce1SinkYankeeSSBN-playervictoryMessage=任务完成！|1968年12月26日\n紧急——绝密\n发件：大西洋舰队总司令\n收件：小约瑟夫·P·肯尼迪号驱逐舰\n\n1.（绝密）美国海军设施工程系统司令部驻挪威单位报告称法罗群岛西北方向发生大规模海底爆炸。\n\n2. （绝密）此接触被评估为苏联弹道导弹核潜艇在受击后解体。\n\n3.（绝密）国家技术情报来源报告称苏联北方舰队未进入戒备状态。\n\n4.（绝密）大西洋舰队总司令祝贺小约瑟夫·P·肯尼迪号的成功。以最佳速度向南航行至法斯兰。干得好，指挥官！|退出任务
Taskforce11minintelwarningdatumMessage=紧急消息|1968年12月26日\n紧急——绝密\n发件：大西洋舰队总司令\n收件：小约瑟夫·P·肯尼迪号驱逐舰\n\n1.（绝密）美国海军设施工程系统司令部驻挪威单位于0931Z时报告了一个法罗群岛北方的声波监听系统接触，位置65.7N, 7.6W。\n\n2.（绝密）声波监听系统报告了间歇性的双螺旋桨信号，评估此接触很可能是未被发现的667A型弹道导弹核潜艇。\n\n3.（绝密）继续前往基准点A01，找到并摧毁此接触，之后等待进一步命令。|收到并继续
Taskforce11minintelwarningdatumIntel=声波监听系统于0931Z时发现符合667A型弹道导弹核潜艇特征的接触，位置65.7N, 7.6W。基准点A01已建立并显示在你的地图上。
Taskforce120minintelwarningmessageMessage=紧急消息|1968年12月26日\n紧急——绝密\n发件：大西洋舰队总司令\n收件：小约瑟夫·P·肯尼迪号驱逐舰\n\n1.（绝密）国家技术情报来源报告称苏联北方舰队正从摩尔曼斯克出发。\n\n2.（绝密）苏联秘密渠道已通知大西洋舰队总司令，这些部队也试图拦截667A型弹道导弹核潜艇。\n\n3.（绝密）此区域内有一艘671型攻击型核潜艇，你在任何情况下都不得对其开火。在使用武器前必须正确识别所有水下接触。|收到并继续
Taskforce120minintelwarningmessageIntel=苏联的友方671型核潜艇正在附近行动。在使用武器前必须正确识别所有水下接触。
Taskforce1Victordestroyed-playerdefeatMessage=任务失败！|1968年12月26日\n紧急——机密\n发件：大西洋舰队总司令\n收件：小约瑟夫·P·肯尼迪号驱逐舰\n\n1.（机密）苏联报告称他们与此地区的671型潜艇失去了联系。\n\n2.（机密）美国海军设施工程系统司令部驻挪威单位报告称爆炸和解体信号符合671型攻击型核潜艇的最后已知方位。\n\n3.（机密）停止交战并以最佳速度向南航行至法斯兰。\n\n4.（机密）到达法斯兰后，乘坐第一班可用的军机前往华盛顿特区进行汇报。|退出任务
