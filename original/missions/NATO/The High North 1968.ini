[Language_ja]
Name=最北の海 (1968年)
Description=情報によれば、ソ連の離反した弾道ミサイル潜水艦が北大西洋への進出を目論み、GIUKギャップへ向けて航行中である。現時点でその意図は不明だが、ソ連側との非公式ルートを通じて、大西洋艦隊総司令官（CINCLANTFLT）には「米本土攻撃の意図あり」との情報がもたらされた。当該海域に展開中の唯一のNATOユニットとして、駆逐艦ジョセフ・P・ケネディ・ジュニアを指揮し、当該潜水艦を捕捉・撃沈せよ。
Taskforce1StartmessageMessage=最北の海 (1968年)|離反したソ連の弾道ミサイル潜水艦が北大西洋への進出を試みている。現時点で意図は不明だが、ソ連の非公式ルートは大西洋艦隊総司令官に対し、当該潜水艦が米国への攻撃を企図していると伝えてきた。\n\n当該海域の唯一のNATO戦力として、駆逐艦ジョセフ・P・ケネディ・ジュニアにソ連SSBNの捕捉・破壊任務が下った。レイキャビク海軍航空基地からP-2Hが1機、支援のために接近中である。\n\n駆逐艦ジョセフ・P・ケネディ・ジュニアの生存を絶対条件とする。|作戦開始
Taskforce1JosephPKennedymustsurviveMessage=敗北|敗北！駆逐艦ジョセフ・P・ケネディが撃沈された！|作戦終了
Taskforce1SinkYankeeSSBN-playervictoryMessage=勝利|1968年12月20日\n緊急 ― 最高機密（TOP SECRET）\n発 大西洋艦隊総司令官\n宛 駆逐艦ジョセフ・P・ケネディ・ジュニア（DD-850）\n\n1. (TS) ノルウェー海軍施設（NAVFAC）は、フェロー諸島北西にて大規模な水中爆発を探知した。\n\n2. (TS) 当該目標を、攻撃を受け船体が崩壊したソ連の離反したSSBNであると判断する。\n\n3. (TS) 国家技術情報源によれば、ソ連北方艦隊は待機状態を解除しつつある。\n\n4. (TS) 大西洋艦隊総司令官は、DD-850の見事な任務完遂を称賛する。最高速で南下し、ファスレーンへ向かえ。指揮官、素晴らしい手際だ。|作戦終了
Taskforce11minintelwarningdatumMessage=緊急電報|1968年12月26日\n緊急 ― 最高機密（TOP SECRET）\n発 大西洋艦隊総司令官\n宛 駆逐艦ジョセフ・P・ケネディ・ジュニア（DD-850）\n\n1. (TS) ノルウェー海軍施設は、0931Zに北緯65.7度、西経7.6度の地点でSOSUS接触を報告した。\n\n2. (TS) SOSUSは断続的な二軸推進のトーナル音を探知。当該目標は未捕捉のヤンキー級SSBNである可能性が極めて高いと判断する。\n\n3. (TS) 起標点（データム）A01へ進出し、アクティブ捜索を実施せよ。目標を捕捉・撃破した後、次命を待て。|了解、継続
Taskforce11minintelwarningdatumIntel=0931Z、北緯65.7度、西経7.6度の位置でヤンキー級SSBNと一致するSOSUS接触を探知。起標点 A01を設定し、マップ上にマークした。
Taskforce120minintelwarningmessageMessage=緊急電報|1968年12月26日\n緊急 ― 最高機密（TOP SECRET）\n発 大西洋艦隊総司令官\n宛 駆逐艦ジョセフ・P・ケネディ・ジュニア（DD-850）\n\n1. (TS) 国家技術情報源によれば、ソ連北方艦隊の諸ユニットがムルマンスクを出航しつつある。\n\n2. (TS) ソ連の非公式ルートは大西洋艦隊総司令官に対し、これらユニットもヤンキー級SSBNの捕捉を試みていると伝えてきた。\n\n3. (TS) 付近にはヴィクター級SSN 1隻が展開している。いかなる状況下においても、当該艦への攻撃は厳禁とする。交戦前に水中目標を確実に識別（ポジティブID）することは絶対条件である。|了解、継続
Taskforce120minintelwarningmessageIntel=付近で友好的なソ連ヴィクター級SSNが活動中。武器使用の前に、すべての潜水艦標的の確実な識別が要求される。
Taskforce1Victordestroyed-playerdefeatMessage=敗北|1968年12月26日\n緊急 ― 秘密（SECRET）\n発 大西洋艦隊総司令官\n宛 駆逐艦ジョセフ・P・ケネディ・ジュニア（DD-850）\n\n1. (S) ソ連側より、当該海域で活動中の自軍ヴィクター級SSNとの連絡が途絶したとの報告あり。\n\n2. (S) ノルウェー海軍施設は、ヴィクター級SSNの最終確認方位と一致する地点で、爆発および船体崩壊のシグネチャーを探知した。\n\n3. (S) 直ちに交戦を中止し、最高速で南下してファスレーンへ向かえ。\n\n4. (S) ファスレーン到着後、直ちにワシントンDC行きの軍用便に搭乗し、事後報告を行え。|作戦終了
Trigger6Condition_Condition1AreaLabel=起標点 A01
Objective_SinkYankeeSSBN=ヤンキー級SSBNの捕捉・撃破
Objective_KennedyMustSurvive=駆逐艦ジョセフ・P・ケネディ・ジュニアの生存
[Language_en]
Name=The High North (1968)
Description=Intel believes a renegade Soviet ballistic missile sub is moving towards the GIUK Gap attempting to transit into the North Atlantic. His intentions are not known at this time, but USSR backchannels have informed CINCLANTFLT they believe he is intending to strike the United States. As the nearest NATO unit in the area, command the USS Joseph P. Kennedy Jr. to locate and sink him.
Taskforce1StartmessageMessage=THE HIGH NORTH (1968)|Intel believes a renegade Soviet ballistic missile sub is attempting to transit into the North Atlantic. His intentions are not known at this time, but USSR backchannels have informed CINCLANTFLT they believe he is intending to strike the United States.\n\nAs the only NATO unit in the area, USS Joseph P. Kennedy Jr. has been tasked to locate and destroy the USSR SSBN. 1 x P-2H out of NAS Reykjavik is inbound for support.\n\nUSS Joseph P. Kennedy Jr. must survive.|Start mission
Taskforce1JosephPKennedymustsurviveMessage=DEFEAT|Defeat! USS Joseph P. Kennedy has been destroyed!|Exit mission
Taskforce1SinkYankeeSSBN-playervictoryMessage=VICTORY|20DEC1968\nFLASH - TOP SECRET\nFM CINCLANTFLT\nTO USS JOSEPH P. KENNEDY JR DD-850\n\n1. (TS) NAVFAC NORWAY REPORTS LARGE UNDERSEA DETONATIONS NW OF FAROE ISLANDS.\n\n2. (TS) ASSESS THIS CONTACT AS ROGUE USSR SSBN BREAKING UP AFTER ATTACK.\n\n3. (TS) NATIONAL TECHNICAL INTELLIGENCE SOURCES REPORT SOVIET NORTHERN FLEET STANDING DOWN.\n\n4. (TS) CINCLANTFLT CONGRATULATES DD-850 ON JOB WELL DONE. PROCEED SOUTH AT BEST SPEED TO FASLANE. GOOD WORK COMMANDER.|Exit mission
Taskforce11minintelwarningdatumMessage=FLASH MESSAGE|26DEC1968\nFLASH - TOP SECRET\nFM CINCLANTFLT\nTO USS JOSEPH P. KENNEDY JR. DD-850\n\n1. (TS) NAVFAC NORWAY REPORTS SOSUS CONTACT NORTH OF FAROE ISLANDS POSITION 65.7N 7.6W AT TIME 0931Z.\n\n2. (TS) SOSUS REPORTS INTERMITTENT TWIN-SCREW TONALS. ASSESS AS HIGHLY LIKELY THIS CONTACT IS UNLOCATED YANKEE CLASS SSBN.\n\n3. (TS) PROCEED TO DATUM A01 AND CONDUCT ACTIVE SEARCH. LOCATE AND DESTROY CONTACT, THEN AWAIT FURTHER ORDERS.|Acknowledge & continue
Taskforce11minintelwarningdatumIntel=SOSUS detected contact correlating to YANKEE class SSBN at position 65.7N 7.6W at time 0931Z. Datum A01 established and marked on your map.
Taskforce120minintelwarningmessageMessage=FLASH MESSAGE|26DEC1968\nFLASH - TOP SECRET\nFM CINCLANTFLT\nTO USS JOSEPH P. KENNEDY JR. DD-850\n\n1. (TS) NATIONAL TECHNICAL INTELLIGENCE SOURCES INDICATE USSR NORTHERN FLEET UNITS GETTING UNDERWAY FROM MURMANSK.\n\n2. (TS) SOVIET BACKCHANNELS INFORMED CINCLANTFLT THESE UNITS ALSO ATTEMPTING TO INTERCEPT YANKEE SSBN.\n\n3. (TS) 1 X VICTOR CLASS SSN IS IN THE AREA AND MUST NOT BE TAKEN UNDER FIRE UNDER ANY CIRCUMSTANCES. POSITIVE ID ON SUB-SURFACE CONTACTS IS ABSOLUTE REQUIREMENT BEFORE ENGAGEMENT.|Acknowledge & continue
Taskforce120minintelwarningmessageIntel=Friendly USSR VICTOR class SSN is operating nearby. Positive ID of all submarine contacts is a requirement before weapons release.
Taskforce1Victordestroyed-playerdefeatMessage=DEFEAT|26DEC1968\nFLASH - SECRET\nFM CINCLANTFLT\nTO USS JOSEPH P. KENNEDY JR. DD-850\n\n1. (S) USSR REPORTS LOST CONTACT WITH THEIR VICTOR CLASS SSN IN THE AREA.\n\n2. (S) NAVFAC NORWAY REPORTS DETONATION AND BREAKUP SIGNATURES CORRELATING TO LAST KNOWN BEARING OF VICTOR CLASS SSN.\n\n3. (S) DISENGAGE AND PROCEED SOUTH AT BEST SPEED TO FASLANE.\n\n4. (S) UPON REACHING FASLANE, BOARD FIRST AVAILABLE MILITARY FLIGHT TO WASHINGTON DC FOR DEBRIEFING.|Exit mission
Trigger6Condition_Condition1AreaLabel=Datum A01
Objective_SinkYankeeSSBN=Locate and destroy rogue Yankee class SSBN
Objective_KennedyMustSurvive=USS Joseph P. Kennedy Jr. must survive
[Language_fr]
Name=Le Grand Nord (1968)
Description=Nos services de renseignement estiment qu'un sous-marin balistique soviétique rebelle se dirige vers la ligne GIUK dans le but de rejoindre l'Atlantique Nord. Ses intentions sont encore inconnues, mais des sources confidentielles soviétiques ont informé le CINCLANTFLT qu'il aurait l'intention d'attaquer les États-Unis. En tant qu'unité de l'OTAN la plus proche de la zone, ordonnez à l'USS Joseph P. Kennedy Jr. de le localiser et de le couler.
Taskforce1StartmessageMessage=LE GRAND NORD (1968)|Nos services de renseignement estiment qu'un sous-marin balistique soviétique rebelle se dirige vers la ligne GIUK dans le but de rejoindre l'Atlantique Nord. Ses intentions sont encore inconnues, mais des sources confidentielles soviétiques ont informé le CINCLANTFLT qu'il aurait l'intention d'attaquer les États-Unis. En tant qu'unité de l'OTAN la plus proche de la zone, ordonnez à l'USS Joseph P. Kennedy Jr. de le localiser et de le couler. Un P-2H provenant de la base aéronavale de Reykjavik est en route pour apporter son soutien. L'USS Joseph P. Kennedy Jr. doit survivre. |Commencer la mission
Taskforce1JosephPKennedymustsurviveMessage=DEFAITE|Défaite ! L'USS Joseph P. Kennedy a été détruit !|Quitter lamission
Taskforce1SinkYankeeSSBN-playervictoryMessage=VICTOIRE|20DEC1968\nFLASH - TOP SECRET\nFM CINCLANTFLT\nPOUR L'USS JOSEPH P. KENNEDY JR DD-850\n\n1. (TS) NAVFAC NORVEGE SIGNALE D'IMPORTANTES DETONATIONS SOUS-MARINES AU NORD-OUEST DES ILES FEROE.\n\n2. (TS) CONSIDEREZ CE CONTACT COMME UN SSBN SOVIETIQUE SE DEROBANT APRES L'ATTAQUE.\n\n3. (TS) LES SOURCES NATIONALES DU RENSEIGNEMENT TECHNIQUE INDIQUENT QUE LA FLOTTE SOVIETIQUE DU NORD EST EN TRAIN DE SE RETIRER.\n\n4. (TS) CINCLANTFLT FELICITE LE DD-850 POUR SON EXCELLENT TRAVAIL. CONTINUEZ VERS LE SUD A VITESSE MAXIMALE VERS FASLANE. BON TRAVAIL, COMMANDANT.|Quitter la mission
Taskforce11minintelwarningdatumMessage=MESSAGE FLASH|26DEC1968\nFLASH - TOP SECRET\nFM CINCLANTFLT\nPOUR L'USS JOSEPH P. KENNEDY JR. DD-850\n\n1. (TS) NAVFAC NORVEGE SIGNALE UN CONTACT SOSUS AU NORD DES ILES FEROE, POSITION 65.7N 7.6W A 0931Z.\n\n2. (TS) SOSUS RAPPORTE DES BRUITEURS INTERMITTENTS DE DOUBLES HELICES. TRES PROBABLE QUE CE CONTACT SOIT UN SSBN DE CLASSE YANKEE D'ORIGINE INCONNUE.\n\n3. (TS) RENDEZ-VOUS AU DATUM A01 ET ENGAGEZ DES RECHERCHES ACTIVES. LOCALISEZ ET DETRUISEZ LE CONTACT, PUIS ATTENDEZ D'AUTRES INSTRUCTIONS.|Continuer
Taskforce11minintelwarningdatumIntel=SOSUS a détecté un contact correspondant à un SNLE de classe YANKEE à la position 65.7N 7.6 W à 0931Z. Le point de référence A01 a été établi et indiqué sur votre carte.
Taskforce120minintelwarningmessageMessage=FLASH MESSAGE|26DEC1968\nFLASH - TOP SECRET\nFM CINCLANTFLT\nTO USS JOSEPH P. KENNEDY JR. DD-850\n\n1. (TS) LE RENSEIGNEMENT TECHNIQUE NATIONAL INDIQUE QUE DES UNITES DE LA FLOTTE DU NORD URSS PARTENT DE MOURMANSK.\n\n2. (TS) LES CANAUX SECRETS SOVIETIQUES ONT INFORME CINCLANTFLT QUE CES UNITES TENTAIENT EGALEMENT D'INTERCEPTER LE SSBN TYPE YANKEE.\n\n3. (TS) 1 SSN DE CLASSE VICTOR SE TROUVE DANS LA ZONE ET NE DOIT EN AUCUN CAS ETRE PRIS POUR CIBLE. L'IDENTIFICATION CERTAINE DES CONTACTS SOUS-MARINS EST UNE EXIGENCE ABSOLUE AVANT TOUT ENGAGEMENT.|continuer
Taskforce120minintelwarningmessageIntel=Un sous-marin nucléaire soviétique de classe VICTOR opère à proximité. L'identification formelle de tous les contacts sous-marins est requise avant tout engagement.
Taskforce1Victordestroyed-playerdefeatMessage=DEFAITE|26DEC1968\nFLASH - SECRET\nFM CINCLANTFLT\nPOUR L'USS JOSEPH P. KENNEDY JR. DD-850\n\n1. (S) L'URSS SIGNALE AVOIR PERDU LE CONTACT AVEC SON SNA DE CLASSE VICTOR DANS LA REGION.\n\n2. (S) NAVFAC NORVEGE SIGNALE DES BRUITS DE DETONATION ET D'ECRASEMENT CORRELANT AVEC LA DERNIERE POSITION CONNUE DU SNA DE CLASSE VICTOR.\n\n3. (S) DEGAGEZ-VOUS ET DIRIGEZ-VOUS VERS LE SUD A VITESSE MAXIMALE VERS FASLANE.\n\n4. (S) A L'ARRIVEE A FASLANE, EMBARQUEZ SUR LE PREMIER VOL MILITAIRE DISPONIBLE VERS WASHINGTON DC POUR UN DEBRIEFING.|Quitter la mission
