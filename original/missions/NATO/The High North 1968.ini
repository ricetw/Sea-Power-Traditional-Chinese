Name=하이 노스 (1968)
Description=정보에 따르면 소련군 전략탄도미사일 잠수함이 독단적으로 GIUK 갭을 돌파하였으며 소련에 위치한 정보원에 따르면 해당 잠수함의 함장이 독단적으로 미국에 대한 핵공격을 가할것이라고 대서양함대사령부에 경고하였습니다. 해당 잠수함 인근에 위치한 유일한 NATO 해군 자산으로서 USS 조셉 P. 케네디 주니어가 해당 잠수함을 추적하고 격침하기 위해 지휘권을 잡으십시오.
Taskforce1StartmessageMessage=하이 노스 (1968)|정보에 따르면 소련군 전략탄도미사일 잠수함이 독단적으로 GIUK 갭을 돌파하였으며 소련에 위치한 정보원에 따르면 해당 잠수함의 함장이 독단적으로 미국에 대한 핵공격을 가할것이라고 대서양함대사령부에 경고하였습니다.\n\n해당 해역 인근의 유일한 NATO군 해군 자산으로써 USS 조셉 P. 케네디 주니어가 해당 잠수함을 격침하기 위해 기동중이며 레이캬비크에서 출격한 P-2H 해상초계기 또한 작전 수행을 위해 도달중입니다.\n\nUSS 조셉 P. 케네디 주니어는 반드시 생존해야합니다.|임무 시작
Taskforce1JosephPKennedymustsurviveMessage=패배|패배! USS 조셉 P. 케네디가 격침되었습니다!|미션 나가기
Taskforce1SinkYankeeSSBN-playervictoryMessage=승리|1968년 12월 20일\n위급 - I급 비밀\n발신:대서양함대사령부\n수신:USS 조셉 P. 케네디 주니어 DD-850\n\n1. (I비) NAVFAC 노르웨이 수중감청소에서 파로 제도 북서쪽에서 수중폭발음을 청음함.\n\n2. (I비) 해당 폭발음은 변절한 양키급 잠수함이 폭발하는 소리로 판단됨.\n\n3. (I비) 국립기술정보원에서 소련 북해함대가 철수하고 있다고 보고하였음.\n\n4. (I비) 대서양함대사령부는 본함의 임무 수행 성공에 대한 격려를 보내며 페슬레인 기지로 전속력으로 복귀할것. 완벽한 임무 수행이였음.|임무 종료
Taskforce11minintelwarningdatumMessage=위급 전문|1968년 12월 26일\n위급 - I급 비밀\n발신:대서양함대사령부\n수신:USS 조셉 P. 케네디 주니어 DD-850\n\n1. (I비) NAVFAC 노르웨이 수중감청소에서는 파로 제도 북쪽 북동 65.7 서향 7.6 지역에서 SOSUS 감청을 확인하였으며 확인 당시 시각은 0931시임.\n\n2. (I비) SOSUS 감청에 따르면 띄엄띄엄 이어진 2중 스크류 추진음이며 이는 이전까지 위치가 불명했던 양키급 잠수함일 가능성이 높음.\n\n3. (I비) 데이텀 A01로 기동하여 능동적 수색을 시작할것. 목표물을 수색섬멸한뒤 추가적인 명령에 대기할것.|확인 및 계속
Taskforce11minintelwarningdatumIntel=SOSUS 감청에 의하면 양키급 잠수함이 0931Z 시 경 북위 65.7도 서경 7.6도에서 탐지되었으며 수색을 위해 데이텀 A01을 지도에 표시함.
Taskforce120minintelwarningmessageMessage=위급 전문|1968년 12월 26일\n위급 - I급 비밀\n발신:대서양함대사령부\n수신:USS 조셉 P. 케네디 주니어 DD-850\n\n1. (I비) 국립기술정보원에서 소련 북해함대가 무르만스크에서 출항하였음을 알림.\n\n2. (I비) 소련 내부 정보원에 따르면 해당 함대는 변절한 양키급 잠수함을 격침하기 위해 출격중임.\n\n3. (I비) 현재 인근 해역에 빅터급 잠수함 1척이 활동중이며 절대로 해당 잠수함을 공격해서는 안됨. 공격전에 모든 잠수 항적에 대한 피아 식별후 공격할것.|확인 및 계속
Taskforce120minintelwarningmessageIntel=아군 빅터급 잠수함이 근처에서 활동중이며 공격 전에 모든 잠수 항적들에 대한 피아식별을 마쳐야 합니다.
Taskforce1Victordestroyed-playerdefeatMessage=패배|1968.12.26\n최신 - 기밀\n발신: 대서양함대사령관\n수신 USS 조셉 P. 케네디 주니어 DD-850\n\n1. (기밀) 소련은 해당 지역에서 빅터급 SSN과의 연락이 끊겼다고 보고했습니다.\n\n2. (기밀) NAVFAC 노르웨이는 빅터급 SSN의 마지막 베어링과 관련된 폭발 및 해체 징후를 보고합니다.\n\n3. (기밀) 분리하여 최고의 속도로 남쪽으로 진행하여 FASlane으로 이동하십시오.\n\n4. (기밀) FASLANE에 도착하면 워싱턴 DC로 가는 첫 번째 군용 항공편에 탑승하여 브리핑을 받으십시오.|임무 종료
