
[Language_en]
Name=Action in the Gulf of Sidra (1986)
Description=As part of Operation ATTAIN DOCUMENT III, U.S. forces have crossed Moammar Gaddafi's "Line of Death", entering the Gulf of Sidra. Shortly thereafter, Libyan SAMs were fired at two American F-14 Tomcats. U.S. forces have been ordered to destroy the SAM site at Sirte in response, and guard against any Libyan counterattack at sea or in the air.
Taskforce2Vessel3NameOverride=Waheed
Taskforce2Vessel3ShortNameOverride=Waheed
Trigger5Condition_Condition1AreaLabel=Sirte SAM Battery
Taskforce1StartMessage=ACTION IN THE\nGULF OF SIDRA (1986)|U.S. forces crossed Gaddafi's "Line of Death" this morning, and two of our Tomcats were fired on by the Libyan SAM battery at Sirte. COMSIXTHFLT has just activated Operation PRAIRIE FIRE, ordering the U.S. forces in the area to destroy the SAM battery and eliminate any Libyan air/naval counterattack.\n\nThere is heavy civilian traffic in the area and civilian casualties must be avoided.\n\nAll of your ships must survive.|Start mission
Taskforce1AllshipsmustsurviveMessage=MISSION FAILED|FM COMSIXTHFLT\nTO CTF 60\n\n1. (S) Loss of one of our combatant units in this action against Gaddafi is completely unacceptable and undermines the objective of this operation.\n\n2. (S) Reverse course at once and proceed north of the Line of Death, then retire at best speed to Naples.\n\n3. (S) On reaching Naples, board first available military flight to Washington DC for debriefing.|Exit mission
Taskforce1DestroySAMradarOBJMessage=FLASH MESSAGE|FM COMSIXTHFLT\nTO CTF 60\n\n1. (S) SEAD strikes on Sirte SAM battery have rendered it inoperable and their targeting radars are no longer functioning.\n\n2. (S) Cease further strikes on Libyan air defense at this time.\n\n3. (S) Excellent work, Commander.|Acknowledge & continue
Taskforce1DestroyLibyanFACsandSAMradarMessage=FLASH MESSAGE|FM COMSIXTHFLT\nTO CTF 60\n\n1. (S) SEAD strikes on Sirte SAM battery have rendered it inoperable, and reconnaissance shows several Libyan vessels burning or sinking after attempting to attack our forces.\n\n2. (S) Cease further strikes on Libyan forces at this time unless tactical situation requires it.\n\n3. (S) Excellent work, Commander. Retire north of the Line of Death and await further orders. COMSIXTHFLT sends.\n\n<size=16>Ships and squadrons have gained proficiency levels:\n\nUSS Ticonderoga CG-47: <color=Green>Veterans</color>\n\nVA-34 'Blue Blasters' (A-6E): <color=DarkOrange>Seasoned</color>\n\nVA-37 'Bulls' (A-7E): <color=DarkOrange>Seasoned</color></size>|Acknowledge & continue
Objective_DestroySAMRadar=Destroy the SA-5 radar at Sirte
Objective_AllShipsMustSurvive=All of your ships must survive
Objective_DestroyLibyanFACs=Destroy any Libyan naval attack
[Language_cn]
Name=锡德拉湾行动（1986）
Description=作为获取文件III行动的一部分，美军已越过穆阿迈尔·卡扎菲的“死亡线”，进入锡德拉湾。不久之后，利比亚对美军的两架F-14战斗机发射防空导弹。作为回应，美军收到命令摧毁位于苏尔特的防空导弹阵地并抵挡利比亚从海上和空中发动的任何反击。
Taskforce2Vessel3NameOverride=独一
Taskforce2Vessel3ShortNameOverride=独一
Trigger5Condition_Condition1AreaLabel=苏尔特面对空导弹阵地
Taskforce1StartMessage=锡德拉湾行动\n1986|今早，美军已越过穆阿迈尔·卡扎菲的“死亡线”，位于苏尔特的利比亚防空导弹阵地对我方的两架F-14战斗机开火。第六舰队司令已启动草原烈火行动，命令此区域内的美军摧毁防空导弹阵地并消灭反击的利比亚海空单位。\n\n此区域内民用航线密集，你必须避免平民伤亡。\n\n你的所有船只不能被击沉。|开始任务
Taskforce1AllshipsmustsurviveMessage=任务失败！|发件：第六舰队司令\n收件：第60特遣舰队指挥官\n\n1.（机密）在此次针对卡扎菲的行动中损失我方战斗单位是完全不可接受的，这也破坏了行动的目标。\n\n2.（机密）立即转向，航行至死亡线以北，再以最佳速度前往那不勒斯。\n\n3.（机密）抵达那不勒斯后，乘坐第一班可用的军机前往华盛顿进行汇报。|退出任务
Taskforce1DestroySAMradarOBJMessage=紧急消息|发件：第六舰队司令\n收件：第60特遣舰队指挥官\n\n1.（机密）对苏尔特面对空导弹阵地执行的防空压制任务已使其无法运行，敌方瞄准雷达已被摧毁。n\n2.（机密）立即停止对利比亚防空系统的进一步打击。\n\n3.（机密）干得好，指挥官。|收到并继续
Taskforce1DestroyLibyanFACsandSAMradarMessage=紧急消息|发件：第六舰队司令\n收件：第60特遣舰队指挥官\n\n1.（机密）对苏尔特面对空导弹阵地执行的防空压制任务已使其无法运行，侦察显示数艘尝试攻击我军的利比亚船只已起火或沉没。\n\n2.（机密）除非战术形势需要，否则立即停止对利比亚军队的进一步打击。\n\n3.（机密）干得好，指挥官。撤退至死亡线以北并等待进一步命令。\n\n<size=16>以下船只和中队达到了新的专业水准：\n\n提康德罗加号（CG-47）：<color=Green>老练</color>\n\nA-6E（VA-34“蓝色爆破手”）：<color=DarkOrange>熟练</color>\n\nA-7E（VA-37“公牛”）：<color=DarkOrange>熟练</color></size>|收到并继续
Objective_DestroySAMRadar=摧毁位于苏尔特的S-200导弹雷达
Objective_AllShipsMustSurvive=你的所有船只不能被击沉
Objective_DestroyLibyanFACs=消灭来袭的利比亚海军
[Language_ru]
Name=Операция «Пожар в прериях»
Description=Ваше авианосное ударное соединение (АУГ) проводит маневры в международных водах вблизи побережья Ливии, чтобы показать несостоятельность ливийских притязаний на залив Сидра. Ваша задача как командира авианосной группы США — защищать права международного судоходства, пересекая так называемую «Линию смерти», одновременно внимательно следя за враждебной деятельностью в этом районе. Ливийские силы, включая самолеты, береговые ракетные комплексы и ракетные катера, находятся в состоянии повышенной боевой готовности и готовы отреагировать на любое предполагаемое вторжение. Вы должны действовать с осторожностью, отстаивать свободу судоходства и быть готовыми быстро и решительно реагировать, если ливийские силы вступят в бой.
[Language_de]
Name=Gefecht in der großen Syrte (1986)
Description=Im Rahmen der Operation ATTAIN DOCUMENT III haben US-Streitkräfte die von Moammar Gaddafi erklärte „Todeslinie“ überschritten und sind in die große Syrte eingedrungen. Kurz darauf eröffneten libysche FlaRak-Stellungen das Feuer auf zwei amerikanische F-14 Tomcat. Als Reaktion wurden US-Streitkräfte angewiesen, die SAM-Stellung bei Sirte zu zerstören und sich gegen mögliche libysche Gegenangriffe zur See und aus der Luft zu sichern.
Taskforce2Vessel3NameOverride=Waheed
Taskforce2Vessel3ShortNameOverride=Waheed
Trigger5Condition_Condition1AreaLabel=SAM-Stellung Sirte
Taskforce1StartMessage=GEFECHT IN DER\nGROßEN SYRTE (1986)|US-Streitkräfte haben heute Morgen Gaddafis „Todeslinie“ überquert, zwei unserer Tomcats wurden daraufhin von der libyschen SAM-Stellung bei Sirte beschossen. COMSIXTHFLT hat soeben die Operation PRAIRIE FIRE aktiviert und den im Einsatzraum befindlichen US-Kräften befohlen, die SAM-Stellung zu vernichten sowie jeden libyschen Gegenangriff aus der Luft oder zur See zu zerschlagen.\n\nIm Einsatzgebiet herrscht starker ziviler Schiffsverkehr, zivile Verluste sind unter allen Umständen zu vermeiden.\n\nAlle Ihre Schiffe müssen den Einsatz überstehen.|Mission starten
Taskforce1AllshipsmustsurviveMessage=MISSION FEHLGESCHLAGEN|FM COMSIXTHFLT\nAN CTF 60\n\n1. (S) Der Verlust einer unserer Kampfeinheiten in dieser Auseinandersetzung mit Gaddafi ist inakzeptabel und untergräbt das Ziel dieser Operation.\n\n2. (S) Kurs unverzüglich umkehren, nördlich der Todeslinie laufen und anschließend mit höchster Fahrt nach Neapel verlegen.\n\n3. (S) Nach Eintreffen in Neapel nächstmöglichen Militärflug nach Washington D.C. zum Debriefing antreten.|Mission beenden
Taskforce1DestroySAMradarOBJMessage=BLITZNACHRICHT|FM COMSIXTHFLT\nAN CTF 60\n\n1. (S) SEAD-Schläge gegen die SAM-Stellung bei Sirte haben diese außer Gefecht gesetzt. Die Feuerleitradare sind nicht mehr funktionsfähig.\n\n2. (S) Weitere Angriffe auf die libysche Luftverteidigung sind bis auf Weiteres einzustellen.\n\n3. (S) Hervorragende Leistung, Kommandant.|Bestätigen & fortsetzen
Taskforce1DestroyLibyanFACsandSAMradarMessage=BLITZNACHRICHT|FM COMSIXTHFLT\nAN CTF 60\n\n1. (S) SEAD-Schläge gegen die SAM-Stellung bei Sirte haben diese außer Gefecht gesetzt. Die Aufklärung zeigt mehrere libysche Einheiten brennend oder sinkend nach Angriffsversuchen auf unsere Kräfte.\n\n2. (S) Weitere Angriffe auf libysche Kräfte sind bis auf Weiteres einzustellen, sofern die taktische Lage nichts anderes erfordert.\n\n3. (S) Hervorragende Leistung, Kommandant. Rückzug nördlich der Todeslinie und Bereithalten für weitere Befehle. COMSIXTHFLT meldet.\n\n<size=16>Schiffe und Staffeln haben an Erfahrungsgrad gewonnen:\n\nUSS Ticonderoga CG-47: <color=Green>Veteran</color>\n\nVA-34 „Blue Blasters“ (A-6E): <color=DarkOrange>Erfahren</color>\n\nVA-37 „Bulls“ (A-7E): <color=DarkOrange>Erfahren</color></size>|Bestätigen & fortsetzen
Objective_DestroySAMRadar=SA-5-Radar bei Sirte zerstören
Objective_AllShipsMustSurvive=Alle eigenen Schiffe müssen überleben
Objective_DestroyLibyanFACs=Jeglichen libyschen Seeangriff zerschlagen
[Language_es]
Name=Operation Prairie Fire
[Language_fr]
Name=Opération Feu de prairie
Description=Votre groupe aéronaval (CVBG) mène des exercices de liberté de mouvement près de la Libye afin de contester ses revendications territoriales sur le golfe de Syrte. En tant que commandant de ce groupe aéronaval américain, votre mission consiste à faire respecter les droits de navigation internationaux en franchissant la « ligne de la mort » tout en surveillant de près les activités hostiles dans la région. Les forces libyennes, notamment les avions à réaction, les sites de missiles côtiers et les patrouilleurs, sont en état d'alerte maximale et prêtes à réagir à toute intrusion présumée. Vous devez mener vos opérations avec prudence, affirmer la liberté de navigation et être prêt à réagir rapidement et de manière décisive si les forces libyennes engagent le combat.
[Language_ko]
Name=프레리 파이어 작전
[Language_ja]
Name=シドラ湾の決戦 (1986年)
Description=アテイン・ドキュメントIII作戦の一環として、米軍はムアンマル・カダフィが宣言した「死の一線」を越えシドラ湾に進出した。その直後、リビア軍のSAMが米海軍のF-14トムキャット2機に対して発射された。これを受け、米軍は報復としてシルトのSAM陣地を破壊し、リビア側によるいかなる海空の反撃も阻止せよとの命令を下した。
Taskforce2Vessel3NameOverride=Waheed
Taskforce2Vessel3ShortNameOverride=Waheed
Trigger5Condition_Condition1AreaLabel=シルト SAM陣地
Taskforce1StartMessage=シドラ湾の決戦\n(1986年)|今朝、米軍はカダフィの「死の一線」を越えた。これに対しシルトのリビア軍SAM部隊が我が方のトムキャット2機を射撃した。第6艦隊司令官（COMSIXTHFLT）はプレーリー・ファイア作戦を発動。当該海域の米軍に対し、SAM部隊の破壊およびリビア海空軍による反撃の排除を命じた。\n\n周辺海域は民間船の往来が激しく、民間人の犠牲は絶対に避けなければならない。\n\n全艦生存を絶対条件とする。|作戦開始
Taskforce1AllshipsmustsurviveMessage=作戦失敗|発 第6艦隊司令官\n宛 第60任務部隊指揮官\n\n1. (S) カダフィに対する本行動において、我が方の戦闘ユニットを1隻でも失うことは到底容認できず、本作戦の目的を損なうものである。\n\n2. (S) 直ちに反転して「死の一線」以北へ進出し、最高速でナポリへ撤収せよ。\n\n3. (S) ナポリ到着後、直ちにワシントンDC行きの軍用便に搭乗し、事後報告を行え。|作戦終了
Taskforce1DestroySAMradarOBJMessage=緊急電報|発 第6艦隊司令官\n宛 第60任務部隊指揮官\n\n1. (S) シルトのSAM部隊に対するSEAD（敵防空網制圧）攻撃により、同部隊は作戦不能となった。敵の照準レーダーも機能停止している。\n\n2. (S) 現時刻をもって、リビア軍防空網へのさらなる攻撃を中止せよ。\n\n3. (S) 指揮官、見事な手際だ。|了解、継続する
Taskforce1DestroyLibyanFACsandSAMradarMessage=緊急電報|発 第6艦隊司令官\n宛 第60任務部隊指揮官\n\n1. (S) シルトのSAM部隊に対するSEAD攻撃により、同部隊は作戦不能となった。また偵察によれば、我々に攻撃を試みた複数のリビア艦艇が炎上または沈没中である。\n\n2. (S) 戦術的状況により必要とされない限り、現時刻をもってリビア軍へのさらなる攻撃を中止せよ。\n\n3. (S) 指揮官、見事な手際だ。「死の一線」以北へ撤収し、次命を待て。第6艦隊司令官より。\n\n<size=16>各艦および飛行隊が熟練度を上げた：\n\nミサイル巡洋艦タイコンデロガ (CG-47)：<color=Green>ベテラン</color>\n\n第34攻撃飛行隊 'Blue Blasters' (A-6E)：<color=DarkOrange>精鋭</color>\n\n第37攻撃飛行隊 'Bulls' (A-7E)：<color=DarkOrange>精鋭</color></size>|了解、継続する
Objective_DestroySAMRadar=シルトのSA-5レーダーを破壊せよ
Objective_AllShipsMustSurvive=自軍全艦の生存
Objective_DestroyLibyanFACs=リビア海軍攻撃部隊の撃滅
