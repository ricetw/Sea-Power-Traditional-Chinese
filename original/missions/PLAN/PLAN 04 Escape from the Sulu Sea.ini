Taskforce1StartMessage=술루해\n탈출|술루해에서 훈련 중인 우리 군대가 필리핀 군대의 공격을 받았습니다. 발라박 해협을 통과하여 팔라완 통로에 도달하여 북쪽으로 탈출하세요.\n\n필리핀 지상군이 해협을 봉쇄하려고 시도하고 있습니다. 그들은 경공격 헬리콥터의 지원을 받으며, 타격기도 지원을 받을 수 있습니다. 우리 남해 함대가 앞다투어 지원하고 있지만, 해협을 통과하기 전까지는 우리가 혼자서 할 수 있을 것 같습니다.\n\n적어도 한 척의 배는 살아남아야 합니다.|임무 시작
Taskforce1Reachareatoescape-playervictoryMessage=승리|발신: 남해함대 사령관\n수신: Southern Theater Command 사령관\n\n1. 술루해 정찰대가 발라박 해협을 성공적으로 통과하여 우리 영해로 탈출했습니다.\n\n2. 그들은 베트남 항공기의 지원을 받는 필리핀 군대의 집중 공격을 받았다고 보고했습니다. 이것은 우리에 대한 적대감의 주요 고조입니다.\n\n3. 술루해 정찰대 사령관은 율린으로 돌아온 후 용맹함으로 훈장을 받을 것입니다. 우리는 큰 승리를 거두었습니다!|임무 종료
Taskforce1SuluSeaForcedestroyed-playerdefeatMessage=패배|발신: 남해함대 사령부\n수신: 남부전구 사령부\n\n1. 술루해 정찰대와 연락이 끊김.\n\n2. 술루해 정찰대 사령관의 마지막 교신은 필리핀군의 지속적인 폭탄, 로켓, 미사일 공격을 받았다고 보고됨.\n\n3. 우리는 술루해 정찰대가 파괴되었다고 평가함.|임무 종료
Taskforce1USSAGattacked-sidechangeMessage=해군 메세지|발신: 남해함대 사령부\n수신: 술루해 정찰부대 사령관\n\n1. 경고: 팔라완에서 미국 태스크포스가 우리 대함 미사일의 공격과 타격을 받고 있다고 보고했습니다.\n\n2. 미국인들은 외교적 항의를 제기하고 있지만, 해당 지역의 미군이 경고 없이 당신을 공격할 수 있다는 점을 유의하세요.\n\n3. 작전을 계속하고 가능하면 탈출하세요. 행운을 빕니다.|확인됨 & 계속
Taskforce145minSSGsidechangeMessage=해군 메세지|발신: 남해함대 사령관\n수신: 술루해 정찰부대 사령관\n\n1. 스프래틀리 제도 근처에서 훈련 크루즈를 타고 있는 실험 잠수함 위안정 351이 방금 보고했으며 이제 여러분을 도울 준비가 되었습니다.\n\n2. 위안정 351호는 발라박 해협 남서쪽에 위치해 있으며, YJ-8 미사일 6발을 장착하고 있습니다.\n\n3. 참고: 이 잠수함은 중요한 방어 자산이며 생존이 필요합니다.|확인됨 & 계속
Taskforce1351mustsurviveMessage=패배|발신: 남해함대 사령관\n수신: 남부전구 사령부\n\n1. 잠수함 351호는 이제 예정된 체크인을 놓쳤습니다.\n\n2. 351에서 마지막으로 전송된 것이 알려지지 않은 세력의 공격을 받고 있다고 보고되었습니다. 잠수함 351호가 손실되었다고 평가합니다.\n\n3. 술루해 정찰대 사령관은 그의 무모한 행동으로 인해 이 중요한 전략 자산이 손실되었다고 판단하여 최대한 빨리 GHQ에 보고하여 보고할 것입니다.|임무 종료
