Name=PLAN 04 - Escape from the Sulu Sea (1988)
Description=The South Seas Fleet has sent a surface action group into the Sulu Sea for an exercise. Unfortunately, the SAG has come under attack by Filipino forces. Fight your way through the Balabac Strait and reach the Palawan Passage to escape north.
Taskforce2Vessel1NameOverride=Francisco Dagohoy PF-10
Taskforce2Vessel1ShortNameOverride=Francisco Dagohoy PF-10
