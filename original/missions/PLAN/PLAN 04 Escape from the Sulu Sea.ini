Taskforce1StartMessage=逃离\n苏禄海|我们在苏禄海演习的部队遭到了菲律宾军队的攻击。通过巴拉巴克海峡进入巴拉望航道，向北撤离。\n\n菲律宾军队正尝试封锁海峡。预计他们会有轻型直升机支援，固定翼飞机也可能进行空对面打击支援。我方的南海舰队正在紧急出动以提供协助，但在通过海峡之前，我们必须自己支撑。\n\n你至少有一艘船只不被击沉。|开始任务
Taskforce1Reachareatoescape-playervictoryMessage=任务完成！|发件：南海舰队司令\n收件：海军总部\n\n1.苏禄海侦察分队已成功通过巴拉巴克海峡并撤回我方领海。\n\n2.他们报告称遭到了菲律宾军队的猛烈攻击，且敌方还有越南飞机的支援。这是他们敌对行为的重大升级。\n\n3.我们取得了胜利！苏禄海侦察分队指挥官将在返回榆林港时受到嘉奖。|退出任务
Taskforce1SuluSeaForcedestroyed-playerdefeatMessage=任务失败！|发件：南海舰队司令\n收件：海军总部\n\n1.我们与苏禄海侦察分队失去了联系。\n\n2.苏禄海侦察分队指挥官最后发来的无线电显示他们遭到了菲律宾军队炸弹、火箭和导弹的持续攻击。\n\n3.我们评估苏禄海侦察分队已被消灭。|退出任务
Taskforce1USSAGattacked-sidechangeMessage=海军消息|发件：南海舰队司令\n收件：苏禄海侦察分队指挥官\n\n1.警告：巴拉望航道附近的美国特遣舰队报告称遭到我方反舰导弹的攻击。\n\n2.美国人正通过外交渠道抗议，但要注意，此区域内的美军可能在不预先警告的情况下对你发动攻击。\n\n3.继续行动，趁机撤离。祝你好运。|收到并继续
Taskforce145minSSGsidechangeMessage=海军消息|发件：南海舰队司令\n收件：苏禄海侦察分队指挥官\n\n1.正在南沙群岛附近训练巡航的351号试验潜艇刚刚发来报告，现已准备好支援你。\n\n2.351号潜艇位于巴拉巴克海峡西南方，艇上有6枚鹰击-8导弹。\n\n3.注意：此潜艇是关键的防御资产，必须保证其安全。|收到并继续
Taskforce1351mustsurviveMessage=任务失败！|发件：南海舰队司令\n收件：海军总部\n\n1.351号潜艇未在预定的汇报时间发送报告。\n\n2.351号潜艇最后发来的无线电显示其遭到未知部队的攻击。我们评估351号潜艇已被击沉。\n\n3.苏禄海侦察分队指挥官将尽早向总参谋部报告情况，我们认为此关键战略资产的损失应归咎于他的鲁莽行为。|退出任务
