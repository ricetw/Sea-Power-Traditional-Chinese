Taskforce1351mustsurviveMessage=NIEDERLAGE|VON KDT, S�dmeerflotte\nAN KDT, Southern Theater Command\n\n1. Das U-Boot 351 hat die planm��ige Meldung verpasst.\n\n2. Die letzte �bertragung von 351 berichtete von einem Angriff unbekannter Kr�fte. Wir gehen davon aus, dass wir das U-Boot 351 verloren haben.\n\n3. Der Kommandant der Aufkl�rungsgruppe Sulusee wird sich schnellstm�glich im Hauptquartier melden, um an einer dringenden Nachbesprechung teilzunehmen, da anzunehmen ist, dass sein leichtsinniges Handeln zum Verlust dieses wertvollen Einsatzmitteln gef�hrt hat.|Mission Beenden
