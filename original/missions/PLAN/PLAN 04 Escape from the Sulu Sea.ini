Taskforce1USSAGattacked-sidechangeMessage=NACHRICHT DER MARINE|VON KDT, S�dmeerflotte\nAN KDT, Aufkl�rungsgruppe Sulusee\n\n1. WARNUNG: Ein US-Einsatzverband vor Palawan meldet, von unseren Seezielflugk�rpern angegriffen und getroffen worden zu sein.\n\n2. Zwar wollen die Amerikaner diplomatischen Protest einlegen, doch beachten Sie, dass die US-Streitkr�fte im Gebiet dennoch auch milit�risch gegen Sie vorgehen k�nnten.\n\n3. Setzen Sie Ihren Auftrag fort und entkommen Sie, wenn m�glich. Viel Gl�ck.|Best�tigen & Fortfahren
