Taskforce1Reachareatoescape-playervictoryMessage=SIEG|VON KDT, S�dmeerflotte\nAN KDT, Southern Theater Command\n\n1. Die Aufkl�rungsgruppe Sulusee hat die BalabacStra�e erfolgreich passiert und unsere Hoheitsgew�sser erreicht.\n\n2. Sie meldete schwere AngriffE durch philippinische Streitkr�fte, unterst�tzt von vietnamesischen Flugzeugen. Dies stellt eine erhebliche Eskalation uns gegen�ber dar.\n\n3. Der Kommandant der Aufkl�rungsgruppe Sulusee wird nach seiner R�ckkehr nach Yulin f�r seine Tapferkeit ausgezeichnet. Wir haben einen gro�en Sieg errungen!|Mission Beenden
