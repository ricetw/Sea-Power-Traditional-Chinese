Objective_OneShipMustSurvive=Au moins l'un de vos navires doit survivre
Objective_351MustSurvive=Le Yuanzheng 351 doit survivre
[Language_ko]
Name=PLAN 04 - 술루해에서의 탈출 (1988)
Description=남해 함대는 훈련을 위해 수면 행동 그룹을 술루해로 보냈습니다. 안타깝게도 SAG는 필리핀군의 공격을 받고 있습니다. 발라박 해협을 통과하여 팔라완 통로에 도달하여 북쪽으로 탈출하시오.
