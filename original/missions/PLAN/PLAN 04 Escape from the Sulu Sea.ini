Name=PLAN 04 - スールー海からの脱出 (1988)
Description=南海艦隊のスールー海派遣部隊が、フィリピン軍による予期せぬ攻撃を受けた。バラバク海峡を強行突破し、北方のパラワン水路へ脱出せよ。
