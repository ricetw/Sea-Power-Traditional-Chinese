Taskforce1StartMessage=S'ECHAPPER DE\nLA MER DE SULU|Notre force, qui effectuait un exercice en mer de Sulu, a été attaquée par les forces philippines. Frayez-vous un chemin à travers le détroit de Balabac et atteignez le passage de Palawan pour fuir vers le nord.\n\nLes forces de surface philippines tentent de bloquer le détroit. Elles sont appuyées par des hélicoptères d'attaque légers, et des avions d'attaque pourraient également intervenir. Notre flotte des mers du Sud se mobilise pour apporter son aide, mais nous serons probablement livrés à nous-mêmes jusqu'à ce que nous ayons traversé le détroit.\n\nAu moins l’un de vos navires doit survivre. |Démarrer la mission
Taskforce1Reachareatoescape-playervictoryMessage=VICTOIRE|DE CMDT Flotte des mers du sud\nA CMDT Théâtre d'opérations sud\n\n1. La Force de reconnaissance maritime de Sulu a traversé avec succès le détroit de Balabac et s'est réfugiée dans nos eaux territoriales.\n\n2. Elle a signalé avoir subi une attaque massive des forces philippines appuyées par l'aviation vietnamienne. Il s'agit d'une escalade majeure des hostilités à notre encontre.\n\n3. Le commandant de la Force de reconnaissance maritime de Sulu sera décoré pour sa bravoure à son retour à Yulin. Nous avons remporté une grande victoire !|Quitter la mission
Taskforce1SuluSeaForcedestroyed-playerdefeatMessage=DEFAITE|DE CMDT Flotte des mers du sud\nA CMDT Théâtre d'opérations sud\n\n1. Nous avons perdu le contact avec la Force de reconnaissance maritime de Sulu.\n\n2. La dernière transmission du commandant de la Force de reconnaissance maritime de Sulu indiquait qu'elle avait subi des attaques soutenues de bombes, de roquettes et de missiles de la part des forces philippines.\n\n3. Nous estimons que la Force de reconnaissance maritime de Sulu a été détruite.|Quitter la mission
Taskforce1USSAGattacked-sidechangeMessage=MESSAGE NAVAL|DE CMDT Flotte des mers du sud\nA CMDT Force de reconnaissance Mer de Sulu\n\n1. AVERTISSEMENT : La force opérationnelle américaine au large de Palawan signale avoir été attaquée et touchée par nos missiles antinavires.\n\n2. Les Américains ont déposé un recours diplomatique, mais sachez que les forces américaines présentes dans la zone pourraient vous attaquer sans avertissement.\n\n3. Poursuivez votre opération et échappez-vous si possible. Bonne chance.|Bien reçu
Taskforce145minSSGsidechangeMessage=NAVAL MESSAGE|DE CMDT Flotte des mers du sud\nA CMDT Force de reconnaissance Mer de Sulu\n\n1. Le sous-marin expérimental Yuanzheng 351, en croisière d'entraînement près des îles Spratly, vient de se signaler et est désormais prêt à vous aider.\n\n2. Le Yuanzheng 351 est en attente au sud-ouest du détroit de Balabac et est équipé de six missiles YJ-8.\n\n3. Remarque : ce sous-marin est un élément clé de notre défense et sa survie est essentielle. |Bien reçu
Taskforce1351mustsurviveMessage=DEFAITE|DE CMDT Flotte des mers du sud\nA CMDT Théâtre d'opérations sud\n\n1. Le sous-marin 351 n’a pas atteint son point de contrôle planifié.\n\n2. La dernière transmission du 351 signale une attaque par des forces inconnues. Nous estimons que le sous-marin 351 a été perdu.\n\n3. Le commandant de la force de reconnaissance maritime de Sulu se présentera au plus tôt au GQG pour un compte rendu, car nous pensons que son acte imprudent a entraîné la perte de cet atout stratégique essentiel.|Quitter la mission
