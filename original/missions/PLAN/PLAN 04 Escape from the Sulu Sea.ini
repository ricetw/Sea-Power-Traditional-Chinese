Taskforce1StartMessage=スールー海からの脱出|スールー海で演習中の我が部隊が、フィリピン軍による攻撃を受けた。バラバク海峡を突破し、北方のパラワン水路へ到達せよ。\n\nフィリピン水上部隊が海峡の封鎖を試みており、軽攻撃ヘリや攻撃機による支援も予想される。南海艦隊が救援を急行させているが、海峡を通過するまでは独力で戦い抜かねばならない。\n\n少なくとも1隻の自艦を生存させよ。|作戦開始
Taskforce1Reachareatoescape-playervictoryMessage=勝利|発：南海艦隊司令官\n宛：南部戦区司令部\n\n1. スールー海偵察部隊はバラバク海峡の通航に成功し、我が国領海へ帰還した。\n\n2. ベトナム機に支援されたフィリピン軍の猛攻を受けたとの報告あり。これは我が国に対する重大な挑発行為である。\n\n3. スールー海偵察部隊指揮官の武勲を称え、楡林への帰還後に勲章を授与する。我々は大いなる勝利を収めた。|作戦終了
Taskforce1SuluSeaForcedestroyed-playerdefeatMessage=敗北|発：南海艦隊司令官\n宛：南部戦区司令部\n\n1. スールー海偵察部隊との連絡が途絶した。\n\n2. 同部隊からの最終通信によれば、フィリピン軍による爆弾、ロケット、およびミサイルの持続的な波状攻撃を受けていた模様である。\n\n3. スールー海偵察部隊は壊滅したものと判断する。|作戦終了
Taskforce1USSAGattacked-sidechangeMessage=海軍通信|発：南海艦隊司令官\n宛：スールー海偵察部隊指揮官\n\n1. 警告：パラワン沖の米海軍任務群より、我が方の対艦ミサイルによる誤射・被弾があったとの通報あり。\n\n2. 米国側は外交的抗議を行っているが、当該海域の米軍部隊が警告なしに攻撃を仕掛けてくる蓋然性が高い。\n\n3. 作戦を続行し、可及的速やかに脱出せよ。諸君の武運を祈る。|了解、作戦続行
Taskforce145minSSGsidechangeMessage=海軍通信|発：南海艦隊司令官\n宛：スールー海偵察部隊指揮官\n\n1. スプラトリー諸島近海で訓練航行中の実験潜水艦「遠征351号」より入電。貴部隊の支援準備が整った。\n\n2. 遠征351号はバラバク海峡南西に待機中。YJ-8対艦ミサイル6基を装備している。\n\n3. 注意：当該潜水艦は極めて重要な国防資産であり、その生存は絶対条件である。|了解、作戦続行
Taskforce1351mustsurviveMessage=敗北|発：南海艦隊司令官\n宛：南部戦区司令部\n\n1. 潜水艦351号が予定の定時連絡を欠いた。\n\n2. 351号からの最終通信では、不明勢力の攻撃を受けているとの報告があった。同艦は喪失したものと判断する。\n\n3. スールー海偵察部隊指揮官に対し、直ちに総司令部への出頭を命じる。貴殿の軽率な行動が、我が国の重要戦略資産を喪失させる事態を招いた。|作戦終了
Trigger2Condition_Condition1AreaLabel=この海域に到達して脱出せよ！
Objective_ReachMarkedArea=マークされた海域へ到達して脱出せよ
Objective_OneShipMustSurvive=少なくとも1隻の自艦を生存させよ
Objective_351MustSurvive=遠征351号を生存させよ
