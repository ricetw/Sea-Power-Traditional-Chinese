[Language_ko]
Name=PLAN 03 - 사일런트 스피어 작전 (1985)
Description=오키나와 앞바다에서 정보 수집 임무를 수행하던 중, 우리의 091형 잠수함 중 하나가 일본에 의해 탐지되었습니다. 모든 능력을 동원하여 대잠 포위망을 피하고 해당 지역을 탈출하시오.
Taskforce1StartMessage=사일런트 스피어\n작전 (1985)|우리의 091형 잠수함이 정보 수집 임무를 위해 오키나와에 매우 가까이 접근했지만, 일본군에 의해 잠시 탐지되었고 그들의 대잠 포위망이 우리에게 다가오고 있습니다.\n\n탈출하려면 지도에 표시된 영역에 도달해야 합니다. 적의 지상군이 다가오고 있으며, 우리는 이전에 근처에서 최소 한 척의 잠수함을 탐지했습니다. 카데나 AFB에서 JMSDF 항공편으로 우리를 찾는 임무도 수행될 수 있습니다.\n\n창정 4는 반드시 생존시킬것.|미션 시작
Taskforce1Changzheng4mustsurviveMessage=패배|발신: 남해함대 사령관\n수신: Southern Theater Command 사령관\n\n1. 잠수함 404호는 예정된 체크인 두 번을 놓쳤습니다.\n\n2. 오키나와/미야코 지역에서 전파를 차단한 결과, JMSDF가 대규모 ASW 작전을 진행 중이며, 깊이 충전과 알려지지 않은 잠수함 침몰에 대한 여러 보고가 있었습니다.\n\n3. 잠수함 404함이 JMSDF에 의해 모든 손이 침몰한 상태로 전투 중에 실종되었다고 평가합니다.|미션 나가기
Taskforce1Reachareatoescape-playervictoryMessage=승리|발신: 북해함대 사령관\n수신: CMDR Northern Theater Command\n\n1. 잠수함 404가 사전 설정된 체크인 시간 동안 성공적으로 보고되었습니다.\n\n2. 404건의 보고에 따르면 JMSDF 부대의 공격을 받았지만 보고서와 함께 전송된 정보 데이터를 통해 해당 지역을 성공적으로 탈출했습니다.\n\n3. 오키나와/미야코 지역에서 전파를 차단한 결과, JMSDF의 대규모 대잠수함전이 성공하지 못했습니다.\n\n4. 잠수함 404의 사령관은 산둥으로 돌아가면 용맹함으로 훈장을 받을 것입니다. 승리는 우리의 것입니다!|미션 나가기
Trigger3Condition_Condition1AreaLabel=탈출을 위해 이 지역에 도달
Objective_EscapeArea=구역에서 탈출
Objective_Changzheng4MustSurvive=창정 4는 반드시 생존할것
