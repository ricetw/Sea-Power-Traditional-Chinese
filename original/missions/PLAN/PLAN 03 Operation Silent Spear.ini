[Language_ja]
Name=PLAN 03 - サイレント・スピア作戦 (1985)
Description=沖縄沖での情報収集任務中、我が方の091型原子力潜水艦が日本側に探知された。あらゆる能力を駆使し、敵の対潜掃討網を回避して当該海域から脱出せよ。
Taskforce1StartMessage=サイレント・スピア作戦\n(1985)|我が方の091型原子力潜水艦は情報収集任務のため沖縄に極めて接近したが、一時的に日本側に探知され、敵の対潜掃討網が狭まりつつある。\n\n脱出のため、マップ上にマークされた地点へ到達せよ。敵水上部隊が接近中であり、付近には少なくとも1隻の潜水艦も探知されている。嘉手納基地より発進した海上自衛隊の航空機も捜索に投入される可能性がある。\n\n長征4号を生存させなければならない。|作戦開始
Taskforce1Changzheng4mustsurviveMessage=敗北|発：北海艦隊司令官\n宛：北部戦区司令部\n\n1. 潜水艦404号は、予定されていた2回の定時連絡を欠いた。\n\n2. 沖縄・宮古海域からの電波傍受によれば、海上自衛隊による大規模な対潜作戦が展開されており、国籍不明の潜水艦に対して爆雷攻撃を行い、撃沈したとの報告が複数確認されている。\n\n3. 潜水艦404号は、海上自衛隊との交戦により全乗組員と共に喪失したものと判断する。|作戦終了
Taskforce1Reachareatoescape-playervictoryMessage=勝利|発：北海艦隊司令官\n宛：北部戦区司令部\n\n1. 潜水艦404号より、所定の定時連絡時刻に無事入電あり。\n\n2. 404号によれば、海上自衛隊による攻撃を受けたものの、当該海域からの脱出に成功したとのこと。入手した情報データも報告と共に送信されている。\n\n3. 沖縄・宮古海域からの電波傍受によれば、海上自衛隊が大規模な対潜掃討を実施したが、成果は得られなかった模様である。\n\n4. 潜水艦404号の指揮官は、山東への帰還後にその武勲を称え、勲章を授与される。勝利は我らのものだ！|作戦終了
Trigger3Condition_Condition1AreaLabel=脱出地点へ到達せよ
Objective_EscapeArea=当該海域から脱出せよ
Objective_Changzheng4MustSurvive=長征4号を生存させよ
[Language_en]
Name=PLAN 03 - Operation Silent Spear (1985)
Description=While on an intelligence gathering mission off Okinawa, one of our Type 091 submarines was detected by the Japanese. Use every capability at your disposal to evade their ASW net and escape the area.
Taskforce1StartMessage=OPERATION\nSILENT SPEAR (1985)|Our Type 091 submarine has approached very close to Okinawa on an intelligence gathering mission, but we were detected briefly by the Japanese and their ASW net is closing in on us.\n\nWe must reach the marked area on the map to escape. An enemy surface force is approaching, and we previously detected at least one submarine nearby. JMSDF air out of Kadena AFB may also be tasked to locate us.\n\nChangzheng 4 must survive.|Start mission
Taskforce1Changzheng4mustsurviveMessage=DEFEAT|FM CMDR North Sea Fleet\nTO CMDR Northern Theater Command\n\n1. Submarine 404 has missed two scheduled check-ins.\n\n2. Radio intercepts from Okinawa/Miyako area show large ASW operation underway by JMSDF with multiple reports of depth charging and sinking an unknown submarine.\n\n3. We assess that Submarine 404 is lost in action with all hands sunk by JMSDF.|Exit mission
Taskforce1Reachareatoescape-playervictoryMessage=VICTORY|FM CMDR North Sea Fleet\nTO CMDR Northern Theater Command\n\n1. Submarine 404 has successfully reported in during pre-set check-in time.\n\n2. 404 reports it was attacked by JMSDF units but successfully escaped the area with intelligence data also transmitted with its report.\n\n3. Radio intercepts from Okinawa/Miyako area show large-scale ASW hunt by JMSDF, without success.\n\n4. Commander of Submarine 404 will be decorated for valor on return to Shandong. Victory is ours!|Exit mission
Trigger3Condition_Condition1AreaLabel=Reach this area to escape
Objective_EscapeArea=Escape the area
Objective_Changzheng4MustSurvive=Changzheng 4 must survive
[Language_cn]
Name=无声之矛行动（1985）
Description=我方的一艘091型潜艇在冲绳附近执行情报收集任务时被日本人发现了。尽你所能避开他们的反潜网，撤离此区域。
Taskforce1StartMessage=无声之矛行动\n1985|我方的一艘091型潜艇在执行情报收集任务时极度靠近冲绳，短暂地暴露在了日本人眼皮之下，现在他们的反潜网正向我方靠近。\n\n我们必须抵达地图上标记的区域才能撤离。敌方水面部队正在靠近，我们之前在附近发现了至少一艘潜艇。从嘉手纳航空基地起飞的日本海上自卫队飞机也可能前来协助搜索。\n\n长征4号不能被击沉。|开始任务
Taskforce1Changzheng4mustsurviveMessage=任务失败！|发件：北海舰队司令\n收件：海军总部\n\n1.404号潜艇已经2次未在预定的汇报时间发送报告。\n\n2.从冲绳/宫古区域截获的无线电显示日本海上自卫队正在进行大规模反潜行动， 他们的报告中提及多次投掷深水炸弹并击沉一艘潜艇。\n\n3.我们评估404号潜艇已在行动中被日本海上自卫队击沉且艇上全员阵亡。|退出任务
Taskforce1Reachareatoescape-playervictoryMessage=任务完成！|发件：北海舰队司令\n收件：海军总部\n\n1.404号潜艇成功在预定的汇报时间发送了报告。\n\n2.404号潜艇报告称遭到日本海上自卫队的攻击但已成功撤离此区域，并且随报告发回了情报数据。\n\n3.从冲绳/宫古区域截获的无线电显示日本海上自卫队正在进行大规模反潜行动，但他们一无所获。\n\n4.我们取得了胜利！英勇的404号潜艇指挥官将在返回山东时受到嘉奖。|退出任务
Trigger3Condition_Condition1AreaLabel=到达此区域以撤离
Objective_EscapeArea=撤离此区域
Objective_Changzheng4MustSurvive=长征4号不能被击沉
[Language_ru]
Name=PLAN 03 - Operation Silent Spear (1985)
[Language_de]
Name=PLAN 03 - Operation Silent Spear (1985)
Description=Während einer Operation vor Okinawa für den Nachrichtendienst wurde eines unserer U-Boote Typ 091 von den Japanern entdeckt. Setzen Sie alle Ihnen zur Verfügung stehenden Mittel ein, um dem von den Japanern errichteten Netz zur U-Jagd zu entkommen und das Einsatzgebiet zu verlassen.
Taskforce1StartMessage=OPERATION\nSILENT SPEAR (1985)|Unser U-Boot Typ 091 ist im Rahmen einer Operation für den Nachrichtendienst zu nahe an Okinawa herangekommen und wurde kurzzeitig von den Japanern entdeckt. Das Abwehrnetz der Japaner zieht sich nun langsam zusammen.\n\nWir müssen den auf der Karte markierten Bereich erreichen, um zu entkommen. Ein feindlicher Kampfverband nähert sich und zuvor wurde mindestens ein U-Boot in der Nähe geortet. JMSDF-Luftstreitkräfte vom Stützpunkt Kadena könnten ebenfalls mit der Suche nach unserem U-Boot beauftragt werden.\n\nDie Changzheng 4 muss überleben.|Mission Starten
Taskforce1Changzheng4mustsurviveMessage=NIEDERLAGE|VON KDT Nrdflotte\nAN KDT Northern Theater Command\n\n1. Das U-Boot 404 hat zwei planmäßige Meldungen verpasst.\n\n2. Die Funkaufklärung aus dem Raum Okinawa/Miyako weist auf eine großangelegte U-Jagd-Operation der JMSDF hin, mit mehreren Meldungen über Wasserbombeneinsätze und die Versenkung eines unbekannten U-Bootes.\n\n3. Wir gehen davon aus, dass U-Boot 404 im Gefecht durch die JMSDF mit der gesamten Besatzung versenkt worden ist.|Mission Beenden
Taskforce1Reachareatoescape-playervictoryMessage=SIEG|VON KDT Nordflotte\nAN KDT Northern Theater Command\n\n1. Das U-Boot 404 hat sich planmäßig gemeldet.\n\n2. 404 berichtet, von Einheiten der JMSDF angegriffen, jedoch erfolgreich entkommen zu sein. Die Aufklärungsdaten wurden mit der Meldung übermittelt.\n\n3. Die Funkaufklärung aus dem Raum Okinawa/Miyako weist auf eine großangelegte U-Jagd der JMSDF hin, bislang jedoch ohne Erfolg.\n\n4. Der Kommandant von U-Boot 404 wird nach seiner der Rückkehr nach Shandong für seine Tapferkeit ausgezeichnet. Der Sieg ist unser!|Mission Beenden
Trigger3Condition_Condition1AreaLabel=Dieses Gebiet erreichen um zu entkommen
Objective_EscapeArea=Entkommen Sie aus dem Gebiet
Objective_Changzheng4MustSurvive=Die Changzheng 4 muss überleben
