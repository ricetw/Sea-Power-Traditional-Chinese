[Language_ja]
Name=突破作戦
Description=ソ連空母、ジブラルタル海峡突破を試む。

Objective_ReachArea=「オリョール」を指定海域へ到達させよ
Objective_ProtectOrel=「オリョール」を死守せよ
Objective_DestroyAirfield=ジブラルタル航空基地の破壊（秘匿目標）
Objective_DestroyDocks=ジブラルタルドックの破壊（秘匿目標）

Taskforce1VictoryMessage=勝利！|指揮官、おめでとう。勝利を収めた！
Taskforce1DefeatMessage=敗北|指揮官、作戦目標の達成に失敗した。

Taskforce1StartMessage=<size=40>突破作戦</size>|指揮官、任務は大西洋への進出である。ジブラルタルに展開するNATO軍の突破は、決して容易な任務ではないことを覚悟せよ。\n\n海峡を無事に通過するには、海軍基地と航空基地の双方を無力化する必要があるだろう。|了解、進撃を開始する
Taskforce2StartMessage=<size=40>警告！</size>|このミッションはNATO側でのプレイを想定していない。|了解、残念だ、ソ連贔屓め！！11

OrelInAtlanticsMessage=<size=40>勝利！</size>|よくやった、指揮官！地中海からの脱出に成功した！|ソビエト連邦に尽くします！|ウラー！
OrelSunkMessage=<size=40>敗北！</size>|指揮官、貴殿は失敗し、我々の最も貴重な艦の一隻を喪失させた。これは完全な敗北である。

DockDestroyedMessage=<size=40>海軍基地破壊！</size>|よくやった、指揮官！もはやあのドックから哨戒艦が出ることはない。
AirfieldDestroyedMessage=<size=40>航空基地破壊！</size>|よくやった、指揮官！もはやあの航空基地から航空機が出ることはない。

DaphneDestroyedMessage=<size=40>致命的失策！</size>|フランス潜水艦を沈めるとは「いい仕事」をしてくれたな、<color={*}ad190e>水兵</color>！これでフランスは確実にNATO側で参戦するだろう。貴殿のせいで、我々全員にとって戦争はより困難なものとなった。解任に備えておけ。

WeatherIntel=気象情報：快晴、弱風（西）。降水なし。
WeatherForecast=快晴、弱風（西）。降水なし。
GibraltarOnAlertIntel=ジブラルタルの情報協力者によると、現地の航空基地に警戒態勢が敷かれた。攻撃機の離陸も確認されている。我々の部隊が探知された可能性が高く、間もなく攻撃を受けるだろう。
SubmarineIntel=情報によれば、当該海域に敵潜水艦が存在する可能性がある。警戒して進め。
[Language_en]
