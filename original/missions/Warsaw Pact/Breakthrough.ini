AirfieldDestroyedMessage=<size=40>Air base destroyed!</size>|Good job, commander! No more aircraft from that airbase!

DaphneDestroyedMessage=<size=40>Fatal mistake!</size>|"Good job" sinking French submarine, \n<color={*}ad190e>seaman</color>! Now France will surely join war on the NATO side. You've just made war more difficult for all of us. Get ready for discharge.

WeatherIntel=Weather forecast for today: Clear, light west wind. No rain.
WeatherForecast=Clear, light west wind. No rain.
GibraltarOnAlertIntel=One of our informants in Gibraltar reports that local airbase is on alert now. Attack planes been seen taking off from it. Most likely your force was detected and will be under attack soon.
