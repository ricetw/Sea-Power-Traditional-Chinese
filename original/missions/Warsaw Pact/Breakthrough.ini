Objective_DestroyDocks=Détruire le port de Gibraltar (Caché)

Taskforce1VictoryMessage=Victoire!|Félicitations, Commandant ! Vous avez gagné !
Taskforce1DefeatMessage=Défaite|Vous n’avez pas réussi à atteindre les objectifs de la mission, commandant.

Taskforce1StartMessage=<size=40>Passage en force</size>|Commandant, votre mission est de pénétrer dans l'Atlantique. Attention : percer les forces de l'OTAN à Gibraltar ne sera pas chose aisée. Vous devrez peut-être neutraliser la base navale et l'aérodrome pour franchir le détroit de Gibraltar.|Continuer
Taskforce2StartMessage=<size=40>Attention !</size>|Cette mission n'est pas conçue pour jouer le rôle de l'OTAN|Ok, dommage

OrelInAtlanticsMessage=<size=40>Victoire !</size>|Bravo, commandant ! Vous avez réussi à sortir de la Méditerranée ! | Je sers l'Union soviétique !|Hourah !
OrelSunkMessage=<size=40>Défaite !</size>|Vous avez échoué, commandant, et perdu l'un de nos navires les plus précieux. C'est une défaite totale.

DockDestroyedMessage=<size=40>Base navale détruite !</size>|Bravo, commandant ! Plus de patrouilleurs dans ce port !
AirfieldDestroyedMessage=<size=40>Base aérienne détruite !</size>|Bravo, commandant ! Plus d'avions sur cette base !

DaphneDestroyedMessage=<size=40>Erreur fatale !</size>|« Bravo ! » Vous avez coulé un sous-marin français, \n<color={*}ad190e>matelot</color> ! La France va certainement rejoindre l'OTAN en guerre. Vous venez de rendre la guerre plus difficile pour nous tous. Préparez-vous à être démis de vos fonctions.

WeatherIntel=Prévisions météo pour aujourd'hui : ciel dégagé, vent d'ouest léger. Pas de pluie.
WeatherForecast=Ciel dégagé, vent d'ouest léger. Pas de pluie.
GibraltarOnAlertIntel=Un de nos informateurs à Gibraltar rapporte que la base aérienne locale est actuellement en état d'alerte. Des avions d'attaque ont été aperçus en train d'en décoller. Vos forces ont probablement été repérées et seront bientôt attaquées.
SubmarineIntel=Les renseignements signalent la présence possible d'un sous-marin ennemi dans la zone. Soyez prudent.

[Language_de]
Name=Durchbruch
