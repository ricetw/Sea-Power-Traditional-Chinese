[Language_ja]
Name=ポラー・フューリー作戦 (1985)
Description=アイオワ水上打撃群（SAG）は、ナルヴィクで窮地に立たされているNATO軍を支援すべく北東へ進撃中である。ソ連最高峰の潜水艦指揮官である貴官に対し、当該海域の潜水艦隊を指揮し、アイオワとその護衛艦艇を撃沈せよとの命令が下った。

Taskforce1StartMessage=ポラー・フューリー作戦|ナルヴィクのNATO軍は追い詰められており、戦艦アイオワが支援のため北上を開始した。地上に展開する我が軍の余力は尽きかけており、アイオワのナルヴィク到達阻止は至上命題である。司令部は潜水艦隊を調整し、アイオワを撃破せよとの命令を下した。\n\nトロンハイムおよびボードーからの敵航空支援が予想される。また、当該海域は民間船の往来が激しい。\n\nK-527は必ず生還せよ。|作戦開始

Taskforce1K-527mustsurviveMessage=敗北|発：赤旗勲章授章北方艦隊司令部\n宛：モスクワ、参謀本部\n\n1. 潜水艦K-527との通信が途絶。当該艦は撃沈されたものと判断する。\n\n2. 同艦は1月29日に探知され、ナルヴィクへ向かっていた米海軍ミズーリ級戦艦とその護衛艦艇の撃破を任務としていた。\n\n3. この損失に鑑み、司令部は潜水艦のみでの当該ユニット撃破は不可能と判断。船団阻止任務に就いていた重要戦力である海軍航空隊の長距離爆撃機隊を、当該戦艦部隊への攻撃に転用する。\n\n4. これは最高レベルの失策である。北方艦隊潜水艦隊司令官はKGBにより拘束された。2月3日にモスクワにて審問が行われる予定である。|任務終了

Taskforce1DestroyIowaSAGMessage=勝利|発：赤旗勲章授章北方艦隊司令部\n宛：モスクワ、参謀本部\n\n1. 潜水艦K-527より、ノルウェー沖にて米海軍ミズーリ級戦艦を雷撃、撃沈せりとの報告あり。\n\n2. 当該米部隊は、ナルヴィクで交戦中のNATO軍を救援すべく進撃中であった。\n\n3. ナルヴィクの我が地上軍は、NATO軍部隊より大隊規模の降伏を受け入れたとの報告を上げている。捕虜の供述によれば、戦艦沈没の報を受けNATO軍の士気は崩壊したとのことである。\n\n4. 我が海軍部隊は洋上において輝かしい勝利を収め、地上の同志らを援護した。勝利は我らのものである！\n\n<size=16>潜水艦が熟練レベルに到達：\n\nK-527：<color=Green>ベテラン</color></size>|任務終了

Taskforce1SSKwarningMessage=VLF通信|発：北方艦隊司令部\n宛：K-527\n\n1. 警告。貴官の活動海域付近にて、ノルウェー海軍SSKの通信を傍受した。\n\n2. 司令部は、ノルウェーのSSKが米艦隊の直衛任務に就いている可能性が高いと判断する。\n\n3. 警戒を厳にせよ。必要であれば当該SSKを排除せよ。幸運を祈る。|了解、任務を継続する

Taskforce1SSKwarningIntel=警告：ノルウェー海軍のディーゼル潜水艦による無線通信が傍受された。ノルウェーのSSKが米艦隊の直衛を試みている可能性がある。

Objective_DestroyIowaSAG=アイオワ水上打撃群の撃破
Objective_K527MustSurvive=K-527の生存
[Language_en]
Name=Operation Polar Fury (1985)
Description=The Iowa SAG is moving northeast in an attempt to support NATO forces embattled at Narvik. As the Soviet Union's finest commander of submarines, you have been ordered south to take command of our submarines in the area and sink the Iowa and its escorts.
Taskforce1StartMessage=OPERATION\nPOLAR FURY|NATO forces are embattled at Narvik, and the battleship Iowa has been sent north to support. With Soviet forces ashore on their last leg, it is imperative the Iowa does not reach Narvik. Command has ordered your submarine force to coordinate and sink the Iowa.\n\nEnemy air support out of Trondheim and Bodo should be expected, and there is heavy civilian traffic in the area.\n\nK-527 must survive.|Start mission
Taskforce1K-527mustsurviveMessage=DEFEAT|FM HQ RED BANNER NORTHERN FLEET\nTO GENERAL STAFF, MOSCOW\n\n1. We have lost contact with submarine K-527 and assess it is destroyed.\n\n2. This submarine was tasked with sinking the American Missouri-class battleship and its escorts, detected heading to Narvik 29 January.\n\n3. Given this loss, HQ assesses submarines will be unable to sink these units alone. We are reallocating critical Naval Aviation long-range bomber forces from convoy interdiction to attack this battleship unit instead.\n\n4. This is a failure of the highest order. Commander Northern Fleet Submarines has been arrested by the KGB and will be debriefed 03 February in Moscow.|Exit mission
Taskforce1DestroyIowaSAGMessage=VICTORY|FM HQ RED BANNER NORTHERN FLEET\nTO GENERAL STAFF, MOSCOW\n\n1. Submarine K-527 reports his force torpedoed and sunk American battleship of Missouri-class off Norwegian coast.\n\n2. This American force was moving towards Narvik attempting to relieve NATO forces engaged in combat there.\n\n3. Our troops at Narvik report accepting Battalion-level surrenders from NATO units ashore. Interrogations of NATO forces report loss of morale following news of battleship sinking.\n\n4. Our naval forces have won a great victory at sea in support of their Comrades ashore. Victory is ours!\n\n<size=16>A submarine has gained a proficiency level:\n\nK-527: <color=Green>Veterans</color></size>|Exit mission
Taskforce1SSKwarningMessage=VLF MESSAGE|FM HQ NORTHERN FLEET\nTO K-527\n\n1. WARNING NORWAY SSK TRANSMISSION INTERCEPTED NEAR YOUR AREA.\n\n2. HQ ASSESSES LIKELY PRESENCE OF NORWAY SSK SCREENING FOR AMERICANS.\n\n3. PROCEED WITH CAUTION AND ELIMINATE NORWAY SSK IF NECESSARY. GOOD LUCK.|Acknowledge & continue
Taskforce1SSKwarningIntel=WARNING: Norwegian diesel submarine radio transmissions have been intercepted. Norwegian SSKs may be present attempting to screen for the Americans.
Objective_DestroyIowaSAG=Destroy the Iowa SAG
Objective_K527MustSurvive=K-527 must survive
[Language_cn]
Name=极地之怒（1985）
Description=艾奥瓦号水面行动群正在向东北方向移动，尝试支援被困在纳尔维克的北约部队。作为苏联最优秀的潜艇艇长，你收到命令指挥我方在此区域内的潜艇南下，击沉艾奥瓦号及其护航舰艇。
Taskforce1StartMessage=极地\n之怒|北约部队被困在纳尔维克，艾奥瓦号战列舰已被派往北方支援。由于我方即将完成登陆，因此不能让艾奥瓦号到达纳尔维克。指挥已命令你的潜艇部队协同击沉艾奥瓦号。\n\n预计敌军将从特隆赫姆和博德派出空中支援，且此区域内民用航线密集。\n\nK-527号不能被击沉。|开始任务
Taskforce1K-527mustsurviveMessage=任务失败！|发件：北方舰队总部\n收件：莫斯科总参谋部\n\n1.我们已与K-527号潜艇失去联系，根据评估此潜艇已被摧毁。\n\n2.此潜艇的任务是击沉我们在1月29日发现的美军艾奥瓦级战列舰及其护航舰艇，当时它正驶向纳尔维克。\n\n3.鉴于此次损失，总部评估潜艇不足以独立击沉这些单位。我们将从拦截护航队任务中抽调关键的海军航空兵远程轰炸机部队以攻击此战列舰编队。\n\n4.这是一次极为严重的失败，北方舰队潜艇部队司令已被国家安全委员会逮捕，并将于2月3日在莫斯科接受讯问。|退出任务
Taskforce1DestroyIowaSAGMessage=任务完成！|发件：北方舰队总部\n收件：莫斯科总参谋部\n\n1.K-527号潜艇报告其部队在挪威海岸附近用鱼雷击沉了美军的一艘艾奥瓦级战列舰。\n\n2.此美军舰队正向纳尔维克方向行驶，尝试救援在当地交战的北约部队。\n\n3.我方在纳尔维克的部队报告称他们接受了营级北约部队的投降。对北约部队的审讯显示敌军在失去战列舰后士气低落。\n\n4.我方海军在海上取得了重大胜利，支援了岸上的同志们。胜利属于我们！\n\n<size=16>一艘潜艇达到了新的专业水准：\n\nK-527号：<color=Green>老练</color></size>|退出任务
Taskforce1SSKwarningMessage=甚低频消息|发件：北方舰队总部\n收件：K-527号潜艇\n\n1.提示：我们在你附近截获了挪威柴电潜艇的通信 。\n\n2.总部评估它们很可能会出现并为美军提供掩护。\n\n3.谨慎行事，必要时消灭挪威柴电潜艇。祝你好运。|收到并继续
Taskforce1SSKwarningIntel=提示：我们截获了挪威柴电潜艇的无线电通信，它们很可能会出现并为美军提供掩护。
Objective_DestroyIowaSAG=消灭艾奥瓦号水面行动群
Objective_K527MustSurvive=K-527号不能被击沉
[Language_ru]
Name=Operation Polar Fury 1985
[Language_de]
Name=Operation Polar Fury (1985)
Description=Die Iowa-SAG verlegt nordostwärts mit dem Ziel, die bei Narvik kämpfenden NATO-Kräfte zu unterstützen. Als bester U-Boot-Kommandant der Sowjetunion wurden Sie nach Süden beordert, um das Kommando über unsere U-Boot-Kräfte im Einsatzraum zu übernehmen und die Iowa samt Sicherung zu versenken.
Taskforce1StartMessage=OPERATION\nPOLAR FURY|NATO-Kräfte sind bei Narvik im Gefecht und das Schlachtschiff Iowa wurde zur Unterstützung nach Norden entsandt. Da sich sowjetische Kräfte an Land in der entscheidenden Phase befinden, ist es zwingend erforderlich, dass die Iowa Narvik nicht erreicht. Das Oberkommando hat Ihre U-Boot-Kräfte angewiesen, koordiniert vorzugehen und die Iowa zu versenken.\n\nMit feindlicher Luftunterstützung aus Trondheim und Bodø ist zu rechnen. Zudem herrscht starker ziviler Schiffsverkehr im Einsatzraum.\n\nK-527 muss überleben.|Mission starten
Taskforce1K-527mustsurviveMessage=NIEDERLAGE|FM HQ ROTBANNER-NORDFLOTTE\nAN GENERALSTAB, MOSKAU\n\n1. Der Kontakt zum U-Boot K-527 ist abgerissen. Es wird davon ausgegangen, dass es zerstört wurde.\n\n2. Dieses U-Boot hatte den Auftrag, das amerikanische Schlachtschiff der MISSOURI-Klasse sowie dessen Sicherung zu versenken, die am 29. Januar auf Narvik zuliefen.\n\n3. Aufgrund dieses Verlustes bewertet das HQ, dass die verbliebenen U-Boot-Kräfte allein nicht in der Lage sind, diese Einheiten zu vernichten. Kritische Kräfte der Marineflieger mit Langstreckenbombern werden daher von der Konvoiunterbrechung abgezogen und stattdessen gegen diese Kampfgruppe eingesetzt.\n\n4. Dies stellt ein Versagen auf höchster Ebene dar. Der Kommandeur der U-Boot-Streitkräfte der Nordflotte wurde durch den KGB verhaftet und wird am 03. Februar in Moskau verhört.|Mission beenden
Taskforce1DestroyIowaSAGMessage=SIEG|FM HQ ROTBANNER-NORDFLOTTE\nAN GENERALSTAB, MOSKAU\n\n1. U-Boot K-527 meldet, dass seine Kräfte ein amerikanisches Schlachtschiff der MISSOURI-Klasse vor der norwegischen Küste torpediert und versenkt haben.\n\n2. Diese amerikanische Streitmacht befand sich auf dem Marsch nach Narvik mit dem Ziel, dort eingesetzte NATO-Kräfte zu entlasten.\n\n3. Unsere Truppen bei Narvik melden die Annahme von Kapitulationen auf Bataillonsebene durch NATO-Einheiten an Land. Vernehmungen von NATO-Kräften berichten von massivem Moralverlust nach Bekanntwerden der Versenkung des Schlachtschiffs.\n\n4. Unsere Seestreitkräfte haben einen großen Sieg zur Unterstützung ihrer Genossen an Land errungen. Der Sieg ist unser!\n\n<size=16>Ein U-Boot hat an Erfahrung gewonnen:\n\nK-527: <color=Green>Veteran</color></size>|Mission beenden
Taskforce1SSKwarningMessage=VLF-MELDUNG|FM HQ NORDFLOTTE\nAN K-527\n\n1. WARNUNG: FUNKÜBERTRAGUNG EINES NORWEGISCHEN SSK IN IHREM EINSATZRAUM AUFGEFASST.\n\n2. HQ BEWERTET DIE WAHRSCHEINLICHE ANWESENHEIT NORWEGISCHER SSK ZUR SICHERUNG DER AMERIKANER.\n\n3. MIT VORSICHT VORGEHEN UND NORWEGISCHES SSK BEI BEDARF AUSSCHALTEN. VIEL GLÜCK.|Bestätigen & fortfahren
Taskforce1SSKwarningIntel=WARNUNG: Funkübertragungen norwegischer diesel-elektrischer U-Boote wurden aufgefasst. Norwegische SSK könnten im Einsatzraum operieren, um amerikanische Kräfte zu sichern.
Objective_DestroyIowaSAG=Iowa-SAG vernichten
Objective_K527MustSurvive=K-527 muss überleben
[Language_es]
Name=Operation Polar Fury 1985
[Language_fr]
Name=Opération Fureur polaire (1985)
Description=Le SAG Iowa se déplace vers le nord-est afin de venir en aide aux forces de l'OTAN engagées dans les combats à Narvik. En tant que meilleur commandant de sous-marins de l'Union soviétique, vous avez reçu l'ordre de vous diriger vers le sud pour prendre le commandement de nos sous-marins dans la région et couler l'Iowa et ses escorteurs.
Taskforce1StartMessage=OPERATION\nFUREUR POLAIRE|Les forces de l'OTAN sont engagées dans des combats à Narvik, et le cuirassé Iowa a été envoyé au nord pour leur prêter main-forte. Les forces soviétiques débarquées étant à bout de souffle, il est impératif que l'Iowa n'atteigne pas Narvik. Le commandement a ordonné à votre force sous-marine de coordonner ses efforts et de couler l'Iowa. Il faut s'attendre à un soutien aérien ennemi depuis Trondheim et Bodo, et le trafic civil est intense dans la région. Le K-527 doit survivre.|Commencer la mission
Taskforce1K-527mustsurviveMessage=DEFAITE|DE QG FLOTTE DU NORD BANNIERE ROUGE\nA POLITBURO, MOSCOU\n\n1. Nous avons perdu le contact avec le sous-marin K-527 et estimons qu'il a été détruit.\n\n2. Ce sous-marin avait pour mission de couler le cuirassé américain de classe Missouri et ses escortes, repérés alors qu'ils se dirigeaient vers Narvik le 29 janvier.\n\n3. Compte tenu de cette perte, le QG estime que les sous-marins ne seront pas en mesure de couler ces unités à eux seuls. Nous réaffectons les forces critiques de bombardiers à longue portée de l'aviation navale, qui étaient chargées d'intercepter les convois, pour attaquer cette unité de cuirassés à la place.\n\n4. Il s'agit d'un échec de la plus haute importance. Le commandant des sous-marins de la flotte du Nord a été arrêté par le KGB et sera interrogé le 3 février à Moscou.|Quitter la mission
Taskforce1DestroyIowaSAGMessage=VICTOIRE|DE QG FLOTTE DU NORD BANNIERE ROUGE\nA POLITBURO, MOSCOU\n\n1. Le sous-marin K-527 signale que ses forces ont torpillé et coulé un cuirassé américain de classe Missouri au large des côtes norvégiennes.\n\n2. Ces forces américaines se dirigeaient vers Narvik pour tenter de soulager les forces de l'OTAN engagées dans les combats dans cette région.\n\n3. Nos troupes à Narvik signalent avoir accepté la reddition de bataillons de l'OTAN à terre. Les interrogatoires des forces de l'OTAN font état d'une baisse du moral suite à l'annonce du naufrage du cuirassé.\n\n4. Nos forces navales ont remporté une grande victoire en mer pour soutenir leurs camarades à terre. La victoire est à nous !\n\n<size=16>Un sous-marin a gagné un niveau de compétence :\n\nK-527 : <color=Green>Vétérans</color></size>|Quitter la mission
Taskforce1SSKwarningMessage=MESSAGE VLF|DE QG FLOTTE DU NORD\nA K-527\n\n1. ATTENTION : TRANSMISSION D'UN SSK NORVÉGIEN INTERCEPTÉE PRÈS DE VOTRE ZONE.\n\n2. LE QG ÉVALUE LA PRÉSENCE PROBABLE D'UN SSK NORVÉGIEN À LA RECHERCHE D'AMÉRICAINS.\n\n3. PROCÉDEZ AVEC PRUDENCE ET ÉLIMINEZ LE SSK NORVÉGIEN SI NÉCESSAIRE. BONNE CHANCE.|Accuser réception et continuer
Taskforce1SSKwarningIntel=ATTENTION : des transmissions radio provenant de sous-marins diesel norvégiens ont été interceptées. Des SSK norvégiens pourraient être présents afin de surveiller les Américains.
Objective_DestroyIowaSAG=Détruire le SAG Iowa
Objective_K527MustSurvive=Le K-527 doit survivre
[Language_ko]
Name=폴라 퓨리 작전 (1985)
Description=아이오와 해상전단은 나르비크에서 교전 중인 NATO군을 지원하기 위해 북동쪽으로 이동하고 있습니다. 소련 최고의 잠수함 지휘관으로서, 당신은 이 지역에서 우리 잠수함을 지휘하고 아이오와와 그 호위함을 침몰시키라는 명령을 받았습니다.
Taskforce1StartMessage=폴라 퓨리\n작전|나토군은 나르비크에서 전투를 벌이고 있으며, 전함 아이오와호는 북쪽으로 파견되어 지원을 받고 있습니다. 소련군이 마지막으로 상륙했기 때문에 아이오와가 나르비크에 도달하지 않는 것이 필수적입니다. 사령부는 당신의 잠수함 부대에게 아이오와를 조정하고 침몰시키라고 명령했습니다.\n\n트론헤임과 보도에서 적의 공중 지원이 예상되어야 하며, 이 지역에는 민간인의 통행이 활발합니다.\n\nK-527은 반드시 생존시킬것.|임무 시작
Taskforce1K-527mustsurviveMessage=패배|발신: 적기북부함대\n수신: GENERAL STAFF, MOSCOW\n\n1. 잠수함 K-527과의 연락이 끊겼으며, 파괴되었다고 평가합니다.\n\n2. 이 잠수함은 1월 29일 나르빅으로 향하던 미국 아이오와급 전함과 호위함을 침몰시키는 임무를 맡았습니다.\n\n3. 이 손실을 감안할 때, 본부는 잠수함이 단독으로 이 부대들을 침몰시킬 수 없을 것이라고 평가합니다. 우리는 이 전함 부대를 공격하기 위해 중요한 해군 장거리 폭격기 부대를 호송 교차로에서 재배치하고 있습니다.\n\n4. 이것은 최고 수준의 실패입니다. 북부함대 잠수함 사령관이 KGB에 의해 체포되었으며, 2월 3일 모스크바에서 브리핑을 받을 예정입니다.|임무 종료
Taskforce1DestroyIowaSAGMessage=승리|발신: 북해함대 사령관\n수신: GENERAL STAFF, MOSCOW\n\n1. 잠수함 K-527은 그의 부대가 노르웨이 해안에서 아이오와급 미국 전함을 어뢰로 격침시켰다고 보고합니다.\n\n2. 이 미군은 그곳에서 전투에 참여한 나토군을 구출하기 위해 나르비크 쪽으로 이동하고 있었다.\n\n3. 나르비크에 있는 우리 군대는 나토 부대의 대대급 항복을 육지로 받아들인다고 보고합니다. 나토군에 대한 심문에서 전함 침몰 소식 이후 사기가 떨어졌다고 보고합니다.\n\n4. 우리 해군은 상륙한 전우들을 지원하여 해상에서 큰 승리를 거두었습니다. 승리는 우리의 것입니다!\n\n<size=16>잠수함 숙련도 획득:\n\nK-527: <color=Green>베테랑</color></size>|임무 종료
Taskforce1SSKwarningMessage=VLF 메세지|발신: 북부함대\n수신: K-527\n\n1. 경고: 노르웨이 SSK 전송이 귀하의 지역 근처에서 차단되었습니다. \n\n2. 본부는 미국인을 대상으로 노르웨이 SSK 검진의 존재 가능성을 평가합니다.\n\n3. 조심해서 진행하고 필요하다면 노르웨이산 SSK를 제거하세요. 행운을 빕니다.|확인됨 & 계속
