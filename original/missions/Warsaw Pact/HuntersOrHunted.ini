[Language_ja]
Name=狩る者か、狩られる者か
Description=北方艦隊がバレンツ海にて米軍の攻撃型原子力潜水艦（SSN）を探知した。司令部は貴殿の対潜分遣隊に対し、目標の捕捉および撃破を命じた。不測の事態など、起こり得ようか？

Taskforce1StartmessageMessage=狩る者か、狩られる者か|司令部は貴殿の分遣隊に対し、ムルマンスク北方にて米軍の攻撃型潜水艦を捕捉・撃破することを命じた。 \n\n第745対潜ヘリコプター連隊のKa-25が捜索支援のため北上中である。同機は長距離の進出を要するため、ソノブイのみを搭載している。警戒せよ――相手は危険な強敵だ！|作戦開始

Taskforce1Sturgeondestroyed-playervictoryMessage=勝利|敵潜水艦を撃沈。見事だ、指揮官！
Taskforce1Playershipsdestroyed-playerdefeatMessage=敗北|敗北だ！米軍を前に、我が方の艦は一隻も生き残れなかった。次回の健闘を祈る。|任務終了
Taskforce2Playershipsdestroyed-playerdefeatMessage=勝利|「狩人」を自称する連中をすべて沈めた。よくやった！

Objective_DestroySub=米潜水艦の撃沈
Objective_OnePlayerMustSurvive=少なくとも1隻の生還
[Language_en]
Name=Hunters or Hunted?
Description=The Northern Fleet has detected an American SSN in the Barents sea. Command has ordered your ASW flotilla to locate and destroy it. What can possibly go wrong?
Taskforce1StartmessageMessage=HUNTERS OR HUNTED?|Command has ordered your flotilla to locate and destroy an American attack submarine north of Murmansk.\n\nKa-25 of 745th PLAVP is moving north to support your search. Due to the long distance required to join you, he is loaded out with sonobuoys only. Beware - this is a dangerous enemy!|Start mission
Taskforce1Sturgeondestroyed-playervictoryMessage=VICTORY|Enemy submarine sunk. Good job commander!
Taskforce1Playershipsdestroyed-playerdefeatMessage=DEFEAT|Defeat! None of your ships have survived against this American. Better luck next time!|Exit mission
Taskforce2Playershipsdestroyed-playerdefeatMessage=VICTORY|All your would be hunters have been sunk. good job!
Objective_DestroySub=Sink the American submarine
Objective_OnePlayerMustSurvive=At least one ship must survive
[Language_cn]
Name=猎人还是猎物？
Description=北方舰队在巴伦支海发现了美国的攻击型核潜艇。指挥官命令你的反潜舰队找到并摧毁它。有什么可能出问题呢？
Taskforce1StartmessageMessage=猎人还是猎物？|指挥官命令你找到并摧毁摩尔曼斯克以北的一艘美国攻击型潜艇。\n\n第745反潜直升机航空团的卡-25正在向北航行，支援你搜索，但由于距离遥远，此直升机仅携带声呐浮标。注意——这是个危险的敌人！|开始任务
Taskforce1Sturgeondestroyed-playervictoryMessage=任务完成！|敌方潜艇被击沉了。干得好，指挥官！
Taskforce1Playershipsdestroyed-playerdefeatMessage=任务失败！|你失败了！你的所有船只都被这艘美国潜艇击沉。下次好运！|退出任务
Taskforce2Playershipsdestroyed-playerdefeatMessage=任务完成！|所有前来猎杀你的船只都被击沉了。干得好！
Objective_DestroySub=击沉美国潜艇
Objective_OnePlayerMustSurvive=你至少有一艘船只不被击沉
[Language_ru]
Name=Охотники, или жертвы?
Description=Три советских противолодочных корабля против одной подводной лодки. Что может пойти не так?
Taskforce1StartmessageMessage=Боевая задача|Вы должны перехватить и уничтожить американскую подводную лодку прямо по Вашему курсу. Имейте в виду – это грозный противник.|Понятно
Taskforce1Sturgeondestroyed-playervictoryMessage=Победа!|Подлодка потоплена!
Taskforce1Playershipsdestroyed-playerdefeatMessage=Поражение|Все корабли потеряны.|Ок
Taskforce2Playershipsdestroyed-playerdefeatMessage=Победа!|Все три советских корабля потоплены|Ок
[Language_de]
Name=Jäger oder Gejagter?
Description=Die Nordflotte hat ein amerikanisches SSN in der Barentssee aufgeklärt. Das Oberkommando hat Ihrer U-Jagd-Flottille befohlen, dieses zu orten und zu vernichten. Was sollte dabei schon schiefgehen?
Taskforce1StartmessageMessage=JÄGER ODER GEJAGTER?|Das Oberkommando hat Ihrer Flottille befohlen, ein amerikanisches Jagd-U-Boot nördlich von Murmansk zu orten und zu zerstören.\n\nEine Ka-25 des 745. PLAVP verlegt zur Unterstützung Ihrer Suche nach Norden. Aufgrund der großen Distanz zum Einsatzraum ist sie ausschließlich mit Sonarbojen ausgerüstet. Vorsicht – es handelt sich um einen gefährlichen Gegner!|Mission starten
Taskforce1Sturgeondestroyed-playervictoryMessage=SIEG|Feindliches U-Boot versenkt. Gute Arbeit, Kommandant!
Taskforce1Playershipsdestroyed-playerdefeatMessage=NIEDERLAGE|Niederlage! Keines Ihrer Schiffe hat den Kampf gegen die Amerikaner überstanden. Mehr Glück beim nächsten Mal!|Mission beenden
Taskforce2Playershipsdestroyed-playerdefeatMessage=SIEG|Der Möchtegern-Jäger wurde versenkt. Gute Arbeit!
Objective_DestroySub=Amerikanisches U-Boot versenken
Objective_OnePlayerMustSurvive=Mindestens ein eigenes Schiff muss überleben
[Language_es]
Name=HuntersOrHunted
[Language_fr]
Name=Chasseurs ou chassés ?
Description=La Flotte du Nord a détecté un sous-marin nucléaire américain en mer de Barents. Le commandement a ordonné à votre flottille anti-sous-marine de le localiser et de le détruire. Pourrait-il y avoir un problème ?
Taskforce1StartmessageMessage=CHASSEURS OU CHASSES ?|Le commandement a ordonné à votre flottille de localiser et de détruire un sous-marin d'attaque américain au nord de Mourmansk.\n\nL'Il-38 du 145e PLAP se déplace vers le nord pour appuyer vos recherches. Attention, c'est un ennemi dangereux !|Lancer la mission
Taskforce1Sturgeondestroyed-playervictoryMessage=VICTOIRE|Sous-marin ennemi coulé. Bravo commandant !
Taskforce1Playershipsdestroyed-playerdefeatMessage=DEFAITE|Défaite ! Aucun de vos navires n'a survécu face à cet Américain. Vous aurez peut-être plus de chance la prochaine fois !|Quitter la mission
Taskforce2Playershipsdestroyed-playerdefeatMessage=VICTOIRE|Tous ceux qui devaient être vos prédateurs ont été coulés. Bon travail !
Objective_DestroySub=Couler le sous-marin américan
Objective_OnePlayerMustSurvive=Au moins un navire doit survivre
