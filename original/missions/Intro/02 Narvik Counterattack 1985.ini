[Language_ja]
Name=02 ナルヴィク反撃作戦 - ソビエト (1985)
Description=NATO軍がナルヴィクの我が方橋頭堡への攻撃を企図している。北方艦隊所属の駆逐艦2隻を指揮し、敵の攻撃を退けよ。
Taskforce1DestroyenemyforcesMessage=任務完了|勝利！\n\n全ての敵艦艇を撃破した。これによりナルヴィクの我が軍部隊はNATOの反撃から守られた。見事な手際だ、同志よ。|作戦終了
Taskforce1OneshipmustsurviveMessage=作戦失敗|敗北！貴官の全艦艇が撃破された！|作戦終了
Objective_DestroyEnemyForces=全敵艦艇の撃破
Objective_OneShipMustSurvive=少なくとも1隻の自艦の生存
[Language_en]
Name=02 Narvik Counterattack - Soviet (1985)
Description=NATO forces are attempting to attack our beachhead at Narvik. Command two Northern Fleet destroyers to repulse their attack.
Taskforce1DestroyenemyforcesMessage=MISSION ACCOMPLISHED|Victory!\n\nAll enemy ships have been destroyed, and our forces at Narvik are safe from this NATO counterattack. Excellent work, Comrade.|Exit mission
Taskforce1OneshipmustsurviveMessage=MISSION FAILED|Defeat! All of your ships have  been destroyed!|Exit mission
Objective_DestroyEnemyForces=Destroy all enemy ships
Objective_OneShipMustSurvive=At least one of your ships must survive
[Language_de]
Name=02 Gegenangriff bei Narvik - Sowjet (1985)
Description=NATO-Streitkräfte versuchen, unseren Brückenkopf bei Narvik anzugreifen. Übernehmen Sie das Kommando über zwei Zerstörer der Rotbanner-Nordflotte, um ihren Angriff abzuwehren.
Taskforce1DestroyenemyforcesMessage=MISSION ERFOLGREICH|Sieg!\n\nAlle feindlichen Schiffe wurden zerstört, und unsere Kräfte bei Narvik sind vor dem NATO-Gegenangriff sicher. Ausgezeichnete Arbeit, Genosse.|Mission beenden
Taskforce1OneshipmustsurviveMessage=MISSION FEHLGESCHLAGEN|Niederlage! Alle Ihre Schiffe wurden zerstört!|Mission beenden
Objective_DestroyEnemyForces=Zerstören Sie alle feindlichen Schiffe
Objective_OneShipMustSurvive=Mindestens eines Ihrer Schiffe muss überleben
[Language_cn]
Name=纳尔维克反击——苏联（1985）
Description=北约军队正在尝试攻击我方位于纳尔维克的滩头阵地。指挥北方舰队的两艘驱逐舰击退他们。
Taskforce1DestroyenemyforcesMessage=任务完成！|任务完成！\n\n所有敌方船只已被摧毁，我方位于纳尔维克的部队已不再受到北约反击的威胁。干得好，同志。|退出任务
Taskforce1OneshipmustsurviveMessage=任务失败！|任务失败！你的所有船只都已被摧毁！|退出任务
Objective_DestroyEnemyForces=摧毁所有敌方船只
Objective_OneShipMustSurvive=你至少有一艘船只不被击沉
