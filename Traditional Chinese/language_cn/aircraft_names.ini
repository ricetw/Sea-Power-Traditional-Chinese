DefaultDescription=QH-50 DASH（無人反潛直升機）旨在讓艦艇擁有遠程反潛武器，特別是那些小到無法容納機庫與直升機的艦艇。作為 FRAM 計畫的重要組成，QH-50 被分配給 Gearing 級驅逐艦等老式艦艇，也裝備於戰後遠洋護航艦。由於艦上操作可靠性不佳，故障率偏高，該直升機於 1973 年退役。海上自衛隊是 QH-50 唯一的外國使用者，因定期保養而操作較成功，後於 1977 年退役。QH-50D 是 QH-50C 的改良型，採用較大的 365 軸馬力引擎、玻璃纖維旋翼葉片，且沒有尾翼總成。
