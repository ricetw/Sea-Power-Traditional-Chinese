# ----------------- 誘餌 Decoys ----------------
usn_an_slq_25_nixie_decoy=AN/SLQ-25尼克西(AN/SLQ-25 Nixie),Nixie,誘餌,AN/SLQ-25尼克西是美國海軍水面艦使用的拖曳式聲學誘餌，產生訊號誘使來襲魚雷偏離母艦。

usn_moss=Mk-70 MOSS誘餌(MOSS MK-70),MK-70,誘餌,Mk 70 MOSS是10吋口徑的機動式潛艦模擬誘餌，用於將敵方聲納注意力從發射潛艦上轉移，可模擬潛艦自噪聲與主動聲納回波。

wp_mg-44=MG-44剛玉(MG-44 Korund),Korund,誘餌,MG-44剛玉是蘇聯第二代自推進水聲潛艦模擬器，可由潛艦400毫米專用發射管發射。
wp_mg-74=MG-74剛玉二型(MG-74 Korund-2),Korund-2,誘餌,MG-74 Korund-2是蘇聯第三代自航水聲潛艦模擬器。與早期MG-44不同，此型可由標準533毫米魚雷管發射，具備高度先進的噪音製造、欺敵發射或聲學干擾能力，也可由航空器投放。

