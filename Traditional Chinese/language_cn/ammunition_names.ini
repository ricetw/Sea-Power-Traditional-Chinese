[AmmunitionNames]
# ------------------ 空對空飛彈 AAM ------------------
it_aspide_1a=Aspide Mk.1A空對空飛彈(Aspide Mk.1A),,空對空飛彈,Aspide是義大利中程空對空飛彈，由美國Sparrow飛彈衍生而來。此型以AIM-7E為基礎，改用性能更佳的發動機以提高射程與速度，並配備大幅改良的單脈衝尋標器，可在低空發射且具備更好的電子反反制能力。
fr_super-530f=Super-530F飛彈(Super-530F),,半主動雷達導引空對空飛彈,Super-530F是法國半主動雷達導引短至中程空對空飛彈，性能定位大致接近AIM-7，屬於早期R530系列的升級型。
fr_r550=R550魔術1型(R550 Magic 1),Magic 1,空對空飛彈,R550 魔術1 是一款法國紅外線導引短程空對空飛彈，其性能可與美國的 AIM-9 相提並論。該飛彈僅能對後方目標進行鎖定，專為近距離格鬥設計，擁有良好的機動性。

pla_pl-2=霹靂-2A(PL-2A),,紅外線導引空對空飛彈,PL-2A是中國的紅外線導引空對空飛彈。採紅外線或影像紅外導引，僅支援後方攻擊，源自既有系統的仿製或授權生產。
pla_pl-2b=霹靂-2B(PL-2B),,紅外線導引空對空飛彈,PL-2B是中國的紅外線導引空對空飛彈。採紅外線或影像紅外導引，僅支援後方攻擊，相較前型有所改良。
pla_pl-5b=霹靂-5B(PL-5B),,紅外線導引空對空飛彈,PL-5B是中國的紅外線導引空對空飛彈。採紅外線或影像紅外導引，僅支援後方攻擊。
pla_pl-5c=霹靂-5C(PL-5C),,紅外線導引空對空飛彈,PL-5C是中國的紅外線導引空對空飛彈。採紅外線或影像紅外導引，可全向攻擊，相較前型有所改良，強化抗干擾或反反制能力。

usaf_aim-9e=AIM-9E響尾蛇(AIM-9E Sidewinder),Sidewinder,空對空飛彈,AIM-9E 響尾蛇是美國的紅外線導引空對空飛彈。E型(Echo)在所有性能面上相較早期版本有顯著提升，包括更廣的捕捉角度與增加的射程，但仍僅能鎖定後方目標。
usaf_aim-9j=AIM-9J響尾蛇(AIM-9J Sidewinder),Sidewinder,空對空飛彈,AIM-9J 響尾蛇是美國的紅外線導引空對空飛彈。J型(Juliet)相較於 E 型有重大改進，特別是控制系統部分，改採固態電子元件取代早期的真空管設計。命中率較先前版本提升，但仍僅限後方鎖定。
usaf_aim-9p=AIM-9P響尾蛇(AIM-9P Sidewinder),Sidewinder,空對空飛彈,AIM-9P響尾蛇是J型的外銷改良版，換用新引信、新發動機與改良導引頭，可支援側面攻擊並提升整體可靠度。

usn_aim-7d=AIM-7D麻雀(AIM-7D Sparrow),Sparrow,空對空飛彈,AIM-7D麻雀是美國半主動雷達導引空對空飛彈，D型針對比早期C型更高的接近速度最佳化；但面對低空目標能力不足，且最小射程偏大。
usn_aim-7e=AIM-7E麻雀(AIM-7E Sparrow),Sparrow,空對空飛彈,AIM-7E麻雀是美國半主動雷達導引空對空飛彈，E型相較前期型號提升射程與飛行性能；但低空目標能力仍差，最小射程也偏大。
usn_aim-7e2=AIM-7E-2麻雀(AIM-7E-2 Sparrow),Sparrow,空對空飛彈,AIM-7E-2「格鬥型」麻雀是越戰經驗後改良的E型分支，縮短最小射程，略微改善低空性能，並在加速段提升機動能力。
usn_aim-7e4=AIM-7E-4麻雀(AIM-7E-4 Sparrow),Sparrow,空對空飛彈,AIM-7E-4麻雀是美國海軍改良型，配合更強的機載雷達使用，導引頭對干擾與反制措施的抗性略有提升。
usn_aim-7f=AIM-7F麻雀(AIM-7F Sparrow),Sparrow,空對空飛彈,AIM-7F麻雀重新設計Sparrow III彈體，採用助推續航火箭以增加射程，並改良引信與導引頭；但低空與抗電戰性能仍不是特別突出。
usn_aim-7m=AIM-7M麻雀(AIM-7M Sparrow),Sparrow,空對空飛彈,AIM-7M麻雀是F型的升級版，改用單脈衝導引頭，可有效攻擊掠海目標，抗電戰能力與有效射程都明顯提升。
usn_aim-9b=AIM-9B響尾蛇(AIM-9B Sidewinder),Sidewinder,空對空飛彈,AIM-9B 響尾蛇是美國的紅外線導引空對空飛彈。B型(Bravo)是 AIM-9 系列的第一款量產型，具備極有限的鎖定角度，容易被太陽等熱源誘導誤判，僅能後方鎖定。
usn_aim-9c=AIM-9C響尾蛇(AIM-9C Sidewinder),Sidewinder,空對空飛彈,AIM-9C響尾蛇是少數服役的雷達導引響尾蛇型號，採半主動雷達導引，可在較遠距離進行全向攻擊；主要搭配美國海軍F-8使用，服役時間不長。
usn_aim-9d=AIM-9D響尾蛇(AIM-9D Sidewinder),Sidewinder,空對空飛彈,AIM-9D 響尾蛇是美國的紅外線導引空對空飛彈。D型(Delta)相較 B 型有顯著升級，搭載更先進的導引頭、更強的戰鬥部與更長射程，但仍僅支援後方攻擊。
usn_aim-9g=AIM-9G響尾蛇(AIM-9G Sidewinder),Sidewinder,空對空飛彈,AIM-9G響尾蛇是D型的改良版，擴大發射角度並提升可靠性，也曾出口至其他國家；仍屬後方攻擊為主的紅外線飛彈。
usn_aim-9h=AIM-9H響尾蛇(AIM-9H Sidewinder),Sidewinder,空對空飛彈,AIM-9H響尾蛇是G型的固態電子改良版，導引頭更靈敏，可支援側面射擊，機動性與可靠度也有所提升。
usn_aim-9l=AIM-9L響尾蛇(AIM-9L Sidewinder),Sidewinder,空對空飛彈,AIM-9L 響尾蛇是美國的紅外線導引空對空飛彈。L型(Lima)是首款具備全向攻擊能力的型號，大幅擴展了捕捉角度，可在近距離交戰中正面鎖定敵機。不過從後方攻擊仍可獲得更長的鎖定距離。
usn_aim-9m=AIM-9M響尾蛇(AIM-9M Sidewinder),Sidewinder,空對空飛彈,AIM-9M響尾蛇是L型的進一步改良，增強抗熱焰彈能力並延伸導引頭搜尋距離，是冷戰後期常見的美國近距空對空飛彈。
usn_aim-54a=AIM-54A鳳凰(AIM-54A Phoenix),Phoenix,空對空飛彈,AIM-54A 鳳凰是美國的主動雷達導引空對空飛彈，是美軍現役射程最遠的空對空飛彈，專屬於 F-14 雄貓戰機。結合先進的 AWG-9 雷達系統，可同時鎖定並攻擊最多六個目標。其導引過程分為中段由飛機雷達更新目標資料、末段由飛彈自體雷達主動導引，具備極強遠程攔截能力。

wp_aa-2a=AA-2B環礁B(AA-2B Atoll B),Atoll B,紅外線導引空對空飛彈,AA-2B 環礁(Vympel K-13/R-3S)是蘇聯研發的紅外線導引短程空對空飛彈，源自對美國 AIM-9B 的逆向工程。雖然性能較早期的 AIM-9B 有所提升，但仍僅能後方鎖定目標，並且在高溫環境下容易受到太陽等熱源的干擾。1962 年量產服役。導引頭為未冷卻型，射程約 0.9-7 km。
wp_aa-2c=AA-2C環礁C(AA-2C Atoll C),Atoll C,半主動雷達導引空對空飛彈,AA-2C 環礁(Vympel K-13R/R-13R)是搭載半主動雷達導引頭的 AA-2 變型，1966-67 年推出。導引頭與紅外版不同，支援全向鎖定，但整體發射性能與原型接近。
wp_aa-2d=AA-2D先進環礁D(AA-2D Advanced Atoll D),Advanced Atoll D,紅外線導引空對空飛彈,AA-2D 先進環礁(Vympel K-13M/R-13M)是蘇聯的紅外線導引空對空飛彈。源自 AA-2A，並升級了動力與導引頭，大幅提升性能，適用於近距格鬥。
wp_aa-2-2=AA-2D先進環礁2(AA-2D Advanced Atoll 2),Advanced Atoll 2,紅外線導引空對空飛彈,AA-2-2 先進環礁(Vympel K-13M1/R-13M1)是蘇聯的紅外線導引空對空飛彈，是 R-13M 的改良型號，1977-82 年間量產並服役。改進導引頭與機動性，但僅限蘇聯或華約內部使用，1988 年退役。

wp_aa-3e=AA-3E先進阿納布(AA-3E Advanced Anab),Advanced Anab,半主動雷達導引空對空飛彈,AA-3E(Kaliningrad R-98MR)是蘇聯開發的中程半主動雷達導引空對空飛彈，配備於 Su-15 與 Yak-28P 攔截機。採取與美軍 F-102/F-106 類似的雙彈發射策略：同時發射雷達與紅外版本以提高命中機率。
wp_aa-3f=AA-3F先進阿納布(AA-3F Advanced Anab),Advanced Anab,紅外線導引空對空飛彈,AA-3F(Kaliningrad R-98MT)是蘇聯紅外導引版本的中程空對空飛彈。與 E 型同屬阿納布家族，常與雷達版搭配使用，以一熱一雷同時攻擊敵機，提高擊落率。
wp_aa-6a=AA-6A刺激(AA-6A Acrid),Acrid,空對空飛彈,AA-6A(Vympel R-40R)是蘇聯為 MiG-25P 攔截機開發的長程空對空飛彈，對抗如 XB-70「女武神」等高空高速目標。採半主動雷達導引，可與紅外版本搭配混合發射。
wp_aa-6b=AA-6B刺激(AA-6B Acrid),Acrid,紅外線導引空對空飛彈,AA-6B(Vympel R-40T)是刺激系列的紅外導引版本，與 R-40R 一樣為 MiG-25P 所設計，專用於高空高速攔截任務，搭配雙導引發射戰術使用。
wp_aa-6c=AA-6C刺激(AA-6C Acrid),Acrid,空對空飛彈,AA-6C(Vympel R-40RD)是為 MiG-25PD 所研發的升級型刺激，最大射程增至約 60 公里，保有原本混合導引射擊的策略特點，提升全距離攔截能力。
wp_aa-6d=AA-6D刺激(AA-6D Acrid),Acrid,空對空飛彈,AA-6D(Vympel R-40TD)為刺激系列紅外版的升級型，與 R-40RD 一樣配合 MiG-25PD 使用，搭配中長程攔截戰術，在高空高速目標擊殺上有優異表現。
wp_aa-7c=AA-7C頂點(AA-7C Apex),Apex,半主動雷達導引空對空飛彈,AA-7C(Vympel R-24R)是蘇聯為 MiG-23 開發的中程空對空飛彈，具備單脈衝導引頭、抗干擾能力提升，並具備發射後鎖定能力。其性能大致相當於美軍 AIM-7E。
wp_aa-7d=AA-7D頂點(AA-7D Apex),Apex,紅外線導引空對空飛彈,AA-7D(Vympel R-24T)為 AA-7C 的紅外版本，同樣裝備於 MiG-23 攔截機。採混合導引戰術，可與 R-24R 同時發射，以雷+紅方式增加命中率。
wp_aa-8=AA-8蚜蟲(AA-8 Aphid),Aphid,空對空飛彈,AA-8蚜蟲（Vympel R-60M）是蘇聯近距紅外線空對空飛彈，廣泛出口並常見於蘇聯陣營國家的航空兵器庫中。
wp_aa-11=AA-11弓箭手(AA-11 Archer),Archer,空對空飛彈,AA-11弓箭手（Vympel R-73A）是蘇聯冷戰後期高性能近距紅外線空對空飛彈，具備全向攻擊能力，在短距格鬥中相當致命。

# ------------------ 地對空飛彈 SAM ------------------
it_aspide_1=Aspide Mk.1A艦對空飛彈(Aspide Mk.1A),,艦對空/反水面飛彈,Aspide是義大利中程艦對空飛彈，由美國Sparrow飛彈衍生而來。此型以AIM-7E為基礎，改用性能更佳的發動機以提高射程與速度，並配備大幅改良的單脈衝尋標器，可在低空發射且具備更好的電子反反制能力。\n艦射型的射程與速度低於空射型，但仍遠優於RIM-7E。
jsdf_sam1=Tan-SAM 1飛彈(Tan-SAM 1),,地對空飛彈,Tan-SAM 1 是日本研發的短程全向紅外線導引地對空飛彈，為 81式地對空飛彈系統的一部分。具備全天候、全方位攔截能力，主要用於防禦低空入侵目標，如敵方戰機與巡弋飛彈。

plan_hq-61=紅旗-61(HQ-61),,地對空飛彈,HQ-61紅旗-61是中國第一種海軍艦載地對空飛彈。雖於1980年代服役，但性能落後同時代系統，大致接近早期RIM-7E海麻雀。

raf_rapier=FSB輕劍(FSB Rapier),Rapier,地對空飛彈,Field Standard B 輕劍 是英國研發的短程低空點防禦地對空飛彈系統，採用目視指令導引(CLOS)技術，主要用於防禦飛機與巡弋飛彈等高速目標。雖具備高機動性，但對高速目標的攔截效能有所變化。

rn_seacat=GWS-21海貓Mk.1(GWS-21 Sea Cat Mk.1),Sea Cat Mk.1,地對空飛彈,GWS-21海貓Mk.1是早期艦載點防空飛彈系統，1962年進入英國皇家海軍服役，也大量出口並取代部分Bofors 40mm火砲；採CLOS導引，對高速噴射機與飛彈效能有限。
rn_seacat_mk2=GWS-24海貓Mk.2(GWS-24 Sea Cat Mk.2),Sea Cat Mk.2,地對空飛彈,GWS-24海貓Mk.2是海貓Mk.1的升級型，改善低空性能、射程與可靠性，並搭配較進步射控系統；但整體仍屬效能有限的點防空飛彈。

usa_mim-14=MIM-14力士(MIM-14 Nike Hercules),Nike Hercules,地對空飛彈,MIM-14力士是美國與北約使用的中高空地對空飛彈系統，用於中高空防空攔截。
usa_mim-23=MIM-23鷹式(MIM-23 Hawk),Hawk,地對空飛彈,MIM-23 鷹式(HAWK)是美國於 1960 年代開發的中程地對空飛彈系統，具備相對良好的機動性。飛彈本體使用半主動雷達導引，依賴高功率照射雷達(HPIR)進行導引，並搭配脈衝獲取雷達(PAR)與連續波雷達(CWAR)偵測高空與低空目標。

usn_rim-2f=RIM-2F㹴犬(RIM-2F Terrier),Terrier,艦對空/反水面飛彈,RIM-2F 㹴犬(Terrier)是美國海軍最早期的中程艦載防空飛彈之一，提供航艦戰鬥群中程防空層。F型改為半主動雷達導引，具備更高機動性與命中率，也可作為對艦武器使用。受限於需人工裝配增推器，一座發射器每 30 秒僅能發射兩枚。
usn_rim-24b=RIM-24B韃靼(RIM-24B Tartar),Tartar,艦對空/反水面飛彈,RIM-24B韃靼是美國海軍為艦艇點防空與區域防空研製的艦載地對空飛彈。它比Terrier系統更小巧，採半主動雷達導引，也可在必要時作為反水面武器使用。
usn_rim-8=RIM-8J護島神(RIM-8J Talos),Talos,艦對空/反水面飛彈,RIM-8J護島神是美國海軍巡洋艦使用的大型長程艦載地對空飛彈，中段採波束乘騎，末段轉為半主動雷達導引。因飛彈體積大且發射前需整備，射速低於後續系統。
usn_rim-7=RIM-7E海麻雀(RIM-7E Sea Sparrow),Sea Sparrow,艦對空/反水面飛彈,RIM-7E海麻雀是北約常見的艦載短程點防空飛彈，基本性能源自AIM-7E，但因艦射限制射程與速度較低；同樣繼承早期麻雀對低空目標與導引性能的弱點。
usn_rim-7h=RIM-7H海麻雀(RIM-7H Sea Sparrow),Sea Sparrow,艦對空/反水面飛彈,RIM-7H海麻雀與早期E型相近，但改用折疊彈翼以適配新型發射器，可靠性也略有改善。
usn_rim-7m=RIM-7M海麻雀(RIM-7M Sea Sparrow),Sea Sparrow,艦對空/反水面飛彈,RIM-7M海麻雀相當於艦射版AIM-7M，射程與速度較空射型低；相較早期海麻雀，首次具備較可靠攔截掠海飛彈與低空飛機的能力。
usn_rim-66a=RIM-66A標準一型中程(RIM-66A SM-1MR),SM-1MR,艦對空/反水面飛彈,標準一型是一系列雷達歸向區域防空飛彈，亦具備短程反艦能力；其特點是續航段燃燒時間長，面對多數威脅都有均衡表現。標準一型是為取代早期RIM-2 Terrier與RIM-24 Tartar而設計、可靠性更高的升級型，但仍受限於射控容量與對低空目標的能力。\n\nSM-1MR Block IV（RIM-66A-4）是SM-1系列的中程型，以固態電子元件取代Tartar的類比組件，大幅提升可靠性與電子反反制能力。
usn_rim-66b=RIM-66B標準一型中程(RIM-66B SM-1MR),SM-1MR,艦對空/反水面飛彈,標準一型是一系列雷達歸向區域防空飛彈，亦具備短程反艦能力；其特點是續航段燃燒時間長，面對多數威脅都有均衡表現。標準一型是為取代早期RIM-2 Terrier與RIM-24 Tartar而設計、可靠性更高的升級型，但仍受限於射控容量與對低空目標的能力。\n\nSM-1MR Block V（RIM-66B-2）是SM-1系列的改良中程型，在早期RIM-66A基礎上換用推力更強的火箭發動機以延伸射程，並採用新型引信與尋標器組件以提升電子反反制能力。
usn_rim-66e=RIM-66E標準一型中程(RIM-66E SM-1MR),SM-1MR,艦對空/反水面飛彈,標準一型是一系列雷達歸向區域防空飛彈，亦具備短程反艦能力；其特點是續航段燃燒時間長，面對多數威脅都有均衡表現。標準一型是為取代早期RIM-2 Terrier與RIM-24 Tartar而設計、可靠性更高的升級型，但仍受限於射控容量。\n\nSM-1MR Block VI（RIM-66E）是SM-1系列的中程型；Block VI升級導入SM-2MR Block I（RIM-66C/D）的電子元件，包括改良的單脈衝尋標器與新型彈頭，並配備改良引信以提升追蹤掠海目標的能力。
usn_rim-66c=RIM-66C標準二型中程(RIM-66C SM-2MR),SM-2MR,艦對空/反水面飛彈,標準二型是一系列雷達導引區域防空飛彈，亦具備短程反艦能力；其特點是續航段燃燒時間長，面對多數威脅都有均衡表現。標準二型以先進資料鏈中途導引取代SM-1的半主動雷達歸向方式，僅在飛行最後數秒採用終端雷達歸向。SM-2可讓空中同時飛行的飛彈數量遠超照射雷達數量，相較SM-1武裝艦艇具有巨大優勢。\n\nSM-2MR Block I（RIM-66C）是SM-2MR系列的AEGIS版本，整體與RIM-66B相同，但增設資料鏈、改良單脈衝尋標器與改良彈頭。
usn_rim-66d=RIM-66D標準二型中程(RIM-66D SM-2MR),SM-2MR,艦對空/反水面飛彈,標準二型是一系列雷達導引區域防空飛彈，亦具備短程反艦能力；其特點是續航段燃燒時間長，面對多數威脅都有均衡表現。標準二型以先進資料鏈中途導引取代SM-1的半主動雷達歸向方式，僅在飛行最後數秒採用終端雷達歸向。SM-2可讓空中同時飛行的飛彈數量遠超照射雷達數量，相較SM-1武裝艦艇具有巨大優勢。\n\nSM-2MR Block I（RIM-66D）是SM-2MR系列的CG(N)/SM-2(MR)版本，僅供改裝後的Virginia級巡洋艦使用。除射控通道較少且需要較長終端照射時間外，其餘各方面均與RIM-66C（AEGIS）相同。
usn_rim-66g=RIM-66G標準二型中程(RIM-66G SM-2MR),SM-2MR,艦對空/反水面飛彈,標準二型是一系列雷達導引區域防空飛彈，亦具備短程反艦能力；其特點是續航段燃燒時間長，面對多數威脅都有均衡表現。標準二型以先進資料鏈中途導引取代SM-1的半主動雷達歸向方式，僅在飛行最後數秒採用終端雷達歸向。SM-2可讓空中同時飛行的飛彈數量遠超照射雷達數量，相較SM-1武裝艦艇具有巨大優勢。\n\nSM-2MR Block I（RIM-66D）是SM-2MR系列的CG(N)/SM-2(MR)版本，僅供改裝後的Virginia級巡洋艦使用。除射控通道較少且需要較長終端照射時間外，其餘各方面均與RIM-66C（AEGIS）相同。
usn_rim-67a=RIM-67A標準一型增程(RIM-67A SM-1ER),SM-1ER,艦對空/反水面飛彈,標準一型是一系列雷達歸向區域防空飛彈，亦具備短程反艦能力；其特點是續航段燃燒時間長，面對多數威脅都有均衡表現。標準一型是為取代早期RIM-2 Terrier與RIM-24 Tartar而設計、可靠性更高的升級型，但仍受限於射控容量與對低空目標的能力。\n\nSM-1ER（RIM-67A-2）是SM-1系列的增程型，以固態電子元件取代Terrier的類比組件，大幅提升可靠性，並採用新型引信與尋標器組件以提升電子反反制能力。
usn_rim-67b=RIM-67B標準二型增程(RIM-67B SM-2ER),SM-2ER,艦對空/反水面飛彈,標準二型是一系列雷達導引區域防空飛彈，亦具備短程反艦能力；其特點是續航段燃燒時間長，面對多數威脅都有均衡表現。標準二型以先進資料鏈中途導引取代SM-1的半主動雷達歸向方式，僅在飛行最後數秒採用終端雷達歸向。SM-2可讓空中同時飛行的飛彈數量遠超照射雷達數量，相較SM-1武裝艦艇具有巨大優勢。\n\nSM-2ER Block I（RIM-67B）是SM-2 Block I家族的增程型，自1970年代末至1980年代中期裝備於升級後的CG/SM-2艦艇，以提升既有Terrier武裝驅逐艦與巡洋艦的火力。
usn_rim-67c=RIM-67C標準二型增程(RIM-67C SM-2ER),SM-2ER,艦對空/反水面飛彈,標準二型是一系列雷達導引區域防空飛彈，亦具備短程反艦能力；其特點是續航段燃燒時間長，面對多數威脅都有均衡表現。標準二型以先進資料鏈中途導引取代SM-1的半主動雷達歸向方式，僅在飛行最後數秒採用終端雷達歸向。SM-2可讓空中同時飛行的飛彈數量遠超照射雷達數量，相較SM-1武裝艦艇具有巨大優勢。\n\nSM-2ER Block II（RIM-67C）是SM-2 Block II家族的增程型，採用新型助推器以大幅提升性能。

wp_sa-n-1=SA-N-1果阿(SA-N-1 Goa),Goa,艦對空/反水面飛彈,SA-N-1 果阿（M-1 Volna）是蘇聯最早部署的艦載地對空飛彈系統，初期僅能對抗高空目標。後期型號增強對低空目標與反艦飛彈的攔截能力，並具備次要對艦能力與延伸射程，提供區域性防空。
wp_sa-n-1c=SA-N-1C果阿(SA-N-1C Goa),Goa,艦對空/反水面飛彈,SA-N-1C果阿（M-1 Volna-P）是早期蘇聯艦載防空系統的改良型，提升抗干擾與抗箔條能力，也具備攻擊低空目標的能力。
wp_sa-n-3=SA-N-3高腳杯(SA-N-3 Goblet),Goblet,艦對空/反水面飛彈,SA-N-3 高腳杯（M-11 Shtorm）是蘇聯艦載地對空飛彈系統，裝備於多型飛彈巡洋艦與航空母艦上。具備次要對艦能力，後期型改良對低空目標的攔截性能。
wp_sa-n-4=SA-N-4壁虎(SA-N-4 Gecko),Gecko,艦對空/反水面飛彈,SA-N-4 壁虎（9K33M Osa）是 SA-8 壁虎(Gecko) 陸基飛彈的艦載版本，採用可收納旋轉式雙聯發射架，擔任近距離防空角色，被大量裝備於蘇聯艦艇。
wp_sa-n-5=SA-N-5聖杯(SA-N-5 Grail),Grail,地對空飛彈,SA-N-5 聖杯（9K32 Strela-2）是 SA-7 聖杯(Grail) 的艦載版本，屬於便攜式近程地對空飛彈系統，主要用於點防禦與自衛用途，在艦艇上常用於補強近距離低空防禦。
wp_sa-n-6=SA-N-6轟鳴(SA-N-6 Grumble),Grumble,艦對空/反水面飛彈,SA-N-6 轟鳴（S-300F Fort）是陸基 S-300P（SA-10）的艦載版本，為蘇聯巡洋艦提供遠程艦隊防空能力，其性能可與美國 SM-2 系統相媲美，是華約最強的艦載防空飛彈之一。
wp_sa-n-7=SA-N-7牛虻(SA-N-7 Gadfly),Gadfly,艦對空/反水面飛彈,SA-N-7 牛虻（3S90 Uragan）為 SA-11（9K37 Buk）的艦載版本，是一款高機動性中程地對空飛彈系統，首次配備於現代級驅逐艦，具備優異的中低空目標攔截能力。
wp_sa-n-9=SA-N-9臂鎧(SA-N-9 Gauntlet),Gauntlet,艦對空/反水面飛彈,SA-N-9 臂鎧（3K95 Kinzhal）為 SA-15（9K330 Tor）系統的艦載版本，使用相同的高機動短程飛彈，廣泛裝備於蘇聯主力水面艦艇上，提供高速反應的點防禦與低空目標攔截能力。

wp_sa-2=SA-2指導線(SA-2 Guideline),Guideline,地對空飛彈,SA-2 指導線（S-75 Dvina）是蘇聯於 1950 年代中期開發的長程地對空飛彈系統，專為大範圍攔截高空轟炸機而設計。該系統在 1960 年擊落美國 U-2 偵察機後聲名大噪，並廣泛出口至多國，參與多場衝突，包括越戰。
wp_sa-3=SA-3果阿(SA-3 Goa),Goa,地對空飛彈,SA-3 果阿（S-125 Neva/Pechora）是蘇聯於 1960 年代初期部署的中程地對空飛彈系統，專門對抗低空、機動性高的目標。該系統採用雙級固體燃料火箭，具備優異的抗干擾能力，並被廣泛出口至多國。
wp_sa-4=SA-4傑尼夫(SA-4 Ganef),Ganef,地對空飛彈,SA-4 傑尼夫（2K11 Krug）是蘇聯於 1960 年代中期部署的機動式中程地對空飛彈系統，主要用於保護地面部隊免受高空轟炸機威脅。該系統具備 NBC 防護，並採用單脈衝雷達追蹤技術，提升抗干擾能力。
wp_sa-5=SA-5伽蒙(SA-5 Gammon),Gammon,地對空飛彈,SA-5 伽蒙（S-200）是蘇聯於 1960 年代中期部署的長程地對空飛彈系統，專為攔截高空高速目標而設計。該系統具備「追干擾訊號導引」能力，並可搭載核彈頭，射程可達 300 公里。
wp_sa-6=SA-6蓋因富(SA-6 Gainful),Gainful,地對空飛彈,SA-6 蓋因富（2K12 Kub）是蘇聯於 1960 年代末期部署的機動式中程地對空飛彈系統，專為保護地面部隊免受低空威脅而設計。該系統採用半主動雷達導引，射程約 24 公里，並在多場衝突中展現優異性能。
wp_sa-8=SA-8壁虎(SA-8 Gecko),Gecko,地對空飛彈,SA-8 Gecko是蘇聯的地對空飛彈。屬短程武器。
wp_sa-11=SA-11牛虻(SA-11 Gadfly),Gadfly,地對空飛彈,SA-11 Gadfly是蘇聯的地對空飛彈。屬短程武器。
wp_sa-13=SA-13地鼠(SA-13 Gopher),Gopher,地對空飛彈,SA-13 地鼠（9K35 Strela-10）是蘇聯於 1970 年代中期部署的高度機動短程地對空飛彈系統，專門對抗低空突現目標，如直升機與無人機。該系統採用光學/紅外導引，並具備兩棲能力。

# ---------- 反輻射飛彈 Anti-radar Missiles ---------
usn_agm-45=AGM-45B百舌鳥(AGM-45B Shrike),Shrike,反輻射飛彈,AGM-45B百舌鳥是美國早期反輻射飛彈，以AIM-7麻雀彈體搭配新導引頭發展而來。它射程短、速度與戰鬥部有限，能追蹤的雷達頻段也受限，但成本低、重量輕，因此使用普遍。
usn_agm-78=AGM-78D標準ARM(AGM-78D Standard ARM),Standard ARM,反輻射飛彈,AGM-78D標準ARM是由SM-1MR發展而來的長程反輻射飛彈，用於在防區外打擊高威脅SAM雷達。它射程與戰鬥部威力良好，但價格昂貴且數量稀少。
usn_agm-88a=AGM-88A高速反輻射飛彈(AGM-88A HARM),HARM,反輻射飛彈,AGM-88A HARM是美國高速反輻射飛彈，性能全面優於早期ARM，尤其在速度、可靠性與射程上更強。1985年前後仍屬新式武器，因此可用數量有限。
usn_agm-122a=AGM-122A響尾蛇反輻射型(AGM-122A Sidearm),Sidearm,反輻射飛彈,AGM-122A Sidearm是由AIM-9C改裝的短程戰術反輻射飛彈，可由直升機或固定翼機使用，適合對付突然出現的近程防空雷達。

usn_rgm-8h=RGM-8H護島神反輻射型(RGM-8H Talos ARM),Talos ARM,反輻射飛彈,RGM-8H護島神反輻射型以RIM-8大型彈體提供艦射ARM所需的長射程與高速；它只能攻擊正在發射雷達訊號的地面或水面目標，沒有防空能力。

wp_as-11=AS-11鐮刀(AS-11 Kilter),Kilter,反輻射飛彈,AS-11鐮刀（Kh-58）是蘇聯為Su-24M研製的先進反輻射飛彈，高速發射時射程很長，是蘇聯空軍重要的防空壓制武器。
wp_as-12=AS-12保齡手(AS-12 Kegler),Kegler,反輻射飛彈,AS-12保齡手（Kh-25MP）是蘇聯空射超音速中程反輻射飛彈，服役數量較多，定位大致接近美國AGM-45百舌鳥。

wp_as-2b=AS-2B奇珀(AS-2B Kipper),Kipper,反艦飛彈,AS-2B奇珀是K-10S反艦飛彈的電子戰衍生型，將原本戰鬥部改為Azaliya干擾系統，用於掩護或支援反艦突擊。

# ---------- 反艦飛彈 Anti-ship Missiles ----------
is_gabriel_2=Gabriel 2飛彈(Gabriel 2),,反艦飛彈,Gabriel 2是以色列短程反艦飛彈，採半主動雷達導引並以低空航線降低受攻擊機率；此型提升原始Gabriel 1的抗干擾能力與可靠度。
is_gabriel_3=Gabriel 3飛彈(Gabriel 3),,反艦飛彈,Gabriel 3是以色列短程反艦飛彈，改用主動雷達導引並具備掠海能力，重新設計的鼻部可容納更先進的尋標器，支援發射後不管。
is_gabriel_3as=Gabriel 3AS飛彈(Gabriel 3AS),,反艦飛彈,Gabriel 3AS是Gabriel 3的空射版本，重新設計彈體並提升射程，採主動雷達導引與掠海攻擊。

it_seakiller_2=Sea Killer 2飛彈(Sea Killer 2),,反艦飛彈,義大利短程反艦飛彈，伊朗海軍曾購買裝備於護衛艦。
it_otomat_mk1=Otomat MK1飛彈(Otomat MK1),,反艦飛彈,義法合作開發的中程反艦飛彈。

jasdf_asm-1=ASM-1飛彈(ASM-1),,反艦飛彈,ASM-1是日本的反艦飛彈。適合防區外發射，由航空平台投射。

fr_as12=AS.12飛彈(AS.12),,反艦飛彈,AS.12是法國的反艦飛彈。採指令導引，屬短程武器，相較前型有所改良。
fr_am-39=AM39飛魚(AM39 Exocet),Exocet,反艦飛彈,法國空射型飛魚飛彈，NATO廣泛使用的標準反艦武器。
fr_mm-38=MM38飛魚(MM38 Exocet),Exocet,反艦飛彈,法國艦射型飛魚飛彈，屬於預警發射制導武器。
fr_sm-39=SM39飛魚(SM39 Exocet),Exocet,反艦飛彈,SM39 Exocet是法國遠距反艦飛彈，也是北約及其他多國廣泛採用的Harpoon替代方案。此型為潛射版本，以升級後的AM-39 Mod 2為基礎，相較原始艦射Exocet具備更佳的電子反反制能力與更長射程。

knm_penguin_mk2=AGM-119企鵝Mk2(AGM-119 Penguin Mk2),Penguin Mk2,反艦飛彈,美國與挪威聯合開發的小型空射/艦射反艦飛彈。

plan_sy-1=上游-1(SY-1 Scrubbrush),Scrubbrush,反艦飛彈,SY-1 Scrubbrush是中國的反艦飛彈。源自既有系統的仿製或授權生產。
plan_sy-1a=上游-1A(SY-1A Scrubbrush),Scrubbrush,反艦飛彈,SY-1A Scrubbrush是中國的反艦飛彈。具備掠海攻擊能力，相較前型有所改良。
plan_hy-1=海鷹-1(HY-1 Silkworm),Silkworm,反艦飛彈,HY-1 Silkworm是中國的反艦飛彈。用途與性能依原型設定，用於對應作戰任務。
plan_hy-1j=海鷹-1J(HY-1J Safflower),Safflower,反艦飛彈,HY-1J Safflower是中國的反艦飛彈。用途與性能依原型設定，用於對應作戰任務。
plan_hy-1a=海鷹-1A(HY-1A Safflower),Safflower,反艦飛彈,HY-1A Safflower是中國的反艦飛彈。具備掠海攻擊能力，相較前型有所改良。
plan_hy-2=海鷹-2(HY-2 Seersucker),Seersucker,反艦飛彈,HY-2 Seersucker是中國的反艦飛彈。用途與性能依原型設定，用於對應作戰任務。
pla_hy-3=海鷹-3(HY-3 Sawhorse),Sawhorse,反艦飛彈,HY-3 Sawhorse是中國的反艦飛彈。用途與性能依原型設定，用於對應作戰任務。
plan_hy-4=海鷹-4(HY-4 Sadsack),Sadsack,反艦飛彈,HY-4 Sadsack是中國的反艦飛彈。用途與性能依原型設定，用於對應作戰任務。
pla_yj-1=鷹擊-1(YJ-1 Saples),Saples,反艦飛彈,YJ-1 Saples是中國的反艦飛彈。具備掠海攻擊能力，屬短程武器，由航空平台投射。
pla_yj-6=鷹擊-6(YJ-6 Kraken),Kraken,反艦飛彈,YJ-6 Kraken是中國的反艦飛彈。由航空平台投射，強化抗干擾或反反制能力。
plan_yj-8=鷹擊-8(YJ-8 Sardine),Sardine,反艦飛彈,YJ-8 Sardine是中國的反艦飛彈。具備掠海攻擊能力。

usn_agm-12b=AGM-12B鬥牛犬(AGM-12B Bullpup),Bullpup,反艦飛彈,AGM-12B鬥牛犬是美國空射超音速防區外打擊武器，需操作員手動導引，因此發射機必須持續朝目標飛行，缺點與蘇聯AS-7相似。
usn_agm-123=AGM-123跳躍者(AGM-123 Skipper),Skipper,反艦飛彈,美軍以Paveway II導引炸彈加固體火箭製成的短中程反艦飛彈。
usn_agm-84a=AGM-84A魚叉(AGM-84A Harpoon),Harpoon,反艦飛彈,美國空射型魚叉飛彈，搭載主動雷達導引器。
usn_agm-84c=AGM-84C魚叉(AGM-84C Harpoon),Harpoon,反艦飛彈,AGM-84C魚叉是空射型Block 1B，沿預設航線飛行後以主動雷達尋標；它取消末段彈跳攻擊，改以掠海航線提高反艦突防效果。
usn_agm-84d=AGM-84D魚叉(AGM-84D Harpoon),Harpoon,反艦飛彈,改良型魚叉，1985年服役，抗電戰性能與航程大幅提升。

usn_rgm-84a=RGM-84A魚叉(RGM-84A Harpoon),Harpoon,反艦飛彈,RGM-84A 魚叉飛彈是美國艦射型反艦巡弋武器，裝有可分離助推器，飛至預定航線後進入低空海面巡航，末段則以主動雷達自動搜尋並彈跳突防 (pop-up)。此型於 1977 年服役，搭載 WDU-18B 221 kg 穿甲破片戰鬥部，最大射程 約 93 km，戰術設計用以避開近迫防禦系統。
usn_rgm-84c=RGM-84C魚叉(RGM-84C Harpoon),Harpoon,反艦飛彈,RGM-84C魚叉是艦射Block 1B，採主動雷達尋標並沿預設航線接近目標；此型取消末段彈跳攻擊，改以掠海方式攻擊水面艦。
usn_rgm-84d=RGM-84D魚叉(RGM-84D Harpoon),Harpoon,反艦飛彈,RGM-84D魚叉是艦射Block 1C，改良燃料帶來更長射程，並提升抗電戰能力。
usn_rgm-109b=RGM-109B戰斧(RGM-109B Tomahawk),Tomahawk,反艦飛彈,以RGM-109為基礎的戰斧反艦飛彈，具備主動雷達導引。

usn_ugm-84a=UGM-84A魚叉(UGM-84A Harpoon),Harpoon,反艦飛彈,UGM-84A 魚叉為潛射型反艦巡弋飛彈(Harpoon Block 1A)，配膠囊從 533 mm 魚雷管發射，飛至海面後展開助推器與主引擎，沿預設航線低空巡航，末段以主動雷達尋標後進行 pop-up 突防攻擊，射程約 92 km，配備 221 kg 穿甲破片戰鬥部，1981 年服役，1997 年退役至復用過程中撤除潛艦配備。
usn_ugm-84b=UGM-84B魚叉(UGM-84B Harpoon),Harpoon,反艦飛彈,UGM-84B魚叉是英國皇家海軍使用的潛射版本，使用一次性膠囊自魚雷管發射；相較UGM-84A取消彈跳末段，改採掠海攻擊。
usn_ugm-84c=UGM-84C魚叉(UGM-84C Harpoon),Harpoon,反艦飛彈,UGM-84C魚叉是潛射版本，使用一次性膠囊發射，末段不採彈跳攻擊而改以掠海方式接近目標。
usn_ugm-109b=UGM-109B戰斧(UGM-109B Tomahawk),Tomahawk,反艦飛彈,UGM-109B戰斧反艦型是魚雷管發射的潛射型TASM，採主動雷達尋標，能依預設航線搜尋並以欺敵機動攻擊水面目標。

wp_as-2=AS-2奇珀(AS-2 Kipper),Kipper,反艦飛彈,蘇聯空射型超音速反艦飛彈，載於Tu-16。
wp_as-4=AS-4廚房(AS-4 Kitchen),Kitchen,反艦飛彈,蘇聯Tu-22M、Tu-95搭載，具高速高空終端俯衝特性。
wp_as-6=AS-6王魚(AS-6 Kingfish),Kingfish,反艦飛彈,小型版AS-4，飛行與終端特性相似。
wp_as-7=AS-7凱瑞(AS-7 Kerry),Kerry,反艦飛彈,蘇聯超音速空射攻擊飛彈，手動引導方式。
wp_as-10=AS-10凱倫(AS-10 Karen),Karen,反艦飛彈,蘇聯雷射導引空射飛彈，具備發射後即忘能力。
wp_as-13=AS-13雷王(AS-13 Kingbolt),Kingbolt,反艦飛彈,蘇聯慣性導航+終端電視導引空射飛彈。
wp_as-14a=AS-14A小船錨(AS-14A Kedge),Kedge,反艦飛彈,AS-14A 小船(Kh-29L)是蘇聯製超音速空對地飛彈，具有重型戰鬥部與半主動雷射導引，射程約 8-10 km，戰鬥部重達 320 kg，專門用於打擊防護堅固的目標如工業設施與橋樑。
wp_as-14b=AS-14B小船錨(AS-14B Kedge),Kedge,反艦飛彈,AS-14B 小船(Kh-29T)是 Kh-29 系列的 TV 導引版本，具備大型鏡頭末段導引，射程延長至約 10-12 km，適合白天對中程目標攻擊，但夜間性能會略降。

wp_ss-n-2=SS-N-2冥河(SS-N-2 Styx),Styx,反艦飛彈,蘇聯艦射型次音速飛彈，可兼攻陸上目標。
wp_ss-n-2c=SS-N-2C冥河(SS-N-2C Styx),Styx,反艦飛彈,改良版針魚飛彈，增程與抗干擾性提升。
wp_ss-n-3=SS-N-3柚子(SS-N-3 Shaddock),Shaddock,反艦飛彈,SS-N-3 柚子(P-35)是蘇聯水面與潛艦發射的亞音速遙控反艦巡弋飛彈，首度服役於 1963 年。飛彈以火箭助推起飛後進入高空亞音速巡航，最大航程約 450 km，彈頭重可達 1000 kg 傳統戰鬥部或核彈頭。飛行期間需由發射平台持續提供中段導引，潛艦發射時需浮出水面並維持數十分鐘通訊，末段以雷達導引。上述結構與航線設定使其於當時威脅性仍高，但隨後逐漸易遭防空飛彈攔截。
wp_ss-n-3b=SS-N-3B萼片(SS-N-3B Sepal),Sepal,反艦飛彈,SS-N-3B 萼片(P-35)是 Shaddock 的改良型，採更低航高飛行以提升突防能力，並強化對電磁干擾與金屬箔條(chaff)的抗性，由驅逐艦與巡洋艦發射器使用，最大射程約 280-300 miles(約 450 km)，彈頭制式同 Shaddock，並維持同樣需發射平台中段導引的設計。
wp_ss-n-7=SS-N-7明星(SS-N-7 Starbright),Starbright,反艦飛彈,全球首款水下發射飛彈，短程、由潛艦發射。
wp_ss-n-9=SS-N-9警笛(SS-N-9 Siren),Siren,反艦飛彈,中程次音速反艦飛彈，具備終端機動性能。
wp_ss-n-12=SS-N-12沙盒(SS-N-12 Sandbox),Sandbox,反艦飛彈,取代SS-N-3的超音速反艦飛彈，具中繼引導與電子戰能力。
wp_ss-n-19=SS-N-19沉船(SS-N-19 Shipwreck),Shipwreck,反艦飛彈,具高速、多目標協同攻擊與ECM防護能力，極具威脅性。
wp_ss-n-22=SS-N-22日灼(SS-N-22 Sunburn),Sunburn,反艦飛彈,蘇聯超音速近海掠波反艦飛彈，末端劇烈蛇行機動提升生存率。

#----------- 對地攻擊飛彈 Land Strike only missiles---------
wp_as-4b=AS-4B廚房B(AS-4B Kitchen-B),Kitchen-B,對地攻擊飛彈,蘇聯開發的超音速空射對地巡航飛彈(Kh-22MP)。

fr_as11=AS.11反裝甲飛彈(AS.11),,對地攻擊飛彈,AS.11是法國指令導引短程反裝甲飛彈，此型改用半穿甲戰鬥部以攻擊小艇，而非使用專攻戰車的成形裝藥。

usn_agm-65b=AGM-65B小牛(AGM-65B Maverick),Maverick,對地攻擊飛彈,美國電視導引空射地攻飛彈，發射後自動鎖定目標。
usaf_agm-86c=AGM-86C常規空射巡弋飛彈(AGM-86C CALCM),CALCM,對地攻擊飛彈,美軍B-52主力遠程打擊武器，使用地形比對導航。

usn_rgm-109c=RGM-109C戰斧(RGM-109C Tomahawk),Tomahawk,對地攻擊飛彈,地形比對導引，飛行預定航路，精確打擊地面目標。

usn_ugm-109c=UGM-109C戰斧(UGM-109C Tomahawk),Tomahawk,對地攻擊飛彈,UGM-109C戰斧地攻型是魚雷管發射的潛射TLAM，依預設航路飛向目標並以地形匹配與數位地圖導引；因潛射構型燃料受限，射程略低於艦射型。

usa_bgm-71a=BGM-71A陶式反戰車飛彈(BGM-71A TOW),TOW,對地攻擊飛彈,BGM-71 TOW是美國線導反戰車飛彈，可由直升機與裝甲車輛使用。其射程較短、彈頭較小，面對現代裝甲的能力受限，可能需要多發命中才能摧毀一輛戰車。
usa_bgm-71c=BGM-71C改良陶式反戰車飛彈(BGM-71C I-TOW),I-TOW,對地攻擊飛彈,BGM-71 I-TOW是美國線導反戰車飛彈，可由直升機與裝甲車輛使用。此型為改良I-TOW，具有如BGM-71B般提升的射程，並增設前伸探桿以擊穿現代戰車裝甲，但對最新式蘇聯主力戰車仍可能力有未逮。
usa_bgm-71d=BGM-71D陶式二型反戰車飛彈(BGM-71D TOW 2),TOW 2,對地攻擊飛彈,BGM-71D TOW 2是美國線導反戰車飛彈，可由直升機與裝甲車輛使用。此型重新設計原始BGM-71 TOW，換用大幅加大的彈頭與改良發動機，能輕易擊穿最新式裝甲目標。

wp_at-6=AT-6螺旋(AT-6 Spiral),Spiral,對地攻擊飛彈,AT-6螺旋（9M114 Kokon）是蘇聯超音速反戰車導引飛彈，用於Ka-29與Mi-24等攻擊直升機，具備長射程、高速與強力戰鬥部。
wp_at-10=AT-10軍刀(AT-10 Sabber),Sabber,對地攻擊飛彈,AT-10軍刀是蘇聯T-55M戰車使用的反戰車導引飛彈，用於提升舊式戰車的遠距離反裝甲能力。

# ---------- 反潛飛彈 Anti-sub Missiles ----------
usn_rur-5=RUR-5阿斯洛克(RUR-5 ASROC),ASROC,反潛武器,美國開發的艦射反潛飛彈，可拋投Mk 46反潛魚雷，採用拋物線飛行路徑。

wp_apr-2=APR-2飛彈(APR-2),,反潛武器,蘇聯空投型反潛魚雷，探測範圍約0.75浬，最大作戰深度600米。
wp_ss-n-14a=SS-N-14A燧石(SS-N-14A Silex),Silex,反潛武器,蘇聯開發的艦射反潛飛彈，類似澳洲Ikara系統，搭載魚雷。
wp_ss-n-14b=SS-N-14B燧石B(SS-N-14B Silex-B),Silex-B,反潛/反水面武器,蘇聯雙用途(反潛/反艦)版本，飛彈搭載魚雷並可攻擊水面艦艇。
wp_ss-n-16=SS-N-16種馬(SS-N-16 Stallion),Stallion,反潛武器,SS-N-16 種馬(RPK-6 Vodopad 水簾/RPK-7 Veter 風)是蘇聯於 1981-1984 年推出的潛艦與水面艦艇發射遠程反潛飛彈。發射後以彈道方式飛行至目標區，中段轉速式固體火箭推進，再投放魚雷或深水炸彈。RPK-6(533 mm)自 533 mm 魚雷管發射，搭載 400 mm UMGT-1 魚雷或可選核深彈；RPK-7(650 mm)自 650 mm 魚雷管發射，射程可達約 100 km，彈頭亦有常規或核選擇。該系統能快速反潛或反艦，優勢是「發射平台可保持安全距離」，但末段需拋魚雷入水搜尋。

# ------------------ 反潛迫擊砲 RBU ------------------
knm_terne_shell=Terne III反潛迫擊砲(Terne III Mortar),,反潛迫擊砲,挪威1960年代開發的火箭推進反潛武器系統。

plan_type62dc=FQF-1200反潛火箭(FQF-1200),,反潛迫擊砲,FQF-1200是中國五管反潛火箭發射器，用於向可疑潛艦位置投射反潛彈藥。
plan_type75dc=FQF-2500反潛火箭(FQF-2500),,反潛迫擊砲,FQF-2500是中國十二管反潛火箭發射器，用於艦艇近距離反潛攻擊。

rn_limbo_shell=LIMBO反潛迫擊砲(LIMBO Mortar),,反潛迫擊砲,英國1950年代研發，使用艦載聲納瞄準，三枚深水炸彈形成包圍圈。
rn_squid_shell=SQUID反潛迫擊砲(SQUID Mortar),,反潛迫擊砲,英國二戰時期開發的反潛迫擊砲，三發齊射形成包圍。

swe_375mm_rocket=Bofors M/50反潛火箭(Bofors M/50),,反潛迫擊砲,瑞典開發的375毫米口徑反潛火箭發射器。

wp_rgb-10=RBU-1000反潛火箭(RBU-1000),,反潛迫擊砲,蘇聯300毫米反潛火箭系統，射程約1000碼。
wp_rgb-12=RBU-1200反潛火箭(RBU-1200),,反潛迫擊砲,RBU-1200是蘇聯的反潛迫擊砲。用途與性能依原型設定，用於對應作戰任務。
wp_rgb-25=RBU-2500反潛火箭(RBU-2500),,反潛迫擊砲,蘇聯213毫米反潛火箭系統，射程約2500碼。
wp_rgb-60=RBU-6000反潛火箭(RBU-6000),,反潛迫擊砲,蘇聯213毫米反潛火箭系統，射程約6000碼。

# --------------- 魚雷 Torpedoes ---------------
fr_e15=E15魚雷(E15),,反水面魚雷,法國55公分被動聲納導引反艦重型魚雷。
fr_l3=L3魚雷(L3),,反潛魚雷,法國L3是一款特殊的55公分中型反潛魚雷升級型。
fr_l5_mod3=L5 Mod 3魚雷(L5 Mod 3),Mod 3,反潛魚雷,法國L5是一款55公分中型反潛魚雷。此型是L3反潛魚雷的高速、長程版本，用以配合更長的聲納探測距離與更快的潛艦航速。
fr_f17_mod1=F17 Mod 1魚雷(F17 Mod 1),Mod 1,反水面魚雷,法國F17是一款53公分重型線導反艦魚雷。此型是E15反艦魚雷的高速、長程版本，具備線導能力，可進行機動或在溫躍層下方航行，並提供兩種速度模式。
fr_f17_mod2=F17 Mod 2魚雷(F17 Mod 2),Mod 2,魚雷,法國F17是一款53公分重型線導多用途魚雷。此型為原始F17的升級版，透過主被動尋標器加入反潛能力，並提升速度、下潛深度與射程。
fr_f17p=F17P魚雷(F17P),,魚雷,法國F17P「Polyvalent」是一款53公分重型線導多用途魚雷。此型為原始F17的外銷專用升級版，透過主被動尋標器加入反潛能力，成為可由水面艦與潛艦使用的多用途魚雷。

ger_dm1=DM1魚雷(DM1),,反潛魚雷,德國開發的第一款線導反潛魚雷。
ger_dm2=DM2魚雷(DM2),,反水面魚雷,德國線導反艦魚雷。
ger_sst4=SST4魚雷(SST4),,反水面魚雷,德國出口用線導重型反艦魚雷。

it_a-244s_air=A-244魚雷(A-244),,反潛魚雷,A-244是義大利輕型空投反潛魚雷，具備主動與被動聲納導引。

jmsdf_type80=Type 80魚雷(Type 80),,魚雷,日本1970年代GRX計畫成果，融合美國Mk 37設計，性能全面優於Mk 37。
jmsdf_type54=Type 54魚雷(Type 54),,魚雷,日本戰後自行開發的第一款魚雷，經多次改良後穩定量產。

knm_tp612=TP612魚雷(TP612),,反水面魚雷,TP612是瑞典重型線導魚雷，沒有自動尋標器；它由TP611發展而來，降低噪音並具備滑出發射能力。
knm_tp613=TP613魚雷(TP613),,反水面魚雷,TP613是瑞典TP612的後續改良型，加入被動聲納尋標器以提升對水面目標的追蹤能力。

plan_yu-1=魚-1(Yu-1),,反水面魚雷,魚-1是中國第一種國產重型魚雷，屬於結構簡單可靠的直航魚雷，主要用於攻擊水面目標。
plan_yu-1g=魚-1G(Yu-1G),,反水面魚雷,魚-1G是魚-1的改良型，加入被動歸向能力，能更有效攻擊機動中的水面艦。
plan_yu-3=魚-3(Yu-3),,反潛魚雷,魚-3是中國被動聲納導引重型反潛魚雷，速度較慢，較適合攻擊柴電潛艦；導引頭最大探測距離約1600碼。
plan_yu-4=魚-4A(Yu-4A),,反水面魚雷,魚-4A是中國被動聲納導引重型反水面魚雷，速度較慢，通常只適合近距離攻擊。

rn_mark9_mod2=Mark IX魚雷(Mark IX),,反水面魚雷,英國Mark IX**是第二次世界大戰期間服役的直航反水面魚雷。此型具有更長續航時間與威力更強的彈頭，是1930年代原始Mark IX設計的最終升級型。

usn_mk16=Mk-16魚雷(Mk-16),,反水面魚雷,Mk-16是美國二戰時期設計的直航重型反艦魚雷，1950至1960年代仍由攻擊潛艦使用。雖無導引，但近距命中時威力極大，Mod 8結合高威力戰鬥部與較長射程。
usn_mk37=Mk-37 Mod 0魚雷(Mk-37 Mod 0),,魚雷,Mk-37是美國海軍標準輕型反潛魚雷並由多國使用。它於1959年服役，但速度太慢、性能不足，難以對抗現代蘇聯高性能潛艦。
usn_mk37_mod1=Mk-37 Mod 1魚雷(Mk-37 Mod 1),,魚雷,Mk-37是美國海軍標準輕型反潛魚雷並由多國使用。它於1959年服役，但速度太慢、性能不足，難以對抗現代蘇聯高性能潛艦。Mod 1加入線導能力，代價是速度略為下降。
usn_mk37_mod3=Mk-37 Mod 3魚雷(Mk-37 Mod 3),,魚雷,Mk-37是美國海軍標準輕型反潛魚雷並由多國使用。它於1959年服役，但速度太慢、性能不足，難以對抗現代蘇聯高性能潛艦。Mk-37 Mod 3換用新型尋標器以提升可靠性與獲取距離，其餘部分則與原始Mod 0相同。
usn_mk37_mod2=Mk-37 Mod 2魚雷(Mk-37 Mod 2),,魚雷,Mk-37是美國海軍標準輕型反潛魚雷並由多國使用。它於1959年服役，但速度太慢、性能不足，難以對抗現代蘇聯高性能潛艦。Mk-37 Mod 2換用新型尋標器以提升可靠性與獲取距離，其餘部分則與線導Mod 1相同。
usn_mk37c=Mk-37C魚雷(Mk-37C),,魚雷,Mk-37C是美國海軍Mk-37魚雷的升級型，採用Otto燃料與線導，性能較原型顯著提升。此型自1970年代中期起僅供外銷夥伴使用；Mk-37C（NT-37C）以改良推進系統將速度提高150%，射程接近兩倍，代價是噪音略高。
usn_mk37e=Mk-37E魚雷(Mk-37E),,魚雷,Mk-37E是Mk-37C的升級型，加入尾流歸向能力並重新設計尋標器。此型僅供外銷夥伴使用；Mk-37E（NT-37E）提升反艦能力並小幅改良推進系統，使其在1980年代中期成為能力優異的反潛兼反艦魚雷。
usn_mk44_air=Mk-44魚雷(Mk-44),,反潛魚雷,Mk-44是北約冷戰早期常見的輕型反潛魚雷，可靠度不錯但射程短、速度慢，對高速深潛目標較吃力；此型為空投版本。
usn_mk44_ship=Mk-44魚雷(Mk-44),,反潛魚雷,Mk-44是北約冷戰早期常見的輕型反潛魚雷，可靠度不錯但射程短、速度慢，對高速深潛目標較吃力；此型為水面艦發射版本。
usn_mk46_air=Mk-46 Mod 2魚雷(Mk-46 Mod 2),,反潛魚雷,Mk-46 Mod 2是多國使用的北約標準輕型魚雷，專為攻擊現代蘇聯高性能潛艦而設計；此型為空投版本。
usn_mk46_ship=Mk-46 Mod 2魚雷(Mk-46 Mod 2),,反潛魚雷,Mk-46 Mod 2是多國使用的北約標準輕型魚雷，專為攻擊現代蘇聯高性能潛艦而設計；此型為艦射版本。
usn_mk46_mod5_air=Mk-46 Mod 5魚雷(Mk-46 Mod 5 NEARTIP),NEARTIP,魚雷,Mk-46 Mod 5 NEARTIP是多國使用的北約標準輕型魚雷，專為攻擊現代蘇聯高性能潛艦而設計；此型為空投版本。\n\nMk-46 Mod 5 NEARTIP（近期改良計畫）是Mk-46魚雷的全面重製型，透過較慢且更安靜的巡航階段延伸射程，提升電子反反制能力，並可追蹤淺水區及浮航潛艦，但效果仍有限。
usn_mk46_mod5_ship=Mk-46 Mod 5魚雷(Mk-46 Mod 5 NEARTIP),NEARTIP,魚雷,Mk-46 Mod 5 NEARTIP是多國使用的北約標準輕型魚雷，專為攻擊現代蘇聯高性能潛艦而設計；此型為艦射版本。\n\nMk-46 Mod 5 NEARTIP（近期改良計畫）是Mk-46魚雷的全面重製型，透過較慢且更安靜的巡航階段延伸射程，提升電子反反制能力，並可追蹤淺水區及浮航潛艦，但效果仍有限。
usn_mk48=Mk-48 Mod 1魚雷(Mk-48 Mod 1),,魚雷,Mk-48 Mod 1是美國重型多用途魚雷，速度極快、射程長，具備線導能力與非常先進的尋標器。Mod 1是1972年首個服役型，以單一高性能魚雷取代舊式Mk-37及Mk-14/16戰備彈藥，但僅具單向線導。
usn_mk48_mod4=Mk-48 Mod 4魚雷(Mk-48 Mod 4),,魚雷,Mk-48 Mod 4是美國重型多用途魚雷，速度極快、射程長，具備線導能力與非常先進的尋標器。Mod 4是1980年代的升級型，改良尋標器以追蹤Alfa級核動力攻擊潛艦等最先進目標，並加入雙向線導以提升排除反制誘餌的能力。
usn_mk48_mod4_adcap=Mk-48 ADCAP魚雷(Mk-48 ADCAP),,魚雷,Mk-48 Mod 4（ADCAP）是美國重型多用途魚雷，速度極快、射程長，具備線導能力與非常先進的尋標器。Mod 4 ADCAP與全新生產的Mk-48 Mod 5 ADCAP計畫不同，是1985年針對既有Mod 4的升級，採用新型斜盤與燃油泵，將既有魚雷性能推至極限，終端速度提高至65節，並改良尋標器以提升排除反制誘餌的能力。

wp_45-36nu=45-36NU魚雷(45-36NU),,反水面魚雷,蘇聯仿義大利設計的450mm直航魚雷，二戰前技術，威力有限。
wp_53-38=53-38魚雷(53-38),,反水面魚雷,蘇聯二戰時期53公分直航重型魚雷，簡單可靠，曾造成歷史上最大船難。
wp_53-39=53-39魚雷(53-39),,反水面魚雷,蘇聯改良型53-38魚雷。
wp_53-56v=53-56魚雷(53-56),,反水面魚雷,蘇聯更新版53系列直航魚雷。
wp_53-65K=53-65K魚雷(53-65K),,尾流導引魚雷,蘇聯開發的尾流追蹤重型魚雷，專門打擊水面艦艇。
wp_65-76=65-76魚雷(65-76),,尾流導引魚雷,蘇聯650mm口徑巨型魚雷，針對航母設計，破壞力極大。
wp_at-1=AT-1魚雷(AT-1),,反潛魚雷,蘇聯直升機專用空投電動反潛魚雷，具備主被動聲納導引。
wp_at-2=AT-2魚雷(AT-2),,反潛魚雷,蘇聯重型空射反潛魚雷，罕見的重型空投魚雷。
wp_set-40=SET-40魚雷(SET-40),,反潛魚雷,蘇聯輕型電動反潛魚雷，主被動聲納導引。
wp_set-65=SET-65魚雷(SET-65),,反潛魚雷,蘇聯重型電動反潛魚雷，主動聲納導引。
wp_test-71=TEST-71魚雷(TEST-71),,反潛魚雷,TEST-71是蘇聯重型線導反潛魚雷，在SET-65基礎上加入更先進的主被動歸向能力。\n受線材與資料傳輸限制，TEST-71只能透過線導控制水平方向，發射後無法改變深度。
wp_test-71m=TEST-71M魚雷(TEST-71M),,反潛魚雷,TEST-71M是蘇聯重型線導反潛魚雷。此型採用改良數位導引段與升級線導單元，解除先前的線導限制，使射擊運用更具彈性。
wp_umgt-1=UMGT-1魚雷(UMGT-1),,反潛魚雷,蘇聯空投輕型反潛魚雷，也是SS-N-14/SS-N-16的搭載武器。
wp_uset-80=USET-80魚雷(USET-80),,魚雷,蘇聯現代雙用途重型魚雷，主被動聲納導引，對水面艦與潛艦均具威脅。

# ------------------ 炸彈 Bombs -----------------
fr_samp_t25=SAMP-25炸彈(SAMP-25),,炸彈,法國製230公斤(500磅)傳統炸彈，性能類似美國Mk-82。
fr_samp_t21=SAMP-21炸彈(SAMP-21),,炸彈,法國製400公斤(880磅)傳統炸彈，性能類似美國Mk-83。

pla_type-2=100公斤二型航彈(Type-100-2),,炸彈,Type-100-2是中國100公斤通用航空炸彈，性能大致相當於蘇聯FAB-100。
pla_type-3-250=250公斤三型航彈(Type-250-3),,炸彈,Type-250-3是中國250公斤通用航空炸彈，性能大致相當於蘇聯FAB-250。
pla_type-3-500=500公斤三型航彈(Type-500-3),,炸彈,Type-500-3是中國500公斤通用航空炸彈，性能大致相當於蘇聯FAB-500。

raf_bl755=BL755炸彈(BL755),,集束炸彈,英國BL755集束炸彈，內含147枚破甲高爆子彈頭，曾於兩伊戰爭與福克蘭戰爭中廣泛使用。

usaf_gbu-2=GBU-2鋪路一型(GBU-2 Paveway I),Paveway I,導引炸彈,美國GBU-2型2000磅(907公斤)雷射導引炸彈，基於Mk-84改裝。
usaf_gbu-15=GBU-15導引滑翔炸彈(GBU-15),,導引炸彈,GBU-15(V)2是美國紅外線影像導引滑翔炸彈，可由F-111與F-4E等戰術機使用。它具備可靠的IIR尋標器與資料鏈，可重新指定目標並回傳導引畫面。
usaf_bolt-117=BOLT-117雷射導引炸彈(BOLT-117),,導引炸彈,BOLT-117是美國750磅雷射導引炸彈，以M117傳統炸彈加裝鼻部雷射尋標器與導引翼面改造而成。
usaf_gbu-11=GBU-11鋪路一型(GBU-11 Paveway I),Paveway I,導引炸彈,GBU-11是美國3000磅雷射導引炸彈，屬於超重型導引炸彈，用於橋梁、掩體與其他堅固目標。
usaf_m117=M117航彈(M117),,炸彈,美國韓戰時期750磅(340公斤)炸彈，越戰中大量使用，後由Mk-80系列取代。
usaf_m118=M118破壞炸彈(M118),,破壞炸彈,M118是美國3000磅超重型破壞炸彈，用於橋梁、掩體、工事、鐵路等堅固或耐受目標。
usaf_cbu-24=CBU-24炸彈(CBU-24),,集束炸彈,美國CBU-24集束炸彈，內含665枚破片子彈頭，常用於攻擊地面防空陣地。

usn_gbu-10=GBU-10鋪路二型(GBU-10 Paveway II),Paveway II,導引炸彈,美國GBU-10型2000磅(907公斤)雷射導引炸彈，屬Paveway II升級版。
usn_gbu-12=GBU-12鋪路二型(GBU-12 Paveway II),Paveway II,導引炸彈,美國GBU-12型500磅(227公斤)雷射導引炸彈，基於Mk-82改裝。
usn_gbu-16=GBU-16鋪路二型(GBU-16 Paveway II),Paveway II,導引炸彈,GBU-16鋪路二型是美國1000磅雷射導引炸彈，以Mk 83彈體加裝雷射尋標器與導引翼面而成。
usn_gbu-24=GBU-24鋪路三型(GBU-24 Paveway III),Paveway III,導引炸彈,GBU-24 Paveway III是美國2000磅（907公斤）增程雷射導引炸彈。此型由Paveway II升級而來，改良導引並延長滑翔射程，同時提高可靠性且具備效率更佳的低空飛行剖面。
usn_mk-82=Mk-82通用炸彈(Mk-82),,炸彈,美國500磅(227公斤)低阻力通用炸彈。
usn_mk-82_snakeye=Mk-82蛇眼高阻炸彈(Mk-82 Snakeye),,炸彈,Mk-82蛇眼是500磅高阻通用炸彈，展開式尾翼讓飛機能以高速低空投放，代價是飛行時間較長。
usn_mk-83=Mk-83通用炸彈(Mk-83),,炸彈,美國1000磅(454公斤)低阻力通用炸彈。
usn_mk-84=Mk-84通用炸彈(Mk-84),,炸彈,美國2000磅(900公斤)低阻力通用炸彈。
usn_rockeye=CBU-100石眼(CBU-100 Rockeye),Rockeye,集束炸彈,美國CBU-100 Rockeye II型集束炸彈，投放247枚子彈頭。
usn_walleye2=AGM-62白眼二型(AGM-62 Walleye II),Walleye II,導引炸彈,美國AGM-62 Walleye II型電視導引滑翔炸彈，部分型號搭載W72核彈頭。

usn_mk54_dc=Mk-54深水炸彈(Mk-54),,深水炸彈,Mk-54深水炸彈是美國二戰時期研製的空投深水炸彈，冷戰期間仍持續服役。

wp_fab-100=OFAB-100航彈(OFAB-100),,炸彈,蘇聯設計100公斤(220磅)高爆通用炸彈。
wp_fab-250=FAB-250航彈(FAB-250),,炸彈,蘇聯設計250公斤(550磅)高爆通用炸彈。
wp_fab-500=FAB-500 M-62航彈(FAB-500 M-62),,炸彈,FAB-500 M-62是蘇聯500公斤高爆通用航空炸彈，主要由蘇聯及其盟國使用。
wp_fab-500_m54=FAB-500 M-54航彈(FAB-500 M-54),,炸彈,FAB-500 M-54是蘇聯500公斤高爆通用航空炸彈，彈體較短且阻力較大，便於大量或內載攜行，但精度不如低阻型。
wp_fab-1500_m54=FAB-1500 M-54航彈(FAB-1500 M-54),,炸彈,FAB-1500 M-54是蘇聯1500公斤大型高爆航空炸彈，主要用於大型軍艦、掩體或機場等堅固目標。
wp_fab-3000_m54=FAB-3000 M-54航彈(FAB-3000 M-54),,炸彈,FAB-3000 M-54是蘇聯3000公斤大型高爆航空炸彈，用於大型軍艦、掩體、機場等硬目標。
wp_fab-9000_m54=FAB-9000 M-54航彈(FAB-9000 M-54),,炸彈,FAB-9000 M-54是蘇聯9000公斤超大型高爆航空炸彈，是實戰曾使用過的最大級傳統炸彈之一，著重摧毀堅固目標。

wp_kab-500l=KAB-500L雷射導引炸彈(KAB-500L),,導引炸彈,KAB-500L是蘇聯500公斤雷射導引航空炸彈，以FAB-500為基礎加裝雷射尋標器與導引翼面。

wp_rbk-250=RBK-250集束炸彈(RBK-250),,集束炸彈,蘇聯設計250公斤(550磅)集束炸彈。
wp_rbk-500=RBK-500集束炸彈(RBK-500),,集束炸彈,蘇聯設計500公斤(1100磅)集束炸彈，內含多枚子彈頭。

wp_plab-100=PLAB-100深水炸彈(PLAB-100),,深水炸彈,PLAB-100是蘇聯100公斤空投反潛深水炸彈，主要由蘇聯及其盟國使用。

# ---------------- 聲納浮標 Sonobuoys ---------------
plan_skf-1=SKF-1被動聲納浮標(SKF-1),,被動聲納浮標,SKF-1是中國海軍自1960年代起使用的全向被動聲納浮標。
plan_skf-2=SKF-2被動聲納浮標(SKF-2),,被動聲納浮標,SKF-2是中國海軍自1970年代中期起使用的定向被動聲納浮標。

usn_ssq-41=AN/SSQ-41LOFAR聲納浮標(AN/SSQ-41 LOFAR),LOFAR,聲納浮標,AN/SSQ-41A「Jezebel」是LOFAR型聲納浮標，屬於常見的北約被動浮標；它不能像後期DIFAR浮標一樣判定方位，但靈敏度仍佳且庫存量大。
usn_ssq-47=AN/SSQ-47Julie主動聲納浮標(AN/SSQ-47 Julie),Julie,主動聲納浮標,AN/SSQ-47A「Julie」是持續主動、僅測距型聲納浮標，是常見的北約主動浮標。它無法判定方位，但可用多枚浮標固定既有接觸；因持續發信，壽命約30分鐘。
usn_ssq-53=AN/SSQ-53DIFAR聲納浮標(AN/SSQ-53 DIFAR),DIFAR,被動聲納浮標,美國SSQ-53型定向頻率分析與錄音(DIFAR)聲納浮標。
usn_ssq-62=AN/SSQ-62DICASS聲納浮標(AN/SSQ-62 DICASS),DICASS,主動聲納浮標,美國AN/SSQ-62 DICASS主動聲納浮標，用於精確定位潛艦。
usn_ssq-77=AN/SSQ-77VLAD聲納浮標(AN/SSQ-77 VLAD),VLAD,聲納浮標,AN/SSQ-77A是VLAD被動聲納浮標，採垂直線列DIFAR架構，靈敏度高、被動探測距離長，適合安靜深潛目標；缺點是重量與成本高，遠距精度也較差。
usn_ssq-101=AN/SSQ-101主動聲納浮標(AN/SSQ-101),,主動聲納浮標,美國AN/SSQ-101空投式主動接收器(ADAR)聲納浮標，用於淺水多基地聲納系統。

wp_rgb-1=RGB-1被動聲納浮標(RGB-1),,被動聲納浮標,蘇聯使用的無指向性被動聲納浮標。
wp_rgb-nm1=RGB-NM-1被動聲納浮標(RGB-NM-1),,被動聲納浮標,蘇聯Baku聲納系統配套的被動浮標。
wp_rgb-3=RGB-3主動聲納浮標(RGB-3),,主動聲納浮標,蘇聯專用的主動聲納浮標。

# ------------------ 折疊翼航空火箭 FFAR -----------------
usn_zuni=Zuni航空火箭(Zuni),,折疊翼航空火箭,Zuni是5吋折疊翼航空火箭，主要由對地攻擊機與攻擊直升機攜帶，可使用多種彈頭，通常裝於四聯裝LAU-10火箭莢艙。
usn_hydra=Hydra 70航空火箭(Hydra 70),,折疊翼航空火箭,Hydra 70是2.75吋折疊翼航空火箭，由戰鬥機與直升機廣泛使用，可搭配多種彈頭，通常以最多19發火箭莢艙攜帶。

wp_s-5=S-5航空火箭(S-5),,折疊翼航空火箭,蘇聯55毫米折疊翼空射火箭，源自二戰德國R4M火箭，通常以32發發射筒搭載。
wp_s-8=S-8航空火箭(S-8),,折疊翼航空火箭,蘇聯80毫米折疊翼空射火箭，含多種彈頭版本，包括跑道破壞型，通常以20發發射筒搭載。
wp_s-24=S-24航空火箭(S-24),,折疊翼航空火箭,S-24是蘇聯240毫米折疊翼航空火箭，由戰鬥轟炸機與直升機單枚攜帶。相較多數FFAR，它體積大、威力強，但不以莢艙成組發射。
wp_s-25=S-25航空火箭(S-25),,折疊翼航空火箭,S-25是蘇聯266毫米折疊翼航空火箭，是蘇聯最大級無導引火箭之一，戰鬥部含近60公斤炸藥，通常單枚攜帶。

# ------------------ 多管火箭 MLRS -----------------
ir_107mm_rocket=Haseb-1火箭(Haseb-1),,多管火箭,Haseb-1是伊朗版中國107毫米火箭，由63式多管火箭系統發射；在伊朗服役中，發射器與火箭常同稱Haseb。

usa_m26=M26火箭(M26),,多管火箭,M26是美國陸軍M270多管火箭系統使用的227毫米無導引火箭，彈頭可散布大量子彈藥覆蓋廣大區域。

wp_grad=冰雹火箭(Grad),,多管火箭,Grad是蘇聯BM-21多管火箭系統使用的M-21OF火箭，完整系統通常稱為「冰雹」。

