Default=63式自走防空砲(Type 63 SPAAG),Type 63 SPAAG
DefaultDescription=63式自走防空砲以T-34車體搭配雙聯裝61式37毫米防空砲砲塔製成。中國在越戰期間曾將此車提供給北越軍，但其來源仍有不同說法。戰後北越軍與解放軍都曾使用，最後於1990年退役。
