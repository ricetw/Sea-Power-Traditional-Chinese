[ -------------------- 地面載具(Vehicles) -------------------- ]
[pla_apc_type63]
Type=裝甲運兵車
Default=63式裝甲運兵車(Type 63 APC),Type 63 APC
DefaultDescription=63式裝甲運兵車性能定位近似美國M113，是中國第一款未依賴蘇聯援助設計的裝甲車。它和M113一樣改裝彈性高，曾由中國及越南、北韓、孟加拉、伊拉克等友好國家使用；越戰期間提供給北越軍，兩伊戰爭中也曾服役。1990年代起，中國部隊逐步以ZSD-89取代。
Variant1=63式裝甲運兵車(Type 63 APC),Type 63 APC

[pla_lt_type_63]
Type=輕型戰車
Default=63式輕型戰車(Type 63 LT),Type 63 LT
DefaultDescription=63式水陸兩棲輕型戰車由蘇聯PT-76發展而來，於1960年代中期開始服役。相較PT-76，它改為四人乘員、左側駕駛席、中央砲塔，並可在水上除水噴射推進外輔以履帶划行。它曾出口給多個中國友好國家，並在越戰後期首次參戰；後來中國一線部隊以改良型63A取代。
Variant1=63式輕型戰車(Type 63 LT),Type 63 LT
Variant2=63式輕型戰車(Type 63 LT),Type 63 LT
Variant3=63式輕型戰車(Type 63 LT),Type 63 LT
Variant4=63式輕型戰車(Type 63 LT),Type 63 LT
Variant5=63式輕型戰車(Type 63 LT),Type 63 LT
Variant6=63式輕型戰車(Type 63 LT),Type 63 LT
Variant7=63式輕型戰車(Type 63 LT),Type 63 LT

[pla_spaag_type63]
