[LoadoutNames]
#------------------------------------------ 新系統 ------------------------------------------
# - LongRange 表示飛機的作戰航程，不是武器射程
# ---------- 必要掛載 ----------
Default=預設掛載                            // 通常是此機型最常見的掛載
Ferry=轉場掛載                              // 最大化副油箱，不攜帶武器，機砲與箔條除外
Empty=空載掛載                              // 不攜帶副油箱與武器，機砲與箔條除外

# ---------- 空對空掛載 ----------
AirToAir=空對空                             // 此機型的標準空對空掛載
AirToAirLongRange=遠程空對空                // 空對空掛載，武器較少、燃油較多
AirToAirIntercept=空對空攔截                // 偏重中距/短距空對空飛彈的攔截掛載

# ---------- 對地/對水面打擊掛載 ----------
Strike=對地打擊                             // 無導引炸彈，通常一次齊射
StrikeLongRange=遠程對地打擊                // 與對地打擊相同，但武器較少、燃油較多
StrikePrecision=精確對地打擊                // 導引炸彈或打擊飛彈，如 AS-7
StrikeHeavy=重型對地打擊                    // 重型轟炸機用打擊掛載，供 AI 識別使用
StrikeDemo=破壞打擊                         // 使用超重型炸彈（>1300kg）摧毀碉堡、橋梁等硬目標
StrikeLowAlt=低空打擊                       // 低空打擊用延遲/減速炸彈，如 Snakeye 或傘降炸彈

CAS=近距空中支援                            // 火箭、集束炸彈、炸彈；通常小批次投放以增加攻擊次數
CASLight=輕型近距空中支援                   // 類似近距空中支援，但偏重續航力而非載彈量
AntiArmor=反裝甲                            // 主要用於攻擊地面車輛的打擊飛彈，如 AS-7

LandAttack=陸攻                              // 遠程空對地巡弋飛彈掛載，如 AGM-86C 或 RGM-109C 陸攻飛彈

# ---------- 反艦掛載 ----------
AntiShip=反艦                               // 泛用反艦掛載，可包含無導引炸彈到中程飛彈
AntiShipLongRange=遠程反艦                  // 與反艦相同，但加掛副油箱
AntiShipPrecision=精確反艦                  // 可包含導引炸彈與飛彈的反艦掛載
AntiShipHeavy=重型反艦                      // 標示 Tu-22、Tu-16 等重型反艦轟炸機，或小型機最大武裝掛載

# ---------- 反潛掛載 ----------
ASW=反潛                                    // 多用途反潛：魚雷、深水炸彈、聲納浮標
ASWHunter=反潛搜索                          // 僅攜帶聲納浮標，無武器
ASWHunterLight=輕型反潛搜索                 // 僅攜帶聲納浮標，無武器
ASWKiller=反潛攻擊                          // 僅攜帶反潛武器
ASWBomb=反潛深彈                            // 反潛深水炸彈
ASWLongRange=遠程反潛                       // 魚雷加副油箱

# ---------- 特殊掛載 ----------
SEAD=防空壓制                               // 反輻射飛彈、集束炸彈
SEADLongRange=遠程防空壓制                  // 與防空壓制相同，但武器較少、副油箱較多
SEADAdvanced=進階防空壓制                   // 使用需控管、供應有限或限時可用的彈藥，如 HARM、STARM 或 AS-11

AEW=空中預警                                // 標示飛機用途；此掛載通常等同於空載
Recon=偵察                                  // 標示偵察用途，有時用於攜帶偵察莢艙
EW=電子戰                                   // 標示電子戰用途，有時用於攜帶電子戰莢艙
Transport=運輸                              // 標示運輸用途

Tanker=空中加油                             // 加油機掛載，允許空中加油

Gun=機砲限定                                // 僅裝填機砲彈藥

# ---------- 貨物掛載 ----------
Containers=貨櫃
Munitions=彈藥
MilitaryVehicles=軍用車輛
DryCargo=乾貨
Vehicles=車輛
Fertilizer=肥料
Lighters=駁船
Oil=原油
Ore=礦石
Passengers=乘客
Troops=部隊

# ---------- 通用單位掛載選項 ----------
Early=早期
Late=後期
