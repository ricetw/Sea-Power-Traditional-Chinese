Taskforce1StartmessageMessage=CLASH DANS LES\nPARACELS (1974)|Les forces vietnamiennes envahissent nos eaux territoriales dans les Paracels et tentent d'intimider nos pêcheurs. Commandez une force de surface de la flotte des mers du Sud pour les localiser et les repousser.\n\nLes forces ennemies déploient deux anciens destroyers de la marine américaine et un dragueur de mines reconverti. Détruisez toutes les forces ennemies rencontrées et attendez les ordres. Deux Q-5 de la PLANAF sont en approche depuis la base aérienne de Lingshui en soutien aérien. Ils seront au rendez-vous à 21h35Z. \n\nAu moins un de vos navires doit survivre.|Commencer la mission
Taskforce1OneplayershipmustsurviveMessage=DEFAITE|Défaite ! Tous vos navires ont été détruits !|Quitter la mission
