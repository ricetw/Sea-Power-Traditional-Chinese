Description=베트남군은 현재 시사 군도에 전진기지를 설치하려 시도중입니다. 이는 우리 중국 어부들을 위협하는 행위이자, 영토 권리를 방해하는 행위입니다. 소규모의 인민해방군 해군 수상함 전대를 지휘해 해당 지역을 조사 후 접촉한 적군을 몰아내십시오.
