Taskforce1StartmessageMessage=西沙\n衝突（1974）|越南部隊正侵入我方在西沙的領海，企圖恐嚇我方漁民。指揮南海艦隊水面部隊搜尋並驅離他們。\n\n敵軍操作兩艘前美國海軍驅逐艦與一艘改裝掃雷艦。摧毀遭遇的所有敵軍，然後等待進一步命令。2 架 PLANAF Q-5 已自陵水空軍基地起飛前來支援，預計 2135Z 抵達上空。\n\n至少一艘我方艦艇必須存活。|開始任務
