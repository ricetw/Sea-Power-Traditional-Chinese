Taskforce1StartmessageMessage=西沙諸島の衝突\n(1974)|ベトナム軍が西沙諸島の我が国領海に侵入し、漁民に対し威嚇を繰り返している。南海艦隊の水上部隊を指揮し、敵部隊を捕捉・駆逐せよ。\n\n敵兵力は旧米海軍駆逐艦2隻および改造掃海艇1隻で構成されている。遭遇した全ての敵部隊を撃滅し、次命を待て。人民解放軍海軍航空兵（PLANAF）のQ-5攻撃機2機が支援のため陵水基地を離陸して向かっており、2135Zまでに現地に到達する予定である。\n\n少なくとも1隻の自艦を生存させなければならない。|作戦開始
Taskforce1OneplayershipmustsurviveMessage=敗北|作戦失敗！全自艦が撃沈された。|作戦終了
Taskforce1Allenemyshipsdestroyed-playervictoryMessage=勝利|作戦成功！全敵部隊を撃滅し、我が領海の安全は確保された。|作戦終了
Objective_DestroyEnemyForces=遭遇した全ての敵部隊を撃滅せよ
Objective_OnePlayerShipMustSurvive=少なくとも1隻の自艦を生存させよ
