Name=PLAN 01 - 西沙諸島の衝突 (1974)
Description=ベトナム軍が西沙諸島に前進拠点の構築を試み、我が国の漁民を脅かし領有権を侵害している。人民解放軍海軍（PLAN）の小型水上任務部隊を指揮し、当該海域を調査して遭遇した敵軍を駆逐せよ。
