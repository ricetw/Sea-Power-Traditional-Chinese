Taskforce1StartmessageMessage=파라셀 \n충돌 (1974)|베트남 군대가 시사 군도의 우리 영해를 공격하며 어부들을 위협하고 있습니다. 남해 함대의 지상군을 지휘하여 그들을 찾아 쫓아내세요.\n\n적군은 두 척의 전 미 해군 구축함과 개조된 지뢰 제거기를 운용하고 있습니다. 마주친 모든 적 병력을 파괴한 후 추가 명령을 기다립니다. 2대의 중국공군 Q-5가 링수이 공군 기지에서 지원을 위해 갑판 밖으로 나가 2135Z까지 보고합니다.\n\n적어도 한 척의 배는 반드시 살아남아야 합니다.|미션 시작
Taskforce1OneplayershipmustsurviveMessage=패배|패배! 당신의 모든 함선이 격침되었습니다!|미션 나가기
Taskforce1Allenemyshipsdestroyed-playervictoryMessage=승리|승리! 모든 적 부대가 파괴되었고 우리 영해는 안전합니다!|미션 끝내기
