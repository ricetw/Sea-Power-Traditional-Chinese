Description=중월 전쟁이 진행 중이며, 베트남군은 다시 한 번 파라셀에서 인민해방군을 축출하려고 시도하고 있습니다. 소련의 지원으로 그들은 로버트 섬에 있는 고립된 전초 기지를 공격하고 있습니다. 하이난에서 남해 함대를 지휘하여 파라셀에서 우리 군대를 재보급하고 강화하며, 베트남의 반격을 격파하십시오.
