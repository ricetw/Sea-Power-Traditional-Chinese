Taskforce1StartMessage=<size=20>1979 年中越戰爭</size>\n南海\n海戰|中越陸上敵對行動展開之際，我方位於西沙的孤立據點遭越南與蘇聯攻擊。一支增援船隊已自榆林海軍基地出發。護送船隊前往西沙，並摧毀遭遇的任何敵軍。\n\n據報越南輕型兵力正自海防向東移動，一支以斯維爾德洛夫級巡洋艦 Admiral Senyavin 為核心的小型蘇聯部隊昨夜離開金蘭灣。\n\n至少一艘船隊登陸艦必須存活。|開始任務
StartForecast=1030 Local: Rain stops, Wind Force 3
Taskforce1AtleastoneLSTmustsurviveMessage=失敗|發自：南海艦隊司令\n致：南部戰區司令\n\n1. 南海攻擊部隊回報，前往西沙群島的我方增援群已遭越南與蘇聯兵力摧毀。\n\n2. 我們已命令該區所有兵力撤回海南重整。對越南的後續行動仍在計畫中。\n\n3. 現場指揮官、南海攻擊部隊司令，將搭乘最早軍機返回接受質詢。|結束任務
Taskforce1Time+30minweatherchangeMessage=海軍電文|發自：南海艦隊司令\n致：南海攻擊部隊司令\n\n1. 當地時間 1030 的天氣觀測顯示惡劣天候正在解除。三亞空軍基地現在可以實施空中作戰。\n\n2. 空軍第 8 航空師與 PLANAF 第 5 航空師飛機現可供調派。\n\n3. 由於戰損與飛彈大量消耗，僅能提供少量架次。祝好運。|確認並繼續
Taskforce1DestroySverdlovSAGandconvoyreachareaMessage=勝利|發自：南海攻擊部隊司令\n致：南部戰區司令\n\n1. 南海攻擊部隊欣然回報，增援船隊已成功抵達我方位於琛航島的守備部隊。\n\n2. 此外，越南的攻擊已被擊退。其由蘇聯輕巡洋艦 ADMIRAL SENYAVIN 支援的襲擊兵力已被摧毀。\n\n3. 我方雖有損失，但對敵取得重大勝利。|結束任務
Taskforce1Noplayershipsremaining-defeatMessage=失敗|發自：南海艦隊司令\n致：南部戰區司令\n\n1. 我們已與所有分配至西沙群島行動的艦艇失去聯絡。評估所有艦艇均已在對敵作戰中損失。\n\n2. 我們已命令該區所有兵力撤回海南重整。對越南的後續行動仍在計畫中。\n\n3. 現場指揮官、南海攻擊部隊司令已失蹤，推定陣亡。|結束任務
