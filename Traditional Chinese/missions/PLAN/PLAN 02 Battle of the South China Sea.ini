Taskforce1StartMessage=<size=20>중월전쟁 1979</size>\n남중국해\n전투|중국과 베트남 사이의 육지에서 적대 행위가 진행됨에 따라 시사 군도에 있는 고립된 전초 기지가 베트남과 소련의 공격을 받게 되었습니다. 유린 해군 기지에서 강화 호송대가 파견되었습니다. 호송대를 시사 군도로 호송하고 마주친 적 병력을 모두 격파하세요.\n\n베트남 경군이 하이퐁에서 동쪽으로 이동 중인 것으로 알려졌으며, 소규모 소련군이 어젯밤 스베르들로프급 순양함 세냐빈 제독을 중심으로 캄란을 떠났습니다.\n\n적어도 하나의 호송 상륙함은 생존해야 합니다.|미션 시작
StartForecast=1030 로컬: 비 멈춤, 바람세기 3
Taskforce1AtleastoneLSTmustsurviveMessage=패배|발신: 남해함대 사령부\n수신: 남부전구 사령부\n\n1. 남해 공격 부대는 시사 군도로 향하는 우리의 원군이 베트남과 소련군에 의해 파괴되었다고 보고했습니다.\n\n2. 우리는 이 지역의 모든 병력에게 재편성을 위해 하이난으로 후퇴하라고 명령했습니다. 베트남에 대한 추가 조치가 계획되어 있습니다.\n\n3. 현장 지휘관인 남해 공격군 사령관은 심문을 위해 가장 빠른 군용 비행기로 도착할 것입니다.|임무 종료
Taskforce1Time+30minweatherchangeMessage=해군 메세지|발신: 남해함대 사령관\n수신: 남해 공격대 사령관\n\n1. 현지 시간으로 10시 30분에 기상 관측을 통해 기상이 크게 상승하는 것을 확인할 수 있습니다. 이제 산야 공군 기지에서 항공 작전이 가능합니다.\n\n2. 제8항공사단 및 중국해군항공대 제5항공사단 항공기가 이제 임무 수행이 가능합니다.\n\n3. 전투 손실과 대량 미사일 사용으로 인해 몇 가지 종류만 가능합니다. 행운을 빕니다.|확인됨 & 계속
Taskforce1DestroySverdlovSAGandconvoyreachareaMessage=승리|발신: 남해공격대 사령관\n수신: 남부전구 사령부\n\n1. 매우 기쁘게도, 남해 공격군은 강화 호송대가 로버트 섬에 있는 우리 수비대에 성공적으로 도착했다고 보고합니다.\n\n2. 게다가 베트남군의 공격이 격퇴되었습니다. 소련 경순양함 제독 센야빈의 지원을 받은 그들의 습격 부대는 파괴되었습니다.\n\n3. 우리는 패배를 당했지만, 적을 상대로 큰 승리를 거두었습니다.|임무 종료
Taskforce1Noplayershipsremaining-defeatMessage=패배|발신: 남해함대 사령관\n수신: 남부전구 사령부\n\n1. 시사 군도 작전에 배정된 모든 선박과의 모든 연락이 끊겼습니다. 우리는 적에 대한 전투에서 모든 함선을 잃었다고 평가합니다.\n\n2. 우리는 이 지역의 모든 병력에게 재편성을 위해 하이난으로 후퇴하라고 명령했습니다. 베트남에 대한 추가 조치가 계획되어 있습니다.\n\n3. 현장 지휘관인 남해 공격군 사령관이 실종되어 사망한 것으로 추정됩니다.|임무 종료
