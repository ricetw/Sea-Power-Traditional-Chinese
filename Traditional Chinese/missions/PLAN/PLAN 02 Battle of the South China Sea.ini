Name=PLAN 02 - 南シナ海海戦 (1979)
Description=中越戦争が勃発し、ベトナム軍が再び西沙諸島から人民解放軍を排除しようと試みている。ソ連の支援を受けた敵軍は、孤立したロバート島（甘泉島）の拠点へ攻撃を開始した。海南島の南海艦隊を指揮し、西沙諸島の自軍への補給と増援を完遂せよ。また、ベトナム軍によるいかなる反撃も粉砕せよ。
