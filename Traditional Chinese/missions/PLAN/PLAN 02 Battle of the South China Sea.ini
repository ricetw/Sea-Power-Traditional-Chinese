NeutralLandUnit1ShortNameOverride=三亜航空基地
Taskforce1StartMessage=<size=20>1979年 中越戦争</size>\n南シナ海海戦|中越両国の地上戦が続く中、西沙諸島の孤立した我が拠点に対し、ベトナムおよびソ連軍が攻撃を開始した。楡林海軍基地より増援船団が派遣されている。船団を西沙諸島まで護衛し、遭遇した敵部隊を撃破せよ。\n\n情報によれば、ベトナム軽快部隊がハイフォンから東進中であり、昨夜にはスヴェルドロフ級巡洋艦アドミラル・セニャーウィンを中心とするソ連小型部隊がカムラン湾を出撃した。\n\n少なくとも1隻の揚陸艦（LST）を生存させなければならない。|作戦開始
StartForecast=現地時間 1030：雨は止み、風力3
Taskforce1AtleastoneLSTmustsurviveMessage=敗北|発：南海艦隊司令官\n宛：南部戦区司令官\n\n1. 南海攻撃部隊より、西沙諸島へ向かっていた増援部隊がベトナム・ソ連連合軍により全滅したとの報告あり。\n\n2. 当該海域の全部隊に対し、再編のため海南島への撤退を命じた。対ベトナム作戦の再検討を期す。\n\n3. 現場指揮官である南海攻撃部隊指揮官は、査問のため最短の軍用便にて帰還予定である。|作戦終了
Taskforce1Time+30minweatherchangeMessage=海軍通信|発：南海艦隊司令官\n宛：南海攻撃部隊指揮官\n\n1. 現地時間 1030の気象観測によれば、荒天は回復しつつある。三亜航空基地からの航空作戦が可能となった。\n\n2. 第8航空師団および海軍航空兵（PLANAF）第5航空師団の機体が投入可能である。\n\n3. 戦闘損失およびミサイルの枯渇により、実施可能な出撃回数は限られている。諸君の健闘を祈る。|了解、作戦続行
Taskforce1DestroySverdlovSAGandconvoyreachareaMessage=勝利|発：南海攻撃部隊指揮官\n宛：南部戦区司令官\n\n1. 南海攻撃部隊は、増援船団がロバート島（甘泉島）の駐屯地に無事到達したことを報告する。\n\n2. さらにベトナム軍の攻撃を撃退した。ソ連軽巡洋艦アドミラル・セニャーウィンに支援された敵襲撃部隊を撃破した。\n\n3. 我が方も損害を被ったが、敵に対し大いなる勝利を収めた。|作戦終了
Taskforce1Noplayershipsremaining-defeatMessage=敗北|発：南海艦隊司令官\n宛：南部戦区司令官\n\n1. 西沙諸島作戦に割り当てられた全艦艇との通信が途絶した。全艦が敵との戦闘で失われたものと判断する。\n\n2. 当該海域の全部隊に対し、再編のため海南島への撤退を命じた。対ベトナム作戦の再検討を期す。\n\n3. 現場指揮官である南海攻撃部隊指揮官は、戦闘中行方不明（MIA）となり、死亡したものと推定される。|作戦終了
