Name=PLAN 02 - Schlacht im Südchinesischen Meer (1979)
Description=Der sino-vietnamesische Krieg tobt, und vietnamesische Kräfte versuchen erneut, die PLA von den Paracel-Inseln zu vertreiben. Mit sowjetischer Unterstützung greifen sie unseren isolierten Vorposten auf Robert Island an. Übernehmen Sie das Kommando über die Südmeeresflotte auf Hainan, um unsere Kräfte auf den Paracel-Inseln zu verstärken und jeden vietnamesischen Gegenangriff zu vernichten
