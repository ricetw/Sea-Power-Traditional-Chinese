[Language_cn]
Name=PLAN 02－南海海戰（1979）
Description=中越戰爭正在進行，越南部隊再次企圖將解放軍逐出西沙。在蘇聯支援下，他們正對我方位於琛航島的孤立據點發動攻擊。指揮海南的南海艦隊兵力，向西沙我軍補給並增援，摧毀任何越南反擊。
