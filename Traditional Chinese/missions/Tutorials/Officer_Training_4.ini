[Language_ja]
Name=士官訓練4 - 空母航空作戦
Description=このチュートリアルでは、戦闘空中哨戒 (CAP) の維持・更新、偵察の実施、艦船および地上目標に対する攻撃機の発艦方法など、空母航空作戦の遂行について学ぶ。このミッションでは、ソ連の空母ヴィリニュスを指揮する。
