[Language_en]
Name=Officer Training 4 - Carrier Operations
Description=In this tutorial, we will learn how to conduct carrier operations, including how to maintain and refresh Combat Air Patrol, conduct reconnaissance, and launch an anti-surface strike against both ship and ground targets. In this mission we will command the Soviet carrier Vilnus.
Taskforce1StartFreeContentPath=missions\Tutorials\Officer_Training_4_briefing\t04_window_1.xml
Taskforce1StartFreeContentAssets=missions\Tutorials\Officer_Training_4_briefing
Taskforce1DestroyallredforcesMessage=MISSION UPDATE|Congratulations, Commander! You have destroyed all the enemy forces present in this tutorial! You can use the tutorial windows to now exit the scenario.|Continue
[Language_cn]
Name=軍官訓練 4－潛艇與魚雷
Description=在此教學中，我們將學習潛艇操作、聲納運用，以及如何使用魚雷攻擊敵方目標。
Taskforce1StartFreeContentPath=missions\Tutorials\Officer_Training_4_briefing\t04_window_1_cn.xml
Taskforce1StartFreeContentAssets=missions\Tutorials\Officer_Training_4_briefing
Taskforce1DestroyallredforcesMessage=任務更新|恭喜你，指揮官！你消滅了此教學中的所有敵軍！你現在可以使用教學視窗退出場景。|繼續
[Language_ru]
Name=Officer Training 4 - Carrier Operations (Soviet)
[Language_de]
Name=Offiziersausbildung 4 - Flugzeugträgerbetrieb
Description=In diesem Tutorial werden Sie den Ablauf von Trägeroperationen erlernen. Dazu gehören das Aufrechterhalten und Auffrischen der Combat Air Patrol, die Durchführung von Aufklärungsflügen sowie die Durchführung eines Angriffs gegen See- und Landziele. In dieser Mission führen Sie den sowjetischen Träger Vilnus.
Taskforce1StartFreeContentPath=missions\Tutorials\Officer_Training_4_briefing\t04_window_1_de.xml
Taskforce1StartFreeContentAssets=missions\Tutorials\Officer_Training_4_briefing
Taskforce1DestroyallredforcesMessage=MISSIONSUPDATE|Herzlichen Glückwunsch, Kommandant! Sie haben alle feindlichen Kräfte in diesem Tutorial vernichtet! Sie können nun das Szenario über das Tutorial-Fenster beenden.|Weiter
[Language_es]
Name=Officer Training 4 - Carrier Operations (Soviet)
[Language_fr]
Name=Leçon n°4 - Opérations aéronavales
Description=Dans ce tutoriel, nous allons apprendre à mener des opérations aériennes, notamment à maintenir et à renouveler les patrouilles aériennes, à effectuer des missions de reconnaissance et à lancer des frappes antinavires contre des cibles maritimes et terrestres. Dans cette mission, nous prendrons les commandes du porte-avions soviétique Vilnus.
Taskforce1StartFreeContentPath=missions\Tutorials\Officer_Training_4_briefing\t04_window_1_fr.xml
