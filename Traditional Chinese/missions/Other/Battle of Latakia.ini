[Language_ja]
Name=ラタキア沖海戦 (1973年)
Description=昨日、シリアとエジプトによるイスラエルへの大規模な攻撃が開始され、第四次中東戦争（ヨム・キプル戦争）が勃発した。イスラエル海軍はラタキアのシリア軍港を急襲し、敵軍を誘き出して撃滅する任務を帯びている。
Taskforce1StartmessageMessage=<size=20>第四次中東戦争 - 第1部</size>\nラタキア沖海戦|昨日、アラブ諸国によるイスラエルへの攻撃が開始され、第四次中東戦争が勃発した。海上においてイスラエル最高司令部は、第3シャイェテット（第3ミサイル艇隊）に対し、ラタキアのシリア軍基地への攻撃を命じた。\n\nハイファより北上し、遭遇するすべてのシリア軍戦力を撃破せよ。\n\n少なくとも自軍のミサイル艇1隻が生存せねばならない。|作戦開始
Taskforce1Syrianshipsdestroyed-playervictoryMessage=勝利|勝利！シリア軍戦力は貴部隊により撃滅された。もはや海上におけるイスラエルの脅威ではない。見事な手際だ、指揮官。|作戦終了
Taskforce1Sinktrawler-defeatMessage=敗北|指揮官、貴殿はソ連の密偵漁船（スパイ・トロール船）を撃沈した。ソ連に対するこの交戦行為は、我々の致命的な敗北を招くものだ！|作戦終了
Objective_DestroySyrianShips=遭遇した全シリア軍戦力の撃破
Objective_OnePlayerShipMustSurvive=少なくともイスラエルミサイル艇1隻が生存
[Language_en]
Name=The Battle of Latakia (1973)
Description=The Yom Kippur War began yesterday, with large-scale attacks on Israel by Syria and Egypt. The Israeli Navy has been tasked with raiding the Syrian harbor at Latakia to draw out and destroy their forces.
Taskforce1StartmessageMessage=<size=20>The Yom Kippur War - Part 1</size>\nTHE BATTLE OF LATAKIA|Israel was attacked yesterday by the Arab states igniting the Yom Kippur War. At sea, Israeli high command has ordered the 3rd Shayetet (missile boat flotilla) to execute a naval attack on the Syrian base at Latakia.\n\nProceed north from Haifa, then destroy all Syrian forces encountered.\n\nAt least one of your missile boats must survive.|Start mission
Taskforce1Syrianshipsdestroyed-playervictoryMessage=VICTORY|Victory! The Syrian forces have been destroyed by your force and will no longer pose a threat at sea to Israel. Good work, Commander.|Exit mission
Taskforce1Sinktrawler-defeatMessage=DEFEAT|Commander, you have sunk the Soviet spy trawler. This act of war against the Soviets will ensure our defeat!|Exit mission
Objective_DestroySyrianShips=Destroy all Syrian forces encountered
Objective_OnePlayerShipMustSurvive=At least one Israeli missile boat must survive
[Language_fr]
Name=La bataille de Lattaquié (1973)
Description=La guerre du Kippour a débuté hier, avec des attaques de grande ampleur contre Israël par la Syrie et l'Égypte. La marine israélienne a reçu pour mission de lancer un raid sur le port syrien de Lattaquié afin d'en extraire et de détruire leurs forces.
Taskforce1StartmessageMessage=<size=20>La guerre du Kippour - 1ère partie</size>\nLA BATAILLE DE LATTAQUIÉ|Israël a été attaqué hier par les États arabes, déclenchant la guerre du Kippour. En mer, le haut commandement israélien a ordonné à la 3e Shayetet (flottille de vedettes lance-missiles) de lancer une attaque navale contre la base syrienne de Lattaquié.\n\n Depuis Haïfa, dirigez-vous vers le nord, puis détruisez toutes les forces syriennes rencontrées.\n\nAu moins une de vos vedettes lance-missiles doit survivre.|Commencer la mission
Taskforce1Syrianshipsdestroyed-playervictoryMessage=VICTOIRE|Victoire ! Les forces syriennes ont été anéanties par vos troupes et ne représenteront plus une menace maritime pour Israël. Bravo, Commandant.|Quitter la mission
Taskforce1Sinktrawler-defeatMessage=DEFAITE|Commandant, vous avez coulé le chalutier espion soviétique. Cet acte de guerre contre les Soviétiques va certainement précipiter notre défaite !|Quitter la mission
Objective_DestroySyrianShips=Détruire toutes les forces syriennes rencontrées
Objective_OnePlayerShipMustSurvive=Au moins une vedette lance-missiles israëlienne doit survivre
[Language_cn]
Name=拉塔基亞海戰（1973）
Description=贖罪日戰爭於昨日爆發，敘利亞與埃及對以色列發動大規模攻擊。以色列海軍奉命突襲敘利亞的拉塔基亞港，引出並摧毀其海上兵力。
Taskforce1StartmessageMessage=<size=20>贖罪日戰爭－第一部</size>\n拉塔基亞海戰|以色列昨日遭阿拉伯國家攻擊，贖罪日戰爭爆發。海上方面，以色列最高指揮部命令第 3 飛彈艇中隊對敘利亞拉塔基亞基地發動海上攻擊。\n\n自海法向北航行，摧毀遭遇的所有敘利亞兵力。\n\n至少一艘我方飛彈艇必須存活。|開始任務
Taskforce1Syrianshipsdestroyed-playervictoryMessage=勝利|勝利！敘利亞兵力已被我方摧毀，將不再於海上威脅以色列。幹得好，指揮官。|結束任務
Taskforce1Sinktrawler-defeatMessage=失敗|指揮官，你擊沉了蘇聯間諜拖網漁船。這種對蘇聯的戰爭行為將導致我們失敗！|結束任務
Objective_DestroySyrianShips=摧毀遭遇的所有敘利亞兵力
Objective_OnePlayerShipMustSurvive=至少一艘以色列飛彈艇必須存活
[Language_ru]
Name=Бой при Латакии (1973)
Description=Война Судного дня началась с масштабных атак на Израиль со стороны Сирии и Египта. В ответ, Израильский флот совершиает набег на сирийскую гавань в Латакии, чтобы выманить и уничтожить корабли находящиеся в ней. Это было первое в истории морское сражение между ракетными катерами и первый случай применения средств РЭБ.
Taskforce1StartmessageMessage=<size=20>Война Судного Дня - Часть 1</size>\nБОЙ ПРИ ЛАТАКИИ|Вчера Израиль подвергся нападению со стороны арабских государств, что развязало войну Судного дня.Израильское высшее командование приказало 3-му шайетету (флотилии ракетных катеров) провести морскую атаку на сирийскую базу в Латакии.\n\nДвигайтесь на север от Хайфы, затем уничтожьте все встреченные сирийские силы.\n\nПо крайней мере один из ваших ракетных катеров должен уцелеть.|Начать миссию
Taskforce1Syrianshipsdestroyed-playervictoryMessage=Победа|Победа! Сирийские корабли потоплены вашими силами и больше не будут представлять угрозу Израилю на море. Хорошая работа, Командир.|Покинуть миссию
Taskforce1Sinktrawler-defeatMessage=ПОРАЖЕНИЕ|Командующий, вы потопили советский корабль-шпион. Без сомнения Советский Союз воспримет это как акт агрессии,что существенно осложнит наше положение. \nМиссия провалена, возвращайтесь.|Покинуть миссию
Objective_DestroySyrianShips=Уничтожить все Сирийские корабли
Objective_OnePlayerShipMustSurvive=По крайней мере один союзный корабль должен уцелеть
[Language_de]
Name=Die Schlacht von Latakia (1973)
Description=Der Jom-Kippur-Krieg begann gestern mit großangelegten Angriffen Syriens und Ägyptens auf Israel. Die israelische Marine wurde beauftragt, den syrischen Hafen von Latakia anzugreifen, um deren Seestreitkräfte herauszulocken und zu vernichten.
Taskforce1StartmessageMessage=<size=20>Der Jom-Kippur-Krieg – Teil 1</size>\nDIE SCHLACHT VON LATAKIA|Israel wurde gestern von den arabischen Staaten angegriffen, wodurch der Jom-Kippur-Krieg ausgelöst wurde. Zur See hat die israelische Führung der 3. Shayetet (Lenkwaffenschnellboot-Flottille) befohlen, einen Seeangriff auf den syrischen Stützpunkt Latakia durchzuführen.\n\nVon Haifa aus nordwärts verlegen und alle angetroffenen syrischen Kräfte vernichten.\n\nMindestens eines Ihrer Lenkwaffenschnellboote muss überleben.|Mission starten
Taskforce1Syrianshipsdestroyed-playervictoryMessage=SIEG|Sieg! Die syrischen Streitkräfte wurden durch Ihren Verband vernichtet und stellen für Israel keine Bedrohung zur See mehr dar. Gute Arbeit, Kommandant.|Mission beenden
Taskforce1Sinktrawler-defeatMessage=NIEDERLAGE|Kommandant, Sie haben den sowjetischen Spionagetrawler versenkt. Dieser kriegerische Handlung gegenüber den Sowjets wird unsere Niederlage besiegeln!|Mission beenden
Objective_DestroySyrianShips=Alle angetroffenen syrischen Kräfte vernichten
Objective_OnePlayerShipMustSurvive=Mindestens ein israelisches Lenkwaffenschnellboot muss überleben
[Language_es]
Name=The Batalla de Latakia (1973)
[Language_fr]
Name=The Battle of Latakia (1973)
[Language_ko]
Name=라타키아 전투 (1973)
Description=어제 시리아와 이집트의 대규모 이스라엘 공격으로 욤 키푸르 전쟁이 시작되었습니다. 이스라엘 해군은 라타키아의 시리아 항구를 습격하여 군대를 철수시키고 파괴하는 임무를 맡고 있습니다.
Taskforce1StartmessageMessage=<size=20>욤 키푸르 전쟁 - 파트 1</size>\\\\n라타키아 해전|이스라엘은 어제 아랍 국가들로부터 4차 중동전쟁을 촉발하는 공격을 받았습니다. 해상에서 이스라엘 최고 사령부는 제3 샤예테트(미사일 고속정 함대)에게 시리아의 라타키아 기지에 대한 해상 공격을 명령했습니다.\\\\n\\\\n하이파에서 북쪽으로 진격한 다음 마주친 모든 시리아 군대를 격파하십시오.\\\\n\\\\n적어도 한척의 미사일 고속정은 생존해야합니다.|미션 시작
Taskforce1Syrianshipsdestroyed-playervictoryMessage=승리|승리! 시리아 군대는 당신의 군대에 의해 파괴되었으며 더 이상 이스라엘 해상에 위협이 되지 않을 것입니다. 수고하셨습니다 사령관님.|미션 나가기
Taskforce1Sinktrawler-defeatMessage=패배|사령관, 당신은 소련의 스파이 트롤선을 침몰시켰습니다. 이 행위는 소련과의 전쟁으로 우리의 패배를 보장할 것입니다!|미션 나가기
Objective_DestroySyrianShips=조우한 모든 시리아군 격파
Objective_OnePlayerShipMustSurvive=적어도 하나의 이스라엘 미사일 고속정은 생존해야 함
