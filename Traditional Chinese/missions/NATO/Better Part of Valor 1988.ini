[Language_fr]
Name=La plus belle valeur (1988)
Description=La guerre est imminente en Amérique du Sud, et les forces américaines se redéploient dans les Caraïbes. Commandez l'USS Pegasus pour naviguer dans le détroit du Yucatan entre Cuba et le Mexique afin d'atteindre les eaux méridionales. Les forces cubaines pourraient tenter de bloquer votre route. Utilisez tous les moyens nécessaires pour traverser le détroit ! (Adapté du jeu « PHM Pegasus » de LucasFilm, sorti en 1986)
Taskforce2Vessel3NameOverride=Mariel 350
Taskforce2Vessel3ShortNameOverride=Mariel
Taskforce1Helicopter1NameOverride=Cutlass
Taskforce1Helicopter1ShortNameOverride=Cutlass
Taskforce1StartMessage=LA PLUS BELLE\nVALEUR (1988)|La guerre a éclaté en Amérique du Sud, et les forces américaines se repositionnent pour intervenir en cas de besoin. L'USS Pegasus PHM-1 a reçu l'ordre de se diriger vers le sud pour les rejoindre. Traversez le détroit du Yucatan entre Cuba et le Mexique pour atteindre les eaux méridionales. Un seul SH-2F du HSL-36 a été chargé d'assurer la reconnaissance maritime et le ciblage. Les forces cubaines présentes dans la région pourraient tenter de bloquer le détroit. Le recours aux armes est autorisé en cas de légitime défense. Remarque : en raison de la traversée à pleine vitesse depuis Key West, nous ne disposons que de cinq missiles Harpoon à bord ! L'USS Pegasus doit survivre.|Commencer la mission
Taskforce1Reachmarkedareatoescape(overt)Message=VICTOIRE|DE CTF 27\nA CINCLANTFLT\nINFO PHMRON-2 NAS KEY WEST\n\n1. (S) L'USS PEGASUS PHM-1 a rejoint avec succès la TF 27 dans l'ouest des Caraïbes. \n\n2. (S) Le commandant du PEGASUS rapporte que son navire a été victime d'attaques répétées de la part de forces présumées cubaines pendant la traversée nocturne du détroit du Yucatan.\n\n3. (S) Il rapporte avoir coulé plusieurs navires qui l'avaient pris pour cible. Le Département d'État déposera une protestation diplomatique contre cette action hostile des forces cubaines.\n\n4. (S) La CTF 27 transmettra une recommandation pour la décoration du commandant de l'USS PEGASUS.\n\n<size=16>Un navire a atteint un niveau de compétence : USS Pegasus PHM-1 : <color=Green>Vétérans</color></size>|Terminer la mission
Taskforce1PegasusmustsurviveMessage=DEFAITE|DE CTF 27\nA CINCLANTFLT\nINFO PHMRON-2 NAS KEY WEST\n\n1. (S) Le CTF 27 signale que nous avons perdu le contact avec l'USS PEGASUS PHM-1.\n\n2. (S) Le PEGASUS faisait route vers l'ouest des Caraïbes depuis Key West pour rejoindre la TF 27. 3.\n\n(S) La dernière transmission du PEGASUS signalait qu'il était victime d'une attaque à la torpille et au missile par des forces cubaines présumées dans le détroit du Yucatan. Le CTF 27 estime que le PEGASUS a probablement été détruit.\n\n4. (S) Nous envoyons le MPRA pour fouiller la zone et rechercher des survivants. Un rapport détaillé suivra.|Terminer la mission
Taskforce1Reachmarkedareatoescape(stealth)Message=VICTOIRE|DE CTF 27\nA CINCLANTFLT\nINFO PHMRON-2 NAS KEY WEST\n\n1. (S) L'USS PEGASUS PHM-1 a rejoint avec succès la TF 27 dans l'ouest des Caraïbes.\n\n2. (S) Le commandant du PEGASUS rapporte avoir détecté et suivi plusieurs navires suspects hostiles alors qu'il opérait sous EMCON, mais n'avoir pas été attaqué par ces forces.\n\n3. (S) La discrétion dont a fait preuve cet officier a permis à son navire de transiter en toute sécurité sans provoquer l'intervention des forces cubaines et sans créer d'incident international.\n\n3. (S) Le CTF 27 transmettra une recommandation pour la décoration du commandant du PEGASUS.\n\n<size=16>Un navire a atteint un niveau de compétence :\n\nUSS Pegasus PHM-1 : <color=Magenta>Ultra</color></size>|Terminer la mission
