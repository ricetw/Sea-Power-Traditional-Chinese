[Language_ja]
Name=勇気の要諦 (1988年)
Description=南米での紛争が不可避となり、米軍はカリブ海へ戦力を再配置中である。ミサイル哨戒艇ペガサスを指揮し、キューバとメキシコの間に位置するユカタン海峽を突破して南方の海域へ到達せよ。キューバ軍が航路を封鎖しようとする可能性がある。あらゆる手段を尽くして海峽を通過せよ！
Taskforce2Vessel3NameOverride=Mariel 350
Taskforce2Vessel3ShortNameOverride=Mariel
Taskforce1Helicopter1NameOverride=Cutlass
Taskforce1Helicopter1ShortNameOverride=Cutlass
Taskforce1StartMessage=勇気の要諦\n(1988年)|南米で戦争が勃発し、米軍は必要に応じて介入すべく戦力の再配置を行っている。ミサイル哨戒艇ペガサス(PHM-1)に対し、これら戦力に合流すべく南下せよとの命令が下った。キューバとメキシコの間のユカタン海峽を通過し、南方の海域へ到達せよ。\n\n第36対潛ヘリコプター飛行隊(HSL-36)所属のSH-2F 1機が配属され、海上偵察および目標照準を支援する。当該海域のキューバ軍が海峽を封鎖する恐れがある。自衛のための武器使用は許可されている。注意：キーウェストからの緊急出撃のため、ハープーン・ミサイルの搭載数はわずか5基のみである！\n\nペガサスは生還しなければならない。|作戦開始
Taskforce1Reachmarkedareatoescape(overt)Message=勝利|発 第27任務部隊指揮官\n宛 大西洋艦隊総司令官\n報 第2ミサイル哨戒艇隊(PHMRON-2) キーウェスト海軍航空基地\n\n1. (S) ミサイル哨戒艇ペガサス(PHM-1)は、カリブ海西部にて第27任務部隊との合流に成功した。\n\n2. (S) ペガサス艦長の報告によれば、同艇はユカタン海峽を夜間通過中にキューバ軍と思われる勢力から継続的な攻撃を受けた。\n\n3. (S) 艦長は、自身に砲火を浴びせた数隻の艦艇を撃沈したと報告している。国務省は、キューバ軍によるこの敵対行動に対し外交的抗議を行う予定である。\n\n4. (S) 第27任務部隊指揮官は、ペガサス艦長を叙勲の対象として推薦する。\n\n<size=16>艦艇が熟練度を獲得した：\n\nUSS ペガサス (PHM-1)：<color=Green>ベテラン</color></size>|作戦終了
Taskforce1PegasusmustsurviveMessage=敗北|発 第27任務部隊指揮官\n宛 大西洋艦隊総司令官\n報 第2ミサイル哨戒艇隊(PHMRON-2) キーウェスト海軍航空基地\n\n1. (S) 第27任務部隊は、ミサイル哨戒艇ペガサス(PHM-1)との通信が途絶したと報告する。\n\n2. (S) ペガサスは第27任務部隊と合流すべく、キーウェストからカリブ海西部へ進出中であった。\n\n3. (S) ペガサスの最終通信では、ユカタン海峽においてキューバ軍と思われる勢力からミサイルおよび魚雷攻撃を受けているとの報告があった。第27任務部隊は、ペガサスが撃破されたものと判断する。\n\n4. (S) 当該海域に海上哨戒機(MPRA)を派遣し、生存者の捜索に当たらせている。詳細な報告を追って送付する。|作戦終了
Taskforce1Reachmarkedareatoescape(stealth)Message=勝利|発 第27任務部隊指揮官\n宛 大西洋艦隊総司令官\n報 第2ミサイル哨戒艇隊(PHMRON-2) キーウェスト海軍航空基地\n\n1. (S) ミサイル哨戒艇ペガサス(PHM-1)は、カリブ海西部にて第27任務部隊との合流に成功した。\n\n2. (S) ペガサス艦長の報告によれば、EMCON（電波発射管制）下で運用中に複数の敵対的な疑いのある艦艇を探知し、これらを追尾したが、攻撃を受けることはなかった。\n\n3. (S) 当該士官が示した慎重な判断により、キューバ軍を刺激して国際問題を招くことなく、自艦を安全に進出させることに成功した。\n\n3. (S) 第27任務部隊指揮官は、ペガサス艦長を叙勲の対象として推薦する。\n\n<size=16>艦艇が熟練度を獲得した：\n\nUSS ペガサス (PHM-1)：<color=Magenta>ウルトラ</color></size>|作戦終了
