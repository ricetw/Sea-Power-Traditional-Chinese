[Language_ko]
Name=용기보다 더 나은 부분 (1988)
Description=남미에서 전쟁이 임박했고, 미군은 카리브해로 재배치되고 있습니다. USS 페가서스를 지휘하여 쿠바와 멕시코 사이의 유카탄 해협을 항해하여 남쪽 해역에 도달하세요. 쿠바군이 당신의 경로를 막으려 할 수도 있습니다. 해협을 통과하는 데 필요한 수단은 무엇이든 사용하세요! (1986년 루카스필름의 게임 "PHM 페가수스"에서 각색됨)
Taskforce2Vessel3NameOverride=마리엘 350
Taskforce2Vessel3ShortNameOverride=마리엘
Taskforce1Helicopter1NameOverride=커틀러스
Taskforce1Helicopter1ShortNameOverride=커틀러스
Taskforce1StartMessage=용기보다\n더 나은 부분 (1988)|남미에서 전쟁이 발발했으며, 미군은 필요하다면 개입할 태세를 재정비하고 있습니다. USS 페가서스 PHM-1이 남쪽으로 합류하라는 명령을 받았습니다. 쿠바와 멕시코 사이의 유카탄 해협을 통과하여 남쪽 해역에 도달하세요.\n\n1대의 HSL-36 소속 SH-2F가 해상 정찰 및 표적을 제공하기 위해 자세히 설명되었습니다. 이 지역의 쿠바군이 해협을 봉쇄하려고 할 수 있습니다. 무기 사용은 정당방위로 승인됩니다. 참고: 키 웨스트에서 신속한 증기로 인해 하푼 미사일이 단 다섯 발밖에 탑재되지 않았습니다!\n\nUSS 페가서스는 반드시 생존할것.|임무 시작
Taskforce1Reachmarkedareatoescape(overt)Message=승리|발신: CTF 27\n수신: 대서양함대사령부\n정보 PHMRON-2 NAS 키 웨스트\n\n1. (기밀) USS 페가수스 PHM-1이 서부 카리브해에서 TF 27과 성공적으로 랑데부했습니다.\n\n2. (기밀) 페가수스의 함장은 그의 선박이 유카탄 해협을 야간에 운항하는 동안 쿠바군으로 의심되는 세력의 지속적인 공격을 받았다고 보고했습니다.\n\n3. (기밀) 그는 여러 척의 선박이 침몰하여 화재가 발생했다고 보고합니다. 국무부는 쿠바 군대의 이러한 적대적 행동에 대해 외교적 항의를 제기할 것입니다.\n\n4. (기밀) CTF 27은 USS 페가수스 사령관에 대한 훈장 추천서를 전달할 예정입니다.\n\n<size=16>함선 숙련도 상승:\n\nUSS 페가수스 PHM-1: <color=Green>베테랑</color></size>|임무 종료
Taskforce1PegasusmustsurviveMessage=패배|발신: CTF 27\n수신: 대서양함대사령부\n정보 PHMRON-2 NAS 키 웨스트\n\n1. (기밀) CTF 27은 USS 페가서스 PHM-1과의 연락이 끊겼다고 보고했습니다.\n\n2. (기밀) 페가서스는 키 웨스트에서 랑데부 TF 27로 향하는 서 카리브해 경로에 있었습니다.\n\n3. (기밀) 페가서스의 마지막 전파는 유카탄 해협에서 쿠바 군대의 미사일 및 어뢰 공격을 받았다고 보고되었습니다. CTF 27은 페가수스가 파괴되었을 가능성을 평가합니다.\n\n4. (기밀) 우리는 MPRA를 파견하여 해당 지역을 수색하고 생존자를 찾고 있습니다. 자세한 보고서는 다음과 같습니다.|임무 종료
Taskforce1Reachmarkedareatoescape(stealth)Message=승리|발신: CTF 27\n수신: 대서양함대사령부\n정보 PHMRON-2 NAS 키 웨스트\n\n1. (기밀) USS 페가수스 PHM-1이 서부 카리브해에서 TF 27과 성공적으로 랑데부했습니다.\n\n2. (기밀) 페가수스의 함장은 EMCON 하에서 작전을 수행하는 동안 여러 개의 의심되는 적대 선박을 탐지하고 그림자를 드리웠다고 보고했지만, 이들 부대의 공격을 받지는 않았습니다.\n\n3. (기밀) 이 장교가 보여준 재량권은 쿠바 군대를 자극하지 않고 국제적인 사건을 일으키지 않고 자신의 선박을 안전하게 운송하는 결과를 초래했습니다.\n\n4. (기밀) CTF 27은 페가수스 사령관에 대한 훈장 추천서를 전달할 예정입니다.\n\n<size=16>함선 숙련도 상승:\n\nUSS 페가수스 PHM-1: <color=Green>전문가</color></size>|임무 종료
