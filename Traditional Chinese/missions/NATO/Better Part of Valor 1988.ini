[Language_en]
Name=The Better Part of Valor (1988)
Description=War is imminent in South America, and U.S. forces are repositioning into the Caribbean. Command the USS Pegasus to navigate the Yucatan Straits between Cuba and Mexico to reach southern waters. Cuban forces may attempt to block your route. Use whatever means necessary to transit the strait! (Adapted from the 1986 game "PHM Pegasus" by LucasFilm)
Taskforce2Vessel3NameOverride=Mariel 350
Taskforce2Vessel3ShortNameOverride=Mariel
Taskforce1Helicopter1NameOverride=Cutlass
Taskforce1Helicopter1ShortNameOverride=Cutlass
Taskforce1StartMessage=THE BETTER PART\nOF VALOR (1988)|War has broken out in South America, and U.S. forces are repositioning to intervene if necessary. USS Pegasus PHM-1 has been ordered south to join them. Transit the Yucatan Strait between Cuba and Mexico to reach southern waters.\n\nA single SH-2F from HSL-36 has been detailed to provide maritime reconnaissance and targeting. Cuban forces in the area may attempt to block the strait. Weapons release is authorized in self-defense. Note: due to expedited steaming from Key West, we have only five Harpoon missiles aboard!\n\nUSS Pegasus must survive.|Start mission
Taskforce1Reachmarkedareatoescape(overt)Message=VICTORY|FM CTF 27\nTO CINCLANTFLT\nINFO PHMRON-2 NAS KEY WEST\n\n1. (S) USS PEGASUS PHM-1 has successfully rendezvoused with TF 27 in western Caribbean.\n\n2. (S) PEGASUS Commanding Officer reports his vessel came under sustained attack by suspected Cuban forces during nighttime run of Yucatan Strait.\n\n3. (S) He reports sinking several vessels which took him under fire. State Dept will file diplomatic protests against this hostile action by Cuban forces.\n\n4. (S) CTF 27 will be forwarding recommendation for decoration for Commanding Officer of USS PEGASUS.\n\n<size=16>A ship has gained a proficiency level:\n\nUSS Pegasus PHM-1: <color=Green>Veterans</color></size>|Exit mission
Taskforce1PegasusmustsurviveMessage=DEFEAT|FM CTF 27\nTO CINCLANTFLT\nINFO PHMRON-2 NAS KEY WEST\n\n1. (S) CTF 27 reports we have lost contact with USS PEGASUS PHM-1.\n\n2. (S) PEGASUS was en route western Caribbean from Key West to rendezvous TF 27.\n\n3. (S) PEGASUS last transmission reported coming under missile and torpedo attack by suspected Cuban forces in the Yucatan Strait. CTF 27 assesses PEGASUS may have been destroyed.\n\n4. (S) We are dispatching MPRA to search the area and look for survivors. Detailed report to follow.|Exit mission
Taskforce1Reachmarkedareatoescape(stealth)Message=VICTORY|FM CTF 27\nTO CINCLANTFLT\nINFO PHMRON-2 NAS KEY WEST\n\n1. (S) USS PEGASUS PHM-1 has successfully rendezvoused with TF 27 in western Caribbean.\n\n2. (S) PEGASUS Commanding Officer reports detecting and shadowing multiple suspected hostile vessels while operating under EMCON, but did not come under attack by these forces.\n\n3. (S) Discretion shown by this officer resulted in safe transit of his vessel without provoking Cuban forces into action and creating an international incident.\n\n3. (S) CTF 27 will be forwarding recommendation for decoration for Commanding Officer of PEGASUS.\n\n<size=16>A ship has gained a proficiency level:\n\nUSS Pegasus PHM-1: <color=Magenta>Ultra</color></size>|Exit mission
