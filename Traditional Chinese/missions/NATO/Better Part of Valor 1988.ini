[Language_de]
Name=The Better Part of Valor (1988)
Description=In Südamerika steht ein Krieg unmittelbar bevor und US-Streitkräfte werden in die Karibik verlegt, um bei Bedarf einzugreifen. Übernehmen Sie das Kommando über die USS Pegasus und durchfahren Sie die Yucatánstraße zwischen Kuba und Mexiko, um südliche Gewässer zu erreichen. Kubanische Kräfte könnten versuchen, Ihren Durchbruch zu blockieren. Nutzen Sie alle notwendigen Mittel, um die Passage zu erzwingen! (Adaptiert aus dem Spiel „PHM Pegasus“ von LucasFilm aus dem Jahr 1986)
Taskforce2Vessel3NameOverride=Mariel 350
Taskforce2Vessel3ShortNameOverride=Mariel
Taskforce1Helicopter1NameOverride=Cutlass
Taskforce1Helicopter1ShortNameOverride=Cutlass
Taskforce1StartMessage=THE BETTER PART\nOF VALOR (1988)|In Südamerika sind Kampfhandlungen ausgebrochen, und US-Streitkräfte werden zur möglichen Intervention neu positioniert. Der USS Pegasus PHM-1 wurde befohlen, südwärts zu verlegen und sich diesen Kräften anzuschließen. Durchfahren Sie die Yucatánstraße zwischen Kuba und Mexiko, um die südlichen Gewässer zu erreichen.\n\nEin einzelner SH-2F der HSL-36 wurde zur maritimen Aufklärung und Zielzuweisung abgestellt. Kubanische Kräfte im Einsatzraum könnten versuchen, die Meerenge zu blockieren. Waffenfreigabe zur Selbstverteidigung ist erteilt. Hinweis: Aufgrund des spontanen Auslaufens von Key West befinden sich lediglich fünf Harpoon-Flugkörper an Bord!\n\nDie USS Pegasus muss den Einsatz überstehen.|Mission starten
Taskforce1Reachmarkedareatoescape(overt)Message=SIEG|FM CTF 27\nAN CINCLANTFLT\nINFO PHMRON-2 NAS KEY WEST\n\n1. (S) USS PEGASUS PHM-1 ist erfolgreich mit TF 27 in der westlichen Karibik zusammengetroffen.\n\n2. (S) Der Kommandant der PEGASUS meldet, dass sein Schiff während der nächtlichen Durchfahrt der Yucatánstraße unter anhaltenden Beschuss durch mutmaßliche kubanische Kräfte geraten ist.\n\n3. (S) Er berichtet die Versenkung mehrerer Einheiten, die sein Schiff unter Feuer nahmen. Das Außenministerium wird diplomatische Proteste gegen diese feindliche Handlung kubanischer Kräfte einlegen.\n\n4. (S) CTF 27 wird eine Empfehlung zur Auszeichnung des Kommandanten der USS PEGASUS weiterleiten.\n\n<size=16>Ein Schiff hat an Erfahrung gewonnen:\n\nUSS Pegasus PHM-1: <color=Green>Veteran</color></size>|Mission beenden
Taskforce1PegasusmustsurviveMessage=NIEDERLAGE|FM CTF 27\nAN CINCLANTFLT\nINFO PHMRON-2 NAS KEY WEST\n\n1. (S) CTF 27 meldet den Verlust des Funk- und Sensorkontakts zur USS PEGASUS PHM-1.\n\n2. (S) PEGASUS befand sich auf dem Marsch von Key West in die westliche Karibik zum Zusammenschluss mit TF 27.\n\n3. (S) Die letzte Meldung von PEGASUS berichtete von Raketen- und Torpedoangriffen durch mutmaßliche kubanische Kräfte in der Yucatánstraße. CTF 27 bewertet, dass PEGASUS vermutlich im Einsatz verloren ging.\n\n4. (S) MPRA-Kräfte werden in den Raum entsandt, um das Gebiet abzusuchen und nach Überlebenden zu suchen. Detaillierter Bericht folgt.|Mission beenden
Taskforce1Reachmarkedareatoescape(stealth)Message=SIEG|FM CTF 27\nAN CINCLANTFLT\nINFO PHMRON-2 NAS KEY WEST\n\n1. (S) USS PEGASUS PHM-1 ist erfolgreich mit TF 27 in der westlichen Karibik zusammengetroffen.\n\n2. (S) Der Kommandant der PEGASUS meldet die Detektion und Beschattung mehrerer mutmaßlich feindlicher Einheiten unter EMCON-Bedingungen, ohne selbst durch diese Kräfte angegriffen worden zu sein.\n\n3. (S) Das besonnene Vorgehen dieses Offiziers ermöglichte die sichere Durchfahrt seines Schiffes, ohne kubanische Kräfte zu provozieren oder einen internationalen Zwischenfall auszulösen.\n\n3. (S) CTF 27 wird eine Empfehlung zur Auszeichnung des Kommandanten der PEGASUS weiterleiten.\n\n<size=16>Ein Schiff hat an Erfahrung gewonnen:\n\nUSS Pegasus PHM-1: <color=Magenta>Ultra</color></size>|Mission beenden
