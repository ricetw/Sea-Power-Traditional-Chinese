[Language_cn]
Name=謹慎即大勇（1988）
Description=南美戰火一觸即發，美軍正在向加勒比海地區部署。指揮飛馬座號飛彈艇穿越古巴和墨西哥之間的尤卡坦海峽以抵達南部海域。古巴軍隊可能會嘗試封鎖你的航線。採取一切必要手段穿越海峽！（改編自盧卡斯影業於1986年出品的遊戲PHM Pegasus）
Taskforce2Vessel3NameOverride=馬里埃爾（350）
Taskforce2Vessel3ShortNameOverride=馬里埃爾
Taskforce1Helicopter1NameOverride=彎刀
Taskforce1Helicopter1ShortNameOverride=彎刀
Taskforce1StartMessage=謹慎\n即大勇|南美已爆發戰爭，美軍正在重新部署，以便在必要時進行干預。飛馬座號飛彈艇已收到命令南下加入大部隊。此行需穿越古巴和墨西哥之間的尤卡坦海峽以抵達南部海域。\n\n來自HSL-36中隊的一架SH-2F已被指派執行海上偵察和目標指示任務。注意：由於需要從基韋斯特緊急航行，我們僅攜帶5枚魚叉飛彈！\n\n飛馬座號不能被擊沉。|開始任務
Taskforce1Reachmarkedareatoescape(overt)Message=任務完成！|發件：第27特遣艦隊指揮官\n收件：大西洋艦隊總司令\n抄送：基韋斯特航空站第2水翼飛彈艇巡邏中隊\n\n1.（機密）飛馬座號飛彈艇已成功在西加勒比海與第27特遣艦隊會合。\n\n2.（機密）飛馬座號指揮官報告稱在夜間通過尤卡坦海峽時遭到疑似古巴部隊的持續攻擊。\n\n3.（機密）指揮官報告稱擊沉了數艘艦艇，但自身也遭到攻擊。美國國務院將就古巴部隊的這一敵對行為提出外交抗議。\n\n4.（機密）第27特遣艦隊將提交飛馬座號指揮官的嘉獎推薦。\n\n<size=16>一艘艦艇達到了新的專業水準：\n\n飛馬座號（PHM-1）：<color=Green>老練</color></size>|結束任務
Taskforce1PegasusmustsurviveMessage=任務失敗！|發件：第27特遣艦隊指揮官\n收件：大西洋艦隊總司令\n抄送：基韋斯特航空站第2水翼飛彈艇巡邏中隊\n\n1.（機密）第27特遣艦隊報告我們已與飛馬座號失去聯繫。\n\n2.（機密）飛馬座號當時正從基韋斯特前往加勒比海西部與第27特遣艦隊會合。\n\n3.（機密）飛馬座號最後一次通信報告稱在尤卡坦海峽遭到疑似古巴部隊的飛彈和魚雷攻擊。第27特遣艦隊評估飛馬座號可能已被摧毀。\n\n4.（機密）我們正派出海上巡邏偵察機以搜索此區域並尋找倖存者。詳細報告將隨後發送。|結束任務
Taskforce1Reachmarkedareatoescape(stealth)Message=任務完成！|發件：第27特遣艦隊指揮官\n收件：大西洋艦隊總司令\n抄送：基韋斯特航空站第2水翼飛彈艇巡邏中隊\n\n1.（機密）飛馬座號飛彈艇已成功在西加勒比海與第27特遣艦隊會合。\n\n2.（機密）飛馬座號指揮官報告稱在輻射控制狀態下發現並跟蹤了多艘疑似敵對艦艇，但未遭到攻擊。\n\n3.（機密）指揮官的謹慎行事使其艦艇安全通過，未激怒古巴軍隊並引發國際事件。\n\n3.（機密）第27特遣艦隊將提交飛馬座號指揮官的嘉獎推薦。\n\n<size=16>一艘艦艇達到了新的專業水準：\n\n飛馬座號（PHM-1）：<color=Magenta>精英</color></size>|結束任務
