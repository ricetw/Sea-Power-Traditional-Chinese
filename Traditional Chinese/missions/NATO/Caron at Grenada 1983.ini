Taskforce1StartmessageMessage=CARON AT GRENADA (1983)|American forces units have landed on Grenada as part of Operation URGENT FURY, but are meeting scattered resistance from Cuban and Grenadian forces. USS Caron is off the southern coast of Grenada coordinating naval gunfire and air support.\n\nAH-1T Sea Cobra callsign "Gunrunner" is overhead requesting orders, and 2 x A-7E Corsairs is inbound from the Independence battlegroup, reporting on top at time 1110Z. USS Moosbrugger is off to the east coordinating combat search and rescue, but is not under our tactical command. \n\nIdentify all enemy forces ashore and destroy them.\n\nUSS Caron must survive.|Start mission
Taskforce1CaronmustsurviveMessage=DEFEAT|Defeat! USS Caron has been sunk!|Exit mission
Taskforce11minenemyintelmessageMessage=MISSION UPDATE|Commander, U.S. forces ashore are requesting support. We have received fire support requests from three locations:\n\n1. U.S. forces at Point Salines Airport report a column of Cuban armored vehicles is approaching.\n\n2. U.S. SEAL teams attempting to evacuate the Governor General from his mansion also report hostile armor inbound, with enemy forces being coordinated from Fort Frederick.\n\n3. Radio Free Grenada at Beausejour Bay is broadcasting Communist propaganda and command has ordered us to destroy it.|Acknowledged!
Taskforce1FoxtrotSSKwarningmessageMessage=MISSION UPDATE|Commander, all enemy forces ashore have been neutralized and the Marines and Rangers are securing the island and evacuating our citizens.\n\nWe are receiving flash traffic from the Independence battlegroup - SIGINT believes a Cuban Foxtrot class submarine is northwest of Grenada attempting to land special forces ashore. Datum A01 has been established and the battlegroup commander has ordered us to locate and sink the submarine.|Acknowledged!
Taskforce1FoxtrotdestroyedplayervictoryMessage=VICTORY|Victory! The destruction of the Foxtrot class submarine and the suppression of enemy opposition ashore ensures the success of Operation Urgent Fury. Great work, Commander!|Exit mission
