Taskforce1StartmessageMessage=LE CARON A LA GRENADE (1983)|Les forces américaines ont débarqué à Grenade dans le cadre de l'opération URGENT FURY et rencontrent une résistance éparse de la part des forces cubaines et grenadiennes. L'USS Caron se trouve au large de la côte sud de la Grenade et coordonne les tirs navals et le soutien aérien. \n\nL'AH-1T Sea Cobra, indicatif « Gunrunner », est en vol et attend les ordres, et deux A-7E Corsairs en provenance du groupe de combat Independence sont en approche et feront leur rapport à 1110 Z. L'USS Moosbrugger se trouve à l'est et coordonne les opérations de recherche et de sauvetage au combat, mais n'est pas sous notre commandement tactique. \n\nIdentifiez toutes les forces ennemies à terre et détruisez-les. \n\nL'USS Caron doit survivre.|Démarrer la mission
Taskforce1CaronmustsurviveMessage=DEFAITE|Défaite ! L'USS Caron a été coulé !|Quitter la mission
Taskforce11minenemyintelmessageMessage=MAJ MISSION|Commandant, Les forces américaines à terre demandent du renfort. Nous avons reçu des demandes d'appui-feu provenant de trois endroits :\n\n1. Les forces américaines à l'aéroport de Point Salines signalent qu'une colonne de véhicules blindés cubains approche.\n\n2. Les équipes SEAL américaines qui tentent d'évacuer le gouverneur général de sa résidence signalent également l'arrivée de blindés hostiles, les forces ennemies étant coordonnées depuis Fort Frederick.\n\n3. Radio Free Grenada, à Beausejour Bay, diffuse de la propagande communiste et le commandement nous a ordonné de la détruire.|Bien reçu !
Taskforce1FoxtrotSSKwarningmessageMessage=MAJ MISSION|Commandant, toutes les forces ennemies à terre ont été neutralisées et les Marines et les Rangers sécurisent l'île et évacuent nos citoyens.\n\nNous recevons un message urgent du groupe de combat Independence : les services de renseignement estiment qu'un sous-marin cubain de classe Foxtrot se trouve au nord-ouest de la Grenade et tente de débarquer des forces spéciales à terre. Le point de référence A01 a été établi et le commandant du groupe de combat nous a ordonné de localiser et de couler le sous-marin.|Bien reçu !
Taskforce1FoxtrotdestroyedplayervictoryMessage=VICTOIRE|Victoire ! La destruction du sous-marin de classe Foxtrot et la suppression des forces ennemies à terre garantissent le succès de l'opération Urgent Fury. Excellent travail, commandant !|Quitter la mission
