Taskforce1StartmessageMessage=卡隆號在格林納達（1983）|作為緊急狂暴行動的一部分，美國軍隊已在格林納達登陸，並遭遇古巴和格林納達軍隊的零星抵抗。卡隆號正位於格林納達南部海岸附近，協調海軍砲火和空中支援。\n\n呼號“軍火走私者”的AH-1T正在空中待命，來自獨立號航母戰鬥群的2架A-7E已於1110Z時報告抵達。穆斯布魯格號正在東部協調戰鬥搜救，但不在我們的戰術指揮之下。\n\n識別岸上的所有敵軍並將其摧毀。\n\n卡隆號不能被擊沉。|開始任務
Taskforce1CaronmustsurviveMessage=任務失敗！|你失敗了！卡隆號已被擊沉！|結束任務
Taskforce11minenemyintelmessageMessage=任務更新|指揮官，岸上的美軍正在請求支援。我們收到了來自三個地點的火力支援請求：\n\n1.薩林斯角機場的美軍報告稱一隊古巴裝甲車正在靠近。\n\n2.試圖從總督官邸撤離總督的海豹部隊也報告稱敵方裝甲部隊以及弗雷德里克堡調來的敵軍已經抵達。\n\n3.博塞茹爾灣的自由格林納達電台正在播放共產主義宣傳內容，指揮部命令我們摧毀它。|收到！
Taskforce1FoxtrotSSKwarningmessageMessage=任務更新|指揮官，岸上的所有敵軍都已被消滅，海軍陸戰隊和遊騎兵正在控制島嶼並撤離我們的公民。\n\n我們收到了來自獨立號航母戰鬥群的緊急通信——信號情報顯示古巴的一艘641型潛艦正位於格林納達西北部，試圖送特種部隊登陸。基準點A01已經建立，戰鬥群指揮官命令我們找到並擊沉潛艦。|收到！
Taskforce1FoxtrotdestroyedplayervictoryMessage=任務完成！|任務完成！你摧毀了敵方潛艦並壓制了岸上的敵軍，確保了緊急狂暴行動的成功。幹得好，指揮官！|結束任務
