Taskforce1StartmessageMessage=CARON BEI GRENADA (1983)|Amerikanische Streitkräfte sind im Rahmen der Operation URGENT FURY auf Grenada gelandet, stoßen jedoch auf vereinzelten Widerstand durch kubanische und grenadische Truppen. Die USS Caron befindet sich vor der Südküste Grenadas und koordiniert den Einsatz von Schiffsgeschützen und Luftunterstützung.\n\nEin AH-1T Sea Cobra mit dem Rufzeichen "Gunrunner" befindet sich über dem Einsatzgebiet und wartet auf Befehle. Zwei A-7E Corsair-Jets sind von der Independence-Kampfgruppe im Anflug und melden Ankunft über dem Zielgebiet um 1110Z. Die USS Moosbrugger befindet sich östlich der Insel zur Koordinierung von Combat Search and Rescue, steht jedoch nicht unter unserem taktischen Kommando. \n\nAlle feindlichen Kräfte an Land sind aufzuklären und zu vernichten.\n\nDie USS Caron muss überleben.|Mission Starten
Taskforce1CaronmustsurviveMessage=Niederlage|Sie wurden besiegt! Die USS Caron wurde versenkt!|Mission Beenden
Taskforce11minenemyintelmessageMessage=MISSIONSUPDATE|Kommandant, Die U.S.-Truppen an Land fordern Unterstützung an. Wir haben Anforderungen von Feuerunterstützung von folgenden Stellen erhalten:\n\n1. US-Einheiten am Flughafen Point Salines melden, dass sich eine Kolonne kubanischer Panzerfahrzeuge nähert.\n\n2. Die US-SEAL-Teams, die aktuell den Generalgouverneur aus seiner Residenz evakuieren, melden ebenfalls feindliche, gepanzerte Einheiten. Diese werden offenbar von Fort Frederick aus koordiniert.\n\n3. Radio Free Grenada bei Beausejour Bay sendet kommunistische Propaganda. Das Oberkommando hat den Befehl erteilt, die Station zu zerstören.|Verstanden!
Taskforce1FoxtrotSSKwarningmessageMessage=MISSIONSUPDATE|Kommandant, alle feindlichen Kräfte an Land wurden neutralisiert. Die Marines und Rangers sichern die Insel und evakuieren unsere Staatsbürger.\n\nWir empfangen Eilmeldungen von der Independence-Battlegroup – SIGINT geht davon aus, dass sich nordwestlich von Grenada ein kubanisches U-Boot der Foxtrot-Klasse befindet, das versucht, Spezialeinheiten an Land zu bringen. Position A01 wurde festgelegt und der Kommandeur der Kampfgruppe hat uns den Befehl erteilt, das U-Boot zu lokalisieren und zu versenken.|Verstanden!
Taskforce1FoxtrotdestroyedplayervictoryMessage=SIEG|Sieg! Die Vernichtung des U-Boots der Foxtrot-Klasse und das Ausschalten der feindlichen Kräfte an Land sichern den Erfolg von Operation URGENT FURY. Hervorragende Arbeit, Kommandant!|Mission Beenden
