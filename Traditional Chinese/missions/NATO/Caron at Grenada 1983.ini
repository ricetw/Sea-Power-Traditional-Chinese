Taskforce1StartmessageMessage=グレナダのキャロン (1983年)|アージェント・フューリー作戦の一環として米軍部隊がグレナダに上陸したが、キューバおよびグレナダ勢力による散発的な抵抗に直面している。駆逐艦キャロンはグレナダ南岸沖に進出し、艦砲射撃と航空支援を統制中だ。\n\nコールサイン"Gunrunner"のAH-1Tシーコブラが上空待機し命令を求めている。また、インディペンデンス空母戦闘群からのA-7Eコルセア2機が接近中で、1110Zに目標上空到達予定。駆逐艦ムースブラッガーは東方沖にて戦闘捜索救難（CSAR）を統制しているが、我々の戦術指揮下にはない。\n\n島内の敵勢力をすべて特定し、撃滅せよ。\n\n駆逐艦キャロンは生存しなければならない。|作戦開始
Taskforce1CaronmustsurviveMessage=敗北|敗北！駆逐艦キャロンが撃沈された！|作戦終了
Taskforce11minenemyintelmessageMessage=状況更新|指揮官、島内の地上部隊が支援を求めている。以下の3地點から火力支援要請を受領した：\n\n1. ポイント・サリンス空港の米軍部隊より、キューバ軍装甲部隊の列が接近中との報告。\n\n2. 総督官邸から総督を避難させているSEALチームより、敵装甲部隊の接近を報告。敵軍はフォート・フレデリックから統制されている模様。\n\n3. ボセジュール灣のラジオ・フリー・グレナダが共産主義のプロパガンダを放送中。司令部より当該施設の破壊命令を受領した。|了解
Taskforce1FoxtrotSSKwarningmessageMessage=状況更新|指揮官、島内の敵勢力はすべて無力化された。海兵隊とレンジャー部隊が島を制圧し、市民の避難を進めている。\n\nインディペンデンス戦闘群より緊急電報を受領――SIGINT（信號情報）によれば、キューバのフォックストロット級潛水艦がグレナダ北西に潛伏し、特殊部隊の上陸を試みている模様だ。起標點A01が設定された。戦闘群司令官は我々に対し、当該潛水艦を捕捉・撃沈せよと命じている。|了解
Taskforce1FoxtrotdestroyedplayervictoryMessage=勝利|勝利！フォックストロット級潛水艦の撃沈および島内の敵対勢力の制圧により、アージェント・フューリー作戦の成功が確実となった。指揮官、見事な手際だ！|作戦終了
