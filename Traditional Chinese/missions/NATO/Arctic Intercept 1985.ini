[Language_ja]
Name=北極での迎撃 (1985年)
Description=NATO情報部がヤンマイエン島北方を航行し、デンマーク海峽へと向かうキエフ戦闘群を捕捉した。潛水艦パーゴの指揮を執り、当該戦闘群を攻撃・撃破せよ。
Taskforce1StartMessage=北極での迎撃 (1985年)|昨夜、空母キエフを中心とする強力な対潛（ASW）任務部隊がデンマーク海峽へと向かっているのが探知された。潛水艦パーゴに対し、当該戦闘群を迎撃すべく北上せよとの命令が下った。\n\n周辺には民間船の往来が予想される。また、我が方のESMマストが東方で運用中のヘリコプターおよび航空機用レーダー数件を探知した。\n\nパーゴは生還しなければならない。|作戦開始
Taskforce1DestroyKievgroupplayervictoryMessage=勝利|発 大西洋潛水艦隊司令官\n宛 潛水艦パーゴ(SSN-614)\n報 大西洋艦隊総司令官\n\n1. (TS) 国家衛星画像およびSIGINT（信號情報）により、ヤンマイエン島近海におけるキエフ級空母の沈没を確認した。\n\n2. (S) 卓越した功績である。パーゴを本撃沈の主功と認める。\n\n3. (S) 当該海域を離脱して南下し、次命を待て。Bravo Zulu（見事な手際だ）。大西洋潛水艦隊司令官より。|作戦終了
Taskforce1PargomustsurviveMessage=敗北|発 大西洋潛水艦隊司令官\n宛 大西洋艦隊総司令官\n報 クライド海軍基地（ファスレーン）\n\n1. (S) パーゴからの定時連絡が現在までに2回途絶している。\n\n2. (S) パーゴの最終任務はヤンマイエンにおけるキエフ戦闘群の迎撃であった。\n\n3. (S) 我々はパーゴが戦闘中に失われたものと判断する。キエフの追撃を継続するため、ノルウェー海における重要潛水艦戦力の再配置に関する指示を追って通達する。|作戦終了
Objective_DestroyKievGroup=キエフ戦闘群の撃滅
Objective_PargoMustSurvive=潛水艦パーゴの生存
[Language_en]
Name=Arctic Intercept (1985)
Description=NATO intelligence has located the Kiev battle group transiting north of Jan Mayen towards the Denmark Strait. Take command of USS Pargo to attack and destroy the battle group.
Taskforce1StartMessage=ARCTIC INTERCEPT 1985|A powerful ASW task group centered on the carrier Kiev was detected last night moving towards the Denmark Strait. USS Pargo has been ordered north to intercept the battle group.\n\nSome civilian traffic should be expected, and our ESM mast detected several helicopter and airborne sets operating to the east.\n\nUSS Pargo must survive.|Start mission
Taskforce1DestroyKievgroupplayervictoryMessage=VICTORY|FM COMSUBLANT\nTO USS PARGO SSN-614\nINFO CINCLANTFLT\n\n1. (TS) National imagery and SIGINT sources confirm KIEV class carrier sunk in vicinity Jan Mayen Island.\n\n2. (S) Outstanding performance. PARGO is credited with primary kill.\n\n3. (S) Clear area southbound and await further orders. BZ. COMSUBLANT sends.|Exit mission
Taskforce1PargomustsurviveMessage=DEFEAT|FM COMSUBLANT\nTO CINCLANTFLT\nINFO HMNB CLYDE FASLANE\n\n1. (S) PARGO has now missed two scheduled check-ins.\n\n2. (S) PARGO last tasked with interception of KIEV battle group at Jan Mayen.\n\n3. (S) We assess PARGO is lost in action. Instructions to follow for repositioning of critical sub forces in the Norwegian Sea to continue prosecution of KIEV.|Exit mission
Objective_DestroyKievGroup=Destroy the Kiev battle group
Objective_PargoMustSurvive=USS Pargo must survive
[Language_cn]
Name=北極攔截（1985）
Description=北約情報部門發現基輔號戰鬥群正從揚馬延島以北駛向丹麥海峽。指揮根室氏管鼻鯛號潛艦攻擊並摧毀此戰鬥群。
Taskforce1StartMessage=北極攔截|昨夜，我們發現一支以基輔號航母為核心的強大反潛特遣隊正在向丹麥海峽移動。根室氏管鼻鯛號潛艦收到命令向北攔截此戰鬥群。\n\n預計會有一些民用艦艇出沒，我們的電子支援措施桅杆探測到幾架直升機和固定翼飛機在東面活動。\n\n根室氏管鼻鯛號不能被擊沉。|開始任務
Taskforce1DestroyKievgroupplayervictoryMessage=任務完成！|發件：大西洋潛艦部隊司令\n收件：根室氏管鼻鯛號潛艦\n抄送：大西洋艦隊總司令\n\n1.（絕密）國家圖像和信號情報來源已證實基輔號航母在揚馬延島附近被擊沉。\n\n2.（機密）根室氏管鼻鯛號表現出色，在此次戰鬥中貢獻最大。\n\n3.（機密）向南撤離此區域，等待進一步命令。幹得漂亮。|結束任務
Taskforce1PargomustsurviveMessage=任務失敗！|發件：大西洋潛艦部隊司令\n收件：大西洋艦隊總司令\n抄送：克萊德海軍基地\n\n1.（機密）根室氏管鼻鯛號已經2次未在預定的回報時間發送報告。\n\n2.（機密）根室氏管鼻鯛號最後的任務是在揚馬延攔截基輔號戰鬥群。\n\n3.（機密）我們評估根室氏管鼻鯛號在行動中沉沒。我們將在後續抽調挪威海的關鍵潛艦部隊以繼續追擊基輔號。|結束任務
Objective_DestroyKievGroup=消滅基輔號戰鬥群
Objective_PargoMustSurvive=根室氏管鼻鯛號不能被擊沉
[Language_ru]
Name=Arctic Intercept (1985)
[Language_de]
Name=Abfangeinsatz in der Arktis (1985)
Description=Die NATO-Aufklärung hat eine Kampfgruppe um den Träger Kiew erfasst, die nördlich von Jan Mayen in Richtung Dänemarkstraße verlegt. Übernehmen Sie das Kommando über die USS Pargo mit dem Auftrag, die Kampfgruppe anzugreifen und zu vernichten.
Taskforce1StartMessage=ABFANGEINSATZ IN DER ARKTIS 1985|Eine starke U-Jagd-Kampfgruppe mit dem Träger Kiew als Kern wurde letzte Nacht auf dem Marsch in Richtung Dänemarkstraße aufgeklärt. Der USS Pargo wurde befohlen, nach Norden zu verlegen und die Kampfgruppe abzufangen.\n\nMit zivilem Verkehr ist zu rechnen, zudem hat unser ESM-Mast mehrere Hubschrauber- und luftgestützte Systeme östlich des Einsatzraums erfasst.\n\nDie USS Pargo muss den Einsatz überstehen.|Mission starten
Taskforce1DestroyKievgroupplayervictoryMessage=SIEG|FM COMSUBLANT\nAN USS PARGO SSN-614\nINFO CINCLANTFLT\n\n1. (TS) Nationale Bild- und SIGINT-Quellen bestätigen die Versenkung eines Trägers der KIEV-Klasse im Raum der Insel Jan Mayen.\n\n2. (S) Hervorragende Leistung. PARGO wird der Hauptabschuss zugerechnet.\n\n3. (S) Einsatzraum südwärts freimachen und auf weitere Befehle warten. BZ. COMSUBLANT ende.|Mission beenden
Taskforce1PargomustsurviveMessage=NIEDERLAGE|FM COMSUBLANT\nAN CINCLANTFLT\nINFO HMNB CLYDE FASLANE\n\n1. (S) PARGO hat inzwischen zwei planmäßige Lage- und Statusmeldungen versäumt.\n\n2. (S) Letzter Auftrag von PARGO war der Abfangeinsatz gegen die KIEV-Kampfgruppe bei Jan Mayen.\n\n3. (S) Es wird davon ausgegangen, dass PARGO im Einsatz verloren gegangen ist. Weitere Weisungen zur Umgruppierung kritischer U-Boot-Kräfte im europäischen Nordmeer zur Fortsetzung der Bekämpfung der KIEV folgen.|Mission beenden
Objective_DestroyKievGroup=Kampfgruppe Kiew vernichten
Objective_PargoMustSurvive=USS Pargo muss überleben
[Language_es]
Name=Arctic Intercept (1985)
[Language_fr]
Name=Interception dans l'Arctique (1985)
Description=Les services de renseignement de l'OTAN ont localisé le Kiev et son groupe de combat transitant au nord de Jan Mayen vers le détroit du Danemark. Prenez le commandement de l'USS Pargo pour attaquer et détruire le groupe de combat.
Taskforce1StartMessage=INTERCEPTION DANS L'ARCTIQUE 1985|Un puissant groupe opérationnel ASM centré sur le porte-avions Kiev a été détecté hier soir, en route vers le détroit du Danemark. L'USS Pargo a reçu l'ordre de se diriger vers le nord pour intercepter le groupe de combat.\n\nIl faut s'attendre à un certain trafic civil, et notre équipement ESM a détecté plusieurs hélicoptères et appareils aériens opérant vers l'est. \n\nL'USS Pargo doit survivre.| Commencer la mission
Taskforce1DestroyKievgroupplayervictoryMessage=VICTOIRE|DE COMSUBLANT\nA USS PARGO SSN-614\nINFO CINCLANTFLT\n\n1. (TS) Des sources nationales d'imagerie et de SIGINT confirment que le porte-avions de classe KIEV a été coulé près de l'île Jan Mayen.\n\n2. (S) Performance exceptionnelle. Le PARGO est crédité de la destruction du but principal.\n\n3. (S) Dégager la zone vers le sud et attendre de nouveaux ordres. Signé BZ. COMSUBLANT.|Fin de mission
Taskforce1PargomustsurviveMessage=DEFAITE|DE COMSUBLANT\nA CINCLANTFLT\nINFO HMNB CLYDE FASLANE\n\n1. (S) Le PARGO a désormais manqué deux points de contrôle prévus. \n\n2. (S) LePARGO avait pour dernière mission d'intercepter le groupe de combat KIEV à Jan Mayen. \n\n3. (S) Nous estimons que le PARGO a été perdu au combat. Instructions à suivre pour le repositionnement des forces sous-marines critiques dans la mer de Norvège afin de poursuivre la poursuite du KIEV.|Fin de la mission
Objective_DestroyKievGroup=Détruire le goupe de combat Kiev
Objective_PargoMustSurvive=L'USS Pargo doit survivre

[Language_ko]
Name=북극에서의 요격 (1985)
Description=NATO 정보국은 얀마옌 북쪽에서 덴마크 해협으로 향하는 키예프 전투단을 발견했습니다. USS 파고 호를 지휘하여 전투단을 공격하고 파괴하시오.
Taskforce1StartMessage=북극에서의 요격 1985|어젯밤 키예프 항모를 중심으로 한 강력한 대잠 태스크 그룹이 덴마크 해협으로 이동하는 모습이 포착되었습니다. USS 파고는 전투단을 요격하라는 명령을 북쪽으로 받았습니다.\n\n민간인 통행이 예상되어야 하며, 우리의 ESM 마스트는 동쪽으로 작전 중인 여러 헬리콥터와 공중 세트를 감지했습니다.\n\nUSS 파고는 반드시 살아남아야 합니다.|미션 시작
Taskforce1DestroyKievgroupplayervictoryMessage=승리|발신: COMSUBLANT\n수신: USS 파고 SSN-614\nINFO CINCLANTFLT\n\n1. (최고기밀) 국가 이미지와 SIGINT 자료에 따르면 얀마옌 섬 인근에서 키예프급 항공모함이 침몰한 것으로 확인되었습니다.\n\n2. (기밀) 뛰어난 성능. 파고는 주요 살인 혐의로 인정받고 있습니다.\n\n3. (기밀) 남쪽으로 향하는 지역을 비우고 추가 명령을 기다립니다. BZ. 컴서브랜트가 전송합니다.|미션 나가기
Taskforce1PargomustsurviveMessage=패배|발신: COMSUBLANT\n수신: CINCLANTFLT\nINFO HMNB CLYDE FASLANE\n\n1. (기밀) 파고는 이제 예정된 체크인 두 번을 놓쳤습니다.\n\n2. (기밀) 파고는 마지막으로 얀마옌에서 키예프 전투단을 요격하는 임무를 맡았습니다.\n\n3. (기밀) 우리는 파고가 작동하지 않는다고 평가합니다. 키예프에 대한 기소를 계속하기 위해 노르웨이해에서 중요한 하위 부대의 재배치 지침을 따라야 합니다.|미션 나가기
Objective_DestroyKievGroup=키예프 전투단 격파
Objective_PargoMustSurvive=USS 파고는 반드시 생존시킬것
