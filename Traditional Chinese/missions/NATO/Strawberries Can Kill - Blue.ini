Taskforce1StartMessage=STRAWBERRIES\nCAN KILL (1985)|Die Kampfhandlungen haben vor drei Tagen begonnen, sowjetische Kräfte führen nun eine Invasionsflotte in Richtung Hawaii. Übernehmen Sie das Kommando über die USS Nimitz sowie Battle Group Delta und wehren Sie den Angriff ab.\n\nDie USS Omaha befindet sich als Vorausaufklärer etwa 100 sm vor Ihrer Formation und mehrere P-3C von Midway (Rufzeichen Strawberry) suchen nach der gegnerischen Kampfgruppe. Ein sowjetisches SSGN der OSCAR-Klasse fehlt in der Aufklärung aus Petropawlowsk und könnte sich im Einsatzraum befinden.\n\nDie USS Nimitz muss überleben.|Mission starten
StartForecast=Wetterlage Nordpazifikflotte:\nHeute Nachmittag: Tiefstwert: 14°C. Teilweise bewölkt.\nHeute Nacht: Tiefstwert: 10°C. Bedeckt.
Taskforce1DestroyenemytaskgroupsplayervictoryMessage=SIEG|FM CTF 70\nAN CINCPACFLT\n\n1. (S) Die Aufklärung zeigt, dass alle wesentlichen feindlichen Überwasserstreitkräfte sinken oder sich westwärts zurückziehen.\n\n2. (S) Wir verlegen nordwestwärts zur Durchführung von Aufräumoperationen.\n\n3. (S) Vollständiger Bericht über Verluste und Munitionsverbrauch folgt innerhalb von 12 Stunden. Wir bewerten das Gefecht jedoch als gewonnen. CTF 70, ende.|Mission beenden
Taskforce1NimitzmustsurviveMessage=NIEDERLAGE|FM CINCPACFLT\nAN NAVFAC MIDWAY\nINFO NOB PEARL HARBOR\n\n1. (S) WARNUNG: Jeglicher Kontakt zu Task Force 70 und NIMITZ ist abgerissen.\n\n2. (S) Die letzte Meldung von NIMITZ berichtete von Angriffen durch sowjetische Kräfte.\n\n3. (S) Es wird vermutet, dass NIMITZ zerstört wurde. \n\n4. (S) Mit sofortiger Wirkung sind Vorbereitungen auf einen sowjetischen Angriff auf Midway und Pearl Harbor einzuleiten.|Mission beenden\n
Taskforce1Time+2hrssubdatumMessage=BLITZFERNSCHREIBEN|FM CINCPACFLT\nAN CTF 70\n\n1. (S) WARNUNG: NAVFAC Midway meldet intermittierenden SOSUS-Kontakt auf Position 45.93N, 171.56E.\n\n2. (S) Datum A01 wurde an dieser Position zum Zeitpunkt 1756Z festgelegt.\n\n3. (S) Geräuschsignatur korreliert mit einem SSGN der OSCAR-Klasse. Die OSCAR-Klasse führt 24 × SS-N-19-Flugkörper.\n\n4. (S) Verfolgung und Bekämpfung dieses Kontakts, sofern die Lage es zulässt. Viel Glück.|Bestätigen & fortfahren
