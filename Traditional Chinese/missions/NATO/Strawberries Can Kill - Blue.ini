[Language_fr]
Name=Les fraises peuvent tuer - Bleu (1985)
Description=Les hostilités ont éclaté en Europe. Dans le Pacifique, une importante force opérationnelle soviétique, que l'on croyait revenue à Petropavlovsk après avoir terminé un exercice, a fait demi-tour et se dirige vers Hawaï. L'USS Nimitz est le seul porte-avions disponible dans le Pacifique. Prenez le commandement du groupe de combat DELTA et repoussez l'assaut soviétique.
