Taskforce1StartMessage=딸기는\n죽일수 있다 (1985)|적대 행위는 3일 전에 시작되었고, 소련군은 하와이를 향해 침공 함대를 진격하고 있습니다. USS 니미츠와 델타 전투단을 지휘하여 공격을 격퇴하십시오.\n\nUSS 오마하는 정찰병으로 진급하기 100nm 앞서 있으며, 미드웨이에서 여러 대의 P-3C(호출명 스트로베리)가 적의 전투단을 찾고 있습니다. 페트로파블롭스크에서 촬영된 이미지에서 소련 오스카급 SSGN 한 대가 누락되어 인근에서 운항 중일 수 있습니다.\n\nUSS 니미츠는 반드시 생존시킬것.|임무 시작
StartForecast=북태평양 함대 기상 경보:\n오늘 오후: 낮음: 14.4°C. 부분적으로 흐림.\n오늘 밤: 낮음: 10°C. 흐림.
Taskforce1DestroyenemytaskgroupsplayervictoryMessage=승리|발신: CTF 70\n수신: CINCPACFLT\n\n1. (기밀) 정찰은 모든 주요 적의 지상군이 서쪽으로 침몰하거나 퇴각하고 있음을 나타냅니다.\n\n2. (기밀) 우리는 대청소 작업을 위해 북서쪽으로 진행하고 있습니다.\n\n3. (기밀) 사상자 및 탄약 지출에 대한 전체 보고서는 12시간 이내에 작성될 예정이지만, 우리는 승리가 우리의 것이라고 평가합니다. CTF 70이 보냄.|임무 종료
Taskforce1NimitzmustsurviveMessage=패배|발신: CINCPACFLT\n수신: NAVFAC MIDWAY\n정보 NOB 진주만\n\n1. (기밀) 경고: 태스크 포스 70과 니미츠와의 모든 연락이 끊겼습니다.\n\n2. (기밀) NIMITZ의 마지막 전송이 소련군의 공격을 받았다고 보고되었습니다.\n\n3. (기밀) 우리는 니미츠가 파괴되었다고 생각합니다. \n\n4. (기밀) 즉시 소련의 미드웨이와 진주만 공격 대비를 시작하세요.|임무 종료\n
Taskforce1Time+2hrssubdatumMessage=최신 메세지|발신: CINCPACFLT\n수신: CTF 70\n\n1. (기밀) 경고: NAVFAC 미드웨이는 45.93N, 171.56E 위치에서 간헐적인 SOSUS 접촉을 보고했습니다.\n\n2. (기밀) 다툼 A01은 1756Z 시점에 이 위치에 설정되었습니다.\n\n3. (기밀) 사운드 시그니처는 오스카급 SSGN과 관련이 있습니다. 오스카급은 24발의 SS-N-19 미사일을 탑재하고 있습니다.\n\n4. (기밀) 상황이 허락한다면 이 연락처를 기소하세요. 행운을 빕니다.|확인됨 & 계속
