[Language_ja]
Name=ストロベリー・キャン・キル (1985年)
Description=欧州にて戦端が開かれた。太平洋では、演習を終えてペトロパブロフスクへ帰還中と見られていたソ連の大規模任務部隊が反転し、ハワイへ向けて進撃中である。太平洋で運用可能な空母はニミッツのみだ。第4戦闘群（BG Delta）の指揮を執り、ソ連軍の侵攻を阻止せよ。
Taskforce1Aircraft5NameOverride=Strawberry 9
Taskforce1Aircraft5ShortNameOverride=Strawberry 9
Taskforce1Aircraft6NameOverride=Strawberry 3
Taskforce1Aircraft6ShortNameOverride=Strawberry 3
Taskforce1Aircraft7NameOverride=Strawberry 5
Taskforce1Aircraft7ShortNameOverride=Strawberry 5
Taskforce1StartMessage=ストロベリー・\nキャン・キル (1985年)|開戦から3日が経過した。ソ連軍の侵攻艦隊がハワイへ向けて進撃中である。空母ニミッツおよび第4戦闘群（BG Delta）を指揮し、この侵攻を退けよ。\n\n潛水艦オマハが艦隊の100海里前方で斥候を務めており、ミッドウェー基地所属の複数のP-3C（コールサイン：ストロベリー）が敵戦闘群を捜索中である。ペトロパブロフスクの偵察画像からソ連軍のオスカー級SSGNが1隻消失しており、付近で活動している恐れがある。\n\n空母ニミッツの生存を絶対条件とする。|作戦開始
StartForecast=北太平洋艦隊 気象アドバイザリー：\n午後：最低気温 14°C (58°F)、一部曇り。\n今夜：最低気温 10°C (50°F)、厚い雲。
Taskforce1DestroyenemytaskgroupsplayervictoryMessage=勝利|発 第70任務部隊指揮官\n宛 太平洋艦隊総司令官\n\n1. (S) 偵察によれば、敵主要水上戦力はすべて沈没中、もしくは西方へ撤退中である。\n\n2. (S) 我々は残敵掃討のため北西へ進出する。\n\n3. (S) 損害状況および弾薬消費に関する完全な報告は12時間以内に送付するが、勝利は我々の手にあると判断する。第70任務部隊指揮官より。|作戦終了
Taskforce1NimitzmustsurviveMessage=敗北|発 太平洋艦隊総司令官\n宛 ミッドウェー海軍施設\n報 パールハーバー海軍基地\n\n1. (S) 警告：第70任務部隊および空母ニミッツとの一切の連絡が途絶した。\n\n2. (S) ニミッツからの最終通信では、ソ連軍による攻撃を受けているとの報告があった。\n\n3. (S) 我々はニミッツが撃沈されたものと判断する。\n\n4. (S) 直ちに、ミッドウェーおよび真珠灣に対するソ連軍の侵攻に備えよ。|作戦終了
Taskforce1Time+2hrssubdatumMessage=緊急電報|発 太平洋艦隊総司令官\n宛 第70任務部隊指揮官\n\n1. (S) 警告：ミッドウェー海軍施設より、北緯45.93度、東経171.56度にて断続的なSOSUS探知ありとの報告。\n\n2. (S) 時刻1756Z、当該地點に起標點（デイタム）A01を設定した。\n\n3. (S) 音響シグネチャーはオスカー級SSGNと一致。オスカー級は24発のSS-N-19対艦ミサイルを搭載している。\n\n4. (S) 戦術的状況が許す限り、当該目標を捕捉・攻撃せよ。諸君の幸運を祈る。|了解、継続
Trigger5Condition_Condition1AreaLabel=起標點 A01
Objective_DestroyEnemyForces=敵任務部隊（両群）の撃滅
Objective_NimitzMustSurvive=空母ニミッツの生存
[Language_en]
Name=Strawberries Can Kill - Blue (1985)
Description=Hostilities have broken out in Europe. In the Pacific, a large Soviet task force previously believed to be returning to Petropavlovsk after completing an exercise has now turned around and is heading towards Hawaii. USS Nimitz is the only available carrier in the Pacific. Take charge of Battle Group DELTA and repel the Soviet assault.
Taskforce1Aircraft5NameOverride=Strawberry 9
Taskforce1Aircraft5ShortNameOverride=Strawberry 9
Taskforce1Aircraft6NameOverride=Strawberry 3
Taskforce1Aircraft6ShortNameOverride=Strawberry 3
Taskforce1Aircraft7NameOverride=Strawberry 5
Taskforce1Aircraft7ShortNameOverride=Strawberry 5
Taskforce1StartMessage=STRAWBERRIES\nCAN KILL (1985)|Hostilities commenced three days ago, and Soviet forces are advancing an invasion fleet towards Hawaii. Command USS Nimitz and Battle Group Delta to repel the assault.\n\nUSS Omaha is 100nm ahead of your formation as a scout, and multiple P-3Cs out of Midway (callsign Strawberry) are searching for the enemy battle group. One Soviet Oscar class SSGN is missing from imagery out of Petropavlovsk and may be operating nearby.\n\nUSS Nimitz must survive.|Start mission
StartForecast=North Pacific Fleet Weather Advisory:\nThis afternoon: Low: 58°F. Partly Cloudy.\nTonight: Low: 50°F. Overcast.
Taskforce1DestroyenemytaskgroupsplayervictoryMessage=VICTORY|FM CTF 70\nTO CINCPACFLT\n\n1. (S) Recon indicates all major enemy surface forces sinking or retiring west.\n\n2. (S) We are proceeding northwest for mop-up operations.\n\n3. (S) Full report on casualties and ammunition expenditure will come within 12 hours, but we assess that victory is ours. CTF 70 sends.|Exit mission
Taskforce1NimitzmustsurviveMessage=DEFEAT|FM CINCPACFLT\nTO NAVFAC MIDWAY\nINFO NOB PEARL HARBOR\n\n1. (S) WARNING: All contact has been lost with Task Force 70 and NIMITZ.\n\n2. (S) Last transmission from NIMITZ reported coming under attack by Soviet forces.\n\n3. (S) We assess that NIMITZ has been destroyed. \n\n4. (S) Effective immediately, begin preparations for Soviet assault on Midway and Pearl Harbor.|Exit mission\n
Taskforce1Time+2hrssubdatumMessage=FLASH MESSAGE|FM CINCPACFLT\nTO CTF 70\n\n1. (S) WARNING: NAVFAC Midway reports intermittent SOSUS contact at position 45.93N, 171.56E.\n\n2. (S) Datum A01 has been established at this position at time 1756Z.\n\n3. (S) Sound signature correlates to OSCAR class SSGN. OSCAR class carries 24 x SS-N-19 missiles.\n\n4. (S) Prosecute this contact if situation allows. Good luck.|Acknowledge & continue
Trigger5Condition_Condition1AreaLabel=Datum A01
Objective_DestroyEnemyForces=Destroy both enemy task groups
Objective_NimitzMustSurvive=USS Nimitz must survive
[Language_cn]
Name=致命草莓（1985）
Description=歐洲戰事已經爆發。在太平洋上，一支預計在完成演習後返回彼得羅巴甫洛夫斯克的大型蘇聯特遣艦隊現已改道前往夏威夷。尼米兹號是美國在太平洋地區唯一可用的航母，指揮其戰鬥群擊退蘇聯的進攻。
Taskforce1Aircraft5NameOverride=草莓9
Taskforce1Aircraft5ShortNameOverride=草莓9
Taskforce1Aircraft6NameOverride=草莓3
Taskforce1Aircraft6ShortNameOverride=草莓3
Taskforce1Aircraft7NameOverride=草莓5
Taskforce1Aircraft7ShortNameOverride=草莓5
Taskforce1StartMessage=致命草莓\n1985|戰事已在三天前爆發，蘇聯軍隊正在計划登陸夏威夷。指揮尼米兹號航母及其戰鬥群擊退蘇聯的進攻。\n\n奧馬哈號潛艦正在你的編隊前方100海里執行偵察任務，從中途島起飛的多架P-3C（呼號草莓）正在搜索敵方戰鬥群。蘇聯的一艘949型巡航飛彈核潛艦已從彼得羅巴甫洛夫斯克的照片上消失，有可能在附近行動。\n\n尼米兹號不能被擊沉。|開始任務
StartForecast=北太平洋天氣情況：\n今天下午：最低氣溫14°C，多云。\n今天夜間：最低氣溫10°C，陰。
Taskforce1DestroyenemytaskgroupsplayervictoryMessage=任務完成！|發件：第70特遣艦隊指揮官\n收件：太平洋艦隊總司令\n\n1.（機密）偵察情報表明敵方大型水面艦艇都已被擊沉或向西撤退。\n\n2.（機密）我們正在向西北方向推進以開展收尾行動。\n\n3.（機密）完整的傷亡和彈藥消耗報告將在未來12小時內發送，但根據評估，我方已經勝利。|結束任務
Taskforce1NimitzmustsurviveMessage=任務失敗！|發件：太平洋艦隊總司令\n收件：海軍設施工程系統司令部駐中途島單位\n抄送：珍珠港海軍基地\n\n1.（機密）警告：我們失去了與第70特遣艦隊和尼米兹號的所有聯繫。\n\n2.（機密）尼米兹號最後的無線電報告了蘇聯軍隊的攻擊。\n\n3.（機密）我們評估尼米兹號已被摧毀。\n\n4.（機密）開始準備防禦蘇聯對中途島和珍珠港的攻勢，此命令立即生效。|結束任務
Taskforce1Time+2hrssubdatumMessage=緊急消息|發件：太平洋艦隊總司令\n收件：第70特遣艦隊指揮官\n\n1.（機密）警告：海軍設施工程系統司令部駐中途島單位報告了間歇性聲波監聽系統接觸，位置45.93N，171.56E。\n\n2.（機密）基準點A01已於1756Z時在此位置建立。\n\n3.此聲學信號符合949型巡航飛彈核潛艦的特徵。此潛艦攜帶有24枚P-700飛彈。\n\n4.（機密）在情況允許時攻擊此接觸。祝你好運。|收到並繼續
Trigger5Condition_Condition1AreaLabel=基準點A01
