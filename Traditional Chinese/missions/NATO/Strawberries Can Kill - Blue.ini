Taskforce1StartMessage=LES FRAISES\nPEUVENT TUER (1985)|Les hostilités ont commencé il y a trois jours, et les forces soviétiques font avancer une flotte d'invasion vers Hawaï. Commandez l'USS Nimitz et le groupe de combat Delta pour repousser l'assaut.\n\nL'USS Omaha se trouve à 100 nm devant votre formation en tant qu'éclaireur, et plusieurs P-3C partis de Midway (indicatif d'appel Strawberry - "Fraises") recherchent le groupe de combat ennemi. Un SSGN soviétique de classe Oscar est manquant sur les images provenant de Petropavlovsk et pourrait opérer à proximité. L'USS Nimitz doit survivre.|Commencer la mission
StartForecast=Prévision météorologique pour la flotte du Pacifique Nord :\nCet après-midi : température minimale : 14°C. Partiellement nuageux. Ce soir : température minimale : 10°C. Ciel couvert.
Taskforce1DestroyenemytaskgroupsplayervictoryMessage=VICTOIRE|DE CTF 70\nA CINCPACFLT\n\n1. (S) La reconnaissance indique que toutes les forces ennemies majeures en surface sont en train de couler ou de se retirer vers l'ouest.\n\n2. (S) Nous nous dirigeons vers le nord-ouest pour mener des opérations de nettoyage.\n\n3. (S) Un rapport complet sur les pertes et les dépenses en munitions sera disponible dans les 12 heures, mais nous estimons que la victoire est à nous. Signé CTF 70.|Fin de la mission
Taskforce1NimitzmustsurviveMessage=DEFAITE|DE CINCPACFLT\nA NAVFAC MIDWAY\nINFO NOB PEARL HARBOR\n\n1. (S) ATTENTION : Tout contact a été perdu avec la Task Force 70 et le NIMITZ.\n\n2. (S) La dernière transmission du NIMITZ signalait qu'il était attaqué par les forces soviétiques.\n\n3. (S) Nous estimons que le NIMITZ a été détruit. \n\n4. (S) À compter de maintenant, commencez les préparatifs en vue d'un assaut soviétique sur Midway et Pearl Harbor.|Fin de mission\n
Taskforce1Time+2hrssubdatumMessage=MESSAGE FLASH|DE CINCPACFLT\nA CTF 70\n\n1. (S) ATTENTION  : NAVFAC Midway signale un contact SOSUS intermittent à la position 45.93 N, 171.56 E.\n\n2. (S) La donnée A01 a été établie à cette position à 1756 Z.\n\n3. (S) La signature acoustique correspond à celle d'un sous-marin nucléaire lanceur d'engins de classe OSCAR. Les sous-marins de classe OSCAR transportent 24 missiles SS-N-19.\n\n4. (S) Poursuivez ce contact si la situation le permet. Bonne chance.|Accuser réception et continuer
