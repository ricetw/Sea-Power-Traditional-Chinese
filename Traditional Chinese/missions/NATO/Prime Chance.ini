[Language_cn]
Name=關鍵機會
Description=美國陸軍和海軍特種部隊的任務是在伊朗和伊拉克之間緊張局勢升級的情況下，保護波斯灣的中立航線。伊朗軍隊已經開始瞄準涉嫌援助伊拉克的油船和商船，將當地水域變成了高风險衝突地區。作為指揮官，你需要在黑暗的掩護下秘密進行部署，使用可快速反應的巡邏艦艇和直升機探測並攔截伊朗對美國或盟友的任何襲擊。行動要求精確，因為在保護平民艦艇的同時，避免公開衝突也至關重要。情報顯示伊朗砲艇和水雷遍布整個海灣，构成了持續威脅。你的任務很明確——保護航線，消滅敵方威脅，確保重要資源的安全通行，同時严格遵守行動規則，避免緊張的地區局勢進一步升級。

