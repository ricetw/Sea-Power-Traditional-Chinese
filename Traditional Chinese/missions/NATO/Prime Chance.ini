[Language_ja]
Name=プライム・チャンス作戦
Description=イラン・イラク間の緊張が高まる中、アメリカ陸海軍の特殊作戦部隊はペルシャ灣における中立航路の防衛任務を帯びている。イラン軍がイラクを支援していると疑われる油槽船(タンカー)や商船への攻撃を開始したことで、周辺海域は極めて危険な紛争地帯へと変貌した。指揮官としての貴殿の任務は、夜陰に乗じて隠密に出撃し、機動力に優れた哨戒艇や迅速な対応が可能なヘリコプターを駆使して、米国および同盟国艦艇に対するイランの攻撃を検知・阻止することにある。公然たる対決を避けつつ民間船舶を保護せねばならず、極めて精密な判断が要求される。情報によれば、イランの砲艇と機雷が灣内全域に配置されており、絶え間ない脅威となっている。命令は明確だ。航路を確保し、敵対的脅威を無力化し、重要資源の安全な通行を保証せよ。同時に、この不安定な地域での事態のエスカレーションを防ぐため、厳格な作戦規律を維持せよ。
Taskforce1StartMessageMessage=<size=40>プライム・チャンス作戦</size>|指揮官、ようこそ。\n\n<size=15>イラン・イラク間の緊張が高まる中、アメリカ陸海軍の特殊作戦部隊はペルシャ灣における中立航路の防衛任務を帯びている。イラン軍がイラクを支援していると疑われる油槽船(タンカー)や商船への攻撃を開始したことで、周辺海域は極めて危険な紛争地帯へと変貌した。指揮官としての貴殿の任務は、夜陰に乗じて隠密に出撃し、機動力に優れた哨戒艇や迅速な対応が可能なヘリコプターを駆使して、米国および同盟国艦艇に対するイランの攻撃を検知・阻止することにある。公然たる対決を避けつつ民間船舶を保護せねばならず、極めて精密な判断が要求される。情報によれば、イランの砲艇と機雷が灣内全域に配置されており、絶え間ない脅威となっている。命令は明確だ。航路を確保し、敵対的脅威を無力化し、重要資源の安全な通行を保証せよ。同時に、この不安定な地域での事態のエスカレーションを防ぐため、厳格な作戦規律を維持せよ。</size>|総員戦闘配置！

