[Language_fr]
Name=Une occasion en or
Description=Les forces spéciales de l'armée et de la marine américaines sont chargées de protéger les voies maritimes neutres dans le golfe Persique, alors que les tensions entre l'Iran et l'Irak s'intensifient. Les forces iraniennes ont commencé à prendre pour cible les pétroliers et les navires marchands soupçonnés d'aider l'Irak, transformant les eaux de la région en une zone de conflit à haut risque. En tant que commandant, vous serez déployé secrètement sous couvert de l'obscurité afin de détecter et d'intercepter toute attaque iranienne contre des navires américains ou alliés, à l'aide de patrouilleurs agiles et d'hélicoptères équipés pour une intervention rapide. L'opération exige une grande précision, car il est primordial d'éviter toute confrontation ouverte tout en protégeant le trafic maritime civil. Les renseignements indiquent que des canonnières et des mines iraniennes sont positionnées dans tout le golfe, ce qui représente un danger permanent. Vos ordres sont clairs : sécuriser les voies maritimes, neutraliser les menaces hostiles et assurer le passage en toute sécurité des ressources vitales, tout en maintenant une discipline opérationnelle stricte afin d'éviter une escalade dans cette région instable.
