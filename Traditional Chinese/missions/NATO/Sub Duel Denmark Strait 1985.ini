[Language_ja]
Name=潛水艦決闘 ― デンマーク海峽 (1985)
Description=ソ連は潛水艦部隊の大西洋への進出を図っている。敵対行為が続く中、USSボルチモアを指揮し、アイスランド沖でアルファ級攻撃型原子力潛水艦を捕捉・撃沈せよ。
Taskforce1StartMessage=<size=24>潛水艦決闘シリーズ</size>\nデンマーク海峽 (1985)|超長波(VLF)通信を受信。大西洋への進出を図るソ連軍アルファ級潛水艦が、デンマーク海峽を通過中である。USSボルチモアは迎撃態勢にある。アルファ級を捜索し、撃沈せよ！\n\nなお、USSボルチモアの生存が絶対条件である。|ミッション開始
Taskforce1BaltimoremustsurviveMessage=作戦失敗|発：大西洋潛水艦部隊司令官\n宛：大西洋艦隊総司令官\n報：NAVFACノルウェー\n\n1. (TS) NAVFACノルウェーは、USSボルチモアの最終確認地點付近で水中爆発を確認した。\n\n2. (S) ボルチモアは6月26日、ソ連軍アルファ級潛水艦の迎撃任務に就いていた。\n\n3. (S) 我々はボルチモアが撃沈されたと判断。アイスランドより哨戒機(MPA)を緊急発進させ、当該アルファ級を捜索・撃沈せよ。|ミッション終了
Taskforce1AlfadestroyedMessage=作戦完了|発：大西洋潛水艦部隊司令官\n宛：USSボルチモア(SSN-704)艦長\n\n1. (S) デンマーク海峽におけるソ連軍アルファ級潛水艦の接觸および撃沈報告を受領した。\n\n2. (S) NAVFACノルウェーは、アルファ級の推定位置において水中爆発を確認した。\n\n3. (S) 見事な手際だ。哨戒區へと帰還し、次命を待て。大西洋潛水艦部隊司令官より。\n\n<size=16>潛水艦が熟練度を獲得した：\n\nUSSボルチモア SSN-704：<color=DarkOrange>中堅(Seasoned)</color></size>|ミッション終了
Taskforce1AlfaescapesMessage=作戦失敗|発：大西洋潛水艦部隊司令官\n宛：USSボルチモア(SSN-704)艦長\n\n1. (S) NAVFACノルウェーは、デンマーク海峽を脱出する高速潛水艦の接觸を確認した。\n\n2. (S) 当該接觸はボルチモアに割り当てられたアルファ級潛水艦であると判断する。\n\n3. (S) 当該目標の無力化に失敗したことは、重大な過失である。哨戒區へと帰還し、次命を待て。|ミッション終了
Trigger4Condition_Condition1AreaLabel=アルファ級の脱出を阻止せよ！
Objective_DestroyAlfa=アルファ級の撃沈
Objective_BaltimoreMustSurvive=USSボルチモアの生存
[Language_en]
Name=Sub Duel - Denmark Strait (1985)
Description=The Soviets are attempting to surge their submarine force into the Atlantic. With hostilities underway, command the USS Baltimore to locate and sink an Alfa class attack submarine off Iceland.
Taskforce1StartMessage=<size=24>Sub Duel Series</size>\nDENMARK STRAIT (1985)|A VLF transmission has just come in indicating the presence of a Soviet Alfa class submarine attempting to transit the Denmark Strait to reach the Atlantic. The USS Baltimore is in position to intercept. Locate and sink the Alfa!\n\nUSS Baltimore must survive.|Start mission
Taskforce1BaltimoremustsurviveMessage=MISSION FAILED|FM COMSUBLANT\nTO CINCLANTFLT\nINFO NAVFAC Norway\n\n1. (TS) NAVFAC Norway reports undersea explosions near last known position of USS BALTIMORE.\n\n2. (S) BALTIMORE was tasked with intercept of Soviet ALFA class SSN 26JUN.\n\n3. (S) We assess BALTIMORE has been destroyed. Advise scramble of MPA assets from Iceland to locate and sink the ALFA.|Exit mission
Taskforce1AlfadestroyedMessage=MISSION ACCOMPLISHED|FM COMSUBLANT\nTO CO USS BALTIMORE SSN-704\n\n1. (S) Acknowledge your contact and sinking report of Soviet ALFA class SSN in Denmark Strait.\n\n2. (S) NAVFAC Norway reports undersea detonations correlating to ALFA class position.\n\n3. (S) Excellent work. Return to patrol station and await further orders. COMSUBLANT sends.\n\n<size=16>A submarine has gained a proficiency level:\n\nUSS Baltimore SSN-704: <color=DarkOrange>Seasoned</color></size>|Exit mission
Taskforce1AlfaescapesMessage=MISSION FAILED|FM COMSUBLANT\nTO CO USS BALTIMORE SSN-704\n\n1. (S) NAVFAC Norway reports high speed submarine contact exiting Denmark Strait.\n\n2. (S) We evaluate this contact as ALFA class submarine assigned to BALTIMORE.\n\n3. (S) Your inability to negate this contact is a failure of the highest order. Return to your patrol station and await further orders.|Exit mission
Trigger4Condition_Condition1AreaLabel=Do not allow Alfa to escape!
Objective_DestroyAlfa=Sink the Alfa
Objective_BaltimoreMustSurvive=USS Baltimore must survive
[Language_cn]
Name=潛艦對决——丹麥海峽（1985）
Description=蘇聯正嘗試向大西洋增派潛艦。在敵對行為已經發生的情況下，指揮巴爾的摩號在冰島附近海域找到並擊沉一艘705型攻擊型潛艦。
Taskforce1StartMessage=<size=24>潛艦對决</size>\n丹麥海峽（1985）|新收到的甚低頻信號顯示蘇聯的一艘705型潛艦正嘗試穿過丹麥海峽進入大西洋。巴爾的摩號已進入攔截位置。找到並擊沉這艘潛艦！\n\n巴爾的摩號不能被擊沉。|開始任務
Taskforce1BaltimoremustsurviveMessage=任務失敗！|發件：大西洋潛艦部隊司令\n收件：大西洋艦隊總司令\n抄送：海軍設施工程系統司令部駐挪威單位\n\n1.（絕密）海軍設施工程系統司令部駐挪威單位在巴爾的摩號的最後已知位置報告了海底爆炸。\n\n2.（機密）巴爾的摩號於6月26日收到命令攔截蘇聯的705型潛艦。\n\n3.（機密）我們評估巴爾的摩號已被摧毀。建議派冰島的海上巡邏機緊急升空，找到並擊沉敵方潛艦。|結束任務
Taskforce1AlfadestroyedMessage=任務完成！|發件：大西洋潛艦部隊司令\n收件：巴爾的摩號潛艦\n\n1.（機密）我們已收到你關於在丹麥海峽接觸並擊沉蘇聯705型潛艦的報告。\n\n2.（機密）海軍設施工程系統司令部駐挪威單位在705型潛艦的對應位置報告了海底爆炸。\n\n3.（機密）幹得漂亮，返回你的巡邏陣位並等待進一步命令。\n\n<size=16>一艘潛艦達到了新的專業水準：\n\n巴爾的摩號（SSN-704）：<color=DarkOrange>熟練</color></size>|結束任務
Taskforce1AlfaescapesMessage=任務失敗！|發件：大西洋潛艦部隊司令\n收件：巴爾的摩號潛艦\n\n1.（機密）海軍設施工程系統司令部駐挪威單位報告水下接觸高速通過丹麥海峽。\n\n2.（機密）我們評估此接觸是分配給巴爾的摩號的705型潛艦。\n\n3.（機密）此次高優先級任務的失敗需歸咎於你的失職。返回你的巡邏陣位並等待進一步命令。|結束任務
Trigger4Condition_Condition1AreaLabel=不要讓705型潛艦逃離！
Objective_DestroyAlfa=擊沉705型潛艦
Objective_BaltimoreMustSurvive=巴爾的摩號不能被擊沉
[Language_ru]
