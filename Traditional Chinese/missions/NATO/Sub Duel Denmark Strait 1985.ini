[Language_ko]
Name=잠수함 결투 - 덴마크 해협(1985)
Description=소련은 잠수함 부대를 대서양으로 급파하려고 시도하고 있습니다. 적대 행위가 진행 중인 가운데, 미 해군 볼티모어함을 지휘하여 아이슬란드 근해에서 알파급 공격 잠수함을 발견하고 침몰시키세요.
Taskforce1StartMessage=<size=24>잠수함 대결 시리즈</size>\n덴마크 해협(1985)|덴마크 해협을 통과하여 대서양에 도달하려는 소련 알파급 잠수함의 존재를 나타내는 VLF 전송이 방금 들어왔습니다. 미 해군 볼티모어함이 요격할 위치에 있습니다. 알파를 찾아서 침몰시키세요!\n\nUSS 볼티모어는 반드시 살아남을 것.|임무 시작
Taskforce1BaltimoremustsurviveMessage=임무 실패|발신: 대서양 잠수함전력사령부\n수신: 대서양함대사령부\n정보: 노르웨이 NAVFAC\n\n1. (최고기밀) 노르웨이 NAVFAC는 USS 볼티모어의 마지막 위치 근처에서 해저 폭발을 보고했습니다.\n\n2. (기밀) 볼티모어는 6월 26일에 소련의 알파급 SSN을 요격하는 임무를 맡았습니다.\n\n3. (기밀) 우리는 볼티모어가 파괴되었다고 평가함. 알파급의 위치를 파악하고 침몰시키기 위해 아이슬란드에서 MPA 자산을 수집할 것을 권장함.|미션 나가기
Taskforce1AlfadestroyedMessage=임무 완수|발신: 대서양 잠수함부대 사령부\n수신: USS 볼티모어 SSN-704\n\n1. (기밀) 덴마크 해협에서 소련 알파급 SSN에 대한 연락 및 침몰 보고서를 확인함.\n\n2. (기밀) 노르웨이 NAVFAC는 알파급의 위치에서 관련된 해저 폭발을 보고함.\n\n3. (기밀) 잘 해냈음. 정찰대로 돌아가서 추가 명령을 기다릴것. 대서양 잠수함부대 사령부가 보냄.\n\n<size=16>잠수함이 숙련도 레벨을 획득:\n\nUSS 볼티모어 SSN-704: <color=DarkOrange>노련함</color></size>|미션 나가기
Taskforce1AlfaescapesMessage=임무 실패|발신: 대서양함대 잠수함사령부\n수신: USS 볼티모어 SSN-704\n\n1. (기밀) NAVFAC 노르웨이는 덴마크 해협에서 고속 잠수함 접촉이 발생했다고 보고했습니다.\n\n2. (기밀) 우리는 이 접촉을 볼티모어에 배정된 알파급 잠수함으로 평가합니다.\n\n3. (기밀) 이 연락을 거부할 수 없는 것은 최고 수준의 실패입니다. 정찰 지점으로로 돌아가서 추가 명령을 기다릴 것.|임무 나가기
