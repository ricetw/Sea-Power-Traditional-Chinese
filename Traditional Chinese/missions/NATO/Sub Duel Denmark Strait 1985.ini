[Language_de]
Name=U-Boot-Duell – Dänemarkstraße (1985)
Description=Die Sowjets versuchen, ihre U-Boote verstärkt in den Atlantik zu verlegen. Während laufender Feindseligkeiten übernehmen Sie das Kommando über die USS Baltimore mit dem Auftrag, ein Jagd-U-Boot der ALFA-Klasse vor Island aufzuklären und zu versenken.
Taskforce1StartMessage=<size=24>U-Boot-Duell-Serie</size>\nDÄNEMARKSTRASSE (1985)|Soeben ist eine VLF-Meldung eingegangen, die auf die Anwesenheit eines sowjetischen U-Bootes der ALFA-Klasse hinweist, das versucht, die Dänemarkstraße in Richtung Atlantik zu passieren. Die USS Baltimore befindet sich in günstiger Abfangposition. Suchen und zerstören Sie die ALFA-Klasse!\n\nDie USS Baltimore muss überleben.|Mission starten
Taskforce1BaltimoremustsurviveMessage=MISSION FEHLGESCHLAGEN|FM COMSUBLANT\nAN CINCLANTFLT\nINFO NAVFAC Norwegen\n\n1. (TS) NAVFAC Norwegen meldet Unterwasserexplosionen nahe der letzten bekannten Position der USS BALTIMORE.\n\n2. (S) Die BALTIMORE war mit dem Abfangen eines sowjetischen SSN der ALFA-Klasse am 26JUN beauftragt.\n\n3. (S) Es wird vermutet, dass BALTIMORE zerstört wurde. Anweisung zur Alarmierung von MPA-Kräften aus Island zur Suche und Vernichtung der ALFA ergeht.|Mission beenden
Taskforce1AlfadestroyedMessage=AUFTRAG ERFÜLLT|FM COMSUBLANT\nAN CO USS BALTIMORE SSN-704\n\n1. (S) Bestätigung Ihres Kontakts sowie Ihrer Meldung über die Versenkung eines sowjetischen SSN der ALFA-Klasse in der Dänemarkstraße.\n\n2. (S) NAVFAC Norwegen meldet Unterwasserdetonationen in Übereinstimmung mit der Position der ALFA-Klasse.\n\n3. (S) Hervorragende Leistung. Rückkehr in den Patrouillenraum und weitere Befehle abwarten. COMSUBLANT, ende.\n\n<size=16>Ein U-Boot hat an Erfahrung gewonnen:\n\nUSS Baltimore SSN-704: <color=DarkOrange>Erfahren</color></size>|Mission beenden
Taskforce1AlfaescapesMessage=MISSION FEHLGESCHLAGEN|FM COMSUBLANT\nAN CO USS BALTIMORE SSN-704\n\n1. (S) NAVFAC Norwegen meldet einen Unterwasserkontakt mit hoher Fahrt, der die Dänemarkstraße verlässt.\n\n2. (S) Dieser Kontakt wird als das der USS BALTIMORE zugewiesene U-Boot der ALFA-Klasse bewertet.\n\n3. (S) Ihr Unvermögen, diesen Kontakt zu neutralisieren, stellt ein Versagen auf höchster Ebene dar. Rückkehr in den Patrouillenraum und weitere Befehle abwarten.|Mission beenden
Trigger4Condition_Condition1AreaLabel=ALFA darf nicht entkommen!
Objective_DestroyAlfa=ALFA versenken
Objective_BaltimoreMustSurvive=Die USS Baltimore muss überleben
