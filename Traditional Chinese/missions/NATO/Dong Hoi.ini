[Language_ja]
Name=ドンホイ (1972年)
Description=アメリカ海軍部隊は北ベトナムの補給路を艦砲射撃によって遮断すべく、トンキン灣に進出した。巡洋艦オクラホマシティおよび数隻の駆逐艦を指揮し、沿岸砲台や敵機との戦闘を遂行せよ。
Taskforce1Helicopter1NameOverride=Copywright 005
Taskforce1Helicopter1ShortNameOverride=Copywright
Taskforce1GenericTrigger1Message=勝利|指揮官、見事な手際だ！大半の目標を破壊した。当該海域から離脱して差し支えない。|作戦終了
Taskforce1GenericTrigger2Message=敗北|敗北！オクラホマシティが撃沈された！|作戦終了
[Language_en]
Name=Đồng Hới (1972)
Description=US Navy forces have moved into the Gulf of Tonkin in an attempt to use naval gunfire to interdict North Vietnamese supply lines. Command the cruiser USS Oklahoma City and several US destroyers in this action against shore batteries and aircraft.
Taskforce1Helicopter1NameOverride=Copywright 005
Taskforce1Helicopter1ShortNameOverride=Copywright
Taskforce1GenericTrigger1Message=VICTORY|Well done, Commander! Most of the targets are destroyed and you can leave the area.|Exit mission
Taskforce1GenericTrigger2Message=DEFEAT|Defeat! The USS Oklahoma City has been sunk!|Exit mission
[Language_cn]
Name=洞海（1972）
Description=美國海軍部隊已進入北部灣，嘗試用艦砲火力切斷北越的補給線。指揮俄克拉荷馬市號巡洋艦和數艘美國驅逐艦攻擊岸防砲台和飛機。
Taskforce1Helicopter1NameOverride=版權005
Taskforce1Helicopter1ShortNameOverride=版權
Taskforce1GenericTrigger1Message=任務完成！|幹得好，指揮官！大部分目標已被摧毀，你可以離開此區域了。|結束任務
Taskforce1GenericTrigger2Message=任務失敗！|任務失敗！俄克拉荷馬市號被擊沉了！|結束任務
[Language_ru]
Name=Донгхой (1972)
Description=Американские корабли обстреливают береговые цели в Северном Вьетнаме.
Taskforce1GenericTrigger1Message=Задание выполнено!|Хорошая работа, командующий! Большинство целей уничтожено и ваши корабли теперь могут покинуть прибрежную зону.
Taskforce1GenericTrigger2Message=Несем потери!|Командующий! Вы потеряли «Оклахому». Это серьезный удар для ВМФ США!
[Language_de]
Name=Đồng Hới (1972)
Description=Kriegsschiffe der US Navy bombardieren Landziele im NordVietnam.
Taskforce1GenericTrigger1Message=Ziel erfüllt!|Gut gemacht, Kommandant! Die meisten Ziele wurden vernichtet, Sie können das Einsatzgebiet verlassen.
Taskforce1GenericTrigger2Message=Massiver Verlust!|Kommandant! Sie haben die Oklahoma verloren! Das ist ein schwerer Schlag für die US Navy!
[Language_es]
Name=Dong Hoi
[Language_fr]
Name=Đồng Hới (1972)
Description=Les forces navales américaines se sont déployées dans le golfe du Tonkin afin d'interrompre les lignes d'approvisionnement nord-vietnamiennes à l'aide de tirs navals. Prenez le commandement du croiseur USS Oklahoma City et de plusieurs destroyers américains dans cette opération contre les batteries côtières et les avions.
Taskforce1VictoryMessage=VICTORY|Bien joué, Commandant ! La plupart des cibles sont détruites et vous pouvez quitter la zone.|Quitter la mission
Taskforce1OklahomaLostMessage=DEFEAT|Défaite ! L'USS Oklahoma City a été coulé!|Quitter la mission
[Language_ko]
Name=동 호이 (1972)
Description=미 해군이 북베트남 보급선을 차단하기 위해 해군의 포격을 시도하기 위해 통킹만으로 진격했습니다. 순양함 USS 오클라호마 시티와 여러 미국 구축함들에게 해안 포대와 항공기에 대한 이 작전을 명령하십시오.
Taskforce1Helicopter1NameOverride=Copywright 005
Taskforce1Helicopter1ShortNameOverride=Copywright
Taskforce1GenericTrigger1Message=VICTORY|Well done, Commander! Most of the targets are destroyed and you can leave the area.|Exit mission
Taskforce1GenericTrigger2Message=DEFEAT|Defeat! The USS Oklahoma City has been sunk!|Exit mission
