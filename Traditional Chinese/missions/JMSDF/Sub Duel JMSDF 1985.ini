[Language_ja]
Name=潜水艦デュエル：北海道 (1985)
Description=自衛隊が北海道沖で2隻のソ連潜水艦を探知した。最寄りの海上自衛隊ユニットとして、潜水艦「もちしお」を指揮し、敵潜水艦を捕捉・撃沈せよ。
Taskforce1StartMessage=<size=24>潜水艦デュエル・シリーズ</size>\n北海道沖決戦 (1985)|自衛隊のソーナー監視網が北海道西方で2隻のソ連潜水艦を捕捉した。「もちしお」は、標的が宗谷海峡を通過してオホーツク海へ進入する前に、これらを捕捉・撃滅せよとの命令を受領した。\n\n接触標的のうち1隻はヴィクターIII型原子力潜水艦（SSN）と特定されたが、もう1隻は不明である（キロ型またはタンゴ型通常動力潜水艦の可能性あり）。おおよその捜索海域はマップ上に示されている。\n\n「もちしお」は生還しなければならない。|作戦開始
Taskforce1BothsubsdestroyedplayervictoryMessage=勝利|1985年6月26日\n発 潜水艦隊司令官\n宛 潜水艦「もちしお」(SS-574)\n\n1. 自衛隊ソーナー監視網が、北海道西方において複数の水中爆発音を確認した。\n\n2. 司令部は、これらを敵潜水艦が圧壊深度において崩壊した際のものと判断する。\n\n3. 指揮官、見事な手際だ。哨戒区に復帰し、次命を待て。\n\n<size=15>潜水艦の熟練度が上がった：\n\nJS もちしお (SS-574)：<color=Green>ベテラン</color></size>|作戦終了
Taskforce1MochishiomustsurviveMessage=敗北|1985年6月26日\n発 潜水艦隊司令官\n宛 海上幕僚監部\n\n1. 自衛隊ソーナー監視網が、「もちしお」(SS-574)の最終確認位置付近において圧壊音を確認した。\n\n2. 「もちしお」に対し、当該海域における2つのソーナー標的の調査および撃滅を命じていた。\n\n3. 「もちしお」からの定時連絡が途絶。潜水艦隊司令部は、同艦が撃沈されたものと判断する。|作戦終了
Taskforce1SubmarinesescapeplayerdefeatMessage=敗北|1985年6月26日\n発 潜水艦隊司令官\n宛 潜水艦「もちしお」(SS-574)\n\n1. 自衛隊ソーナー監視網が、宗谷海峡を通過する敵潜水艦のものと思われる音響信号を確認した。\n\n2. 直ちに追撃を中止し、哨戒区へ帰還せよ。海上自衛隊または米軍の航空戦力を転用し、当該標的を撃破する。\n\n3. 帰港後、直ちに東京行きの軍用便に搭乗せよ。事後報告および解任の手続きを行う。|作戦終了
Trigger5Condition_Condition1AreaLabel=基準点 A01
Objective_DestroyBothEnemySubs=全ソ連潜水艦の撃沈
Objective_MochishioMustSurvive=「もちしお」の生存
[Language_en]
Name=Sub Duel - Hokkaido (1985)
Description=Two USSR submarines have been detected by the JSDF off Hokkaido. As the nearest JMSDF unit, command JDS Mochishio to locate and sink them.
Taskforce1StartMessage=<size=24>Sub Duel Series</size>\nACTION OFF\nHOKKAIDO (1985)|JSDF sonar arrays have located two USSR submarines west of Hokkaido. JDS Mochishio has just received orders to locate and destroy both submarines before they can transit La Perouse Strait into the Sea of Okhotsk.\n\nAcoustic signature for one of the contacts was positively identified as VICTOR III class SSN, but the other is unknown (either KILO or TANGO class SSK). Rough search area is marked on your map.\n\nJDS Mochishio must survive.|Start mission
Taskforce1BothsubsdestroyedplayervictoryMessage=VICTORY|26JUN1985\nFM COMFLTSUBFOR\nTO JDS MOCHISHIO SS-574\n\n1. JSDF sonar array reports multiple subsurface detonations west of Hokkaido.\n\n2. HQ assesses these explosions as enemy submarine contacts breaking up at crush depth.\n\n3. Excellent work, Commander. Return to patrol station and await further orders.\n\n<size=15>A submarine has gained a proficiency level:\n\nJDS Mochishio (SS-574): <color=Green>Veterans</color></size>|Exit mission
Taskforce1MochishiomustsurviveMessage=DEFEAT|26JUN1985\nFM COMFLTSUBFOR\nTO GHQ JMSDF\n\n1. JSDF sonar array reports implosion near last known position of MOCHISHIO SS-574.\n\n2. MOCHISHIO was ordered to investigate and destroy two sonar contacts in this area.\n\n3. MOCHISHIO has now missed scheduled check-in. Fleet Submarine Force assesses MOCHISHIO has been destroyed.|Exit mission
Taskforce1SubmarinesescapeplayerdefeatMessage=DEFEAT|26JUN1985\nFM COMFLTSUBFOR\nTO JDS MOCHISHIO SS-574\n\n1. JSDF sonar array reports acoustic signature correlating to enemy submarine transiting La Perouse Strait.\n\n2. Break off prosecution and return to your patrol station immediately. JMSDF or US air will be rerouted from critical positions to destroy this contact.\n\n3. On your return to port, board first available military flight to Tokyo for debriefing and relief.|Exit mission
Trigger5Condition_Condition1AreaLabel=Datum A01
Objective_DestroyBothEnemySubs=Destroy both USSR submarines
Objective_MochishioMustSurvive=JDS Mochishio must survive
[Language_fr]
Name=Duel sous-marin - Hokkaido (1985)
Description=Deux sous-marins soviétiques ont été détectés par la JSDF au large d'Hokkaido. En tant qu'unité de la JMSDF la plus proche de la zone, ordonnez au JDS Mochishio de les localiser et de les couler.
Taskforce1StartMessage=<size=24>Duel sous-marin</size>\nACTION AU LARGE\nD'HOKKAIDO (1985)|Les sonars de la JSDF ont localisé deux sous-marins soviétiques à l'ouest d'Hokkaido. Le JDS Mochishio vient de recevoir l'ordre de localiser et de détruire les deux sous-marins avant qu'ils ne puissent traverser le détroit de La Pérouse et pénétrer dans la mer d'Okhotsk.\n\nLa signature acoustique de l'un des contacts a été formellement identifiée comme étant celle d'un sous-marin de classe VICTOR III, mais l'autre est inconnue (sous-marin de classe KILO ou TANGO). La zone de recherche approximative est indiquée sur votre carte.\n\nLe JDS Mochishio doit survivre.|Démarrer la mission
Taskforce1BothsubsdestroyedplayervictoryMessage=VICTOIRE|26JUN1985\nDE COMFLTSUBFOR\nA JDS MOCHISHIO SS-574\n\n1. Le réseau sonar de la JSDF signale plusieurs détonations sous-marines à l'ouest d'Hokkaido.\n\n2. Le QG évalue ces explosions comme des contacts sous-marins ennemis parvenus à la profondeur d'écrasement.\n\n3. Excellent travail, Commandant. Retournez au poste de patrouille et attendez les ordres.\n\n<size=15>Un sous-marin a atteint un niveau de compétence :\n\nJDS Mochishio (SS-574) :<color=Green>Vétérans</color></size>|Quitter la mission
Taskforce1MochishiomustsurviveMessage=DEFAITE|26JUN1985\nDE COMFLTSUBFOR\nA GHQ JMSDF\n\n1. Le réseau sonar de la JSDF signale une implosion près de la dernière position connue du MOCHISHIO SS-574.\n\n2. Le MOCHISHIO a reçu l'ordre d'enquêter et de détruire deux contacts sonar dans cette zone.\n\n3. Le MOCHISHIO a manqué son point de contrôle prévu. La Force sous-marine de la Flotte estime que le MOCHISHIO a été détruit.|Quitter la mission
Taskforce1SubmarinesescapeplayerdefeatMessage=DEFAITE|26JUN1985\nDE COMFLTSUBFOR\nA JDS MOCHISHIO SS-574\n\n1. Le réseau sonar de la JSDF signale une signature acoustique corrélée à un sous-marin ennemi traversant le détroit de La Pérouse.\n\n2. Cessez toute poursuite et retournez immédiatement à votre poste de patrouille. La JMSDF ou l'aviation américaine seront déroutées des positions critiques pour détruire ce contact.\n\n3. À votre retour au port, embarquez sur le premier vol militaire disponible à destination de Tokyo pour un débriefing et une relève.|Quitter la mission
Trigger5Condition_Condition1AreaLabel=Datum A01
Objective_DestroyBothEnemySubs=Détruire les deux sous-marins soviétiques
Objective_MochishioMustSurvive=Le JDS Mochishio doit survivre
[Language_cn]
Name=潛艦對決 - 北海道（1985）
Description=日本自衛隊在北海道外海偵測到兩艘蘇聯潛艦。你是距離最近的海上自衛隊單位，請指揮自衛艦望潮號，定位並擊沉它們。
Taskforce1StartMessage=<size=24>潛艦對決系列</size>\n北海道外海行動（1985）|日本自衛隊聲納陣列在北海道以西偵測到兩艘蘇聯潛艦。望潮號剛收到命令，必須在兩艘潛艦通過宗谷海峽、進入鄂霍次克海之前，將其定位並摧毀。\n\n其中一個接觸的音響特徵已確認為 Victor III 級核子攻擊潛艦；另一個接觸尚未識別，可能是 Kilo 級或 Tango 級常規潛艦。大致搜索區域已標示於你的地圖上。\n\n望潮號必須存活。|開始任務
Taskforce1BothsubsdestroyedplayervictoryMessage=勝利|1985年6月26日\n發自：潛水艦隊司令官\n致：自衛艦望潮號（SS-574）\n\n1. 日本自衛隊聲納陣列回報，北海道以西發生多次水下爆炸。\n\n2. 司令部判定這些爆炸為敵方潛艦接觸在壓潰深度解體所致。\n\n3. 幹得好，指揮官。返回巡邏站位，等待後續命令。\n\n<size=15>一艘潛艦的熟練度提升：\n\n自衛艦望潮號（SS-574）：<color=Green>老練</color></size>|結束任務
Taskforce1MochishiomustsurviveMessage=失敗|1985年6月26日\n發自：潛水艦隊司令官\n致：海上自衛隊總部\n\n1. 日本自衛隊聲納陣列回報，在望潮號（SS-574）最後已知位置附近偵測到內爆聲。\n\n2. 望潮號奉命調查並摧毀此區域內的兩個聲納接觸。\n\n3. 望潮號已錯過預定回報時間。潛水艦隊司令部判定望潮號已遭摧毀。|結束任務
Taskforce1SubmarinesescapeplayerdefeatMessage=失敗|1985年6月26日\n發自：潛水艦隊司令官\n致：自衛艦望潮號（SS-574）\n\n1. 日本自衛隊聲納陣列回報，偵測到與敵方潛艦通過宗谷海峽相符的音響特徵。\n\n2. 立即中止追擊並返回你的巡邏站位。海上自衛隊或美軍航空兵力將自關鍵位置改派，以摧毀此接觸。\n\n3. 返回港口後，請搭乘第一班可用軍用航班前往東京接受任務簡報與解除職務。|結束任務
Trigger5Condition_Condition1AreaLabel=基準點 A01
Objective_DestroyBothEnemySubs=摧毀兩艘蘇聯潛艦
Objective_MochishioMustSurvive=望潮號必須存活
[Language_ru]
Name=Sub Duel - Hokkaido (1985)
[Language_de]
Name=U-Boot Duell - Hokkaido (1985)
Description=Vor Hokkaidō wurden von der JMSDF zwei U-Boote der UdSSR entdeckt. Sie befehligen die JDS Mochishio als nächstgelegene JMSDF-Einheit. Ihre Aufgabe ist es, die U-Boote zu orten und zu versenken.
Taskforce1StartMessage=<size=24>U-Boot Duell</size>\nEINSATZ VOR\nHOKKAIDO (1985)|Sonaranlagen der JSDF haben westlich von Hokkaidō zwei sowjetische U-Boote lokalisiert. Die JDS Mochishio hat soeben den Befehl erhalten, beide U-Boote zu orten und zu vernichten, bevor sie die La-Pérouse-Straße in das Ochotskische Meer durchqueren können.\n\nDas akustische Profil einer der Kontakte wurde eindeutig als VICTOR-III-Klasse (SSN) identifiziert, der andere ist unbekannt (entweder KILO- oder TANGO-Klasse, SSK). Das grobe Suchgebiet ist auf Ihrer Karte markiert.\n\nDie JDS Mochishio muss überleben.|Mission Starten
Taskforce1BothsubsdestroyedplayervictoryMessage=SIEG|26.JUNI 1985\nVON COMFLTSUBFOR\nAN JDS MOCHISHIO SS-574\n\n1. Die Sonaranlagen der JSDF melden mehrere Unterwasserexplosionen westlich von Hokkaidō.\n\n2. Das Hauptquartier bewertet diese Detonationen als feindliche U-Boote, die in der Tiefe zerbrechen.\n\n3. Ausgezeichnete Arbeit, Kommandant. Nehmen Sie Ihre Patrouille wieder auf und warten Sie auf weitere Befehle.\n\n<size=15>Ein U-Boot hat eine Erfahrungsstufe erreicht:\n\nJDS Mochishio (SS-574): <color=Green>Veteran</color></size>|Mission Beenden
Taskforce1MochishiomustsurviveMessage=NIEDERLAGE|26.JUNI 1985\nVON COMFLTSUBFOR\nAN GHQ JMSDF\n\n1. Sonaranlagen der JSDF melden eine Implosion an der zuletzt bekannten Position der MOCHISHIO (SS-574).\n\n2. Die MOCHISHIO hatte den Auftrag, zwei Sonarkontakte in diesem Gebiet aufzuklären und zu vernichten.\n\n3. Die MOCHISHIO hat ihre planmäßige Meldung verpasst. Das Flottenkommando geht davon aus, dass die MOCHISHIO vernichtet wurde.|Mission Beenden
Taskforce1SubmarinesescapeplayerdefeatMessage=NIEDERLAGE|26.JUNI 1985\nVON COMFLTSUBFOR\nAN JDS MOCHISHIO SS-574\n\n1. Sonaranlagen der JSDF meldet eine akustische Signatur, die mit einem feindlichen U-Boot korreliert, das die La-Pérouse-Straße passiert.\n\n2. Verfolgung abbrechen und unverzüglich zu Ihrer Patrouille zurückkehren. JMSDF- oder US-Einheiten werden von anderen Aufträgen abgezogen, um diesen Kontakt zu vernichten.\n\n3. Nach Einlaufen in den Hafen den ersten verfügbaren Militärflug nach Tokio zur Nachbesprechung und Ihrer Ablösung besteigen.|Mission Beenden
Trigger5Condition_Condition1AreaLabel=Datum A01
Objective_DestroyBothEnemySubs=Zerstören Sie beide U-Boote der UdSSR
Objective_MochishioMustSurvive=Die JDS Mochishio muss überleben
