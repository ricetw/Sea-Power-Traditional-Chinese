[Language_ko]
Name=잠수함 대결 - 홋카이도 (1985)
Description=자위대가 홋카이도 인근에서 소련군 잠수함 2척을 탐지했습니다. 가장 가까운 해상자위대 부대로서, JDS 모치시오로 잠수함들을 탐지 및 격침시키십시오.
Taskforce1StartMessage=<size=24>잠수함 대결 시리즈</size>\nACTION OFF\n홋카이도 (1985)|홋카이도 서쪽에서 자위대 소나가 소련군 잠수함 2척을 탐지했습니다. JDS 모치시오는 두 잠수함이 라페루즈 해협을 통과하여 오호츠크해로 진입하기 전에 탐지 및 격침시킬 것을 막 명령받았습니다.\n\n접촉 신호 두 개 중 하나는 빅터III급으로 확실히 식별되었으나, 나머지 하나는 정확히 식별되지 않았습니다(킬로급 혹은 탱고급 잠수함 중 하나). 대략적인 수색 구역이 지도 상에 표시되어 있습니다.\n\nJDS 모치시오는 반드시 살아남아야 합니다.|임무 시작
Taskforce1BothsubsdestroyedplayervictoryMessage=승리|1985.06.26\n발신: 잠수함대 사령부\n수신: JDS 모치시오 SS-574\n\n1. 소나가 홋카이도 서쪽에서 다수의 수중 폭발을 보고함.\n\n2. 본 사령부는 해당 폭발을 붕괴 심도에서 파괴되는 적 잠수함으로 평가함.\n\n3. 귀하의 공을 치하함. 초계 위치로 복귀 및 다음 명령 하달에 대기할 것.\n\n<size=15>잠수함이 숙련도 획득:\n\nJDS 모치시오 (SS-574): <color=Green>베테랑</color></size>|임무 종료
Taskforce1MochishiomustsurviveMessage=패배|1985.06.26\n발신: 잠수함대 사령부\n수신: 자위함대 사령부\n\n1. 소나가 SS-574 모치시오의 마지막 위치로 알려진 지점 인근에서 내파음을 보고함.\n\n2. 모치시오는 해당 구역에서 접촉 신호를 조사 및 파괴할 것을 명령받음.\n\n3. 모치시오와 예정된 교신 시간이 지났음. 잠수함대 사령부는 모치시오가 격침된 것으로 평가함.|임무 종료
Taskforce1SubmarinesescapeplayerdefeatMessage=패배|1985.06.26\n발신: 잠수함대 사령부\n수신: JDS 모치시오 SS-574n\n1. JSDF 소나 배열은 라 페루즈 해협을 통과하는 적 잠수함과 관련된 음향 신호를 보고합니다.\n\n2. 기소를 중단하고 즉시 경찰서로 돌아가세요. MSDF 또는 미 공군은 이 접촉을 파괴하기 위해 중요한 위치에서 경로를 변경할 것입니다.\n\n3. 항구로 돌아오시면 먼저 도쿄로 가는 군용 항공편에 탑승하여 브리핑과 구호를 받으세요.|미션 나가기
