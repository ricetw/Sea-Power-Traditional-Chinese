[Language_ko]
Name=잠수함 결투 - 덴마크 해협 탈출하기(1985)
Description=전쟁이 발발했고, 우리 북부함대 잠수함들은 호송 작전을 시작하기 위해 대서양에 진입하라는 명령을 받았습니다. 알파급 잠수함 K-316을 지휘하여 덴마크 해협을 항해하고 방해가 되는 NATO 잠수함을 격파하세요.
Taskforce1StartMessage=<size=24>잠수함 대결 시리즈</size>\n덴마크 해협\n탈출(1985)|사령부는 북부 함대에 대서양으로 급강하하여 NATO 호송대를 사냥하기 시작하라고 명령했습니다. K-316은 아이슬란드 앞바다에 있으며 덴마크 해협을 통과해야 합니다.\n\n근처에 미국 잠수함 한 척이 보고되었습니다. 가능하면 잠수함을 격침시킬 것!\n\nK-316은 반드시 살아남을 것.|임무 시작
Taskforce1K-316mustsurviveMessage=임무 실패|적기북부함대 사령부로부터 발신\n수신: 모스크바 참모부\n\n1. 잠수함 K-316과의 연락이 끊겼으며, 파괴되었다고 평가됨.\n\n2. K-316은 호송 차단 임무를 위해 미사일 잠수함의 후속 수송을 위해 덴마크 해협을 통과하는 차선을 확보하는 임무를 맡았음.\n\n3. 우리는 이 지역에서 미국의 공격 잠수함이 여전히 활동 중이라고 평가함. 미군을 제거하기 위해 이 지역에 추가 공격 잠수함을 배치할 것을 권장함.|임무 나가기
Taskforce1LAdestroyedMessage=임무 완수됨|발신: 적기북부함대 사령부\n수신: 모스크바 참모부\n\n1. 잠수함 K-316은 덴마크 해협에서 미국 로스앤젤레스급 잠수함이 침몰했다고 보고함.\n\n2. K-316은 현재 호송대의 봉쇄 작전을 지원하기 위해 북대서양으로 이동 중. 이곳은 이제 우리의 미사일 잠수함이 통과할 수 있게됨.\n\n3. K-316의 함장은 미국과의 전투에서 영웅적인 행동으로 훈장을 수여받을 것을 권장함. 승리는 우리의 것!\n\n<size=16>잠수함이 숙련도 레벨을 획득:\n\nK-316: <color=DarkOrange>노련함</color></size>|임무 나가기
Trigger4Condition_Condition1AreaLabel=미국 잠수함의 의심 위치
Objective_DestroyBaltimore=로즈엔젤레스급 SSN 침몰
Objective_K-316MustSurvive=K-316을 반드시 생존시킬것
