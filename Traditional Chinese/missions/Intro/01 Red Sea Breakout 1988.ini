[Language_ja]
Name=01 レッドシー・ブレイクアウト - NATO (1988)
Description=USSヨークタウンにバブ・アル・マンデブ海峡の強行突破命令が下った。ソ連の支援を受けるイエメン軍が、高速戦闘艇やMiG-21、沿岸ミサイル砲台を用いて通航の阻止を企てている。防衛網を突破してアデン湾へと進出し、無害通航権を確固たるものにせよ。
Trigger3Condition_Condition1AreaLabel=脱出指定海域
Taskforce1YorktownmustsurviveMessage=作戦失敗|敗北！USSヨークタウンが撃沈された！|作戦終了
Taskforce1ReachmarkedareaMessage=任務完了|勝利！敵の脅威は全て排除され、海峡の通航に成功した。任務完了だ。見事な手際だ、指揮官。|作戦終了
Objective_ReachMarkedArea=バブ・アル・マンデブ海峡の通航
Objective_YorktownMustSurvive=USSヨークタウンの生存
[Language_en]
Name=01 Red Sea Breakout - NATO (1988)
Description=USS Yorktown has been directed to force the Bab al-Mandab Strait. Soviet-backed Yemeni forces are attempting to deny the passage with fast attack craft, MiG-21 fighters, and coastal missile batteries. Fight through the defenses and enter the Gulf of Aden to assert the right of innocent passage.
Trigger3Condition_Condition1AreaLabel=Reach this area to escape
Taskforce1YorktownmustsurviveMessage=MISSION FAILED|Defeat! USS Yorktown has been destroyed!|Exit mission
Taskforce1ReachmarkedareaMessage=MISSION ACCOMPLISHED|Victory! We assess that all enemy threats have been neutralized and we can successfully transit the strait. Our mission is complete. Good work, Commander.|Exit mission
Objective_ReachMarkedArea=Transit the Bab al-Mandab Strait
Objective_YorktownMustSurvive=USS Yorktown must survive
[Language_cn]
Name=01 紅海突圍 - 北約（1988）
Description=約克鎮號奉命強行通過曼德海峽。受蘇聯支援的葉門部隊正試圖以快速攻擊艇、MiG-21 戰鬥機與岸基飛彈陣地阻止通行。突破防線並進入亞丁灣，以主張無害通過權。
Trigger3Condition_Condition1AreaLabel=抵達此區域以脫離
Taskforce1YorktownmustsurviveMessage=任務失敗|失敗！約克鎮號已被摧毀！|結束任務
Taskforce1ReachmarkedareaMessage=任務完成|勝利！我們評估所有敵方威脅皆已被消除，現在可以順利通過海峽。任務完成。幹得好，指揮官。|結束任務
Objective_ReachMarkedArea=通過曼德海峽
Objective_YorktownMustSurvive=約克鎮號必須存活
[Language_ru]
Name=01 Red Sea Breakout (1988)
[Language_de]
Name=01 Red Sea Breakout - NATO (1988)
Description=Die USS Yorktown hat den Auftrag erhalten, den Bab al-Mandab zu durchqueren. Von der Sowjetunion unterstützte jemenitische Streitkräfte versuchen, die Passage mit Schnellangriffsbooten, MiG-21-Jagdflugzeugen und landgestützten Raketenbatterien zu verhindern. Kämpfen Sie sich durch die Verteidigung und laufen Sie in den Golf von Aden ein, um das Recht der friedlichen Durchfahrt durchzusetzen.
Trigger3Condition_Condition1AreaLabel=Erreichen Sie dieses Gebiet, um zu entkommen
Taskforce1YorktownmustsurviveMessage=MISSION FEHLGESCHLAGEN|Niederlage! Die USS Yorktown wurde zerstört!|Mission beenden
Taskforce1ReachmarkedareaMessage=MISSION ERFOLGREICH|Sieg! Wir gehen davon aus, dass alle feindlichen Bedrohungen neutralisiert wurden und wir die Meerenge erfolgreich passieren können. Unsere Mission ist erfüllt. Gute Arbeit, Kommandant.|Mission beenden
Objective_ReachMarkedArea=Bab al-Mandab passieren
Objective_YorktownMustSurvive=Die USS Yorktown muss überleben
