[Language_ko]
Name=01 홍해 돌파 - NATO  (1988)
Description=USS 요크타운은 바브 알-만데브 해협을 강제로 통과하라는 지시를 받았습니다. 소련의 지원을 받는 예멘군은 고속정, MiG-21 전투기, 해안 미사일 포대를 사용하여 통과를 거부하려고 시도하고 있습니다. 방어선을 뚫고 아덴만으로 들어가 통행권을 주장하세요.
