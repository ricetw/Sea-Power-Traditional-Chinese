Name=Info Mission
Description=This mission contains \ndocumentation and <Span Foreground="{StaticResource Brush.Glyph.Highlighted}">examples</Span> of what is possible in the ini files

#Intel items - messages which will be displayed in the "intel" tab of message log at given time during mission
#Time format: <hour>,<minutes> or <year>,<month>,<day>,<hour>,<minutes>
#Note: Message is displayed if current time/date is bigger than given one, so message with time 1789,7,14,14,20 for example, woould be displayed right at the start of this mission
#IMPORTANT: Works for EVERY taskforce so cant really be used in scenarios with switchable sides.
NumberOfIntelItems=4
IntelligenceTime1=5, 30
IntelligenceItem1=Test 1
IntelligenceTime2=1974, 5, 9, 5, 45
IntelligenceItem2=Test 2
IntelligenceTime3=6, 00
IntelligenceItem3=Test 3
IntelligenceTime4=7, 00
IntelligenceItem4=Test 4

#Messages for triggers
#Template: <message name>=<message>
#message name is specified in trigger
#message composition: <Caption>|<Message text>|<Exit Button Variant>,<Exit Button Variant>,<Exit Button Variant>...
Taskforce1StartMessage=<size=40>Message Caption</size>|Message example:\n\n<size=15> size=15 </size>\n<color={*}ffc68c>color={*}ffc68c</color>|Variant 1, Variant 2

