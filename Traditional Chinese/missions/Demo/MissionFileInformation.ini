[ ---------- Taskforce1 ---------- ]
[Taskforce1Vessel1] #大部分關於單位生成的資訊
#---------- 一般 ----------

#使單位不可控制，例如著陸狀態時。
#預設 = True
//Controllable=False
#使單位對其他 taskforce 的感測器隱形。
#預設 = False
//Undetectable=False

#控制此單位生成的機率
#可用值：0-1。小於 0 視為 0，大於 1 視為 1
#預設 = 1（一定生成）
//SpawnChance=0.5

#通常任務開始時會選取第一個玩家單位。此設定可覆寫該行為。
#注意：最後一個設為 'SetSelected=True' 的玩家單位會在任務開始時被選取。
#預設 = False
SetSelected=True

#單位 ini 檔名稱
#若有像 'Type=wp_takr_kiev,wp_em_sovremenny,wp_rkr_slava' 這樣的值清單，會從清單中隨機生成一個單位
Type=wp_takr_kiev

#這會定義艦名、塗裝與航空隊
#注意：Aircraft 與 Helicopters 會改用 'SquadronReference'
#可用值：Default, Random, Variant<number>
#預設 = Default
VariantReference=Variant2

#允許覆寫單位國籍
#對艦艇而言，這會自動覆寫桅旗貼圖
#Aircraft 與 Helicopters 也適用
#可用值：<NationName>
#預設 = variants 檔案中標示的單位國籍
//Nation=Pakistan

#允許覆寫單位桅旗貼圖
#Aircraft 與 Helicopters 通常不會使用
#可用值：<PathToTheFlag>
#預設 = variants 檔案中標示的旗幟
//FlagTexture=ships/materials/textures/flag_cyprus

#若單位有裝載配置，這會定義其 loadout。Aircraft、貨船與部分特殊案例會使用
#預設 = Default
//LoadoutVariant=Default

#---------- 航空隊 ----------
#完整替換艦上航空器。
#適用於空軍基地、航空母艦與搭載直升機的護航艦
#注意：不相容的航空器會被忽略。不可能超過容量載入
CustomAirGroup=True
wp_yak-38=Squadron2,12|Squadron4,12
wp_mig-23a=Squadron1,6 //<-- 基輔級不支援 MiG-23A，因此不會加入
wp_ka-25=Squadron1,4
wp_ka-27=Squadron1,16  //<-- 由於基輔級容量（36 架）限制，只會加入 8 架

#---------- 感測器 ----------
#允許開啟/關閉特定單位的感測器（若適用）。
VisualSystemsOn=True        // 預設 = True。警告：除了使用 DevMode/Sensors 外，無法重新開啟
RadarsActive=True           // 預設 = False。警告：若啟用，水面與空中搜索雷達都會啟用。
TowedArrayDeployed=True     // 預設 = False。
ActiveSonarsEnabled=True    // 預設 = False。若拖曳聲納是主動 VDS，也必須啟用此項才會部署
TowedDecoyDeployed=False    // 預設 = False。這裡不作用，因為基輔級沒有拖曳誘餌

#---------- 武器 ----------
#設定單位的武器狀態
#可用值：Hold, Tight, Free
#預設 = Tight
#注意：敵方 taskforce 單位可由 [Debug]/EnemyWeaponStatus 設定覆寫
//WeaponStatus=Tight

#---------- 其他 ----------

#單位乘員熟練度。目前只影響 TMA 速度。未來還有很大發展空間……
#可用值：Green, Trained, Seasoned, Veterans, Ultra
#預設 = Green
CrewSkill=Veterans

# ---------- 生成位置 ----------

#預設 = 0,0,0
#0) 地理位置。
#直接位置定義
#<緯度, 經度, 高度>
#高度單位為英尺，但也可使用文字。請參考潛艦與航空器範例（在 NM 中也使用相同文字。注意：在 GP 中高度是第 3 個參數）
GeoPosition=38.0753,21.9964,3392

#定義生成位置的多種方式：
#x 為負值代表向西，z 為負值代表向北，高度（y）單位為英尺

#預設 = 0,0,0
#1) 直接位置。
#指定相對任務區域中心的英里偏移
#<海里,英尺,海里>
#高度單位為英尺，但也可使用文字。請參考潛艦與航空器範例
RelativePositionInNM=-0,0,-20
#可以使用其他單位位置，而非地圖中心。
#重要：該單位必須已經定義。因此可以在玩家單位周圍生成敵方單位，但不能反過來
//PositionRelativeTo=Taskforce1LandUnit1  

#2) 在某位置周圍隨機生成
#
#範圍單位為英里
//RandomSpawnCenter=0,0,0
#也可使用：RandomSpawnCenter=Taskforce1LandUnit1，規則同上
//RandomSpawnRange=5,10        //會在距離中心 5 到 10 海里的隨機範圍生成
//RandomSpawnDirection=-45,45  //會以 -45 到 45 度的隨機絕對方位生成（西北到東北）
//PositionRelativeTo=Taskforce1LandUnit1  // 也可在此用於航向定義

#航向
#預設 = 0
Heading=-140
//Heading=0,-140,0     // 完整旋轉向量
//Heading=Parent       // 將航向設為等同 "PositionRelativeTo" 單位的航向
#可圍繞選定航向隨機化航向
RandomizeCourse=-45,45  //結果航向會是 Heading 加上 -45 到 45 度的隨機值。（僅水平）

#車鐘/速度設定
#可用值：艦艇 -1 - 5，航空器 2 - 5
#預設 = 0
Telegraph=2

#---------- 航點 ----------
Waypoints=Turn,0,20,current   //<- 會在單位前方 20 海里產生航點
#Course,-100/-90,10,current,32|RandomTurns,20,-30/30,2/4,current,10/20|-13,0,4
#Turn,-30/35,2,current|Turn,-30/35,2,current|Turn,-30/35,2,current|Turn,-30/35,2,current|Turn,-30/35,2,current|Turn,-30/35,2,current|Turn,-30/35,2,current|Turn,-30/35,2,current

#航點規則資訊：
#<X>,<Z> = <英里Min/英里Max>					相對中心的世界座標／相對 parent 的相對座標，單位為英里
#<height> = <英尺Min/英尺Max>, p/psd/periscope, current, parent		高度的各種定義
#<time> = <秒Min/秒Max>									航點刪除前的時間。可選
#<angle> = <度Min/度Max>
#<number> = <整數>								建立的隨機航點數量
#<range> = <英里Min/英里Max>					到航點的距離
#<parent> = 單位區段名稱。必須位於目前單位之前

#<X>,<height>,<Z>,<time>										依座標建立的一般世界航點
#Course,<courseMin/courseMax>,<range>,<height>,<time>		依世界方位與距離建立的一般世界航點
#Turn,<angle>,<range>,<height>,<time>						依目前航向轉向 <angle> 度建立的一般世界航點
#RandomTurns,<number>,<angle>,<range>,<height>,<time>		自動產生 <number> 個隨機 "Turn" 類型航點

#ToSpawnPosition,<parent>,<height>,<time>					位於 <parent> 生成位置的一般世界航點
#ToCurrentPosition,<parent>,<height>,<time>					位於執行航點當下 <parent> 位置的一般世界航點

#RelativeFixed,<parent>,<X>,<height>,<Z>,<time>			可抵達、會隨 parent 旋轉的相對航點
#RelativeLoose,<parent>,<X>,<height>,<Z>,<time>			可抵達、不會隨 parent 旋轉的相對航點
#FollowFixed,<parent>,<X>,<height>,<Z>,<time>			不可抵達、會隨 parent 旋轉的相對航點
#FollowLoose,<parent>,<X>,<height>,<Z>,<time>			不可抵達、不會隨 parent 旋轉的相對航點

#無條件攻擊
#很粗略，或許應改由觸發器取代
//Attack=Taskforce2Vessel1,1,wp_ss-n-12,4,wp_1|Taskforce2Vessel1,10
