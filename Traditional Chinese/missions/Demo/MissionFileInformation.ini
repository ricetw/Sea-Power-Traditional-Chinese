# targetObject：必要，一律預期為第 1 項
# timeOfAttack：可選，一律預期為第 2 項。以任務開始或抵達航點（若指定）後的秒數計算。
# ammunitionFileName（可選），可位於第 3 項之後任意位置
# numberOfShots（可選），可位於第 3 項之後任意位置
# waypointNumber（可選），可位於第 3 項之後任意位置。允許在抵達指定航點後才開始攻擊；若航點不存在，攻擊會取消

