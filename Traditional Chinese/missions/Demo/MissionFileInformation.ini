[Debug]
#記錄模式定義。
#預設 = None
#用於個人化記錄
LogMode=Ivan

#允許在此特定任務中停用地形。
#預設 = False
#覆寫 usersettings.ini 中的設定
//DisableTerrain=False

#即使設定檔停用音樂，也可在此任務中強制載入音樂。
#預設 = False
#覆寫 config.ini 中的設定
//ForceMusicLoadig=False

#允許覆寫非玩家單位的控制選項。
#預設 = False
//AllowControlOfEnemyUnits=False


#允許覆寫未識別非玩家單位的可視設定。
#預設 = False
//ShowUnidentifiedUnitsIn3D=False

#允許啟用 WeaponTestMode。
#預設 = False
//WeaponTestMode=False

#允許禁止敵方 AI 在此特定任務中攻擊玩家。
#預設 = True
AllowEnemyUnitsAttackPlayer=False

#允許覆寫所有敵方（由 'EnemyTaskforce' 定義）單位的武器狀態
#預設 = 不寫此行
//EnemyWeaponStatus=Tight

#DevMode GUI 的初始縮放比例。
#可用值 = Auto,<數字>
#預設 = Auto
#DevModeGUIScale=Auto
DevModeGUIScale=1
#縮放調整按鈕會加上或減去的數值

